<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JEM Clip Summary Editor</title>
<style>
  :root {
    --bg: #f5f0e8;
    --bg2: #ede8dc;
    --bg3: #e4ddd0;
    --panel: #faf7f2;
    --panel2: #f0ece3;
    --border: #d4c9b5;
    --border2: #c4b89f;
    --tx: #2a2118;
    --tx2: #5a4e3a;
    --tx3: #8a7a62;
    --tx4: #b0a088;
    --accent: #8b4513;
    --accent2: #a0522d;
    --accent-light: #f0e0d0;
    --green: #4a7c59;
    --green-light: #e0f0e4;
    --yellow: #c8960a;
    --yellow-light: #fdf3d0;
    --red: #9b3a2a;
    --red-light: #fbe8e4;
    --blue: #2a5a8b;
    --blue-light: #e0eaf8;
    --shadow: 0 2px 8px rgba(42,33,24,0.10);
    --shadow2: 0 4px 20px rgba(42,33,24,0.15);
    --radius: 8px;
    --radius2: 12px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Georgia', serif; background: var(--bg); color: var(--tx); min-height: 100vh; display: flex; flex-direction: column; }

  /* ── AUTH SCREEN ── */
  #authScreen {
    position: fixed; inset: 0; background: var(--bg);
    display: flex; align-items: center; justify-content: center; z-index: 1000;
    flex-direction: column;
  }
  .auth-card {
    background: var(--panel); border: 1px solid var(--border); border-radius: var(--radius2);
    padding: 40px 48px; text-align: center; box-shadow: var(--shadow2); max-width: 400px; width: 100%;
  }
  .auth-jem-logo { width: 120px; height: auto; display: block; margin: 0 auto 20px; border-radius: 8px; }
  .auth-title { font-size: 21px; color: var(--tx); font-weight: normal; margin-bottom: 4px; }
  .auth-sub { font-size: 11px; color: var(--tx3); margin-bottom: 24px; letter-spacing: 1.5px; text-transform: uppercase; }
  .auth-divider { height: 1px; background: var(--border); margin: 0 0 24px; }
  .auth-btn {
    background: var(--accent); color: #fff; border: none; border-radius: var(--radius);
    padding: 11px 26px; font-size: 13px; cursor: pointer; font-family: inherit;
    transition: background 0.15s; display: inline-flex; align-items: center; gap: 10px;
    box-shadow: 0 2px 6px rgba(139,69,19,0.25);
  }
  .auth-btn:hover { background: var(--accent2); }
  .auth-error { color: var(--red); font-size: 12px; margin-top: 14px; }

  /* ── TOP BAR ── */
  #topBar {
    display: none; background: var(--panel); border-bottom: 1px solid var(--border);
    padding: 0 20px; height: 52px; align-items: center; gap: 16px; position: sticky; top: 0; z-index: 100;
    box-shadow: 0 1px 4px rgba(42,33,24,0.08);
  }
  .topbar-logo { font-size: 11px; letter-spacing: 2px; color: var(--tx3); text-transform: uppercase; white-space: nowrap; }
  .topbar-title { font-size: 15px; color: var(--tx); font-weight: normal; }
  .topbar-sep { width: 1px; height: 20px; background: var(--border); }
  .topbar-nav { display: flex; gap: 2px; }
  .topbar-nav-btn {
    padding: 5px 12px; border-radius: 6px; border: none; background: none;
    font-size: 13px; font-family: inherit; color: var(--tx2); cursor: pointer; transition: all 0.15s;
  }
  .topbar-nav-btn:hover { background: var(--bg2); }
  .topbar-nav-btn.active { background: var(--accent-light); color: var(--accent); font-weight: bold; }
  .topbar-right { margin-left: auto; display: flex; align-items: center; gap: 12px; }
  .user-chip { font-size: 12px; color: var(--tx3); display: flex; align-items: center; gap: 6px; }
  .user-avatar { width: 26px; height: 26px; border-radius: 50%; background: var(--accent-light); color: var(--accent); font-size: 11px; font-weight: bold; display: flex; align-items: center; justify-content: center; }
  .btn { padding: 6px 14px; border-radius: 6px; border: 1px solid var(--border); background: var(--panel); font-size: 12px; font-family: inherit; cursor: pointer; color: var(--tx2); transition: all 0.15s; }
  .btn:hover { background: var(--bg2); border-color: var(--border2); }
  .btn-primary { background: var(--accent); color: #fff; border-color: var(--accent); }
  .btn-primary:hover { background: var(--accent2); border-color: var(--accent2); }
  .btn-green { background: var(--green); color: #fff; border-color: var(--green); }
  .btn-green:hover { background: #3d6b4a; border-color: #3d6b4a; }
  .btn-sm { padding: 4px 10px; font-size: 11px; }

  /* ── MAIN LAYOUT ── */
  #appShell { display: none; flex: 1; flex-direction: column; }

  /* ── QUEUE VIEW ── */
  #queueView { flex: 1; display: flex; gap: 0; overflow: hidden; height: calc(100vh - 52px); }

  .queue-sidebar {
    width: 320px; min-width: 280px; background: var(--panel); border-right: 1px solid var(--border);
    display: flex; flex-direction: column; overflow: hidden;
  }
  .queue-controls { padding: 14px; border-bottom: 1px solid var(--border); display: flex; flex-direction: column; gap: 10px; }
  .search-input {
    width: 100%; padding: 7px 10px; border: 1px solid var(--border); border-radius: 6px;
    font-size: 13px; font-family: inherit; background: var(--bg); color: var(--tx);
    outline: none; transition: border-color 0.15s;
  }
  .search-input:focus { border-color: var(--accent); }
  .filter-row { display: flex; gap: 4px; flex-wrap: wrap; }
  .filter-chip {
    padding: 3px 9px; border-radius: 20px; border: 1px solid var(--border); background: var(--bg2);
    font-size: 11px; font-family: inherit; cursor: pointer; color: var(--tx2); transition: all 0.15s; white-space: nowrap;
  }
  .filter-chip:hover { border-color: var(--border2); }
  .filter-chip.active { background: var(--accent); color: #fff; border-color: var(--accent); }
  .batch-bar { display: flex; gap: 6px; align-items: center; }
  .clip-count { font-size: 11px; color: var(--tx3); margin-left: auto; }

  .queue-list { flex: 1; overflow-y: auto; }
  .queue-item {
    padding: 12px 14px; border-bottom: 1px solid var(--border); cursor: pointer;
    transition: background 0.12s; display: flex; gap: 10px; align-items: flex-start;
  }
  .queue-item:hover { background: var(--bg2); }
  .queue-item.selected { background: var(--accent-light); border-left: 3px solid var(--accent); }
  .queue-item-thumb { width: 56px; height: 36px; border-radius: 4px; object-fit: cover; background: var(--bg3); flex-shrink: 0; }
  .queue-item-thumb-placeholder { width: 56px; height: 36px; border-radius: 4px; background: var(--bg3); flex-shrink: 0; display: flex; align-items: center; justify-content: center; font-size: 10px; color: var(--tx4); }
  .queue-item-body { flex: 1; min-width: 0; }
  .queue-item-title { font-size: 12px; font-weight: bold; color: var(--tx); line-height: 1.3; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .queue-item-meta { font-size: 10px; color: var(--tx3); margin-top: 2px; }
  .queue-item-preview { font-size: 11px; color: var(--tx2); margin-top: 4px; line-height: 1.4; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
  .status-badge {
    display: inline-flex; align-items: center; gap: 3px; padding: 2px 7px; border-radius: 10px; font-size: 10px; white-space: nowrap; flex-shrink: 0;
  }
  .status-unprocessed { background: var(--bg3); color: var(--tx3); }
  .status-flagged { background: var(--red-light); color: var(--red); }
  .status-draft { background: var(--yellow-light); color: var(--yellow); }
  .status-approved { background: var(--green-light); color: var(--green); }
  .queue-item-cb { margin-top: 2px; accent-color: var(--accent); flex-shrink: 0; }

  /* ── DETAIL PANEL ── */
  .detail-panel {
    flex: 1; display: flex; flex-direction: column; overflow: hidden; background: var(--bg);
  }
  .detail-empty {
    flex: 1; display: flex; align-items: center; justify-content: center;
    flex-direction: column; gap: 12px; color: var(--tx4);
  }
  .detail-empty-icon { font-size: 48px; opacity: 0.4; }
  .detail-content { flex: 1; overflow-y: auto; padding: 24px; display: flex; flex-direction: column; gap: 20px; }

  .detail-header { display: flex; gap: 18px; align-items: flex-start; }
  .detail-thumb { width: 140px; height: 90px; border-radius: 6px; object-fit: cover; background: var(--bg3); flex-shrink: 0; box-shadow: var(--shadow); }
  .detail-thumb-placeholder { width: 140px; height: 90px; border-radius: 6px; background: var(--bg3); flex-shrink: 0; display: flex; align-items: center; justify-content: center; color: var(--tx4); font-size: 12px; }
  .detail-meta { flex: 1; }
  .detail-title { font-size: 18px; color: var(--tx); line-height: 1.3; margin-bottom: 6px; }
  .detail-meta-row { font-size: 12px; color: var(--tx3); display: flex; gap: 16px; flex-wrap: wrap; margin-bottom: 8px; }
  .detail-meta-item { display: flex; align-items: center; gap: 4px; }

  .card {
    background: var(--panel); border: 1px solid var(--border); border-radius: var(--radius2);
    overflow: hidden; box-shadow: var(--shadow);
  }
  .card-header {
    padding: 10px 16px; background: var(--panel2); border-bottom: 1px solid var(--border);
    font-size: 12px; font-weight: bold; color: var(--tx2); letter-spacing: 0.5px; text-transform: uppercase;
    display: flex; align-items: center; gap: 8px;
  }
  .card-body { padding: 16px; }

  .orig-text { font-size: 13px; color: var(--tx2); line-height: 1.7; background: var(--bg2); border-radius: 6px; padding: 12px; }
  .draft-textarea {
    width: 100%; min-height: 120px; font-size: 13px; font-family: 'Georgia', serif; color: var(--tx);
    line-height: 1.7; border: 1px solid var(--border); border-radius: 6px; padding: 12px;
    background: var(--bg); resize: vertical; outline: none; transition: border-color 0.15s;
  }
  .draft-textarea:focus { border-color: var(--accent); }
  .word-count { font-size: 11px; color: var(--tx4); text-align: right; margin-top: 4px; }
  .word-count.over { color: var(--red); }

  .action-bar { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; padding: 12px 16px; background: var(--panel2); border-top: 1px solid var(--border); }
  .action-bar-right { margin-left: auto; display: flex; gap: 8px; }

  .flag-banner { background: var(--red-light); border: 1px solid var(--red); border-radius: 8px; padding: 12px 16px; font-size: 13px; color: var(--red); display: flex; gap: 10px; align-items: flex-start; }
  .flag-icon { font-size: 18px; flex-shrink: 0; }

  /* ── AI CHAT ── */
  .chat-panel { display: flex; flex-direction: column; }
  .chat-messages { min-height: 120px; max-height: 280px; overflow-y: auto; padding: 12px; display: flex; flex-direction: column; gap: 10px; }
  .chat-msg { display: flex; gap: 8px; }
  .chat-msg-avatar { width: 24px; height: 24px; border-radius: 50%; background: var(--accent-light); color: var(--accent); font-size: 10px; font-weight: bold; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
  .chat-msg-avatar.ai { background: var(--blue-light); color: var(--blue); }
  .chat-msg-body { flex: 1; font-size: 13px; color: var(--tx); line-height: 1.6; background: var(--bg2); border-radius: 8px; padding: 8px 12px; }
  .chat-msg-body.ai { background: var(--blue-light); }
  .chat-input-row { display: flex; gap: 8px; padding: 10px 12px; border-top: 1px solid var(--border); }
  .chat-input { flex: 1; padding: 7px 10px; border: 1px solid var(--border); border-radius: 6px; font-size: 13px; font-family: inherit; background: var(--bg); color: var(--tx); outline: none; }
  .chat-input:focus { border-color: var(--accent); }
  .use-as-draft-btn { font-size: 11px; color: var(--accent); cursor: pointer; border: 1px solid var(--accent); border-radius: 4px; padding: 2px 6px; background: var(--accent-light); display: inline-block; margin-top: 6px; }
  .use-as-draft-btn:hover { background: var(--accent); color: #fff; }
  .transcript-note { font-size: 11px; color: var(--green); margin-top: 4px; }

  /* ── PROGRESS BAR ── */
  .progress-bar-wrap { background: var(--bg3); border-radius: 4px; height: 6px; overflow: hidden; margin: 8px 0; }
  .progress-bar-fill { height: 100%; background: var(--accent); border-radius: 4px; transition: width 0.3s; }
  .progress-label { font-size: 11px; color: var(--tx3); }

  /* ── ATTENTION QUEUE ── */
  #attentionView { flex: 1; overflow-y: auto; padding: 24px; }
  .attention-grid { display: flex; flex-direction: column; gap: 12px; max-width: 900px; margin: 0 auto; }
  .attention-card {
    background: var(--panel); border: 1px solid var(--border); border-radius: var(--radius2);
    padding: 16px; display: flex; gap: 14px; align-items: flex-start; cursor: pointer;
    transition: box-shadow 0.15s; box-shadow: var(--shadow);
  }
  .attention-card:hover { box-shadow: var(--shadow2); }
  .attention-thumb { width: 80px; height: 52px; border-radius: 6px; object-fit: cover; background: var(--bg3); flex-shrink: 0; }
  .attention-body { flex: 1; }
  .attention-title { font-size: 14px; font-weight: bold; margin-bottom: 4px; }
  .attention-flag { font-size: 12px; color: var(--red); margin-bottom: 6px; }
  .attention-orig { font-size: 12px; color: var(--tx3); font-style: italic; }

  /* ── EXPORT VIEW ── */
  #exportView { flex: 1; overflow-y: auto; padding: 24px; }
  .export-header { display: flex; gap: 12px; align-items: center; margin-bottom: 20px; max-width: 1000px; margin-left: auto; margin-right: auto; }
  .export-title { font-size: 20px; color: var(--tx); }
  .export-list { max-width: 1000px; margin: 0 auto; display: flex; flex-direction: column; gap: 16px; }
  .export-item { background: var(--panel); border: 1px solid var(--border); border-radius: var(--radius2); padding: 16px; display: flex; gap: 16px; box-shadow: var(--shadow); }
  .export-thumb { width: 100px; height: 64px; border-radius: 6px; object-fit: cover; background: var(--bg3); flex-shrink: 0; }
  .export-body { flex: 1; }
  .export-clip-title { font-size: 14px; font-weight: bold; margin-bottom: 4px; }
  .export-meta { font-size: 11px; color: var(--tx3); margin-bottom: 8px; }
  .export-summary { font-size: 13px; color: var(--tx); line-height: 1.7; margin-bottom: 10px; font-style: italic; }
  .tag-bubbles { display: flex; gap: 5px; flex-wrap: wrap; }
  .tag-bubble { padding: 2px 9px; border-radius: 20px; background: var(--bg3); border: 1px solid var(--border); font-size: 10px; color: var(--tx2); }

  /* ── BOOK VIEW ── */
  #bookView { flex: 1; overflow-y: auto; background: var(--bg2); padding: 32px; }
  .book-controls { display: flex; gap: 10px; align-items: center; margin-bottom: 24px; justify-content: center; }
  .book-pages { max-width: 860px; margin: 0 auto; display: flex; flex-direction: column; gap: 0; }
  .book-page {
    background: #fefcf7; border: 1px solid #d4c9b5; box-shadow: 0 4px 24px rgba(42,33,24,0.18), 0 1px 4px rgba(42,33,24,0.08);
    padding: 60px 60px 80px; margin-bottom: 40px; border-radius: 2px; position: relative;
    min-height: 700px;
  }
  .book-page::before { content: ''; position: absolute; inset: 3px; border: 0.5px solid #e0d8c8; border-radius: 1px; pointer-events: none; }
  .book-page-header { text-align: center; border-bottom: 2px solid var(--accent); padding-bottom: 12px; margin-bottom: 28px; }
  .book-page-header-title { font-size: 11px; letter-spacing: 3px; text-transform: uppercase; color: var(--tx3); }
  .book-entries { columns: 2; column-gap: 36px; }
  .book-entry { break-inside: avoid; margin-bottom: 24px; padding-bottom: 24px; border-bottom: 1px solid var(--border); }
  .book-entry:last-child { border-bottom: none; }
  .book-entry-inner { display: flex; gap: 10px; }
  .book-entry-thumb { width: 72px; height: 46px; border-radius: 4px; object-fit: cover; background: var(--bg3); flex-shrink: 0; }
  .book-entry-content { flex: 1; }
  .book-entry-title { font-size: 11px; font-weight: bold; color: var(--tx); margin-bottom: 3px; line-height: 1.3; }
  .book-entry-meta { font-size: 9px; color: var(--tx3); margin-bottom: 6px; }
  .book-entry-summary { font-size: 10px; color: var(--tx); line-height: 1.6; font-family: 'Georgia', serif; }
  .book-entry-tags { display: flex; gap: 3px; flex-wrap: wrap; margin-top: 6px; }
  .book-tag { font-size: 8px; padding: 1px 6px; border-radius: 10px; background: var(--bg2); border: 1px solid var(--border); color: var(--tx3); }
  .book-page-footer { position: absolute; bottom: 24px; left: 60px; right: 60px; display: flex; justify-content: space-between; font-size: 9px; color: var(--tx4); border-top: 0.5px solid var(--border); padding-top: 8px; }

  /* ── LOADING OVERLAY ── */
  #loadingOverlay {
    position: fixed; inset: 0; background: rgba(245,240,232,0.92); z-index: 500;
    display: flex; align-items: center; justify-content: center; flex-direction: column; gap: 16px;
  }
  .loading-spinner { width: 36px; height: 36px; border: 3px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.8s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .loading-text { font-size: 14px; color: var(--tx3); }

  /* ── TOAST ── */
  #toast {
    position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%) translateY(80px);
    background: var(--tx); color: var(--bg); padding: 10px 20px; border-radius: 8px;
    font-size: 13px; z-index: 999; transition: transform 0.25s; pointer-events: none;
  }
  #toast.show { transform: translateX(-50%) translateY(0); }
  #toast.success { background: var(--green); }
  #toast.error { background: var(--red); }

  /* ── MISC ── */
  .divider { height: 1px; background: var(--border); margin: 4px 0; }
  .empty-state { text-align: center; padding: 40px; color: var(--tx4); font-size: 14px; }
  .spinning { animation: spin 0.8s linear infinite; display: inline-block; }

  @media print {
    #topBar, .queue-sidebar, .book-controls { display: none !important; }
    #bookView { padding: 0; background: none; }
    .book-page { box-shadow: none; border: none; margin: 0; page-break-after: always; }
  }
</style>
</head>
<body>

<!-- AUTH SCREEN -->

// Editorial prompt (rules)
const EDITORIAL_PROMPT = `You are an editor rewriting Jewish educational video summaries for the back of the JEM Video Index book. Rewrite the summary provided according to the rules below. Output only the rewritten summary — no preamble, no explanation, no notes about what was changed.

## 1. Length and structure
Target: 90 words. Maximum: 110 words. This is a hard cap, not a guideline.
- The output length does NOT depend on the length of the input.
- If your draft exceeds 110 words, cut it further.
- Short inputs may produce shorter outputs (45–70 words is fine if the source is genuinely brief). Never pad.
- Break into short paragraphs of 2–4 sentences. No bullets, no headers.
- Never open with a scene-setting clause like "While discussing...," "In modern times...," "During the year of..."
- Remove closing sentences that only restate what was just said.

### Flow and rhythm
Short sentences are fine, but do not stack many 5–8 word sentences in a row.
When two sentences express a linked idea, join them using semicolons, em dashes, colons, appositives, or participial phrases.
Cut transitions that only announce a shift: "Furthermore," "Moreover," "In addition," "As a result," "Consequently," "That being said," "Needless to say."

## 2. Voice
- When content is addressed to the audience, shift to direct second-person ("You must...").
- When content is narrative or explanatory, keep third-person.
- Cut hedging filler: "of course," "similarly," "needless to say," "it goes without saying," "as we know," "in truth," "indeed."
- Do not announce that a lesson will be drawn — just state the lesson.

## 3. Cuts to make
- Cut meta-commentary about the source text.
- Cut parenthetical gender pairs — use a single pronoun or rephrase.
- Cut extended analogies down to their punchline.
- Cut redundant intensifiers.
- When a verse repeats what is said immediately before or after it, remove the verse.

## 4. Terminology and spelling
### 4a. Sephardic spelling — mandatory conversions
- Shabbat (not Shabbos), mitzvot (not mitzvos), Mashiach (not Moshiach)
- Shavuot, Sukkot, Simchat Torah, bat, Beit Hamikdash, Beit Midrash, Tzemach Tzedek
- Any Hebrew word ending "-s"/"-os" → "-t"/"-ot"

### 4b. G-d
- G-d, G-d's (never God); L-rd (never Lord); A-lmighty (never Almighty)

### 4c. Other spelling
- Torah always capitalized
- The Rebbe, Alter Rebbe, Mitteler Rebbe, Tzemach Tzedek, Previous Rebbe

### 4d. Italicization — whitelist only
Italicize ONLY: mitzvah, mitzvot, shofar, tzaddik, tzaddikim, farbrengen, sicha, sichot, maamar, maamarim, niggun, niggunim, teshuvah, chinuch, shlichut, shliach, shluchim, yeshivah, cheder, nekudah, avodah, kabbalah, Chassid, Chassidim, Anochi, Kumatz, Aleph, bet din, halacha, halachot
Do NOT italicize: Torah, Mashiach, Shabbat, Rebbe, Chassidus, Chassidic, Kohen, Levi, and all proper nouns.

### 4e. Punctuation
Em dash (—) only for emphasis or interruption.

## 5. Tone and fidelity
- Warm and direct.
- Preserve all theological and halachic specifics.
- Keep names and specific texts if the original has them.
- Do not introduce names, texts, dates, or claims not in the source.

## 6. Output format
Output only the rewritten summary. No preamble, no explanation, no headers, no word count. Plain prose in short paragraphs. Italics with markdown asterisks (*term*).

## 7. Final self-check
1. Any word ending "-os" or "-us" that should be "-ot"? (Shabbos→Shabbat, mitzvos→mitzvot)
2. Any "Moshiach"? → Mashiach.
3. Any "God"? → G-d.
4. Any italicized term not on the whitelist? → remove italics.
5. Any whitelist term left plain? → add italics.
6. Any "bas" in a name? → bat.

## FINAL STEP — two-pass length enforcement
Pass 1: write the draft, aim for ~90 words.
Pass 2: if over 110 words, cut transition-only sentences, delete last sentence if it only restates, cut verbose phrases, merge short related sentences, delete parenthetical asides, then if still long delete least-central sentence.
Output only the result of Pass 2.`;

function handleAuthCallback() {
  const hash = new URLSearchParams(location.hash.slice(1));

async function fetchUserInfo() {

// ══════════════════════════════════════════════
// SHEETS API
// ══════════════════════════════════════════════
async function sheetsGet(range) {
  const url = `https://sheets.googleapis.com/v4/spreadsheets/${CONFIG.SHEET_ID}/values/${encodeURIComponent(range)}`;
  const r = await fetch(url, { headers: { Authorization: 'Bearer ' + S.token } });
  if (r.status === 401) { signOut(); throw new Error('Session expired — please sign in again'); }
  if (!r.ok) throw new Error('Sheets read error: ' + r.status);
  return r.json();
}

async function sheetsSet(range, values) {
  const url = `https://sheets.googleapis.com/v4/spreadsheets/${CONFIG.SHEET_ID}/values/${encodeURIComponent(range)}?valueInputOption=RAW`;
  const r = await fetch(url, {
    method: 'PUT',
    headers: { Authorization: 'Bearer ' + S.token, 'Content-Type': 'application/json' },
    body: JSON.stringify({ range, majorDimension: 'ROWS', values })
  });
  if (r.status === 401) { signOut(); throw new Error('Session expired'); }
  if (!r.ok) throw new Error('Sheets write error: ' + r.status);
  return r.json();
}

async function sheetsBatchSet(data) {
  // data = [{range, values}]
  const url = `https://sheets.googleapis.com/v4/spreadsheets/${CONFIG.SHEET_ID}/values:batchUpdate`;
  const r = await fetch(url, {
    method: 'POST',
    headers: { Authorization: 'Bearer ' + S.token, 'Content-Type': 'application/json' },
    body: JSON.stringify({ valueInputOption: 'RAW', data })
  });
  if (r.status === 401) { signOut(); throw new Error('Session expired'); }
  if (!r.ok) throw new Error('Sheets batch write error: ' + r.status);
  return r.json();
}

function colLetter(n) { // 0-based to A, B, ...
  let s = '';
  n++;
  while (n > 0) { n--; s = String.fromCharCode(65 + (n % 26)) + s; n = Math.floor(n / 26); }
  return s;
}

function rowNum(clip) { return clip._rowNum; } // 1-based sheet row

// ══════════════════════════════════════════════
// REVIEW TAB
// ══════════════════════════════════════════════
const REVIEW_COLS = { ID: 0, STATUS: 1, ORIGINAL_BACKUP: 2, FLAG_REASON: 3, APPROVED_BY: 4, APPROVED_AT: 5 };

async function ensureReviewTab() {
  // Check if tab exists
  const url = `https://sheets.googleapis.com/v4/spreadsheets/${CONFIG.SHEET_ID}?fields=sheets.properties`;
  const r = await fetch(url, { headers: { Authorization: 'Bearer ' + S.token } });
  const meta = await r.json();
  const exists = meta.sheets?.some(s => s.properties.title === CONFIG.REVIEW_TAB);
  if (!exists) {
    // Create tab
    await fetch(`https://sheets.googleapis.com/v4/spreadsheets/${CONFIG.SHEET_ID}:batchUpdate`, {
      method: 'POST',
      headers: { Authorization: 'Bearer ' + S.token, 'Content-Type': 'application/json' },
      body: JSON.stringify({ requests: [{ addSheet: { properties: { title: CONFIG.REVIEW_TAB } } }] })
    });
    // Write header
    await sheetsSet(`'${CONFIG.REVIEW_TAB}'!A1:F1`, [['clip_id','status','original_backup','flag_reason','approved_by','approved_at']]);
  }
}

async function loadReviewData() {
  try {
    const data = await sheetsGet(`'${CONFIG.REVIEW_TAB}'!A:F`);
    const rows = data.values || [];
    S.reviewData = {};
    rows.slice(1).forEach(row => {
      if (!row[0]) return;
      S.reviewData[row[0]] = {
        status: row[1] || 'unprocessed',
        originalBackup: row[2] || '',
        flagReason: row[3] || '',
        approvedBy: row[4] || '',
        approvedAt: row[5] || '',
      };
    });
  } catch(e) { console.warn('Review data load error:', e); }
}

async function saveReviewRow(clip) {
  const id = String(clip._rowNum);
  const rd = S.reviewData[id] || {};
  // Find existing row or append
  const data = await sheetsGet(`'${CONFIG.REVIEW_TAB}'!A:A`);
  const rows = data.values || [];
  let sheetRow = -1;
  rows.forEach((r, i) => { if (r[0] === id) sheetRow = i + 1; });
  const values = [[id, rd.status||'unprocessed', rd.originalBackup||'', rd.flagReason||'', rd.approvedBy||'', rd.approvedAt||'']];
  if (sheetRow > 0) {
    await sheetsSet(`'${CONFIG.REVIEW_TAB}'!A${sheetRow}:F${sheetRow}`, values);
  } else {
    // Append
    const nextRow = rows.length + 1;
    await sheetsSet(`'${CONFIG.REVIEW_TAB}'!A${nextRow}:F${nextRow}`, values);
  }
}

// ══════════════════════════════════════════════
// DATA LOADING
// ══════════════════════════════════════════════
async function loadAllData() {
  showLoading('Loading clips…');
  try {
    await ensureReviewTab();
    showLoading('Reading sheet data…');
    // Load main tab — all columns up to AD (col 29)
    const data = await sheetsGet(`'${CONFIG.MAIN_TAB}'!A:AD`);
    const rows = data.values || [];
    if (rows.length < 2) throw new Error('No data found in sheet');
    const header = rows[0];
    showLoading('Loading review data…');
    await loadReviewData();
    // Filter to Sicha clips only
    S.clips = [];
    rows.slice(1).forEach((row, i) => {
      const clipType = (row[CONFIG.COL.CLIP_TYPE] || '').trim();
      if (clipType !== CONFIG.CLIP_TYPE_FILTER) return;
      S.clips.push({
        _rowNum: i + 2, // 1-based, +1 for header
        description: row[CONFIG.COL.DESCRIPTION] || '',
        thumbnail: row[CONFIG.COL.THUMBNAIL] || '',
        keywords: row[CONFIG.COL.KEYWORDS] || '',
        programNum: row[CONFIG.COL.PROGRAM_NUM] || '',
        date: row[CONFIG.COL.DATE] || '',
        rewrite: row[CONFIG.COL.REWRITE] || '',
        clipType: clipType,
        // Title: try to construct from available data
        title: row[1] || row[2] || row[3] || ('Clip #' + (i+2)),
      });
    });
    hideLoading();
    renderQueue();
    updateAttentionCount();
  } catch(e) {
    hideLoading();
    showToast('Error loading data: ' + e.message, 'error');
    console.error(e);
  }
}

// ══════════════════════════════════════════════
// CLIP HELPERS
// ══════════════════════════════════════════════
function getStatus(clip) {
  const rd = S.reviewData[String(clip._rowNum)];
  return rd?.status || 'unprocessed';
}

function getReviewField(clip, field) {
  return S.reviewData[String(clip._rowNum)]?.[field] || '';
}

function setReviewField(clip, field, val) {
  const id = String(clip._rowNum);
  if (!S.reviewData[id]) S.reviewData[id] = { status: 'unprocessed', originalBackup: '', flagReason: '', approvedBy: '', approvedAt: '' };
  S.reviewData[id][field] = val;
}

function parseTags(clip) {
  try {
    const raw = clip.keywords;
    if (!raw) return [];
    const parsed = JSON.parse(raw);
    if (Array.isArray(parsed)) return parsed.map(t => typeof t === 'object' ? (t.name || t.value || JSON.stringify(t)) : String(t)).slice(0, 20);
    if (typeof parsed === 'object') return Object.keys(parsed).slice(0, 20);
    return [];
  } catch { return []; }
}

function wordCount(text) {
  return text.trim().split(/\s+/).filter(Boolean).length;
}

function statusBadgeHTML(status) {
  const map = {
    unprocessed: ['status-unprocessed', '⬜ Unprocessed'],
    flagged: ['status-flagged', '🚩 Needs Attention'],
    draft: ['status-draft', '🟡 Draft'],
    approved: ['status-approved', '✅ Approved'],
  };
  const [cls, label] = map[status] || map.unprocessed;
  return `<span class="status-badge ${cls}">${label}</span>`;
}

// ══════════════════════════════════════════════
// QUEUE RENDER
// ══════════════════════════════════════════════
function filteredClips() {
  let clips = S.clips;
  if (S.filter !== 'all') clips = clips.filter(c => getStatus(c) === S.filter);
  if (S.search) {
    const q = S.search.toLowerCase();
    clips = clips.filter(c => c.title.toLowerCase().includes(q) || c.description.toLowerCase().includes(q) || c.date.toLowerCase().includes(q) || c.programNum.toLowerCase().includes(q));
  }
  return clips;
}

function renderQueue() {
  const clips = filteredClips();
  const el = document.getElementById('queueList');
  document.getElementById('clipCount').textContent = clips.length + ' clips';
  el.innerHTML = clips.map(clip => {
    const status = getStatus(clip);
    const thumbHTML = clip.thumbnail
      ? `<img class="queue-item-thumb" src="${esc(clip.thumbnail)}" onerror="this.style.display='none'">`
      : `<div class="queue-item-thumb-placeholder">🎬</div>`;
    const preview = (clip.rewrite || clip.description || '').substring(0, 80);
    return `<div class="queue-item ${S.selectedIdx === clip._rowNum ? 'selected' : ''}" onclick="selectClip(${clip._rowNum})">
      <input type="checkbox" class="queue-item-cb" data-row="${clip._rowNum}" onclick="event.stopPropagation()" onchange="updateBatchBtn()">
      ${thumbHTML}
      <div class="queue-item-body">
        <div class="queue-item-title">${esc(clip.title)}</div>
        <div class="queue-item-meta">LT ${esc(clip.programNum)} · ${esc(clip.date)}</div>
        <div class="queue-item-preview">${esc(preview)}…</div>
        <div style="margin-top:4px">${statusBadgeHTML(status)}</div>
      </div>
    </div>`;
  }).join('') || `<div class="empty-state">No clips match current filter</div>`;
}

function filterQueue() {
  S.search = document.getElementById('searchInput').value;
  renderQueue();
}

function setFilter(f, btn) {
  S.filter = f;
  document.querySelectorAll('.filter-chip').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderQueue();
}

function selectAll() {
  const clips = filteredClips().filter(c => getStatus(c) === 'unprocessed');
  document.querySelectorAll('.queue-item-cb').forEach(cb => {
    const row = parseInt(cb.dataset.row);
    const clip = S.clips.find(c => c._rowNum === row);
    if (clip && getStatus(clip) === 'unprocessed') cb.checked = true;
  });
  updateBatchBtn();
}

function updateBatchBtn() {
  const checked = document.querySelectorAll('.queue-item-cb:checked').length;
  document.getElementById('batchBtn').textContent = checked > 0 ? `▶ Run AI on ${checked} Selected` : '▶ Run AI on Selected';
}

function updateAttentionCount() {
  const n = S.clips.filter(c => getStatus(c) === 'flagged').length;
  const el = document.getElementById('attentionCount');
  if (n > 0) { el.textContent = n; el.style.display = 'inline'; }
  else el.style.display = 'none';
}

// ══════════════════════════════════════════════
// DETAIL PANEL
// ══════════════════════════════════════════════
function selectClip(rowNum) {
  S.selectedIdx = rowNum;
  renderQueue();
  renderDetail();
}

function renderDetail() {
  const clip = S.clips.find(c => c._rowNum === S.selectedIdx);
  if (!clip) return;
  document.getElementById('detailEmpty').style.display = 'none';
  const dc = document.getElementById('detailContent');
  dc.style.display = 'flex';
  const status = getStatus(clip);
  const flagReason = getReviewField(clip, 'flagReason');
  const originalBackup = getReviewField(clip, 'originalBackup');
  const currentDraft = clip._draft || clip.rewrite || '';
  const tags = parseTags(clip);
  const wc = wordCount(currentDraft);
  const wcClass = wc > 110 ? 'over' : '';
  const thumbHTML = clip.thumbnail
    ? `<img class="detail-thumb" src="${esc(clip.thumbnail)}" onerror="this.style.display='none'">`
    : `<div class="detail-thumb-placeholder">🎬</div>`;

  dc.innerHTML = `
    <div class="detail-header">
      ${thumbHTML}
      <div class="detail-meta">
        <div class="detail-title">${esc(clip.title)}</div>
        <div class="detail-meta-row">
          <span class="detail-meta-item">📺 LT ${esc(clip.programNum)}</span>
          <span class="detail-meta-item">📅 ${esc(clip.date)}</span>
          <span class="detail-meta-item">${statusBadgeHTML(status)}</span>
        </div>
        ${tags.length ? `<div class="tag-bubbles">${tags.map(t=>`<span class="tag-bubble">${esc(t)}</span>`).join('')}</div>` : ''}
      </div>
    </div>

    ${status === 'flagged' ? `<div class="flag-banner"><div class="flag-icon">🚩</div><div><strong>Needs Attention:</strong> ${esc(flagReason)}<br><small>Use the AI chat below to provide more context, then regenerate.</small></div></div>` : ''}

    <div class="card">
      <div class="card-header">Original Description</div>
      <div class="card-body">
        <div class="orig-text">${esc(clip.description) || '<em style="color:var(--tx4)">No description</em>'}</div>
        ${originalBackup ? `<div style="font-size:11px;color:var(--tx3);margin-top:6px">📦 Original backup saved</div>` : ''}
      </div>
    </div>

      </div>

        <button class="btn btn-sm" onclick="revertClip(${clip._rowNum})">↩ Revert to Original</button>
        <div class="action-bar-right">
          <button class="btn btn-sm btn-green" onclick="approveClip(${clip._rowNum})">✅ Approve & Save</button>
        </div>

      <div class="card-header">💬 AI Chat <span style="font-size:10px;color:var(--tx4);font-weight:normal;margin-left:6px">Ask AI to revise, clarify, or try a different angle</span></div>
      <div class="chat-messages" id="chatMessages_${clip._rowNum}"></div>
      <div class="chat-input-row">
        <input class="chat-input" id="chatInput_${clip._rowNum}" placeholder="Type a message…" onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();sendChat(${clip._rowNum})}">
        <button class="btn btn-sm btn-primary" onclick="sendChat(${clip._rowNum})">Send</button>
      </div>

  renderChatMessages(clip._rowNum);

function onDraftInput(rowNum) {
  const clip = S.clips.find(c => c._rowNum === rowNum);
  if (!clip) return;
  const val = document.getElementById('draftTA_' + rowNum)?.value || '';
  clip._draft = val;
  const wc = wordCount(val);
  const wcEl = document.getElementById('wc_' + rowNum);
  if (wcEl) {
    wcEl.textContent = wc + ' words' + (wc > 110 ? ' — over limit!' : wc > 90 ? ' ✓' : '');
    wcEl.className = 'word-count' + (wc > 110 ? ' over' : '');
  }
}

// ══════════════════════════════════════════════
// TRANSCRIPT
// ══════════════════════════════════════════════
async function loadTranscript(rowNum) {
  const clip = S.clips.find(c => c._rowNum === rowNum);
  if (!clip) return;
  showToast('Loading transcript…');
  try {
    const data = await sheetsGet(`'${CONFIG.MAIN_TAB}'!AC${rowNum}:AC${rowNum}`);
    const transcript = data.values?.[0]?.[0] || '';
    S.transcriptLoaded[rowNum] = transcript;
    showToast('Transcript loaded ✓', 'success');
    renderDetail();
  } catch(e) { showToast('Failed to load transcript', 'error'); }
}

// ══════════════════════════════════════════════
// AI PROCESSING
// ══════════════════════════════════════════════
function buildAIPrompt(clip, extraContext) {
  const transcript = S.transcriptLoaded[clip._rowNum];
  let prompt = EDITORIAL_PROMPT + '\n\n---\n\nNow rewrite this summary:\n\n' + clip.description;
  if (transcript) prompt += '\n\n---\n\nAdditional context from transcript:\n' + transcript.substring(0, 3000);
  if (extraContext) prompt += '\n\n---\n\nAdditional guidance: ' + extraContext;
  return prompt;
}

async function callAI(messages) {
  if (!S.claudeKey) throw new Error('No API key — please sign out and add your Anthropic key');
  const r = await fetch('https://api.anthropic.com/v1/messages', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json', 'x-api-key': S.claudeKey, 'anthropic-version': '2023-06-01', 'anthropic-dangerous-direct-browser-access': 'true' },
    body: JSON.stringify({
      model: 'claude-sonnet-4-20250514',
      max_tokens: 1000,
      messages,
    })
  });
  const data = await r.json();
  if (data.error) throw new Error(data.error.message);
  return data.content?.find(b => b.type === 'text')?.text || '';
}

async function evaluateAndDraft(clip) {
  // First pass: evaluate if description is sufficient
  const evalPrompt = `You are evaluating a video description to decide if it has enough content to rewrite as a 90-word summary.

Description: "${clip.description}"

Respond with ONLY a JSON object like:
{"ok": true} if the description is sufficient (20+ words with specific content),
{"ok": false, "reason": "brief reason"} if it is too short or too vague to rewrite.

Do not include any other text.`;

  let evalResult;
  try {
    const evalText = await callAI([{ role: 'user', content: evalPrompt }]);
    const clean = evalText.replace(/```json|```/g, '').trim();
    evalResult = JSON.parse(clean);
  } catch { evalResult = { ok: true }; } // default to trying

  if (!evalResult.ok) return { flagged: true, reason: evalResult.reason || 'Description too short or vague' };

  // Second pass: rewrite
  const draft = await callAI([{ role: 'user', content: buildAIPrompt(clip) }]);
  return { flagged: false, draft };
}

async function processClip(clip) {
  const result = await evaluateAndDraft(clip);
  const id = String(clip._rowNum);
  if (result.flagged) {
    if (!S.reviewData[id]) S.reviewData[id] = {};
    S.reviewData[id].status = 'flagged';
    S.reviewData[id].flagReason = result.reason;
    await saveReviewRow(clip);
  } else {
    clip._draft = result.draft;
    if (!S.reviewData[id]) S.reviewData[id] = {};
    S.reviewData[id].status = 'draft';
    S.reviewData[id].flagReason = '';
    await saveReviewRow(clip);
  }
}

async function regenerateClip(rowNum) {
  const clip = S.clips.find(c => c._rowNum === rowNum);
  if (!clip) return;
  const btn = document.querySelector(`[onclick="regenerateClip(${rowNum})"]`);
  if (btn) { btn.disabled = true; btn.textContent = '⏳ Generating…'; }
  try {
    const result = await evaluateAndDraft(clip);
    if (result.flagged) {
      setReviewField(clip, 'status', 'flagged');
      setReviewField(clip, 'flagReason', result.reason);
    } else {
      clip._draft = result.draft;
      setReviewField(clip, 'status', 'draft');
      setReviewField(clip, 'flagReason', '');
    }
    await saveReviewRow(clip);
    renderDetail();
    renderQueue();
    updateAttentionCount();
  } catch(e) { showToast('AI error: ' + e.message, 'error'); }
  finally { if (btn) { btn.disabled = false; btn.textContent = '🔄 Regenerate'; } }
}

async function runBatch() {
  if (S.batchRunning) return;
  const checked = [...document.querySelectorAll('.queue-item-cb:checked')].map(cb => parseInt(cb.dataset.row));
  if (!checked.length) { showToast('Select clips first'); return; }
  S.batchRunning = true;
  document.getElementById('batchProgress').style.display = 'block';
  let done = 0, drafted = 0, flagged = 0;
  for (const rowNum of checked) {
    const clip = S.clips.find(c => c._rowNum === rowNum);
    if (!clip) { done++; continue; }
    document.getElementById('progressLabel').textContent = `Processing ${done+1}/${checked.length} — ${clip.title.substring(0,40)}…`;
    document.getElementById('progressFill').style.width = ((done/checked.length)*100) + '%';
    try {
      await processClip(clip);
      if (getStatus(clip) === 'flagged') flagged++; else drafted++;
    } catch(e) { console.error('Batch error on row', rowNum, e); }
    done++;
    renderQueue();
    updateAttentionCount();
  }
  document.getElementById('progressFill').style.width = '100%';
  document.getElementById('progressLabel').textContent = `Done — ${drafted} drafted, ${flagged} flagged`;
  S.batchRunning = false;
  showToast(`Batch complete: ${drafted} drafted, ${flagged} flagged`, 'success');
  setTimeout(() => { document.getElementById('batchProgress').style.display = 'none'; }, 4000);
}

// ══════════════════════════════════════════════
// APPROVE / REVERT
// ══════════════════════════════════════════════
async function approveClip(rowNum) {
  const clip = S.clips.find(c => c._rowNum === rowNum);
  if (!clip) return;
  const draft = document.getElementById('draftTA_' + rowNum)?.value || clip._draft || '';
  if (!draft.trim()) { showToast('Nothing to save — draft is empty', 'error'); return; }
  showLoading('Saving to sheet…');
  try {
    const id = String(rowNum);
    // Save original backup if not already saved
    if (!S.reviewData[id]?.originalBackup) {
      setReviewField(clip, 'originalBackup', clip.description);
    }
    // Update clip rewrite in memory
    clip.rewrite = draft;
    clip._draft = draft;
    // Set status
    setReviewField(clip, 'status', 'approved');
    setReviewField(clip, 'approvedBy', S.user?.email || '');
    setReviewField(clip, 'approvedAt', new Date().toISOString());
    // Write col Y on main tab
    const colY = colLetter(CONFIG.COL.REWRITE);
    await sheetsSet(`'${CONFIG.MAIN_TAB}'!${colY}${rowNum}:${colY}${rowNum}`, [[draft]]);
    // Write review row
    await saveReviewRow(clip);
    hideLoading();
    renderDetail();
    renderQueue();
    updateAttentionCount();
    showToast('Saved ✅', 'success');
  } catch(e) { hideLoading(); showToast('Save failed: ' + e.message, 'error'); }
}

async function revertClip(rowNum) {
  const clip = S.clips.find(c => c._rowNum === rowNum);
  if (!clip) return;
  const backup = getReviewField(clip, 'originalBackup');
  const restoreTo = backup || clip.description;
  if (!confirm('Revert to original description? This cannot be undone.')) return;
  showLoading('Reverting…');
  try {
    // Restore col Y to original
    const colY = colLetter(CONFIG.COL.REWRITE);
    await sheetsSet(`'${CONFIG.MAIN_TAB}'!${colY}${rowNum}:${colY}${rowNum}`, [[restoreTo]]);
    clip.rewrite = restoreTo;
    clip._draft = '';
    setReviewField(clip, 'status', 'unprocessed');
    setReviewField(clip, 'flagReason', '');
    await saveReviewRow(clip);
    hideLoading();
    renderDetail();
    renderQueue();
    updateAttentionCount();
    showToast('Reverted to original', 'success');
  } catch(e) { hideLoading(); showToast('Revert failed: ' + e.message, 'error'); }
}

// ══════════════════════════════════════════════
// CHAT
// ══════════════════════════════════════════════
function renderChatMessages(rowNum) {
  const el = document.getElementById('chatMessages_' + rowNum);
  if (!el) return;
  const history = S.chatHistory[rowNum] || [];
  if (!history.length) { el.innerHTML = `<div style="font-size:12px;color:var(--tx4);padding:8px">Ask the AI to revise the draft, explain a choice, or try a different angle.</div>`; return; }
  el.innerHTML = history.map((m, i) => {
    const isAI = m.role === 'assistant';
    return `<div class="chat-msg">
      <div class="chat-msg-avatar ${isAI ? 'ai' : ''}">${isAI ? 'AI' : 'You'}</div>
      <div class="chat-msg-body ${isAI ? 'ai' : ''}">
        ${m.content.replace(/\n/g, '<br>')}
        ${isAI ? `<div><span class="use-as-draft-btn" onclick="useAsDraft(${rowNum}, ${i})">Use as Draft</span></div>` : ''}
      </div>
    </div>`;
  }).join('');
  el.scrollTop = el.scrollHeight;
}

async function sendChat(rowNum) {
  const clip = S.clips.find(c => c._rowNum === rowNum);
  if (!clip) return;
  const input = document.getElementById('chatInput_' + rowNum);
  const msg = input?.value?.trim();
  if (!msg) return;
  input.value = '';
  if (!S.chatHistory[rowNum]) S.chatHistory[rowNum] = [];
  // Build context system message
  const ctx = `You are helping edit a Jewish educational video summary. 
Clip: ${clip.title}
Program: LT ${clip.programNum}
Date: ${clip.date}
Original description: ${clip.description}
Current draft: ${clip._draft || clip.rewrite || '(none yet)'}
${S.transcriptLoaded[rowNum] ? 'Transcript excerpt: ' + S.transcriptLoaded[rowNum].substring(0, 1500) : ''}

Follow the same editorial rules as before (90 words target, max 110, Sephardic spellings, G-d, italics whitelist, etc.). If the user asks for a rewrite, output only the rewritten summary with no preamble.`;

  S.chatHistory[rowNum].push({ role: 'user', content: msg });
  renderChatMessages(rowNum);
  // Build messages for API — inject system as first user message
  const messages = [
    { role: 'user', content: ctx + '\n\nUser says: ' + S.chatHistory[rowNum][0].content },
    ...S.chatHistory[rowNum].slice(1).map(m => ({ role: m.role, content: m.content })),
  ];
  // If more than 1 message in history, rebuild properly
  const apiMessages = [{ role: 'user', content: ctx }];
  S.chatHistory[rowNum].forEach(m => apiMessages.push({ role: m.role, content: m.content }));
  // Remove consecutive same-role messages (shouldn't happen but safety)
  const cleanMessages = [apiMessages[0]];
  // Actually just send system context + full chat
  try {
    const reply = await callAI([
      { role: 'user', content: ctx + '\n\n---\n\n' + S.chatHistory[rowNum].slice(0,-1).map(m => (m.role==='user'?'User: ':'AI: ') + m.content).join('\n') + '\n\nUser: ' + msg }
    ]);
    S.chatHistory[rowNum].push({ role: 'assistant', content: reply });
    renderChatMessages(rowNum);
  } catch(e) {
    S.chatHistory[rowNum].push({ role: 'assistant', content: 'Error: ' + e.message });
    renderChatMessages(rowNum);
  }
}

function useAsDraft(rowNum, msgIdx) {
  const clip = S.clips.find(c => c._rowNum === rowNum);
  if (!clip) return;
  const msg = S.chatHistory[rowNum]?.[msgIdx];
  if (!msg) return;
  clip._draft = msg.content;
  setReviewField(clip, 'status', 'draft');
  renderDetail();
  showToast('Draft updated from chat ✓', 'success');
}

// ══════════════════════════════════════════════
// ATTENTION VIEW
// ══════════════════════════════════════════════
function renderAttentionView() {
  const flagged = S.clips.filter(c => getStatus(c) === 'flagged');
  const el = document.getElementById('attentionGrid');
  if (!flagged.length) { el.innerHTML = `<div class="empty-state">No flagged clips 🎉</div>`; return; }
  el.innerHTML = `<h2 style="font-size:18px;color:var(--tx);margin-bottom:8px">🚩 Needs Attention (${flagged.length})</h2>` +
    flagged.map(clip => {
      const thumbHTML = clip.thumbnail
        ? `<img class="attention-thumb" src="${esc(clip.thumbnail)}" onerror="this.style.display='none'">`
        : `<div class="attention-thumb" style="display:flex;align-items:center;justify-content:center;color:var(--tx4)">🎬</div>`;
      return `<div class="attention-card" onclick="goToClip(${clip._rowNum})">
        ${thumbHTML}
        <div class="attention-body">
          <div class="attention-title">${esc(clip.title)}</div>
          <div style="font-size:11px;color:var(--tx3);margin-bottom:4px">LT ${esc(clip.programNum)} · ${esc(clip.date)}</div>
          <div class="attention-flag">🚩 ${esc(getReviewField(clip, 'flagReason'))}</div>
          <div class="attention-orig">${esc((clip.description||'').substring(0,120))}…</div>
        </div>
        <button class="btn btn-sm btn-primary" onclick="event.stopPropagation();goToClip(${clip._rowNum})">Open →</button>
      </div>`;
    }).join('');
}

function goToClip(rowNum) {
  switchView('queue', document.querySelector('[data-view="queue"]'));
  S.selectedIdx = rowNum;
  renderQueue();
  renderDetail();
}

// ══════════════════════════════════════════════
// EXPORT VIEW
// ══════════════════════════════════════════════
function renderExportView() {
  const approved = S.clips.filter(c => getStatus(c) === 'approved');
  document.getElementById('exportStats').textContent = `${approved.length} approved clips`;
  const el = document.getElementById('exportList');
  el.innerHTML = approved.map(clip => {
    const tags = parseTags(clip);
    const summary = clip.rewrite || clip._draft || clip.description || '';
    const thumbHTML = clip.thumbnail
      ? `<img class="export-thumb" src="${esc(clip.thumbnail)}" onerror="this.style.display='none'">`
      : `<div class="export-thumb" style="display:flex;align-items:center;justify-content:center;color:var(--tx4)">🎬</div>`;
    return `<div class="export-item">
      ${thumbHTML}
      <div class="export-body">
        <div class="export-clip-title">${esc(clip.title)}</div>
        <div class="export-meta">LT ${esc(clip.programNum)} · ${esc(clip.date)}</div>
        <div class="export-summary">${esc(summary)}</div>
        <div class="tag-bubbles">${tags.map(t=>`<span class="tag-bubble">${esc(t)}</span>`).join('')}</div>
      </div>
    </div>`;
  }).join('') || `<div class="empty-state">No approved clips yet</div>`;
}

function exportHTML() {
  const approved = S.clips.filter(c => getStatus(c) === 'approved');
  const rows = approved.map(clip => {
    const tags = parseTags(clip);
    const summary = clip.rewrite || clip.description || '';
    return `<tr>
      <td><img src="${clip.thumbnail}" style="width:80px;height:52px;object-fit:cover;border-radius:4px"></td>
      <td>${clip.title}</td>
      <td>LT ${clip.programNum}</td>
      <td>${clip.date}</td>
      <td>${summary}</td>
      <td>${tags.join(', ')}</td>
    </tr>`;
  }).join('');
  const html = `<!DOCTYPE html><html><head><meta charset="UTF-8"><title>JEM Sichos Summaries Export</title>
<style>body{font-family:Georgia,serif;padding:24px;background:#faf7f2}table{border-collapse:collapse;width:100%}th,td{border:1px solid #d4c9b5;padding:8px;vertical-align:top;font-size:12px}th{background:#f0ece3;font-weight:bold}</style></head>
<body><h1 style="font-size:20px;margin-bottom:16px">JEM Sichos Summaries — ${approved.length} clips</h1>
<table><thead><tr><th>Thumb</th><th>Title</th><th>Program</th><th>Date</th><th>Summary</th><th>Tags</th></tr></thead>
<tbody>${rows}</tbody></table></body></html>`;
  const blob = new Blob([html], { type: 'text/html' });
  const a = document.createElement('a'); a.href = URL.createObjectURL(blob);
  a.download = 'JEM_Sichos_Summaries_' + new Date().toISOString().slice(0,10) + '.html';
  a.click();
}

// ══════════════════════════════════════════════
// BOOK VIEW
// ══════════════════════════════════════════════
function renderBookView() {
  const approved = S.clips.filter(c => getStatus(c) === 'approved');
  const el = document.getElementById('bookPages');
  if (!approved.length) { el.innerHTML = `<div class="empty-state">No approved summaries yet</div>`; return; }
  // Chunk into pages
  const perPage = CONFIG.ENTRIES_PER_PAGE;
  const pages = [];
  for (let i = 0; i < approved.length; i += perPage) pages.push(approved.slice(i, i + perPage));
  el.innerHTML = pages.map((pageClips, pi) => {
    const entries = pageClips.map(clip => {
      const tags = parseTags(clip).slice(0, 8);
      const summary = clip.rewrite || clip.description || '';
      const thumbHTML = clip.thumbnail
        ? `<img class="book-entry-thumb" src="${esc(clip.thumbnail)}" onerror="this.style.display='none'">`
        : `<div class="book-entry-thumb" style="display:flex;align-items:center;justify-content:center;font-size:10px;color:var(--tx4)">🎬</div>`;
      return `<div class="book-entry">
        <div class="book-entry-inner">
          ${thumbHTML}
          <div class="book-entry-content">
            <div class="book-entry-title">${esc(clip.title)}</div>
            <div class="book-entry-meta">LT ${esc(clip.programNum)} · ${esc(clip.date)}</div>
            <div class="book-entry-summary">${esc(summary)}</div>
            ${tags.length ? `<div class="book-entry-tags">${tags.map(t=>`<span class="book-tag">${esc(t)}</span>`).join('')}</div>` : ''}
          </div>
        </div>
      </div>`;
    }).join('');
    return `<div class="book-page">
      <div class="book-page-header"><div class="book-page-header-title">JEM Video Index · Sichos</div></div>
      <div class="book-entries">${entries}</div>
      <div class="book-page-footer"><span>JEM · Jewish Educational Media</span><span>${pi + 1}</span><span>Sichos</span></div>
    </div>`;
  }).join('');
}

// ══════════════════════════════════════════════
// VIEW SWITCHING
// ══════════════════════════════════════════════
function switchView(view, btn) {
  S.currentView = view;
  document.querySelectorAll('.topbar-nav-btn').forEach(b => b.classList.remove('active'));
  if (btn) btn.classList.add('active');
  const views = ['queueView','attentionView','exportView','bookView'];
  views.forEach(v => document.getElementById(v).style.display = 'none');
  if (view === 'queue') { document.getElementById('queueView').style.display = 'flex'; }
  else if (view === 'attention') { document.getElementById('attentionView').style.display = 'block'; renderAttentionView(); }
  else if (view === 'export') { document.getElementById('exportView').style.display = 'block'; renderExportView(); }
  else if (view === 'book') { document.getElementById('bookView').style.display = 'block'; renderBookView(); }
}

// ══════════════════════════════════════════════
// UI UTILS
// ══════════════════════════════════════════════
function esc(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}
function showLoading(txt) {
  document.getElementById('loadingOverlay').style.display = 'flex';
  document.getElementById('loadingText').textContent = txt || 'Loading…';
}
function hideLoading() { document.getElementById('loadingOverlay').style.display = 'none'; }
let _toastTimer;
function showToast(msg, type) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.className = 'show' + (type ? ' ' + type : '');
  clearTimeout(_toastTimer);
  _toastTimer = setTimeout(() => el.className = '', 3000);
}

// ══════════════════════════════════════════════
// INIT
// ══════════════════════════════════════════════
async function init() {
  const gotToken = handleAuthCallback();
  const savedCode = localStorage.getItem('jem_cse_key');
  if (savedCode) {
    const inp = document.getElementById('teamCodeInput');
    if (inp) inp.value = savedCode;
  }
  if (gotToken || S.token) {
    document.getElementById('authScreen').style.display = 'none';
    showLoading('Verifying account…');
    try {
      S.user = await fetchUserInfo();
      document.getElementById('userEmail').textContent = S.user.email || '';
      document.getElementById('userAvatar').textContent = (S.user.email || '?')[0].toUpperCase();
      document.getElementById('topBar').style.display = 'flex';
      document.getElementById('appShell').style.display = 'flex';
      switchView('queue', document.querySelector('[data-view="queue"]'));
      hideLoading();
      await loadAllData();
    } catch(e) {
      hideLoading();
      document.getElementById('authError').textContent = 'Sign-in failed: ' + e.message;
      document.getElementById('authScreen').style.display = 'flex';
    }
  }
}
