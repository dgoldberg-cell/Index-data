<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>JEM Index Workstation</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&family=Crimson+Pro:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
<style>
:root{
--bg-0:#0a0c10;--bg-1:#0f1218;--bg-2:#161b24;--bg-3:#1c2231;--bg-4:#242b3d;
--bg-hover:#283044;--bg-active:#303a50;
--border:#1e2536;--border-hi:#2d3650;--border-focus:#4a6cf7;
--tx-1:#e6e9f0;--tx-2:#9299b0;--tx-3:#626a82;--tx-4:#4a5168;
--blue:#4a6cf7;--blue-hi:#6584ff;--blue-bg:rgba(74,108,247,.08);--blue-bd:rgba(74,108,247,.25);
--purple:#9b72f2;--purple-bg:rgba(155,114,242,.08);--purple-bd:rgba(155,114,242,.25);
--red:#f06070;--red-bg:rgba(240,96,112,.08);--red-bd:rgba(240,96,112,.25);
--green:#3dd68c;--green-bg:rgba(61,214,140,.08);--green-bd:rgba(61,214,140,.25);
--amber:#f0a030;--amber-bg:rgba(240,160,48,.08);
--sidebar-w:220px;--topbar-h:48px;
--font:'DM Sans',system-ui,sans-serif;--mono:'JetBrains Mono',monospace;--serif:'Crimson Pro',Georgia,serif;
--radius:8px;--radius-lg:12px;
}
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;overflow:hidden;background:var(--bg-0);color:var(--tx-1);font-family:var(--font)}
::-webkit-scrollbar{width:6px;height:6px}::-webkit-scrollbar-track{background:var(--bg-1)}::-webkit-scrollbar-thumb{background:var(--border-hi);border-radius:3px}
button{font-family:var(--font);cursor:pointer}input,textarea,select{font-family:var(--font)}

/* Layout */
#app{display:flex;height:100vh}
.sidebar{width:var(--sidebar-w);background:var(--bg-1);border-right:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0;z-index:50}
.sidebar-logo{padding:16px 18px;font-size:14px;font-weight:700;letter-spacing:-.3px;background:linear-gradient(135deg,var(--blue),var(--purple));-webkit-background-clip:text;-webkit-text-fill-color:transparent;border-bottom:1px solid var(--border)}
.sidebar-sheet{padding:8px 18px;font-size:10px;color:var(--tx-4);font-family:var(--mono);border-bottom:1px solid var(--border);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.sidebar-nav{flex:1;padding:8px;overflow-y:auto}
.nav-section{font-size:9px;font-weight:600;text-transform:uppercase;letter-spacing:.8px;color:var(--tx-4);padding:12px 10px 6px}
.nav-item{display:flex;align-items:center;gap:10px;padding:9px 12px;border-radius:7px;font-size:13px;font-weight:500;color:var(--tx-3);cursor:pointer;transition:all .1s;margin-bottom:1px}
.nav-item:hover{background:var(--bg-hover);color:var(--tx-2)}
.nav-item.active{background:var(--blue-bg);color:var(--blue);border:1px solid var(--blue-bd)}
.nav-item .badge{margin-left:auto;background:var(--purple-bg);color:var(--purple);font-size:10px;font-weight:600;padding:2px 7px;border-radius:10px}
.nav-item svg{width:16px;height:16px;flex-shrink:0;opacity:.7}
.nav-item.active svg{opacity:1}
.sidebar-tabs{padding:8px;border-top:1px solid var(--border)}
.sidebar-tabs h4{font-size:9px;font-weight:600;text-transform:uppercase;letter-spacing:.8px;color:var(--tx-4);padding:4px 10px 6px}
.tab-item{padding:6px 12px;border-radius:5px;font-size:11px;color:var(--tx-3);cursor:pointer;transition:all .1s}
.tab-item:hover{background:var(--bg-hover);color:var(--tx-2)}
.tab-item.active{color:var(--blue);font-weight:600}
.sidebar-user{padding:12px 14px;border-top:1px solid var(--border);display:flex;align-items:center;gap:10px}
.sidebar-avatar{width:30px;height:30px;border-radius:50%;background:var(--bg-4);border:1.5px solid var(--border-hi);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:600;color:var(--blue);overflow:hidden;flex-shrink:0}
.sidebar-avatar img{width:100%;height:100%;object-fit:cover}
.sidebar-uname{font-size:12px;color:var(--tx-2);flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}

/* Main */
.main{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0}
.main-content{flex:1;display:flex;overflow:hidden}
.content{flex:1;overflow-y:auto;overflow-x:hidden}

/* Buttons */
.btn{display:inline-flex;align-items:center;gap:6px;padding:0 14px;height:34px;border-radius:var(--radius);font-size:12px;font-weight:500;border:1px solid var(--border);background:var(--bg-2);color:var(--tx-2);transition:all .12s;white-space:nowrap}
.btn:hover{background:var(--bg-hover);color:var(--tx-1);border-color:var(--border-hi)}
.btn-blue{background:var(--blue);color:#fff;border-color:var(--blue)}.btn-blue:hover{background:var(--blue-hi)}
.btn-purple{background:var(--purple-bg);color:var(--purple);border-color:var(--purple-bd)}.btn-purple:hover{background:rgba(155,114,242,.15)}
.btn-red{background:var(--red-bg);color:var(--red);border-color:var(--red-bd)}.btn-red:hover{background:rgba(240,96,112,.15)}
.btn-green{background:var(--green-bg);color:var(--green);border-color:var(--green-bd)}.btn-green:hover{background:rgba(61,214,140,.15)}
.btn-sm{height:28px;padding:0 10px;font-size:11px}
.btn-icon{width:34px;padding:0;justify-content:center}.btn-icon.btn-sm{width:28px}

/* Page header */
.page-header{padding:20px 28px 16px;border-bottom:1px solid var(--border);flex-shrink:0}
.page-header h1{font-size:18px;font-weight:700;letter-spacing:-.3px}
.page-header p{font-size:12px;color:var(--tx-3);margin-top:2px}

/* Cards */
.card{background:var(--bg-1);border:1px solid var(--border);border-radius:var(--radius-lg);padding:20px;transition:border-color .12s}
.card:hover{border-color:var(--border-hi)}
.card h4{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.5px;color:var(--tx-4);margin-bottom:8px}
.card .val{font-size:26px;font-weight:700;letter-spacing:-.8px}
.card .sub{font-size:11px;color:var(--tx-4);margin-top:3px}

/* Grid */
.grid{display:grid;gap:14px}
.grid-4{grid-template-columns:repeat(auto-fill,minmax(200px,1fr))}
.grid-2{grid-template-columns:repeat(auto-fill,minmax(300px,1fr))}
.span-2{grid-column:span 2}

/* Dashboard */
.dash-pad{padding:24px 28px}
.progress-row{display:flex;align-items:center;gap:10px;margin-bottom:8px;font-size:12px}
.progress-label{width:100px;color:var(--tx-2);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.progress-track{flex:1;height:6px;background:var(--bg-4);border-radius:3px;overflow:hidden}
.progress-fill{height:100%;border-radius:3px;transition:width .4s ease}
.progress-count{font-family:var(--mono);font-size:10px;color:var(--tx-4);width:40px;text-align:right}

/* Table */
.table-toolbar{display:flex;align-items:center;gap:8px;padding:10px 20px;border-bottom:1px solid var(--border);flex-wrap:wrap}
.search-box{display:flex;align-items:center;gap:8px;background:var(--bg-2);border:1px solid var(--border);border-radius:var(--radius);padding:0 12px;height:34px;min-width:200px;transition:border-color .12s}
.search-box:focus-within{border-color:var(--blue)}
.search-box input{background:none;border:none;outline:none;color:var(--tx-1);font-size:13px;width:100%}
.search-box input::placeholder{color:var(--tx-4)}
.table-wrap{flex:1;overflow:auto}
table{width:max-content;min-width:100%;border-collapse:separate;border-spacing:0}
thead{position:sticky;top:0;z-index:10}
th{background:var(--bg-2);padding:0 12px;height:36px;font-size:10px;font-weight:600;color:var(--tx-4);text-transform:uppercase;letter-spacing:.5px;text-align:left;border-bottom:1px solid var(--border);border-right:1px solid var(--border);white-space:nowrap;cursor:pointer;user-select:none}
th:hover{color:var(--tx-3);background:var(--bg-3)}
td{padding:0 12px;height:34px;font-size:12px;border-bottom:1px solid var(--border);border-right:1px solid var(--border);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:280px;background:var(--bg-0)}
tr:hover td{background:var(--bg-1)}
tr.sel td{background:var(--blue-bg)}
td.editing{background:var(--bg-2)!important;outline:2px solid var(--blue);outline-offset:-2px}
.cell-input{background:none;border:none;outline:none;color:var(--tx-1);font-size:12px;width:100%;height:100%}
.col-chk{width:38px;min-width:38px;text-align:center}
.col-num{width:44px;min-width:44px;text-align:center;font-family:var(--mono)}
input[type="checkbox"]{appearance:none;width:14px;height:14px;border:1.5px solid var(--border-hi);border-radius:3px;background:var(--bg-2);cursor:pointer;position:relative;transition:all .08s;vertical-align:middle}
input[type="checkbox"]:checked{background:var(--blue);border-color:var(--blue)}
input[type="checkbox"]:checked::after{content:'✓';position:absolute;top:-2px;left:1px;font-size:11px;color:#fff;font-weight:700}
.toolbar-spacer{flex:1}
.toolbar-count{font-size:10px;color:var(--tx-4);font-family:var(--mono)}
.sel-bar{display:flex;align-items:center;gap:8px;padding:4px 12px;background:var(--blue-bg);border:1px solid var(--blue-bd);border-radius:var(--radius);font-size:12px;color:var(--blue);font-weight:500}

/* Review Queue */
.review-item{background:var(--bg-1);border:1px solid var(--border);border-radius:var(--radius-lg);padding:20px;margin-bottom:12px;transition:border-color .15s}
.review-item:hover{border-color:var(--border-hi)}
.review-tag{font-size:14px;font-weight:600;margin-bottom:4px}
.review-section{font-size:10px;color:var(--tx-4);text-transform:uppercase;letter-spacing:.5px;margin-bottom:12px}
.review-row{display:flex;gap:16px;margin-bottom:10px;font-size:13px}
.review-label{font-size:10px;font-weight:600;color:var(--tx-4);text-transform:uppercase;letter-spacing:.4px;margin-bottom:3px}
.review-old{color:var(--tx-3);text-decoration:line-through;font-style:italic}
.review-new{color:var(--green);font-weight:500}
.review-reason{font-size:11px;color:var(--tx-3);font-style:italic;margin-bottom:12px;padding:8px 12px;background:var(--bg-2);border-radius:6px;border-left:3px solid var(--purple)}
.review-actions{display:flex;gap:8px;align-items:center}
.review-custom-input{flex:1;background:var(--bg-2);border:1px solid var(--border);border-radius:var(--radius);padding:6px 12px;color:var(--tx-1);font-size:12px;outline:none}
.review-custom-input:focus{border-color:var(--blue)}
.review-transcript{font-size:11px;color:var(--tx-3);margin-top:8px;padding:8px 12px;background:var(--bg-2);border-radius:6px;max-height:80px;overflow-y:auto;font-family:var(--serif);line-height:1.5}

/* Auditor */
.auditor-config{padding:24px 28px}
.auditor-grid{display:grid;grid-template-columns:1fr 1fr;gap:20px}
.audit-stat{text-align:center;padding:16px;background:var(--bg-2);border-radius:var(--radius);border:1px solid var(--border)}
.audit-stat .num{font-size:32px;font-weight:700;letter-spacing:-1px}
.audit-stat .label{font-size:10px;color:var(--tx-4);text-transform:uppercase;letter-spacing:.5px;margin-top:2px}
.audit-progress{margin:20px 0;padding:16px;background:var(--bg-2);border:1px solid var(--border);border-radius:var(--radius)}
.audit-progress-bar{height:8px;background:var(--bg-4);border-radius:4px;overflow:hidden;margin:8px 0}
.audit-progress-fill{height:100%;background:linear-gradient(90deg,var(--blue),var(--purple));border-radius:4px;transition:width .3s}
.audit-log{margin-top:12px;max-height:200px;overflow-y:auto;font-family:var(--mono);font-size:10px;color:var(--tx-3);padding:10px;background:var(--bg-0);border-radius:6px}
.audit-log div{padding:2px 0}

/* AI Chat Panel */
.ai-panel{width:380px;min-width:380px;background:var(--bg-1);border-left:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0}
.ai-panel.hidden{display:none}
.ai-head{display:flex;align-items:center;gap:8px;padding:14px 16px;border-bottom:1px solid var(--border)}
.ai-head h3{font-size:13px;font-weight:600;flex:1}
.ai-dot{width:8px;height:8px;border-radius:50%;background:var(--purple);box-shadow:0 0 8px var(--purple)}
.ai-msgs{flex:1;overflow-y:auto;padding:16px;display:flex;flex-direction:column;gap:10px}
.ai-msg{padding:10px 14px;border-radius:10px;font-size:13px;line-height:1.5;max-width:92%;word-wrap:break-word;animation:msgIn .15s ease-out}
@keyframes msgIn{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:translateY(0)}}
.ai-msg.user{background:var(--blue-bg);border:1px solid var(--blue-bd);color:var(--tx-1);align-self:flex-end;border-bottom-right-radius:3px}
.ai-msg.assistant{background:var(--bg-2);border:1px solid var(--border);color:var(--tx-2);align-self:flex-start;border-bottom-left-radius:3px}
.ai-msg.system{background:var(--purple-bg);border:1px solid var(--purple-bd);color:var(--purple);font-size:12px;align-self:center;text-align:center}
.ai-msg strong{color:var(--tx-1)}.ai-msg code{font-family:var(--mono);font-size:11px;background:var(--bg-3);padding:1px 5px;border-radius:3px}
.ai-msg pre{background:var(--bg-3);padding:8px;border-radius:6px;font-family:var(--mono);font-size:10px;overflow-x:auto;margin:6px 0;white-space:pre-wrap;color:var(--tx-1)}
.ai-typing{color:var(--tx-4);font-size:12px;font-style:italic;padding:4px 14px}
.ai-input-area{display:flex;gap:8px;padding:12px 16px;border-top:1px solid var(--border)}
.ai-input{flex:1;background:var(--bg-2);border:1px solid var(--border);border-radius:var(--radius);padding:10px 14px;color:var(--tx-1);font-size:13px;outline:none;resize:none;min-height:40px;max-height:100px}
.ai-input:focus{border-color:var(--purple)}.ai-input::placeholder{color:var(--tx-4)}
.ai-send{width:38px;height:38px;border-radius:var(--radius);background:var(--purple);border:none;color:#fff;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:background .12s}
.ai-send:hover{background:#a980ff}.ai-send:disabled{opacity:.4}

/* Setup */
.setup-screen{display:flex;align-items:center;justify-content:center;height:100vh;background:var(--bg-0);background-image:radial-gradient(ellipse at 25% 15%,rgba(74,108,247,.05) 0%,transparent 55%),radial-gradient(ellipse at 75% 85%,rgba(155,114,242,.04) 0%,transparent 55%)}
.setup-card{background:var(--bg-1);border:1px solid var(--border);border-radius:var(--radius-lg);padding:40px;max-width:540px;width:100%;box-shadow:0 8px 40px rgba(0,0,0,.4)}
.setup-card h1{font-size:22px;font-weight:700;letter-spacing:-.5px;margin-bottom:4px;background:linear-gradient(135deg,var(--tx-1),var(--blue));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.setup-card .sub{font-size:13px;color:var(--tx-3);line-height:1.6;margin-bottom:20px}
.setup-card label{display:block;font-size:10px;font-weight:600;color:var(--tx-4);margin-bottom:5px;text-transform:uppercase;letter-spacing:.5px}
.s-input{width:100%;padding:10px 14px;background:var(--bg-2);border:1px solid var(--border);border-radius:var(--radius);color:var(--tx-1);font-size:13px;font-family:var(--mono);outline:none;margin-bottom:14px}
.s-input:focus{border-color:var(--blue)}.s-input::placeholder{color:var(--tx-4)}
.setup-steps{background:var(--bg-2);border:1px solid var(--border);border-radius:var(--radius);padding:14px 18px;margin-bottom:18px}
.setup-steps h3{font-size:11px;font-weight:600;color:var(--tx-2);margin-bottom:8px}
.setup-steps ol{padding-left:18px;font-size:11px;color:var(--tx-3);line-height:1.9}
.setup-steps code{background:var(--bg-active);padding:1px 5px;border-radius:3px;font-family:var(--mono);font-size:10px;color:var(--blue)}
.setup-ai{background:var(--purple-bg);border:1px solid var(--purple-bd);border-radius:var(--radius);padding:14px 18px;margin-bottom:18px}
.setup-ai h3{font-size:11px;font-weight:600;color:var(--purple);margin-bottom:4px}
.setup-ai p{font-size:11px;color:var(--tx-3);margin-bottom:8px}
.setup-err{color:var(--red);font-size:12px;margin-bottom:10px}

/* Loading */
.loading-state{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;gap:14px;color:var(--tx-4)}
.spinner{width:24px;height:24px;border:3px solid var(--border);border-top-color:var(--blue);border-radius:50%;animation:sp .7s linear infinite}
@keyframes sp{to{transform:rotate(360deg)}}

/* Toasts */
.toasts{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);z-index:999;display:flex;flex-direction:column;gap:8px;align-items:center}
.toast{padding:10px 20px;background:var(--bg-2);border:1px solid var(--border);border-radius:var(--radius);font-size:12px;color:var(--tx-2);box-shadow:0 4px 20px rgba(0,0,0,.3);animation:toastIn .2s ease-out}
.toast.success{border-color:var(--green);color:var(--green)}.toast.error{border-color:var(--red);color:var(--red)}
@keyframes toastIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}

/* Settings */
.settings-pad{padding:24px 28px}
.settings-section{margin-bottom:24px}
.settings-section h3{font-size:13px;font-weight:600;margin-bottom:10px}
.rule-item{display:flex;align-items:center;gap:10px;padding:8px 12px;background:var(--bg-2);border:1px solid var(--border);border-radius:6px;margin-bottom:6px;font-size:12px}
.rule-item .rule-name{font-weight:600;color:var(--tx-1);flex:1}
.rule-item .rule-desc{font-size:11px;color:var(--tx-3);flex:2}
.rule-toggle{width:36px;height:20px;border-radius:10px;background:var(--bg-4);border:none;cursor:pointer;position:relative;transition:background .15s}
.rule-toggle.on{background:var(--blue)}
.rule-toggle::after{content:'';position:absolute;top:3px;left:3px;width:14px;height:14px;border-radius:50%;background:#fff;transition:transform .15s}
.rule-toggle.on::after{transform:translateX(16px)}
</style>
</head>
<body>
<div id="app"></div>
<script src="https://accounts.google.com/gsi/client" async defer></script>
<script src="https://apis.google.com/js/api.js"></script>
<script>
// ═══════════════════════════════════════════════════════════════
// JEM INDEX WORKSTATION — Core Logic
// ═══════════════════════════════════════════════════════════════

const DISC='https://sheets.googleapis.com/$discovery/rest?version=v4',SCOPES='https://www.googleapis.com/auth/spreadsheets';

// ── Rules Config ──────────────────────────────────────────
const RULES = {
  tagDesc: {
    minWords:3, maxWords:6, absMax:8,
    checks: [
      {id:'length',name:'Length (3-6 words, max 8)',on:true},
      {id:'no_repeat',name:'No tag name repetition',on:true},
      {id:'rebbe',name:'"Rebbe" only when it\'s the point',on:true},
      {id:'trailing_prep',name:'Preserve trailing prepositions',on:true},
      {id:'multi_point',name:'Multi-point: each point matters',on:true},
      {id:'spelling',name:'Spelling & grammar',on:true},
    ],
    goodExamples:[
      {tag:'Tefillin',desc:'With pride',note:'Short, punchy'},
      {tag:'Pesach',desc:'Communal Seders in',note:'Trailing preposition links'},
      {tag:'Terror',desc:'Following Ma\'alot Massacre',note:'Event/cause style'},
      {tag:'Farbrengen',desc:'Broadcast at',note:'Location-link style'},
    ],
    badExamples:[
      {tag:'Tefillin',desc:'Praying publicly with pride wearing tefillin',note:'Too long, repeats tag'},
      {tag:'Shabbos',desc:'The Rebbe speaks about Shabbos',note:'Repeats tag, unnecessary Rebbe'},
    ],
    spellingFixes:{'prier':'prior','preformed':'performed','begining':'beginning','Godliness':'G-dliness','Godly':'G-dly',"Farbrengen's":'Farbrengens'},
  },
  relDefaults:{
    People:{Addresses:'spoken about','Timeless Moments':'seen in',Conversations:'in conversation with','My Encounter':'interviewee','Short Films':'interviewee',Films:'interviewee'},
    Topics:{Addresses:'spoken about','Timeless Moments':'seen in',Conversations:'spoken about','My Encounter':'spoken about','Short Films':'spoken about',Films:'spoken about'},
  },
  segmentOrder:['Addresses','Timeless Moments','Conversations','My Encounter','Short Films','Films'],
};

// ── State ─────────────────────────────────────────────────
const S = {
  connected:false, clientId:localStorage.getItem('jw_cid')||'', sheetId:localStorage.getItem('jw_sid')||'',
  claudeKey:localStorage.getItem('jw_ckey')||'', user:null, sheetMeta:null,
  activeTab:0, headers:[], rows:[], loading:false,
  view:'dashboard', aiOpen:false, colPanel:false,
  search:'', sortCol:null, sortDir:'asc', selected:new Set(), visibleCols:new Set(),
  editCell:null, editVal:'',
  // Review queue
  reviewQueue:[], reviewCustom:{},
  // Auditor
  auditRunning:false, auditProgress:0, auditTotal:0, auditLog:[], auditBatchSize:30,
  auditMode:'batch', // batch | interactive
  auditInteractiveIdx:0,
  // AI chat
  aiMsgs:[], aiTyping:false, aiInput:'',
  // Toasts
  toasts:[], tid:0,
};

// ── Helpers ───────────────────────────────────────────────
const $=s=>document.querySelector(s), $$=s=>document.querySelectorAll(s);
function esc(s){const d=document.createElement('div');d.textContent=s;return d.innerHTML}
function cl(n){let s='',c=n;while(c>=0){s=String.fromCharCode(c%26+65)+s;c=Math.floor(c/26)-1}return s}
function toast(m,t=''){S.toasts.push({id:++S.tid,m,t});render();setTimeout(()=>{S.toasts=S.toasts.filter(x=>x.id!==S.tid);render()},3500)}
function rmd(t){return t.replace(/```action[\s\S]*?```/g,'').replace(/```([\s\S]*?)```/g,'<pre>$1</pre>').replace(/`([^`]+)`/g,'<code>$1</code>').replace(/\*\*([^*]+)\*\*/g,'<strong>$1</strong>').replace(/\n/g,'<br>')}

// Column lookup helper
function colIdx(name){
  const lower = name.toLowerCase();
  let idx = S.headers.findIndex(h=>h.toLowerCase()===lower);
  if(idx===-1) idx = S.headers.findIndex(h=>h.toLowerCase().includes(lower));
  return idx;
}

function getProcessed(){
  let r=S.rows.map((d,i)=>({d,i}));
  if(S.search.trim()){const q=S.search.toLowerCase();r=r.filter(x=>x.d.some(c=>c&&c.toString().toLowerCase().includes(q)))}
  if(S.sortCol!==null){const c=S.sortCol,dir=S.sortDir;r.sort((a,b)=>{const va=(a.d[c]||'').toString(),vb=(b.d[c]||'').toString(),na=parseFloat(va),nb=parseFloat(vb);if(!isNaN(na)&&!isNaN(nb))return dir==='asc'?na-nb:nb-na;return dir==='asc'?va.localeCompare(vb):vb.localeCompare(va)})}
  return r;
}

// ── Google Sheets API ─────────────────────────────────────
let gapiOk=false;
function initG(){return new Promise((r,j)=>{if(gapiOk)return r();gapi.load('client',async()=>{try{await gapi.client.init({discoveryDocs:[DISC]});gapiOk=true;r()}catch(e){j(e)}})})}

async function doConnect(cid,sid,ck){
  S.clientId=cid;S.sheetId=sid;S.claudeKey=ck||'';
  localStorage.setItem('jw_cid',cid);localStorage.setItem('jw_sid',sid);if(ck)localStorage.setItem('jw_ckey',ck);
  await initG();
  return new Promise((r,j)=>{
    const tc=google.accounts.oauth2.initTokenClient({client_id:cid,scope:SCOPES,callback:async resp=>{
      if(resp.error){j(new Error(resp.error_description||resp.error));return}
      try{const u=await(await fetch('https://www.googleapis.com/oauth2/v3/userinfo',{headers:{Authorization:'Bearer '+resp.access_token}})).json();S.user={name:u.name||u.email||'User',pic:u.picture||'',email:u.email||''}}catch{S.user={name:'User',pic:'',email:''}}
      // Load sheet meta
      try{const m=await gapi.client.sheets.spreadsheets.get({spreadsheetId:sid});S.sheetMeta={title:m.result.properties.title,tabs:m.result.sheets.map(s=>({title:s.properties.title,sid:s.properties.sheetId}))}}catch(e){console.error(e)}
      S.connected=true;r();
    }});tc.requestAccessToken();
  });
}

async function loadTab(idx){
  if(!S.sheetMeta?.tabs?.[idx])return;
  S.loading=true;render();
  const name=S.sheetMeta.tabs[idx].title;
  try{
    const r=await gapi.client.sheets.spreadsheets.values.get({spreadsheetId:S.sheetId,range:`'${name}'`});
    const v=r.result.values||[];
    S.headers=v.length?v[0]:[];
    S.rows=v.length>1?v.slice(1).map(r=>{while(r.length<S.headers.length)r.push('');return r}):[];
    S.visibleCols=new Set(S.headers.map((_,i)=>i));
    S.selected=new Set();S.sortCol=null;S.search='';S.editCell=null;S.activeTab=idx;
  }catch(e){toast('Load failed: '+e.message,'error')}
  S.loading=false;render();
}

async function saveCell(ri,ci,val){
  const name=S.sheetMeta.tabs[S.activeTab].title;
  const range=`'${name}'!${cl(ci)}${ri+2}`;
  try{await gapi.client.sheets.spreadsheets.values.update({spreadsheetId:S.sheetId,range,valueInputOption:'USER_ENTERED',resource:{values:[[val]]}});S.rows[ri][ci]=val;toast('Saved','success')}catch(e){toast('Save failed: '+e.message,'error')}
}

async function saveCells(changes){
  const name=S.sheetMeta.tabs[S.activeTab].title;
  const data=changes.map(c=>({range:`'${name}'!${cl(c.col)}${c.row+2}`,values:[[c.value]]}));
  try{await gapi.client.sheets.spreadsheets.values.batchUpdate({spreadsheetId:S.sheetId,resource:{valueInputOption:'USER_ENTERED',data}});
    changes.forEach(c=>{if(S.rows[c.row])S.rows[c.row][c.col]=c.value});
    toast(`Updated ${changes.length} cells`,'success')}catch(e){toast('Batch save failed: '+e.message,'error')}
}

async function delRows(idxs){
  const name=S.sheetMeta.tabs[S.activeTab].title;
  const sorted=[...idxs].sort((a,b)=>b-a);
  try{
    const sid=S.sheetMeta.tabs[S.activeTab].sid;
    await gapi.client.sheets.spreadsheets.batchUpdate({spreadsheetId:S.sheetId,resource:{requests:sorted.map(i=>({deleteDimension:{range:{sheetId:sid,dimension:'ROWS',startIndex:i+1,endIndex:i+2}}}))}});
    S.rows=S.rows.filter((_,i)=>!idxs.has(i));S.selected=new Set();
    toast(`Deleted ${sorted.length} rows`,'success');
  }catch(e){toast('Delete failed: '+e.message,'error')}
  render();
}

function logout(){
  try{google.accounts.oauth2.revoke(gapi.client.getToken()?.access_token)}catch{}
  S.connected=false;S.sheetMeta=null;S.user=null;S.headers=[];S.rows=[];S.aiMsgs=[];S.reviewQueue=[];
  localStorage.removeItem('jw_cid');localStorage.removeItem('jw_sid');
  render();
}

// ── Claude AI ─────────────────────────────────────────────
async function aiChat(msg){
  if(!S.claudeKey){toast('No Claude API key','error');return}
  S.aiMsgs.push({role:'user',content:msg});S.aiTyping=true;S.aiInput='';render();scrollAI();
  const mx=60,prev=S.rows.slice(0,mx);
  const tabName=S.sheetMeta?.tabs?.[S.activeTab]?.title||'';
  const ctx=`Tab: "${tabName}"\nColumns (${S.headers.length}): ${S.headers.join(', ')}\nTotal rows: ${S.rows.length}\nFirst ${Math.min(mx,S.rows.length)} rows CSV:\n${S.headers.join(',')}\n${prev.map(r=>r.map(c=>`"${(c||'').toString().replace(/"/g,'""')}"`).join(',')).join('\n')}${S.rows.length>mx?`\n...+${S.rows.length-mx} more`:''}\n\nTag description rules: ${RULES.tagDesc.checks.filter(c=>c.on).map(c=>c.name).join('; ')}\nTo make changes, use:\n\`\`\`action\n{"type":"update_cells","changes":[{"row":0,"col":2,"value":"new"}]}\n\`\`\`\nor delete_rows with indices array. Be concise.`;
  const sys=`You are an AI assistant in the JEM Index Workstation for managing video index data from JEM.tv. Data is about the Lubavitcher Rebbe's video clips.\n\n${ctx}`;
  try{
    const resp=await fetch('https://api.anthropic.com/v1/messages',{method:'POST',headers:{'Content-Type':'application/json','x-api-key':S.claudeKey,'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:2048,system:sys,messages:S.aiMsgs.slice(-12).map(m=>({role:m.role,content:m.content}))})});
    if(!resp.ok){const e=await resp.json().catch(()=>({}));throw new Error(e.error?.message||'API error')}
    const data=await resp.json(),text=data.content.map(c=>c.text||'').join('');
    S.aiMsgs.push({role:'assistant',content:text});
    const am=text.match(/```action\s*([\s\S]*?)```/);
    if(am){try{const act=JSON.parse(am[1].trim());await execAction(act)}catch(e){toast('Action error','error')}}
  }catch(e){S.aiMsgs.push({role:'assistant',content:'Error: '+e.message});toast('AI error','error')}
  S.aiTyping=false;render();scrollAI();
}

async function execAction(a){
  if(a.type==='update_cells')await saveCells(a.changes);
  else if(a.type==='update_cell')await saveCell(a.row,a.col,a.value);
  else if(a.type==='delete_rows')await delRows(new Set(a.indices));
  render();
}

function scrollAI(){setTimeout(()=>{const el=$('.ai-msgs');if(el)el.scrollTop=el.scrollHeight},50)}

// ── Auditor ───────────────────────────────────────────────
async function runAudit(){
  if(!S.claudeKey){toast('Need Claude API key for auditing','error');return}
  const descCol=colIdx('description');
  const tagCol=colIdx('tag')===-1?colIdx('name'):colIdx('tag');
  const transcriptCol=colIdx('transcript');
  const sectionCol=colIdx('section')===-1?colIdx('index_section'):colIdx('section');
  const relCol=colIdx('relationship');
  
  if(descCol===-1||tagCol===-1){toast('Cannot find description or tag columns','error');return}

  // Build entries to audit
  const entries=[];
  S.rows.forEach((r,i)=>{
    entries.push({
      rowIdx:i,
      tagName:(r[tagCol]||'').trim(),
      description:(r[descCol]||'').trim(),
      transcript:transcriptCol>=0?(r[transcriptCol]||'').trim():'',
      indexSection:sectionCol>=0?(r[sectionCol]||'').trim():'',
      relationship:relCol>=0?(r[relCol]||'').trim():'',
    });
  });

  S.auditRunning=true;S.auditProgress=0;S.auditTotal=entries.length;S.auditLog=[];
  render();

  const batchSize=S.auditBatchSize;
  const results=[];

  for(let i=0;i<entries.length;i+=batchSize){
    const batch=entries.slice(i,i+batchSize);
    S.auditLog.push(`Processing batch ${Math.floor(i/batchSize)+1}/${Math.ceil(entries.length/batchSize)} (rows ${i+1}-${Math.min(i+batchSize,entries.length)})...`);
    render();

    try{
      const rulesText=RULES.tagDesc.checks.filter(c=>c.on).map(c=>'- '+c.name).join('\n');
      const goodEx=RULES.tagDesc.goodExamples.map(e=>`  "${e.tag}" → "${e.desc}" (${e.note})`).join('\n');
      const prompt=`Audit these tag descriptions for the JEM Video Index.\n\nRules:\n${rulesText}\n\nGood examples:\n${goodEx}\n\nCONTEXT: The entire index is about the Rebbe. Default subject is always the Rebbe. Only include "Rebbe" when it's genuinely the point.\n\nFor each entry:\n- "ok" if it follows all rules\n- "fix" if needs changes (provide suggestion + reason)\n- "generate" if empty (create from transcript)\n\nRespond ONLY with JSON array:\n[{"idx":0,"status":"ok"},{"idx":1,"status":"fix","suggestion":"New text","reason":"Why"}]\n\nENTRIES:\n${batch.map((e,j)=>`[${j}] Tag: "${e.tagName}" | Section: ${e.indexSection} | Rel: ${e.relationship}\n  Description: "${e.description||'[empty]'}"\n  Transcript: "${(e.transcript||'').slice(0,250)}"`).join('\n\n')}`;

      const resp=await fetch('https://api.anthropic.com/v1/messages',{method:'POST',headers:{'Content-Type':'application/json','x-api-key':S.claudeKey,'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:4096,system:'Expert editor for JEM Video Index. Respond ONLY with the requested JSON array.',messages:[{role:'user',content:prompt}]})});

      if(!resp.ok)throw new Error('API error '+resp.status);
      const data=await resp.json(),text=data.content.map(c=>c.text||'').join('');
      const clean=text.replace(/```json\s*/g,'').replace(/```\s*/g,'').trim();
      let parsed;
      try{parsed=JSON.parse(clean)}catch{const m=text.match(/\[[\s\S]*\]/);if(m)parsed=JSON.parse(m[0]);else throw new Error('Parse failed')}

      let fixes=0;
      parsed.forEach(p=>{
        if(p.status==='fix'||p.status==='generate'){
          const entry=batch[p.idx];
          if(entry){
            results.push({
              rowIdx:entry.rowIdx,
              tagName:entry.tagName,
              original:entry.description,
              suggestion:p.suggestion||'',
              reason:p.reason||'',
              status:p.status,
              transcript:entry.transcript,
              indexSection:entry.indexSection,
            });
            fixes++;
          }
        }
      });
      S.auditLog.push(`  → ${fixes} items need review, ${batch.length-fixes} OK`);
    }catch(e){
      S.auditLog.push(`  ✗ Error: ${e.message}`);
    }

    S.auditProgress=Math.min(i+batchSize,entries.length);
    render();

    // Rate limit pause
    if(i+batchSize<entries.length) await new Promise(r=>setTimeout(r,1500));
  }

  S.auditRunning=false;
  S.reviewQueue=[...S.reviewQueue,...results];
  S.auditLog.push(`\nDone! ${results.length} items added to review queue.`);
  toast(`Audit complete — ${results.length} items to review`,'success');
  render();
}

// ── Review Actions ────────────────────────────────────────
async function reviewAction(item,action,customText){
  const descCol=colIdx('description');
  if(descCol===-1){toast('Cannot find description column','error');return}
  
  if(action==='accept'){
    await saveCell(item.rowIdx,descCol,item.suggestion);
  }else if(action==='custom'){
    await saveCell(item.rowIdx,descCol,customText||item.suggestion);
  }
  // Remove from queue regardless
  S.reviewQueue=S.reviewQueue.filter(r=>r.rowIdx!==item.rowIdx);
  render();
}

function render(){
  const app=$('#app');
  if(!S.connected){renderSetup(app);return}
  if(S.loading&&!S.headers.length){app.innerHTML='<div class="loading-state"><div class="spinner"></div>Loading…</div>';return}

  let h='';
  // Sidebar
  h+=renderSidebar();
  // Main
  h+='<div class="main"><div class="main-content">';
  h+='<div class="content">';
  if(S.view==='dashboard')h+=renderDashboard();
  else if(S.view==='sheet')h+=renderSheet();
  else if(S.view==='auditor')h+=renderAuditor();
  else if(S.view==='review')h+=renderReview();
  else if(S.view==='settings')h+=renderSettings();
  h+='</div>';
  // AI Panel
  if(S.aiOpen)h+=renderAIPanel();
  h+='</div></div>';
  // Toasts
  h+='<div class="toasts">';S.toasts.forEach(t=>{h+=`<div class="toast ${t.t}">${esc(t.m)}</div>`});h+='</div>';
  app.innerHTML=h;
  bindAll();
}

function renderDashboard(){
  const descCol=colIdx('description'), tagCol=colIdx('tag')===-1?colIdx('name'):colIdx('tag');
  let total=S.rows.length, withDesc=0, noDesc=0, longDesc=0;
  if(descCol>=0){
    S.rows.forEach(r=>{const d=(r[descCol]||'').trim();if(d){withDesc++;if(d.split(/\s+/).length>8)longDesc++}else noDesc++});
  }

  let h='<div class="page-header"><h1>Dashboard</h1><p>Overview of your index data</p></div>';
  h+='<div class="dash-pad">';
  h+='<div class="grid grid-4">';
  h+=`<div class="card"><h4>Total Entries</h4><div class="val">${total.toLocaleString()}</div></div>`;
  h+=`<div class="card"><h4>With Description</h4><div class="val" style="color:var(--green)">${withDesc.toLocaleString()}</div><div class="sub">${total?(withDesc/total*100).toFixed(1):0}%</div></div>`;

  h+=`<div class="card"><h4>Too Long (8+ words)</h4><div class="val" style="color:${longDesc?'var(--amber)':'var(--green)'}">${longDesc}</div></div>`;
  h+=`<div class="card"><h4>Pending Review</h4><div class="val" style="color:${S.reviewQueue.length?'var(--purple)':'var(--green)'}">${S.reviewQueue.length}</div>${S.reviewQueue.length?`<div class="sub"><button class="btn btn-sm btn-purple" data-nav="review">Go to Review →</button></div>`:''}</div>`;
  h+=`<div class="card"><h4>Columns</h4><div class="val">${S.headers.length}</div></div>`;
  h+=`<div class="card"><h4>Sheet Tab</h4><div class="val" style="font-size:16px">${esc(S.sheetMeta?.tabs?.[S.activeTab]?.title||'—')}</div></div>`;
  h+=`<div class="card"><h4>AI Status</h4><div class="val" style="font-size:16px;color:${S.claudeKey?'var(--green)':'var(--tx-4)'};">${S.claudeKey?'Connected':'No Key'}</div></div>`;
  h+='</div>';

  // Quick actions
  h+=`<div style="margin-top:20px;display:flex;gap:10px;flex-wrap:wrap">
    <button class="btn btn-purple" data-nav="auditor">${IC.audit} Run AI Audit</button>
    ${S.reviewQueue.length?`<button class="btn btn-green" data-nav="review">${IC.review} Review ${S.reviewQueue.length} Items</button>`:''}
    <button class="btn" data-nav="sheet">${IC.sheet} Open Sheet View</button>
  </div>`;

  h+='</div>';
  return h;
}

function renderSheet(){
  const pr=getProcessed(), vc=S.headers.map((h,i)=>({h,i})).filter(c=>S.visibleCols.has(c.i)), dr=pr.slice(0,500);
  let h='<div style="display:flex;flex-direction:column;height:100%">';
  // Toolbar
  h+='<div class="table-toolbar">';
  h+=`<div class="search-box">${IC.search}<input id="si" placeholder="Search…" value="${esc(S.search)}"></div>`;
  if(S.selected.size>0) h+=`<div class="sel-bar">${S.selected.size} selected <button class="btn btn-sm btn-red" id="btn-del">${IC.trash} Delete</button><button class="btn btn-sm" id="btn-desel">Clear</button></div>`;
  h+=`<div class="toolbar-spacer"></div><span class="toolbar-count">${pr.length.toLocaleString()} rows</span>`;
  h+=`<button class="btn btn-sm" id="btn-ref">${IC.refresh}</button>`;
  h+='</div>';
  // Table
  h+='<div class="table-wrap"><table><thead><tr>';
  h+=`<th class="col-chk"><input type="checkbox" id="chk-all" ${S.selected.size===pr.length&&pr.length?'checked':''}></th><th class="col-num">#</th>`;
  for(const c of vc) h+=`<th data-col="${c.i}">${esc(c.h)}</th>`;
  h+='</tr></thead><tbody>';
  for(const{d,i:idx}of dr){
    h+=`<tr class="${S.selected.has(idx)?'sel':''}" data-idx="${idx}"><td class="col-chk"><input type="checkbox" data-chk="${idx}" ${S.selected.has(idx)?'checked':''}></td><td class="col-num" style="color:var(--tx-4);font-size:10px">${idx+1}</td>`;
    for(const c of vc){const val=d[c.i]||'',ed=S.editCell&&S.editCell.r===idx&&S.editCell.c===c.i;
      if(ed) h+=`<td class="editing"><input class="cell-input" id="ei" value="${esc(S.editVal)}"></td>`;
      else h+=`<td data-dbl="${idx}-${c.i}" title="${esc(val)}">${esc(val)}</td>`}
    h+='</tr>';
  }
  h+='</tbody></table>';
  if(pr.length>500) h+=`<div style="padding:12px;text-align:center;color:var(--tx-4);font-size:11px">Showing 500 of ${pr.length.toLocaleString()}</div>`;
  h+='</div></div>';
  return h;
}

function renderAuditor(){
  let h='<div class="page-header"><h1>AI Tag Description Auditor</h1><p>Batch-check descriptions against your rules using Claude AI</p></div>';
  h+='<div class="auditor-config">';
  
  // Stats
  const descCol=colIdx('description');
  let total=S.rows.length, withDesc=0, noDesc=0;
  if(descCol>=0){S.rows.forEach(r=>{(r[descCol]||'').trim()?withDesc++:noDesc++})}

  h+='<div class="grid grid-4" style="margin-bottom:20px">';
  h+=`<div class="audit-stat"><div class="num">${total}</div><div class="label">Total Entries</div></div>`;
  h+=`<div class="audit-stat"><div class="num">${withDesc}</div><div class="label">With Description</div></div>`;
  h+=`<div class="audit-stat"><div class="num" style="color:var(--red)">${noDesc}</div><div class="label">Empty</div></div>`;
  h+=`<div class="audit-stat"><div class="num" style="color:var(--purple)">${S.reviewQueue.length}</div><div class="label">In Review Queue</div></div>`;
  h+='</div>';

  // Active rules
  h+='<div class="card" style="margin-bottom:16px"><h4>Active Rules</h4>';
  RULES.tagDesc.checks.forEach(c=>{
    h+=`<div style="display:flex;align-items:center;gap:8px;padding:4px 0;font-size:12px"><span style="color:${c.on?'var(--green)':'var(--tx-4)'}">${c.on?'✓':'✗'}</span><span style="color:${c.on?'var(--tx-1)':'var(--tx-4)}'}">${c.name}</span></div>`;
  });
  h+='</div>';

  // Controls
  if(S.auditRunning){
    h+='<div class="audit-progress">';
    h+=`<div style="font-size:13px;font-weight:600">Auditing… ${S.auditProgress}/${S.auditTotal}</div>`;
    h+=`<div class="audit-progress-bar"><div class="audit-progress-fill" style="width:${S.auditTotal?(S.auditProgress/S.auditTotal*100):0}%"></div></div>`;
    h+='<div class="audit-log">';
    S.auditLog.forEach(l=>{h+=`<div>${esc(l)}</div>`});
    h+='</div></div>';
  }else{
    h+=`<div style="display:flex;gap:12px;align-items:center">`;
    h+=`<button class="btn btn-blue" id="btn-audit" style="height:44px;padding:0 24px;font-size:14px;font-weight:600">${IC.play} Run Full Audit</button>`;
    h+=`<span style="font-size:12px;color:var(--tx-3)">Processes ${S.auditBatchSize} entries per batch with rate limiting</span>`;
    h+='</div>';
  }

  h+='</div>';
  return h;
}

function renderReview(){
  let h='<div class="page-header"><h1>Review Queue</h1><p>${S.reviewQueue.length} items awaiting your review</p></div>';
  h=h.replace('${S.reviewQueue.length}',S.reviewQueue.length);
  h+='<div style="padding:20px 28px">';
  
  if(S.reviewQueue.length===0){
    h+=`<div style="text-align:center;padding:60px;color:var(--tx-3)"><div style="font-size:48px;margin-bottom:12px">✓</div><div style="font-size:16px;font-weight:600;color:var(--tx-2)">All clear!</div><div style="font-size:13px;margin-top:4px">Run the AI Auditor to generate items for review.</div><button class="btn btn-purple" data-nav="auditor" style="margin-top:16px">Go to Auditor</button></div>`;
  }

  S.reviewQueue.forEach((item,qi)=>{
    const customVal=S.reviewCustom[item.rowIdx]||'';
    h+=`<div class="review-item">`;
    h+=`<div class="review-tag">${esc(item.tagName)}</div>`;
    h+=`<div class="review-section">${esc(item.indexSection)} · Row ${item.rowIdx+1} · ${item.status==='generate'?'🤖 Generated':'✏️ Fix suggested'}</div>`;
    h+='<div class="review-row">';
    h+=`<div style="flex:1"><div class="review-label">Original</div><div class="${item.original?'review-old':''}">${item.original?esc(item.original):'<span style="color:var(--tx-4);font-style:italic">[empty]</span>'}</div></div>`;
    h+=`<div style="flex:1"><div class="review-label">Suggested</div><div class="review-new">${esc(item.suggestion)}</div></div>`;
    h+='</div>';
    if(item.reason) h+=`<div class="review-reason">${esc(item.reason)}</div>`;
    if(item.transcript) h+=`<div class="review-transcript"><strong>Transcript:</strong> ${esc(item.transcript.slice(0,300))}${item.transcript.length>300?'…':''}</div>`;
    h+='<div class="review-actions">';
    h+=`<button class="btn btn-sm btn-green" data-accept="${qi}">${IC.check} Accept</button>`;
    h+=`<button class="btn btn-sm btn-red" data-deny="${qi}">${IC.x} Deny</button>`;
    h+=`<input class="review-custom-input" data-custominput="${qi}" placeholder="Custom text…" value="${esc(customVal)}">`;
    h+=`<button class="btn btn-sm btn-purple" data-custom="${qi}">Save Custom</button>`;
    h+='</div></div>';
  });

  h+='</div>';
  return h;
}

function renderSettings(){
  let h='<div class="page-header"><h1>Settings</h1><p>Configure rules and connections</p></div>';
  h+='<div class="settings-pad">';
  
  h+='<div class="settings-section"><h3>Tag Description Rules</h3>';
  RULES.tagDesc.checks.forEach((c,i)=>{
    h+=`<div class="rule-item"><span class="rule-name">${c.name}</span><span class="rule-desc">${esc(c.name)}</span><button class="rule-toggle ${c.on?'on':''}" data-ruletoggle="${i}"></button></div>`;
  });
  h+='</div>';

  h+='<div class="settings-section"><h3>Good Examples</h3>';
  RULES.tagDesc.goodExamples.forEach(e=>{
    h+=`<div style="font-size:12px;padding:4px 0;color:var(--tx-2)"><strong>${esc(e.tag)}</strong> → "${esc(e.desc)}" <span style="color:var(--tx-4)">(${esc(e.note)})</span></div>`;
  });
  h+='</div>';

  h+='<div class="settings-section"><h3>Connection</h3>';
  h+=`<div style="font-size:12px;color:var(--tx-2);margin-bottom:6px">Sheet: <code style="color:var(--blue)">${esc(S.sheetId)}</code></div>`;
  h+=`<div style="font-size:12px;color:var(--tx-2);margin-bottom:6px">Claude API: <code style="color:${S.claudeKey?'var(--green)':'var(--red)'}">${S.claudeKey?'Connected':'Not set'}</code></div>`;
  h+='</div>';

  h+='</div>';
  return h;
}

function renderAIPanel(){
  let h='<div class="ai-panel">';
  h+=`<div class="ai-head"><div class="ai-dot"></div><h3>Claude AI</h3><button class="btn btn-sm btn-icon" id="ai-close">${IC.x}</button></div>`;
  h+='<div class="ai-msgs">';
  if(!S.aiMsgs.length) h+=`<div class="ai-msg system">Ask me anything about your sheet data — I can analyze, search, and make changes.</div>`;
  S.aiMsgs.forEach(m=>{const d=rmd(m.content);if(d) h+=`<div class="ai-msg ${m.role}">${d}</div>`});
  if(S.aiTyping) h+='<div class="ai-typing">Thinking…</div>';
  h+='</div>';
  h+=`<div class="ai-input-area"><textarea class="ai-input" id="ain" placeholder="Ask about your data…" rows="1">${esc(S.aiInput)}</textarea><button class="ai-send" id="ais" ${S.aiTyping?'disabled':''}>${IC.send}</button></div>`;
  h+='</div>';
  return h;
}

function renderSetup(app){
  app.innerHTML=`<div class="setup-screen"><div class="setup-card"><h1>JEM Index Workstation</h1><p class="sub">Connect your Google Sheet and optionally add Claude AI for intelligent data management.</p>
  <div class="setup-steps"><h3>Google Setup (one-time, ~5 min)</h3><ol><li>Go to <code>console.cloud.google.com</code></li><li>Create project → Enable <code>Google Sheets API</code></li><li><strong>Clients</strong> → Create <strong>OAuth 2.0 Client ID</strong> (Web app)</li><li>Add authorized JS origin: <strong>your GitHub Pages URL</strong></li><li>Add yourself as <strong>test user</strong> in Audience settings</li></ol></div>
  <label>Google OAuth Client ID</label><input class="s-input" id="ic" placeholder="123…apps.googleusercontent.com" value="${esc(S.clientId)}">
  <label>Google Sheet ID</label><input class="s-input" id="is" placeholder="From spreadsheet URL" value="${esc(S.sheetId)}">
  <div class="setup-ai"><h3>🤖 Claude AI (optional)</h3><p>Powers the AI Auditor, chat, and intelligent editing features.</p><label style="color:var(--purple)">Anthropic API Key</label><input class="s-input" id="ik" type="password" placeholder="sk-ant-…" value="${esc(S.claudeKey)}"></div>
  <div class="setup-err" id="se"></div>
  <button class="btn btn-blue" id="btn-con" style="width:100%;height:44px;font-size:14px;font-weight:600">Sign in with Google & Connect</button></div></div>`;
  $('#btn-con').onclick=async()=>{
    const c=$('#ic').value.trim(),s=$('#is').value.trim(),k=$('#ik').value.trim();
    if(!c||!s){$('#se').textContent='Client ID and Sheet ID required';return}
    $('#btn-con').textContent='Connecting…';$('#btn-con').disabled=true;
    try{await doConnect(c,s,k);await loadTab(0);render()}catch(e){$('#se').textContent=e.message;$('#btn-con').textContent='Sign in with Google & Connect';$('#btn-con').disabled=false}
  };
}

// ═══════════════════════════════════════════════════════════════
// EVENT BINDING
// ═══════════════════════════════════════════════════════════════
function bindAll(){
  const on=(sel,ev,fn)=>{const el=$(sel);if(el)el.addEventListener(ev,fn)};

  // Navigation
  $$('[data-nav]').forEach(el=>el.onclick=()=>{S.view=el.dataset.nav;render()});
  on('#nav-ai','click',()=>{S.aiOpen=!S.aiOpen;render()});
  on('#btn-logout','click',logout);

  // Sheet tabs
  $$('[data-stab]').forEach(el=>el.onclick=()=>loadTab(+el.dataset.stab));

  // Sheet view
  on('#si','input',()=>{S.search=$('#si').value;render();setTimeout(()=>{const e=$('#si');if(e){e.focus();e.selectionStart=e.selectionEnd=e.value.length}},0)});
  on('#chk-all','change',()=>{const p=getProcessed();S.selected=$('#chk-all').checked?new Set(p.map(r=>r.i)):new Set();render()});
  $$('[data-chk]').forEach(el=>el.onchange=()=>{const i=+el.dataset.chk;S.selected.has(i)?S.selected.delete(i):S.selected.add(i);render()});
  $$('th[data-col]').forEach(el=>el.onclick=()=>{const c=+el.dataset.col;if(S.sortCol===c)S.sortDir=S.sortDir==='asc'?'desc':'asc';else{S.sortCol=c;S.sortDir='asc'}render()});
  $$('[data-dbl]').forEach(el=>el.ondblclick=()=>{const[r,c]=el.dataset.dbl.split('-').map(Number);S.editCell={r,c};S.editVal=(S.rows[r]||[])[c]||'';render();setTimeout(()=>{const e=$('#ei');if(e)e.focus()},0)});
  const ei=$('#ei');if(ei){ei.oninput=()=>{S.editVal=ei.value};ei.onblur=()=>{if(S.editCell){saveCell(S.editCell.r,S.editCell.c,S.editVal).then(()=>{S.editCell=null;render()})}};ei.onkeydown=e=>{if(e.key==='Enter')ei.blur();if(e.key==='Escape'){S.editCell=null;render()}}}
  on('#btn-del','click',()=>delRows(S.selected));
  on('#btn-desel','click',()=>{S.selected=new Set();render()});
  on('#btn-ref','click',()=>loadTab(S.activeTab));

  // Auditor
  on('#btn-audit','click',runAudit);

  // Review
  $$('[data-accept]').forEach(el=>el.onclick=()=>{const qi=+el.dataset.accept;const item=S.reviewQueue[qi];if(item)reviewAction(item,'accept')});
  $$('[data-deny]').forEach(el=>el.onclick=()=>{const qi=+el.dataset.deny;const item=S.reviewQueue[qi];if(item){S.reviewQueue=S.reviewQueue.filter(r=>r.rowIdx!==item.rowIdx);render()}});
  $$('[data-custominput]').forEach(el=>el.oninput=()=>{const qi=+el.dataset.custominput;const item=S.reviewQueue[qi];if(item)S.reviewCustom[item.rowIdx]=el.value});
  $$('[data-custom]').forEach(el=>el.onclick=()=>{const qi=+el.dataset.custom;const item=S.reviewQueue[qi];if(item){const val=S.reviewCustom[item.rowIdx]||'';if(val)reviewAction(item,'custom',val)}});

  // Settings
  $$('[data-ruletoggle]').forEach(el=>el.onclick=()=>{const i=+el.dataset.ruletoggle;RULES.tagDesc.checks[i].on=!RULES.tagDesc.checks[i].on;render()});

  // AI
  const ain=$('#ain');if(ain){ain.oninput=()=>{S.aiInput=ain.value;ain.style.height='auto';ain.style.height=Math.min(ain.scrollHeight,100)+'px'};ain.onkeydown=e=>{if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();doSendAI()}}}
  on('#ais','click',doSendAI);
  on('#ai-close','click',()=>{S.aiOpen=false;render()});
}

function doSendAI(){const v=(S.aiInput||'').trim();if(!v||S.aiTyping)return;aiChat(v)}

// ═══════════════════════════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════════════════════════
render();
</script>
