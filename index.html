// ═══════════════════════════════════════════════════════════════
// INDEX TAB SYNC — write review data back to Google Sheet
// ═══════════════════════════════════════════════════════════════

// Build a map from (entryName, clipLink) → sheet row number in an Index tab.
// The indented format: entry rows have col A filled, segment rows have col B filled,
// result rows have col C (description) filled and col K (clip link).
// We use clip link as the unique identifier for a result row.
async function buildIndexTabMap(tabName){
  try{
    const r=await gapi.client.sheets.spreadsheets.values.get({
      spreadsheetId:S.sheetId,
      range:`'${tabName}'!A:M`
    });
    const rows=r.result.values||[];
    const map={}; // key: "entryName|clipLink" → {sheetRow (1-indexed), tabName}
    let currentEntry='';
    let currentSeg='';
    for(let i=1;i<rows.length;i++){ // skip header
      const row=rows[i]||[];
      const colA=(row[0]||'').trim();
      const colB=(row[1]||'').trim();
      const colL=(row[11]||'').trim(); // clip link (column L)
      if(colA){currentEntry=colA;currentSeg='';continue}
      if(colB){currentSeg=colB;continue}
      // Result row — has clip link in col L
      if(colL&&currentEntry){
        const mapKey=currentEntry+'|'+colL;
        map[mapKey]={sheetRow:i+1,tabName,entry:currentEntry,seg:currentSeg}; // +1 because sheets are 1-indexed
      }
    }
    return map;
  }catch(e){
    console.error('buildIndexTabMap error:',e);
    return{};
  }
}

// Find the Index tab name for a given section
function indexTabForSection(sectionName){
  return'Index - '+sectionName;
}

// Find which section an entry belongs to
function sectionForEntry(entryName){
  if(!S.indexData)return null;
  for(const sec of RULES.sectionOrder){
    const entries=S.indexData.sections[sec]||[];
    if(entries.find(e=>e.name===entryName))return sec;
  }
  return null;
}

// Build clip link from a result object (same logic as generateIndexTab)
function clipLinkForResult(r){
  const cid=r.clipId||(r.objId?(r.objId.replace('video_clip-','')):'');
  return cid?('https://videos.jem.tv/video-player?clip='+cid):'';
}

// Cache for tab maps to avoid re-reading on every action
let _tabMapCache={};
let _tabMapCacheTime={};
const TAB_MAP_TTL=60000; // 1 minute cache

async function getTabMap(tabName){
  const now=Date.now();
  if(_tabMapCache[tabName]&&_tabMapCacheTime[tabName]&&(now-_tabMapCacheTime[tabName]<TAB_MAP_TTL)){
    return _tabMapCache[tabName];
  }
  // Check tab exists
  const existingTabs=(S.sheetMeta?.tabs||[]).map(t=>t.title);
  if(!existingTabs.includes(tabName))return null;
  const map=await buildIndexTabMap(tabName);
  _tabMapCache[tabName]=map;
  _tabMapCacheTime[tabName]=now;
  return map;
}

function invalidateTabMapCache(tabName){
  if(tabName){delete _tabMapCache[tabName];delete _tabMapCacheTime[tabName]}
  else{_tabMapCache={};_tabMapCacheTime={}}
}

// Write Review Status and AI Suggestion to the Index tab for a specific result
// reviewStatus: 'pending', 'accepted', 'denied', 'custom', 'ok', 'reviewed'
// suggestion: the AI suggestion text (or empty)
async function syncToIndexTab(entryName,result,reviewStatus,suggestion){
  const section=sectionForEntry(entryName);
  if(!section)return;
  const tabName=indexTabForSection(section);
  const map=await getTabMap(tabName);
  if(!map)return; // Tab doesn't exist yet, skip silently

  const clipLink=clipLinkForResult(result);
  if(!clipLink)return;
  const mapKey=entryName+'|'+clipLink;
  const info=map[mapKey];
  if(!info)return; // Row not found in tab

  // Write H (Review Status) and I (AI Suggestion) — columns index 7 and 8
  const statusLabel={pending:'⏳ Pending',accepted:'✅ Accepted',denied:'❌ Denied',custom:'✏️ Custom',ok:'✓ OK',reviewed:'✓ Reviewed'}[reviewStatus]||reviewStatus;
  try{
    await gapi.client.sheets.spreadsheets.values.batchUpdate({
      spreadsheetId:S.sheetId,
      resource:{
        valueInputOption:'RAW',
        data:[
          {range:`'${tabName}'!I${info.sheetRow}`,values:[[statusLabel]]},
          {range:`'${tabName}'!J${info.sheetRow}`,values:[[suggestion||'']]}
        ]
      }
    });
  }catch(e){console.warn('syncToIndexTab write error:',e)}
}

// Also update the Description column (C) in the Index tab when a description changes
async function syncDescToIndexTab(entryName,result,newDesc){
  if(!newDesc&&newDesc!=='')return; // Skip if undefined/null (but allow explicit empty string)
  const section=sectionForEntry(entryName);
  if(!section)return;
  const tabName=indexTabForSection(section);
  const map=await getTabMap(tabName);
  if(!map)return;

  const clipLink=clipLinkForResult(result);
  if(!clipLink)return;
  const mapKey=entryName+'|'+clipLink;
  const info=map[mapKey];
  if(!info)return;

  try{
    await gapi.client.sheets.spreadsheets.values.update({
      spreadsheetId:S.sheetId,
      range:`'${tabName}'!D${info.sheetRow}`,
      valueInputOption:'RAW',
      resource:{values:[[newDesc]]}
    });
  }catch(e){console.warn('syncDescToIndexTab write error:',e)}
}

// Batch sync: write all current review data to Index tabs
// Called manually from dashboard or settings
async function fullSyncToSheets(){
  if(!S.indexData){toast('No index data','error');return}
  toast('Syncing review data to sheets…');
  let synced=0,skipped=0;
  for(const sec of RULES.sectionOrder){
    const tabName=indexTabForSection(sec);
    const map=await getTabMap(tabName);
    if(!map){skipped++;continue}

    const entries=S.indexData.sections[sec]||[];
    const batchData=[];
    entries.forEach(entry=>{
      entry.results.forEach(r=>{
        const k=rvKey(entry.name,r.segType,r.rowIdx);
        const rv=getRV(k);
        if(!rv)return;
        const clipLink=clipLinkForResult(r);
        if(!clipLink)return;
        const mapKey=entry.name+'|'+clipLink;
        const info=map[mapKey];
        if(!info)return;
        const statusLabel={pending:'⏳ Pending',accepted:'✅ Accepted',denied:'❌ Denied',custom:'✏️ Custom',ok:'✓ OK'}[rv.status]||(rv.reviewed?'✓ Reviewed':'');
        batchData.push(
          {range:`'${tabName}'!I${info.sheetRow}`,values:[[statusLabel]]},
          {range:`'${tabName}'!J${info.sheetRow}`,values:[[rv.suggestion||'']]}
        );
      });
    });

    if(batchData.length){
      // Write in chunks of 200 ranges (100 rows × 2 cols)
      for(let i=0;i<batchData.length;i+=200){
        try{
          await gapi.client.sheets.spreadsheets.values.batchUpdate({
            spreadsheetId:S.sheetId,
            resource:{valueInputOption:'RAW',data:batchData.slice(i,i+200)}
          });
          synced+=Math.min(200,batchData.length-i)/2;
        }catch(e){console.warn('Batch sync error:',e)}
        if(i+200<batchData.length)await new Promise(r=>setTimeout(r,300));
      }
    }
  }
  toast(`Synced ${Math.round(synced)} items to ${RULES.sectionOrder.length-skipped} tabs`,'success');
}


async function runAudit(){
  if(!S.claudeKey||!S.indexData){toast('Need API key and data','error');return}
  // Gather entries based on audit scope
  const allEntries=[];
  const scope=S.auditScope||'all';
  
  if(scope==='sections'){
    const selectedSections=Object.keys(S.auditSections).filter(s=>S.auditSections[s]);
    if(!selectedSections.length){toast('Select at least one section','error');return}
    selectedSections.forEach(sec=>{
      (S.indexData.sections[sec]||[]).forEach(e=>{
        e.results.forEach(r=>{
          allEntries.push({entryName:e.name,section:e.section,desc:r.desc,rel:r.rel,transcript:r.transcript,rowIdx:r.rowIdx,clipName:r.clipName,segType:r.segType});
        });
      });
    });
  }else if(scope==='visible'){
    // Audit what's currently visible in index preview
    const q=S.idxSearch.toLowerCase();
    let sectionsToShow=S.idxActiveSection==='all'?RULES.sectionOrder:[S.idxActiveSection];
    sectionsToShow.forEach(sec=>{
      let entries=S.indexData.sections[sec]||[];
      if(q)entries=entries.filter(e=>e.name.toLowerCase().includes(q)||e.results.some(r=>(r.desc||'').toLowerCase().includes(q)));
      if(S.idxNavMode==='tree'&&S.idxActiveEntry)entries=entries.filter(e=>e.name===S.idxActiveEntry);
      entries.forEach(e=>{
        e.results.forEach(r=>{
          allEntries.push({entryName:e.name,section:e.section,desc:r.desc,rel:r.rel,transcript:r.transcript,rowIdx:r.rowIdx,clipName:r.clipName,segType:r.segType});
        });
      });
    });
  }else{
    // 'all' — everything
    Object.values(S.indexData.sections).forEach(sec=>sec.forEach(e=>{
      e.results.forEach(r=>{
        allEntries.push({entryName:e.name,section:e.section,desc:r.desc,rel:r.rel,transcript:r.transcript,rowIdx:r.rowIdx,clipName:r.clipName,segType:r.segType});
      });
    }));
  }
  
  if(!allEntries.length){toast('No entries to audit','error');return}
  
  S.auditRunning=true;S.auditProgress=0;S.auditTotal=allEntries.length;S.auditLog=[];render();
  const bs=S.auditBatch;let totalFixed=0;
  for(let i=0;i<allEntries.length;i+=bs){
    const batch=allEntries.slice(i,i+bs);
    S.auditLog.push(`Batch ${Math.floor(i/bs)+1}/${Math.ceil(allEntries.length/bs)}...`);render();
    try{
      const rulesText=RULES.tagDesc.checks.filter(c=>c.on).map((c,i)=>`${i+1}. ${c.name}`).join('\n');
      const goodEx=RULES.tagDesc.good.map(e=>`"${e.tag}" → "${e.desc}"`).join('\n  ');
      const badEx=RULES.tagDesc.bad.map(e=>`"${e.tag}" → "${e.desc}"`).join('\n  ');
      const spellingFixes=(RULES.tagDesc.spelling||[]).map(s=>`${s.wrong}→${s.right}`).join(', ');
      const tightenEx=(RULES.tagDesc.tightenExamples||[]).map(e=>`"${e.before}" → "${e.after}"`).join('\n  ');
      const prompt=`Audit these tag descriptions for the JEM Video Index book.

RULES — flag as "fix" if ANY rule is violated:
${rulesText}

SPELLING FIXES: ${spellingFixes}

GOOD EXAMPLES:
  ${goodEx}

BAD EXAMPLES:
  ${badEx}

TIGHTENING EXAMPLES (remove unnecessary words):
  ${tightenEx}

The description reads as "[Entry name]: [description]" like a subtitle. It must add meaning beyond the entry name.

JSON array only. Each: {idx, status:"ok"|"fix"|"generate", suggestion:"...", reason:"..."}

${batch.map((e,j)=>`[${j}] Entry:"${e.entryName}" Sec:${e.section} Rel:${e.rel}\n  Desc:"${e.desc||'[empty]'}"\n  Transcript:"${(e.transcript||'').slice(0,150)}"`).join('\n\n')}`;
      const resp=await fetch('https://api.anthropic.com/v1/messages',{method:'POST',headers:{'Content-Type':'application/json','x-api-key':S.claudeKey,'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:4096,system:'You are a strict, expert editor auditing tag descriptions for the JEM Video Index book about the Lubavitcher Rebbe. You must enforce all rules rigorously. The most common error is repeating words from the tag name in the description — catch every instance. Respond with a JSON array only. Each item: {idx, status:"ok"|"fix"|"generate", suggestion:"...", reason:"..."}',messages:[{role:'user',content:prompt}]})});
      if(!resp.ok)throw new Error('API '+resp.status);
      const d=await resp.json(),txt=d.content.map(c=>c.text||'').join('');
      let parsed;try{parsed=JSON.parse(txt.replace(/```json?\s*/g,'').replace(/```/g,'').trim())}catch{const m=txt.match(/\[[\s\S]*\]/);if(m)parsed=JSON.parse(m[0]);else throw new Error('Parse fail')}
      let fx=0;const syncQueue=[];
      parsed.forEach(p=>{
        if(p.status==='fix'||p.status==='generate'){
          const e=batch[p.idx!=null?p.idx:p.index];
          if(e){
            const k=rvKey(e.entryName,e.segType,e.rowIdx);
            const existing=getRV(k);
            // Don't overwrite if already has a pending suggestion or is reviewed
            if(!existing||(!existing.reviewed&&existing.status!=='pending')){
              setRV(k,{suggestion:p.suggestion||'',reason:p.reason||'',status:'pending',reviewed:false,deniedHistory:(existing?.deniedHistory||[])});
              syncQueue.push({entryName:e.entryName,segType:e.segType,rowIdx:e.rowIdx,status:'pending',suggestion:p.suggestion||''});
            }
            fx++;
          }
        }else{
          // Mark as OK = reviewed
          const e=batch[p.idx!=null?p.idx:p.index];
          if(e){
            const k=rvKey(e.entryName,e.segType,e.rowIdx);
            const existing=getRV(k);
            if(!existing||!existing.reviewed){
              setRV(k,{...(existing||{}),status:'ok'});
              syncQueue.push({entryName:e.entryName,segType:e.segType,rowIdx:e.rowIdx,status:'ok',suggestion:''});
            }
          }
        }
      });
      // Batch sync to Index tabs (non-blocking, fire and forget per batch)
      if(syncQueue.length){
        (async()=>{
          for(const sq of syncQueue){
            const entry=findEntry(sq.entryName);
            const r=entry?.results.find(x=>x.segType===sq.segType&&x.rowIdx===sq.rowIdx);
            if(r)syncToIndexTab(sq.entryName,r,sq.status,sq.suggestion).catch(()=>{});
          }
        })();
      }
      totalFixed+=fx;
      S.auditLog.push(`  ${fx} need review, ${batch.length-fx} OK`);
    }catch(e){S.auditLog.push(`  Error: ${e.message}`)}
    S.auditProgress=Math.min(i+bs,allEntries.length);render();
    if(i+bs<allEntries.length)await new Promise(r=>setTimeout(r,1500));
  }
  S.auditRunning=false;
  S.auditLog.push(`\nDone! ${totalFixed} need changes, ${S.auditTotal-totalFixed} look good.`);toast(`${totalFixed} need changes, ${S.auditTotal-totalFixed} look good`,'success');render();
}
async function reviewAction(item,action,custom){
  if(action==='accept'||action==='custom'){
    const newDesc=action==='custom'?custom:item.suggestion;
    await updateTagDesc(item.rowIdx,item.entryName,newDesc);
  }
  S.reviewQueue=S.reviewQueue.filter(r=>!(r.rowIdx===item.rowIdx&&r.entryName===item.entryName));saveRQ();render();
}

function render(){
  const app=$('#app');
  if(!S.connected){rSetup(app);return}
  if(S.loading&&!S.headers.length){app.innerHTML='<div class="loading-state"><div class="spinner"></div>Loading…</div>';return}
  let h='';
  h+=rSidebar();
  const isIdx=S.view==='index';
  h+=`<div class="main"><div class="main-content"><div class="content${isIdx?' content-index':''}">`;
  if(S.view==='dashboard')h+=rDash();
  else if(isIdx)h+=rIndex();
  else if(S.view==='sheet')h+=rSheet();
  else if(S.view==='auditor')h+=rAuditor();
  else if(S.view==='review')h+=rReview();
  else if(S.view==='settings')h+=rSettings();
  else if(S.view==='consistency')h+=rConsistency();
  h+='</div>';
  if(S.aiOpen)h+=rAI();
  h+='</div></div>';
  // Transcript popup
  if(S.transcriptPopup)h+=rTranscript();
  // Floating audit bar
  if(S.auditSelectMode&&(S.auditSelected.size>0||S.auditRunning)){
    h+='<div class="audit-float" id="audit-float">';
    if(S.auditRunning){
      h+=`<div class="af-spinner"></div> Auditing… ${S.auditProgress}/${S.auditTotal}`;
    }else{
      h+=`<span class="af-count">${S.auditSelected.size}</span> selected `;
      h+=`<button class="af-run" id="idx-audit-selected2">Run Audit</button>`;
      h+=`<span class="af-close" id="idx-audit-float-x2" title="Dismiss">✕</span>`;
    }
    h+='</div>';
  }
  // Floating move bar
  if(S.moveSelectMode&&S.moveSelected.size>0){
    h+='<div class="move-float" id="move-float">';
    h+=`<span class="af-count">${S.moveSelected.size}</span> entries `;
    h+=`<span>Move to:</span>`;
    h+=`<select id="move-target">`;
    RULES.sectionOrder.forEach(sec=>{h+=`<option value="${sec}">${sec}</option>`});
    h+=`</select>`;
    h+=`<button class="af-run" id="move-execute">Move</button>`;
    h+=`<span class="af-close" id="move-float-x" title="Dismiss">✕</span>`;
    h+='</div>';
  }
  // Toasts
  h+='<div class="toasts">';S.toasts.forEach(t=>{h+=`<div class="toast ${t.t}">${esc(t.m)}</div>`});h+='</div>';
  // Save scroll positions before DOM replacement
  const scrollSave={};
  const idxBody=$('.idx-body');if(idxBody)scrollSave.idxBody=idxBody.scrollTop;
  const pad=$('.pad');if(pad)scrollSave.pad=pad.scrollTop;
  const mainContent=$('.main-content');if(mainContent)scrollSave.mainContent=mainContent.scrollTop;
  const content=$('.content');if(content)scrollSave.content=content.scrollTop;
  app.innerHTML=h;bindAll();
  // Restore scroll positions
  const idxBody2=$('.idx-body');if(idxBody2&&scrollSave.idxBody)idxBody2.scrollTop=scrollSave.idxBody;
  const pad2=$('.pad');if(pad2&&scrollSave.pad)pad2.scrollTop=scrollSave.pad;
  const mainContent2=$('.main-content');if(mainContent2&&scrollSave.mainContent)mainContent2.scrollTop=scrollSave.mainContent;
  const content2=$('.content');if(content2&&scrollSave.content)content2.scrollTop=scrollSave.content;
  // Fix idx-body scroll height
  fixIdxScroll();
}
function fixIdxScroll(){
  const body=$('.idx-body');
  if(!body)return;
  const main=$('.idx-main');
  if(!main)return;
  body.style.height=main.clientHeight+'px';
}

// Dynamically show/update/hide the floating audit bar without full re-render
function updateAuditFloat(){
  const count=S.auditSelected.size;
  let bar=$('#audit-float');
  if(count===0){
    if(bar)bar.remove();
    return;
  }
  if(!bar){
    bar=document.createElement('div');
    bar.className='audit-float';
    bar.id='audit-float';
    document.body.appendChild(bar);
  }
  bar.innerHTML=`<span class="af-count">${count}</span> selected <button class="af-run" id="idx-audit-float-run">Run Audit</button><span class="af-close" id="idx-audit-float-x" title="Dismiss">✕</span>`;
  bar.querySelector('#idx-audit-float-run').onclick=()=>{if(S.auditSelected.size)auditSelectedItems()};
  bar.querySelector('#idx-audit-float-x').onclick=()=>{S.auditSelected=new Set();$$('.idx-audit-chk').forEach(cb=>cb.checked=false);updateAuditFloat()};
}

function rSidebar(){
  let h='<div class="sidebar"><div class="sidebar-logo">JEM Index<span>Workstation</span></div>';
  h+=`<div class="sidebar-sheet">${esc(S.sheetMeta?.title||S.sheetId)}</div>`;
  h+='<div class="sidebar-nav">';
  // Main views
  [{id:'index',ic:IC.idx,l:'Index Preview'},{id:'dashboard',ic:IC.dash,l:'Dashboard'},{id:'settings',ic:IC.settings,l:'Settings'}].forEach(n=>{
    h+=`<div class="nav-item ${S.view===n.id?'active':''}" data-nav="${n.id}">${n.ic}<span>${n.l}</span></div>`;
  });

  // Review Progress — right after main nav
  if(S.indexData){
    h+='<div class="nav-sec" style="margin-top:14px">Review Progress</div>';
    RULES.sectionOrder.forEach(sec=>{
      const prog=sectionReviewProgress(sec);
      if(!prog.total)return;
      const pct=Math.round(prog.reviewed/prog.total*100);
      const done=isSectionReviewed(sec);
      h+=`<div class="sidebar-progress"><div style="display:flex;justify-content:space-between;align-items:center"><span style="font-size:10px;color:${done?'var(--green)':'var(--tx-3)'};font-weight:${done?'600':'400'}">${sec}</span><span class="sidebar-progress-text">${prog.reviewed}/${prog.total}</span></div><div class="sidebar-progress-bar"><div class="sidebar-progress-fill" style="width:${pct}%"></div></div></div>`;
    });
  }

  // Bookmarks
  const bmNames=Object.keys(S.idxBookmarks).filter(k=>S.idxBookmarks[k]);
  if(bmNames.length){
    h+=`<div class="nav-sec" style="margin-top:14px">Bookmarks <span style="font-size:8px;font-weight:400;letter-spacing:0">(${bmNames.length})</span></div>`;
    bmNames.sort().slice(0,20).forEach(name=>{
      h+=`<div class="stab" data-bmjump="${esc(name)}" style="font-size:10.5px;padding:3px 11px;display:flex;align-items:center;gap:4px;cursor:pointer"><span style="color:var(--gold);font-size:9px">🔖</span>${esc(name.length>22?name.slice(0,22)+'…':name)}</div>`;
    });
    if(bmNames.length>20)h+=`<div style="padding:2px 11px;font-size:9px;color:var(--tx-4)">+${bmNames.length-20} more</div>`;
  }

  // Tools — collapsible
  h+=`<div class="nav-sec" style="margin-top:14px;cursor:pointer" id="tools-toggle">Tools <span style="font-size:8px;color:var(--tx-4)">${S.toolsOpen?'▾':'▸'}</span></div>`;
  if(S.toolsOpen){
    const pendingCount=Object.values(S.reviewData).filter(rv=>rv.status==='pending'&&rv.suggestion).length;
    [{id:'auditor',ic:IC.audit,l:'AI Auditor'},{id:'review',ic:IC.review,l:'Review Queue',b:pendingCount||null},{id:'sheet',ic:IC.sheet,l:'Sheet View'}].forEach(n=>{
      h+=`<div class="nav-item ${S.view===n.id?'active':''}" data-nav="${n.id}">${n.ic}<span>${n.l}</span>${n.b?`<span class="badge">${n.b}</span>`:''}</div>`;
    });
    h+=`<div class="nav-item ${S.aiOpen?'active':''}" id="nav-ai">${IC.ai}<span>AI Chat</span></div>`;
  }

  h+='</div>';
  if(S.sheetMeta?.tabs?.length){h+='<div class="sidebar-tabs"><h4>Sheet Tabs</h4>';S.sheetMeta.tabs.forEach((t,i)=>{h+=`<div class="stab ${i===S.activeTab?'active':''}" data-stab="${i}">${esc(t.title)}</div>`});h+='</div>'}
  // Timer widget
  h+='<div style="padding:8px 14px;border-top:1px solid var(--border);display:flex;align-items:center;gap:8px">';
  if(S.timerRunning){
    h+=`<span id="timer-display" style="font-family:var(--mono);font-size:13px;font-weight:600;color:var(--green)">${formatTimer(S.timerElapsed)}</span>`;
    h+=`<button class="btn btn-sm btn-red" id="timer-stop" style="font-size:10px;padding:2px 8px">Stop</button>`;
  }else{
    h+=`<button class="btn btn-sm btn-green" id="timer-start" style="font-size:10px;padding:2px 8px">⏱ Clock In</button>`;
  }
  h+='</div>';
  if(S.user)h+=`<div class="sidebar-user"><div class="sidebar-avatar">${S.user.pic?'<img src="'+S.user.pic+'">':esc(S.user.name.charAt(0))}</div><span class="sidebar-uname">${esc(S.user.name)}</span><button class="btn btn-sm btn-icon" id="blo" title="Sign out">${IC.logout}</button></div>`;
  return h+'</div>';
}

function rDash(){
  if(!S.indexData)return'<div class="pad" style="color:var(--tx-3)">Loading index data…</div>';
  const ix=S.indexData;
  let h='<div class="page-hd"><h1>Dashboard</h1><p>Overview of your JEM Video Index</p></div><div class="pad">';
  h+='<div class="grid grid-4" style="margin-bottom:18px">';
  h+=`<div class="card"><h4>Index Entries</h4><div class="val">${ix.totalEntries.toLocaleString()}</div></div>`;
  h+=`<div class="card"><h4>Tag Instances</h4><div class="val">${ix.totalResults.toLocaleString()}</div></div>`;
  h+=`<div class="card"><h4>Pending Review</h4><div class="val" style="color:${S.reviewQueue.length?'var(--purple)':'var(--green)'}">${S.reviewQueue.length}</div></div>`;
  h+=`<div class="card"><h4>Source Clips</h4><div class="val">${S.rows.length.toLocaleString()}</div></div>`;
  h+='</div>';
  // Progress Dashboard — detailed per-section stats
  h+='<div class="card" style="margin-bottom:18px"><h4 style="margin-bottom:10px">Review Progress by Section</h4>';
  let grandTotal=0,grandReviewed=0,grandPending=0;
  RULES.sectionOrder.forEach(sec=>{
    const prog=sectionReviewProgress(sec);
    const entries=(ix.sections[sec]||[]).length;
    const pct=prog.total?Math.round(prog.reviewed/prog.total*100):0;
    const pending=Object.values(S.reviewData).filter(rv=>rv.status==='pending'&&rv.suggestion).length;
    const secPending=(ix.sections[sec]||[]).reduce((s,e)=>s+e.results.filter(r=>{const rv=getRV(rvKey(e.name,r.segType,r.rowIdx));return rv&&rv.status==='pending'&&rv.suggestion}).length,0);
    grandTotal+=prog.total;grandReviewed+=prog.reviewed;grandPending+=secPending;
    h+=`<div style="margin-bottom:8px">`;
    h+=`<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:2px">`;
    h+=`<span style="font-size:12px;font-weight:500">${sec}</span>`;
    h+=`<span style="font-size:10px;color:var(--tx-3)">${prog.reviewed}/${prog.total} reviewed (${pct}%)${secPending?' \u00b7 <span style=\"color:var(--purple)\">' +secPending+' pending</span>':''}</span>`;
    h+=`</div>`;
    h+=`<div class="progress-track" style="height:6px"><div class="progress-fill" style="width:${pct}%;background:${pct===100?'var(--green)':'var(--gold)'}"></div></div>`;
    h+=`<div style="display:flex;gap:6px;margin-top:4px">`;
    h+=`<button class="btn btn-sm" data-bulkauditsec="${sec}" style="font-size:9px;padding:1px 6px">${IC.audit} Audit Section</button>`;
    h+=`</div>`;
    h+=`</div>`;
  });
  const grandPct=grandTotal?Math.round(grandReviewed/grandTotal*100):0;
  h+=`<div style="border-top:1px solid var(--border);padding-top:8px;margin-top:8px;display:flex;justify-content:space-between;font-size:12px;font-weight:600">`;
  h+=`<span>Total</span><span>${grandReviewed}/${grandTotal} (${grandPct}%)${grandPending?' \u00b7 <span style=\"color:var(--purple)\">'+grandPending+' pending</span>':''}</span>`;
  h+=`</div>`;
  h+='</div>';

  // Duplicate Detection
  h+='<div class="card" style="margin-bottom:18px"><h4 style="margin-bottom:10px">🔍 Duplicate Entries</h4>';
  h+='<p style="font-size:11px;color:var(--tx-3);margin-bottom:8px">Entries that appear in multiple sections:</p>';
  const entrySections={};
  RULES.sectionOrder.forEach(sec=>{
    (ix.sections[sec]||[]).forEach(e=>{
      if(!entrySections[e.name])entrySections[e.name]=[];
      entrySections[e.name].push(sec);
    });
  });
  const dupes=Object.entries(entrySections).filter(([n,secs])=>secs.length>1).sort((a,b)=>a[0].localeCompare(b[0]));
  if(dupes.length){
    h+=`<div style="font-size:11px;color:var(--amber);margin-bottom:6px">${dupes.length} entries found in multiple sections</div>`;
    h+='<div style="max-height:200px;overflow-y:auto;font-size:11px">';
    dupes.forEach(([name,secs])=>{
      h+=`<div style="padding:3px 0;border-bottom:1px solid var(--bg-1)"><strong>${esc(name)}</strong> <span style="color:var(--tx-3)">\u2192 ${secs.join(', ')}</span></div>`;
    });
    h+='</div>';
  }else{
    h+='<div style="font-size:12px;color:var(--green)">No duplicates found.</div>';
  }
  h+='</div>';
  // Generate Index Tabs section
  const existingTabs=(S.sheetMeta?.tabs||[]).map(t=>t.title);
  h+='<div class="card" style="margin-bottom:18px"><h4>Generate Index Tabs in Google Sheet</h4>';
  h+='<p style="font-size:11px;color:var(--tx-3);margin-bottom:10px">Create structured index tabs (one per section) in your spreadsheet. Each tab has the indented book format with entry names, segment types, descriptions, references, and full transcripts.</p>';
  h+='<div style="display:flex;flex-wrap:wrap;gap:6px;margin-bottom:10px">';
  RULES.sectionOrder.forEach(sec=>{
    const tabName='Index - '+sec;
    const exists=existingTabs.includes(tabName);
    const cnt=(ix.sections[sec]||[]).length;
    if(exists){
      h+=`<div style="display:flex;align-items:center;gap:4px"><button class="btn btn-sm" disabled style="opacity:.5">${sec} (${cnt})</button><span style="font-size:10px;color:var(--green)">✓ exists</span></div>`;
    }else{
      h+=`<button class="btn btn-sm btn-gold" data-gentab="${sec}">${sec} (${cnt} entries)</button>`;
    }
  });
  h+='</div>';
  // Toggle review columns
  const indexTabs=existingTabs.filter(t=>t.startsWith('Index - '));
  if(indexTabs.length>0){
    h+='<div style="display:flex;gap:6px;margin-top:8px;flex-wrap:wrap">';
    h+=`<button class="btn btn-sm" data-togglerev="show">Show Review Columns</button>`;
    h+=`<button class="btn btn-sm" data-togglerev="hide">Hide Review Columns</button>`;
    h+=`<button class="btn btn-sm" data-toggleorig="show">Show Original Desc</button>`;
    h+=`<button class="btn btn-sm" data-toggleorig="hide">Hide Original Desc</button>`;
    h+=`<button class="btn btn-sm btn-blue" id="btn-fullsync">⟳ Sync All Review Data to Sheets</button>`;
    h+='</div>';
  }
  h+='</div>';
  h+=`<div style="display:flex;gap:10px;flex-wrap:wrap"><button class="btn btn-gold" data-nav="index">${IC.idx} Open Index Preview</button><button class="btn btn-purple" data-nav="auditor">${IC.audit} Run Audit</button><button class="btn" id="run-consistency" style="border-color:var(--blue);color:var(--blue)">🔍 Consistency Check</button><button class="btn" id="export-index" style="border-color:var(--green);color:var(--green)">📄 Export Index</button></div>`;

  // Time Tracking section
  h+='<div class="card" style="margin-top:18px"><h4 style="margin-bottom:10px">⏱ Time Tracking</h4>';
  h+='<p style="font-size:11px;color:var(--tx-3);margin-bottom:10px">Clock in/out from the sidebar. Recent sessions:</p>';
  h+='<div id="time-log-area" style="font-size:12px;color:var(--tx-3)">Loading…</div>';
  h+=`<button class="btn btn-sm" id="load-time-log" style="margin-top:8px">Refresh Time Log</button>`;
  h+='</div>';

  // Activity Log
  h+='<div class="card" style="margin-top:18px"><h4 style="margin-bottom:10px">📋 Recent Activity</h4>';
  const isAdmin=ADMIN_EMAILS.includes(S.user?.email?.toLowerCase());
  const myName=S.user?.name||'Unknown';
  
  // Split into my activity and others
  const myActivity=[...S.activityLog].filter(e=>e.user===myName).reverse().slice(0,50);
  const allActivity=[...S.activityLog].reverse().slice(0,50);
  
  if(isAdmin){
    h+=`<div style="display:flex;gap:8px;margin-bottom:8px">`;
    h+=`<button class="btn btn-sm ${!S.showAllActivity?'btn-gold':''}" id="activity-mine" style="font-size:10px">My Activity</button>`;
    h+=`<button class="btn btn-sm ${S.showAllActivity?'btn-gold':''}" id="activity-all" style="font-size:10px">Everyone</button>`;
    h+=`</div>`;
  }
  
  const displayLog=isAdmin&&S.showAllActivity?allActivity:myActivity;
  
  if(displayLog.length){
    h+='<div style="max-height:300px;overflow-y:auto;font-size:11px">';
    displayLog.forEach(entry=>{
      const time=new Date(entry.timestamp);
      const timeStr=time.toLocaleDateString()+' '+time.toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'});
      h+=`<div style="padding:4px 0;border-bottom:1px solid var(--bg-1);display:flex;gap:8px">`;
      h+=`<span style="color:var(--tx-4);white-space:nowrap;min-width:110px">${timeStr}</span>`;
      if(isAdmin&&S.showAllActivity)h+=`<span style="color:var(--blue);font-weight:500;min-width:60px">${esc(entry.user)}</span>`;
      h+=`<span style="color:var(--tx-2)">${esc(entry.action)}</span>`;
      h+=`</div>`;
    });
    h+='</div>';
  }else{
    h+='<div style="font-size:12px;color:var(--tx-3)">No activity yet.</div>';
  }
  h+='</div>';

  return h+'</div>';
}

function rIndex(){
  if(!S.indexData)return'<div class="pad" style="color:var(--tx-3)">No index data. Load a sheet first.</div>';
  const ix=S.indexData;
  const q=S.idxSearch.toLowerCase();
  // Always show selected section (no more nav modes — just sections)
  let sectionsToShow=S.idxActiveSection==='all'?RULES.sectionOrder:[S.idxActiveSection];

  let h='<div class="idx-wrap">';
  // Clean toolbar
  h+='<div class="idx-toolbar">';
  // Search
  h+=`<div class="idx-search">${IC.search}<input id="idx-search" placeholder="Search entries…" value="${esc(S.idxSearch)}"></div>`;
  // Section dropdown
  const secLabel=S.idxActiveSection==='all'?'All Sections':S.idxActiveSection;
  const secCount=S.idxActiveSection==='all'?Object.values(ix.sections).reduce((a,s)=>a+s.length,0):(ix.sections[S.idxActiveSection]||[]).length;
  h+=`<div class="tb-dd" data-tbdd="section"><div class="tb-dd-btn">📂 <span class="tb-dd-val">${secLabel}</span> <span style="font-size:9px;color:var(--tx-4)">${secCount}</span></div><div class="tb-dd-panel">`;
  h+=`<div class="tb-dd-item ${S.idxActiveSection==='all'?'active':''}" data-idxsec="all">All Sections</div>`;
  RULES.sectionOrder.forEach(sec=>{
    const cnt=(ix.sections[sec]||[]).length;
    const done=isSectionReviewed(sec);
    h+=`<div class="tb-dd-item ${S.idxActiveSection===sec?'active':''}" data-idxsec="${sec}">${done?'✓ ':''}${sec}<span class="tb-dd-cnt">${cnt}</span></div>`;
  });
  h+=`</div></div>`;
  // Filter dropdown
  const filterLabels={all:'Everything',unreviewed:'Needs Review',pending:'Has Suggestions',reviewed:'Reviewed',bookmarked:'Bookmarked'};
  h+=`<div class="tb-dd" data-tbdd="filter"><div class="tb-dd-btn">Show: <span class="tb-dd-val">${filterLabels[S.reviewFilter]||'Everything'}</span></div><div class="tb-dd-panel">`;
  [{id:'all',l:'Everything'},{id:'unreviewed',l:'Needs Review'},{id:'pending',l:'Has Suggestions'},{id:'reviewed',l:'Reviewed ✓'},{id:'bookmarked',l:'🔖 Bookmarked'}].forEach(f=>{
    h+=`<div class="tb-dd-item ${S.reviewFilter===f.id?'active':''}" data-rvfilter="${f.id}">${f.l}</div>`;
  });
  h+=`</div></div>`;
  // Spacer
  h+=`<div class="toolbar-spacer"></div>`;
  // Layout toggle — single/double column
  h+=`<div class="tb-layout-toggle">`;
  h+=`<div class="tb-layout-btn ${S.idxLayout==='single'?'active':''}" data-idxlayout="single" title="Single column">☰</div>`;
  h+=`<div class="tb-layout-btn ${S.idxLayout==='two'?'active':''}" data-idxlayout="two" title="Two columns">❘❘</div>`;
  h+=`</div>`;
  // Sync button (combines sync + rebuild)
  h+=`<button class="btn btn-sm btn-icon" id="idx-undo" title="Undo last action (Ctrl+Z)" ${S.undoStack.length?'':'disabled'} style="${S.undoStack.length?'':'opacity:0.3'}">↩</button>`;
  h+=`<button class="btn btn-sm btn-icon" id="idx-sync" title="Sync latest data">⟳</button>`;
  h+='</div>';

  h+='<div class="idx-main">';

  // Main body — collect entry HTML, then split into columns if two-col
  const isTwoCol=S.idxLayout==='two';
  const entryHtmls=[];
  let currentSecHdr='';
  let entryCount=0;
  sectionsToShow.forEach(sec=>{
    let entries=(ix.sections[sec]||[]);
    if(q)entries=entries.filter(e=>e.name.toLowerCase().includes(q)||e.results.some(r=>(r.desc||'').toLowerCase().includes(q)));
    if(!entries.length)return;
    // Apply review filter
    entries=applyReviewFilter(entries);
    if(!entries.length)return;

    // Section header
    entryHtmls.push(`<div class="idx-section-hd">${sec}${isSectionReviewed(sec)?' <span style="color:var(--green);font-size:14px">✓ reviewed</span>':''}</div>`);

    entries.forEach(e=>{
      const isBM=S.idxBookmarks[e.name];
      const note=S.idxNotes[e.name];
      const hasEmpty=e.results.some(r=>!r.desc?.trim());
      const tooMany=e.results.length>=12;
      const entryDone=isEntryReviewed(e);
      const entryHasPending=e.results.some(r=>hasPendingSuggestion(e.name,r.segType,r.rowIdx));
      entryCount++;

      let eh='';
      eh+=`<div class="idx-entry ${tooMany?'flagged':''} ${isBM?'bookmarked':''}">`;
      eh+=`<div class="idx-entry-name" data-entry="${esc(e.name)}">`;
      // Audit checkbox (hidden unless select mode)
      const allSelected=e.results.every(r=>S.auditSelected.has(e.name+'|'+r.segType+'|'+r.rowIdx));
      eh+=`<input type="checkbox" class="idx-audit-chk" data-audit-entry="${esc(e.name)}" ${allSelected?'checked':''} title="Select for AI audit">`;
      // Move checkbox (hidden unless move mode)
      eh+=`<input type="checkbox" class="idx-move-chk" data-move-entry="${esc(e.name)}" ${S.moveSelected.has(e.name)?'checked':''} title="Select to move">`;
      eh+=`${esc(e.name)}`;
      if(tooMany)eh+=` <span class="idx-entry-badge warn">${e.results.length} results</span>`;
      if(hasEmpty)eh+=` <span class="idx-entry-badge empty">missing desc</span>`;
      // Status toggle — Pending/Reviewed
      eh+=`<button class="idx-entry-status ${entryDone?'reviewed':''}" data-entry-rv="${esc(e.name)}">${entryDone?'✓ Reviewed':'Pending'}</button>`;
      eh+=`</div>`;
      eh+=`<div class="idx-entry-meta">${e.results.length} result${e.results.length!==1?'s':''} · <span data-bm="${esc(e.name)}" style="cursor:pointer;color:${isBM?'var(--gold)':'var(--tx-4)'}">${IC.bookmark}</span>`;
      if(note)eh+=` · 📝`;
      if(entryHasPending)eh+=` · <button class="btn btn-sm btn-green bulk-accept-btn" data-bulkaccept="${esc(e.name)}">Accept All</button>`;
      eh+=`</div>`;

      const byseg={};
      e.results.forEach(r=>{if(!byseg[r.segType])byseg[r.segType]=[];byseg[r.segType].push(r)});
      RULES.segOrder.forEach(seg=>{
        if(!byseg[seg])return;
        eh+=`<div class="idx-seg"><div class="idx-seg-label">${seg}</div>`;
        byseg[seg].forEach((r,ri)=>{
          const descEmpty=!r.desc?.trim();
          const vidUrl=r.clipId?`https://videos.jem.tv/video-player?clip=${r.clipId}`:(r.objId?`https://videos.jem.tv/video-player?clip=${r.objId.replace('video_clip-','')}`:'');
          const k=rvKey(e.name,r.segType,r.rowIdx);
          const rv=getRV(k);
          const isReviewed=rv&&rv.reviewed;
          const isPending=rv&&rv.suggestion&&rv.status==='pending';
          if(S.reviewMode&&isReviewed&&!isPending)return;

          eh+=`<div class="idx-result">`;
          // Audit checkbox (hidden unless select mode)
          const selKey=esc(e.name)+'|'+seg+'|'+r.rowIdx;
          eh+=`<input type="checkbox" class="idx-audit-chk" data-audit-sel="${selKey}" ${S.auditSelected.has(selKey)?'checked':''} title="Select for AI audit">`;
          // Description content
          const hasOriginal=rv&&rv.originalDesc&&rv.originalDesc!==r.desc;
          if(isPending){
            if(hasOriginal){
              eh+=`<span class="idx-orig-inline"><span class="idx-orig-text" data-revert="${esc(e.name)}|${seg}|${r.rowIdx}" title="Click to revert">${esc(rv.originalDesc)}</span><span class="idx-orig-sep">→</span></span>`;
            }
            eh+=`<span class="idx-sug-old">${descEmpty?'[empty]':esc(r.desc)}</span>`;
            eh+=`<span class="idx-sug-arrow">→</span>`;
            eh+=`<span class="idx-sug-new">${esc(rv.suggestion)}</span>`;
            if(rv.reason)eh+=`<span class="idx-sug-reason" data-reason="${esc(rv.reason)}">${esc(rv.reason.length>18?rv.reason.slice(0,18)+'…':rv.reason)}</span>`;
            eh+=`<span class="idx-sug-actions">`;
            eh+=`<span class="idx-sug-btn accept" data-sugaccept="${esc(e.name)}|${seg}|${r.rowIdx}" title="Accept">${IC.check}</span>`;
            eh+=`<span class="idx-sug-btn deny" data-sugdeny="${esc(e.name)}|${seg}|${r.rowIdx}" title="Deny">${IC.x}</span>`;
            eh+=`<span class="idx-sug-btn custom" data-sugcustom="${esc(e.name)}|${seg}|${r.rowIdx}" title="Custom edit">✎</span>`;
            eh+=`</span>`;
          }else if(hasOriginal){
            eh+=`<span class="idx-orig-inline"><span class="idx-orig-text" data-revert="${esc(e.name)}|${seg}|${r.rowIdx}" title="Click to revert to original">${esc(rv.originalDesc)}</span><span class="idx-orig-revert" data-revert="${esc(e.name)}|${seg}|${r.rowIdx}">↩</span><span class="idx-orig-sep">→</span></span>`;
            eh+=`<span class="idx-result-desc editable" data-editdesc="${esc(e.name)}|${seg}|${ri}" title="Double-click to edit">${esc(r.desc)}</span>`;
          }else{
            eh+=`<span class="idx-result-desc ${descEmpty?'empty-desc':'editable'}" data-editdesc="${esc(e.name)}|${seg}|${ri}" title="Double-click to edit">${descEmpty?'[no description]':esc(r.desc)}</span>`;
          }
          // Reference info — compact
          if(r.rel)eh+=`<span class="idx-result-rel">[${esc(r.rel)}]</span>`;
          eh+=`<span class="idx-result-ref">`;
          if(r.clipType==='Film Chapter'||r.clipType==='Film')eh+=`<a href="${vidUrl}" target="_blank" title="${esc(r.clipName)}">${esc(r.pvName||r.clipName)}</a>`;
          else eh+=`<a href="${vidUrl}" target="_blank" title="${esc(r.clipName)}">#${esc(r.progNum)}</a>`;
          eh+=`</span>`;
          // Audit shield icon (always visible)
          eh+=`<span class="idx-mini-btn" data-auditone="${esc(e.name)}|${r.rowIdx}|${seg}" title="Audit this">${IC.audit}</span>`;
          // Clip dropdown (video + transcript)
          if(vidUrl||r.transcript){
            eh+=`<span class="idx-clip-menu" data-clipmenu><span class="idx-clip-btn" data-clipbtn>⋮</span><span class="idx-clip-dd">`;
            if(vidUrl)eh+=`<a href="${vidUrl}" target="_blank">${IC.video} Watch clip</a>`;
            if(r.transcript)eh+=`<span data-showtx="${r.rowIdx}">${IC.doc} View transcript</span>`;
            eh+=`</span></span>`;
          }
          // Status toggle — Pending/Reviewed
          eh+=`<button class="idx-status ${isReviewed?'reviewed':''}" data-desc-rv="${esc(e.name)}|${seg}|${r.rowIdx}">${isReviewed?'✓ Reviewed':'Pending'}</button>`;
          eh+=`</div>`;
        });
        eh+='</div>';
      });
      eh+='</div>';
      entryHtmls.push(eh);
    });
  });

  // Render into idx-body — paginate + single or two columns
  const PAGE_SIZE=200;
  const totalEntries=entryHtmls.length;
  const totalPages=Math.ceil(totalEntries/PAGE_SIZE);
  if(S.idxPage>=totalPages)S.idxPage=Math.max(0,totalPages-1);
  const pageStart=S.idxPage*PAGE_SIZE;
  const pageEnd=Math.min(pageStart+PAGE_SIZE,totalEntries);
  const pageHtmls=entryHtmls.slice(pageStart,pageEnd);

  h+=`<div class="idx-body ${isTwoCol?'two-col-mode':''} ${S.auditSelectMode?'select-mode':''} ${S.moveSelectMode?'move-mode':''}">`;
  
  // Top bar: INSIDE idx-body but sticky at top
  h+='<div class="idx-top-bar" style="position:sticky;top:0;z-index:10;background:var(--bg-0);padding-bottom:8px;border-bottom:1px solid var(--border);margin-bottom:8px">';
  if(S.auditSelectMode){
    h+=`<button class="btn btn-sm" id="idx-audit-cancel" style="font-size:11px">☑ Done Selecting</button>`;
  }else if(S.moveSelectMode){
    h+=`<button class="btn btn-sm" id="idx-move-cancel" style="font-size:11px">✦ Done Moving</button>`;
  }else{
    h+=`<button class="btn btn-sm" id="idx-audit-select" style="font-size:11px">☐ Select for Audit</button>`;
    h+=`<button class="btn btn-sm" id="idx-move-select" style="font-size:11px">✦ Move Entries</button>`;
  }
  if(totalPages>1){
    h+=`<div class="idx-pager" style="margin-left:auto">`;
    h+=`<button class="btn btn-sm" id="idx-page-prev" ${S.idxPage<=0?'disabled':''} style="font-size:10px;padding:2px 8px">←</button>`;
    h+=`<span>Page</span><input id="idx-page-input" type="text" value="${S.idxPage+1}" title="Type page number and press Enter"><span>of ${totalPages}</span>`;
    h+=`<button class="btn btn-sm" id="idx-page-next" ${S.idxPage>=totalPages-1?'disabled':''} style="font-size:10px;padding:2px 8px">→</button>`;
    h+=`</div>`;
  }
  h+='</div>';

  // Content — single or two columns
  if(isTwoCol&&pageHtmls.length>1){
    // Find the split point that minimizes the difference in total weight between columns
    const weights=pageHtmls.map(h=>h.length);
    const totalWeight=weights.reduce((a,b)=>a+b,0);
    let bestSplit=Math.ceil(pageHtmls.length/2);
    let bestDiff=Infinity;
    for(let s=1;s<pageHtmls.length;s++){
      const leftW=weights.slice(0,s).reduce((a,b)=>a+b,0);
      const rightW=totalWeight-leftW;
      const diff=Math.abs(leftW-rightW);
      if(diff<bestDiff){bestDiff=diff;bestSplit=s}
    }
    h+='<div class="idx-cols">';
    h+='<div class="idx-col">'+pageHtmls.slice(0,bestSplit).join('')+'</div>';
    h+='<div class="idx-col-divider"></div>';
    h+='<div class="idx-col">'+pageHtmls.slice(bestSplit).join('')+'</div>';
    h+='</div>';
  }else{
    h+=pageHtmls.join('');
  }

  // Bottom pagination
  if(totalPages>1){
    h+=`<div class="idx-pager" style="border-top:1px solid var(--border);margin-top:12px;padding-top:12px">`;
    h+=`<button class="btn btn-sm" id="idx-page-prev2" ${S.idxPage<=0?'disabled':''} style="font-size:10px;padding:2px 8px">←</button>`;
    h+=`<span>Page</span><input id="idx-page-input2" type="text" value="${S.idxPage+1}" title="Type page number and press Enter"><span>of ${totalPages} (${totalEntries} entries)</span>`;
    h+=`<button class="btn btn-sm" id="idx-page-next2" ${S.idxPage>=totalPages-1?'disabled':''} style="font-size:10px;padding:2px 8px">→</button>`;
    h+=`</div>`;
  }

  h+='</div></div></div>';
  return h;
}

// Apply review filter to entries
function applyReviewFilter(entries){
  const f=S.reviewFilter;
  if(f==='all'&&!S.reviewMode)return entries;
  return entries.filter(e=>{
    if(f==='reviewed')return isEntryReviewed(e);
    if(f==='unreviewed')return!isEntryReviewed(e);
    if(f==='pending')return e.results.some(r=>hasPendingSuggestion(e.name,r.segType,r.rowIdx));
    if(f==='bookmarked')return S.idxBookmarks[e.name];
    // 'all' with review mode — show only unreviewed or with pending
    if(S.reviewMode)return!isEntryReviewed(e)||e.results.some(r=>hasPendingSuggestion(e.name,r.segType,r.rowIdx));
    return true;
  });
}

function getProc(){let r=S.rows.map((d,i)=>({d,i}));if(S.search.trim()){const q=S.search.toLowerCase();r=r.filter(x=>x.d.some(c=>c&&c.toString().toLowerCase().includes(q)))}if(S.sortCol!==null){const c=S.sortCol,dir=S.sortDir;r.sort((a,b)=>{const va=(a.d[c]||'').toString(),vb=(b.d[c]||'').toString(),na=parseFloat(va),nb=parseFloat(vb);if(!isNaN(na)&&!isNaN(nb))return dir==='asc'?na-nb:nb-na;return dir==='asc'?va.localeCompare(vb):vb.localeCompare(va)})}return r}

function rReview(){
  const pendingItems=Object.entries(S.reviewData).filter(([k,rv])=>rv.status==='pending'&&rv.suggestion).map(([k,rv])=>({key:k,...rv,parts:k.split('|')}));
  const deniedItems=Object.entries(S.reviewData).filter(([k,rv])=>rv.deniedHistory&&rv.deniedHistory.length>0).map(([k,rv])=>({key:k,...rv,parts:k.split('|')}));
  let h=`<div class="page-hd"><h1>Review Queue</h1><p>${pendingItems.length} pending suggestions · Suggestions also appear inline in Index Preview</p><div class="page-hd-actions"><button class="btn btn-purple" data-nav="index" onclick="S.reviewFilter='pending';render()">View in Index Preview →</button></div></div><div class="pad">`;

      h+=`<div class="review-item"><div class="review-tag">${esc(entryName)}</div><div class="review-section">${esc(seg)} · Row ${rowIdx+1}</div>`;

      const entry=findEntry(entryName);
      const curDesc=entry?entry.results.find(r=>r.segType===seg&&r.rowIdx===rowIdx)?.desc:'';
      h+=`<div class="review-row"><div style="flex:1"><div class="review-label">Original</div><div class="${curDesc?'review-old':''}">${curDesc?esc(curDesc):'<i style="color:var(--tx-4)">[empty]</i>'}</div></div><div style="flex:1"><div class="review-label">Suggested</div><div class="review-new">${esc(item.suggestion)}</div></div></div>`;

      h+=`<div class="review-actions"><button class="btn btn-sm btn-green" data-sugaccept="${esc(entryName)}|${seg}|${rowIdx}">${IC.check} Accept</button><button class="btn btn-sm btn-red" data-sugdeny="${esc(entryName)}|${seg}|${rowIdx}">${IC.x} Deny</button><input class="review-custom-input" data-rcinput2="${qi}" placeholder="Custom…"><button class="btn btn-sm btn-purple" data-sugcustom2="${esc(entryName)}|${seg}|${rowIdx}|${qi}">Custom</button></div></div>`;

  }

  // Denied history
  if(deniedItems.length){
    h+='<div style="margin-top:24px"><h3 style="font-family:var(--serif);font-size:16px;margin-bottom:8px">Denied Suggestion History</h3>';
    h+='<div class="denied-drawer">';
    deniedItems.forEach(item=>{
      const entryName=item.parts[0];

        h+=`<div class="denied-item"><strong>${esc(entryName)}</strong><span style="color:var(--tx-4);margin:0 6px">→</span><span style="text-decoration:line-through">${esc(d.suggestion)}</span><span style="margin-left:auto;font-size:9px;color:var(--tx-4)">${d.time?new Date(d.time).toLocaleDateString():''}</span></div>`;
      });
    });

  }
  return h+'</div>';
}

  h+=`</div><div class="ai-input-area"><textarea class="ai-input" id="ain" placeholder="Ask about your data…" rows="1">${esc(S.aiInput)}</textarea><button class="ai-send" id="ais" ${S.aiTyping?'disabled':''}>${IC.send}</button></div></div>`;
  return h;
}

// ═══════════════════════════════════════════════════════════════
// EVENT BINDING
// ═══════════════════════════════════════════════════════════════
function bindAll(){
  const on=(sel,ev,fn)=>{const el=$(sel);if(el)el.addEventListener(ev,fn)};
  // Nav
  $$('[data-nav]').forEach(el=>el.onclick=()=>{S.view=el.dataset.nav;render()});
  on('#nav-ai','click',()=>{S.aiOpen=!S.aiOpen;render()});
  on('#tools-toggle','click',()=>{S.toolsOpen=!S.toolsOpen;render()});
  on('#run-consistency','click',()=>runConsistencyCheck());
  on('#export-index','click',()=>exportIndex());
  // Bulk audit by section
  $$('[data-bulkauditsec]').forEach(el=>el.onclick=()=>{
    const sec=el.dataset.bulkauditsec;
    bulkAuditSection(sec);
  });

  // Timer
  on('#timer-start','click',()=>startTimer());
  on('#timer-stop','click',()=>stopTimer());
  
  // Time log on dashboard
  on('#activity-mine','click',()=>{S.showAllActivity=false;render()});
  on('#activity-all','click',()=>{S.showAllActivity=true;render()});
  on('#load-time-log','click',async()=>{
    const area=$('#time-log-area');
    if(area)area.innerHTML='Loading…';
    const log=await loadTimeLog();
    const area2=$('#time-log-area');
    if(!area2)return;
    if(!log.length){area2.innerHTML='No time entries yet.';return}
    // Group by user
    const byUser={};
    log.forEach(e=>{if(!byUser[e.user])byUser[e.user]=[];byUser[e.user].push(e)});
    let html='';
    Object.keys(byUser).sort().forEach(user=>{
      const entries=byUser[user];
      const totalMin=entries.reduce((s,e)=>s+e.duration,0);
      const totalH=Math.floor(totalMin/60);
      const remM=totalMin%60;
      html+=`<div style="margin-bottom:12px">`;
      html+=`<div style="font-weight:600;font-size:13px;margin-bottom:4px">${esc(user)} <span style="font-weight:400;color:var(--tx-3)">— ${totalH}h ${remM}m total</span></div>`;
      html+=`<table style="width:100%;font-size:11px;border-collapse:collapse">`;
      html+=`<tr style="color:var(--tx-4);border-bottom:1px solid var(--border)"><td style="padding:3px 6px">Date</td><td>In</td><td>Out</td><td>Min</td><td>Section</td></tr>`;
      entries.slice(-20).reverse().forEach(e=>{
        html+=`<tr style="border-bottom:1px solid var(--bg-1)"><td style="padding:3px 6px">${esc(e.date)}</td><td>${esc(e.clockIn)}</td><td>${esc(e.clockOut)}</td><td>${e.duration}</td><td>${esc(e.section)}</td></tr>`;
      });
      html+=`</table></div>`;
    });
    area2.innerHTML=html;
  });
  // Auto-load time log when on dashboard
  if(S.view==='dashboard'){
    setTimeout(async()=>{
      const area=$('#time-log-area');
      if(!area)return;
      const log=await loadTimeLog();
      if(!log.length){area.innerHTML='No time entries yet.';return}
      $('#load-time-log')?.click();
    },500);
  }
  on('#rerun-consistency','click',()=>runConsistencyCheck());
  if(!S.consistencyDismissed)S.consistencyDismissed={};
  $$('[data-dismiss-issue]').forEach(el=>el.onclick=()=>{
    const idx=+el.dataset.dismissIssue;
    S.consistencyDismissed[idx]=!S.consistencyDismissed[idx];
    render();
  });
  on('#blo','click',logout);
  $$('[data-stab]').forEach(el=>el.onclick=()=>loadTab(+el.dataset.stab));

  // Index
  let _searchTimer=null;
  on('#idx-search','input',()=>{
    const el=$('#idx-search');
    S.idxSearch=el?.value||'';
    S.idxPage=0;
    if(_searchTimer)clearTimeout(_searchTimer);
    _searchTimer=setTimeout(()=>{
      const curEl=$('#idx-search');
      const savedValue=curEl?.value||S.idxSearch;
      const savedPos=curEl?.selectionStart??savedValue.length;
      render();
      requestAnimationFrame(()=>{
        const newEl=$('#idx-search');
        if(newEl){
          newEl.value=savedValue;
          S.idxSearch=savedValue;
          newEl.focus();
          newEl.selectionStart=newEl.selectionEnd=savedPos;
        }
      });
    },400);
  });
  $$('[data-tree]').forEach(el=>el.onclick=()=>{S.idxActiveEntry=el.dataset.tree;render()});
  on('#idx-undo','click',()=>doUndo());
  on('#idx-sync','click',()=>manualRefresh());
  on('#idx-page-prev','click',()=>{if(S.idxPage>0){S.idxPage--;render();$('.idx-body')?.scrollTo(0,0)}});
  on('#idx-page-next','click',()=>{S.idxPage++;render();$('.idx-body')?.scrollTo(0,0)});
  on('#idx-page-prev2','click',()=>{if(S.idxPage>0){S.idxPage--;render();$('.idx-body')?.scrollTo(0,0)}});
  on('#idx-page-next2','click',()=>{S.idxPage++;render();$('.idx-body')?.scrollTo(0,0)});
  // Page jump input
  ['#idx-page-input','#idx-page-input2'].forEach(sel=>{
    const inp=$(sel);
    if(inp)inp.onkeydown=e=>{
      if(e.key==='Enter'){
        const pg=parseInt(inp.value,10);
        if(!isNaN(pg)&&pg>=1){S.idxPage=pg-1;render();$('.idx-body')?.scrollTo(0,0)}
      }
    };
  });

  // Audit select mode toggle
  on('#idx-audit-select','click',()=>{S.auditSelectMode=true;S.moveSelectMode=false;S.auditSelected=new Set();render()});
  on('#idx-audit-cancel','click',()=>{S.auditSelectMode=false;S.auditSelected=new Set();render()});
  on('#idx-audit-selected','click',()=>{if(S.auditSelected.size)auditSelectedItems()});
  on('#idx-audit-selected2','click',()=>{if(S.auditSelected.size)auditSelectedItems()});
  on('#idx-audit-float-x2','click',()=>{S.auditSelected=new Set();updateAuditFloat();render()});

  // Move mode
  on('#idx-move-select','click',()=>{S.moveSelectMode=true;S.auditSelectMode=false;S.moveSelected=new Set();render()});
  on('#idx-move-cancel','click',()=>{S.moveSelectMode=false;S.moveSelected=new Set();render()});
  on('#move-float-x','click',()=>{S.moveSelected=new Set();render()});
  // Move checkboxes
  $$('[data-move-entry]').forEach(el=>el.onchange=()=>{
    const name=el.dataset.moveEntry;
    if(el.checked)S.moveSelected.add(name);else S.moveSelected.delete(name);
    render();
  });
  // Execute move
  on('#move-execute','click',async()=>{
    const target=$('#move-target')?.value;
    if(!target||!S.moveSelected.size)return;
    const names=[...S.moveSelected];
    if(!confirm(`Move ${names.length} entry/entries to "${target}"?`))return;
    // Capture original sections for undo and tab regeneration
    const originalSections={};
    names.forEach(name=>{
      originalSections[name]=S.sectionOverrides[name]||sectionForEntry(name)||null;
    });
    pushUndo('move',{entries:names,originalSections,target},`${names.length} entries → ${target}`);
    // Apply overrides
    names.forEach(name=>{S.sectionOverrides[name]=target});
    logActivity(`Moved ${names.length} entries to ${target}: ${names.slice(0,5).join(', ')}${names.length>5?'…':''}`);
    syncSharedDataToSheet();
    S.moveSelectMode=false;S.moveSelected=new Set();
    buildIndex();
    toast(`Moved ${names.length} entries to ${target}`,'success');
    render();
    // Regenerate affected Index tabs if they exist
    const existingTabs=(S.sheetMeta?.tabs||[]).map(t=>t.title);
    const affectedSections=new Set([target]);
    Object.values(originalSections).forEach(s=>{if(s)affectedSections.add(s)});
    for(const sec of affectedSections){
      const tabName='Index - '+sec;
      if(existingTabs.includes(tabName)){
        toast(`Regenerating ${tabName}…`);
        _tabMapCache={};
        await generateIndexTab(sec);
      }
    }
  });
  // Individual audit selection checkboxes
  $$('[data-audit-sel]').forEach(el=>el.onchange=()=>{
    const k=el.dataset.auditSel;
    if(el.checked)S.auditSelected.add(k);else S.auditSelected.delete(k);
    updateAuditFloat();
    const btn=$('#idx-audit-selected');
    if(btn){btn.innerHTML=`${IC.audit} Audit${S.auditSelected.size?' '+S.auditSelected.size:''}`;btn.disabled=!S.auditSelected.size}
  });
  // Entry-level audit selection
  $$('[data-audit-entry]').forEach(el=>el.onchange=()=>{
    const entryName=el.dataset.auditEntry;
    const entry=findEntry(entryName);
    if(!entry)return;
    if(el.checked){
      entry.results.forEach(r=>S.auditSelected.add(entryName+'|'+r.segType+'|'+r.rowIdx));
    }else{
      entry.results.forEach(r=>S.auditSelected.delete(entryName+'|'+r.segType+'|'+r.rowIdx));
    }
    $$('[data-audit-sel]').forEach(cb=>{cb.checked=S.auditSelected.has(cb.dataset.auditSel)});
    updateAuditFloat();
    const btn=$('#idx-audit-selected');
    if(btn){btn.innerHTML=`${IC.audit} Audit${S.auditSelected.size?' '+S.auditSelected.size:''}`;btn.disabled=!S.auditSelected.size}
  });

  // Toolbar dropdown toggles
  $$('.tb-dd-btn').forEach(el=>el.onclick=(e)=>{
    e.stopPropagation();

  // Toolbar dropdown item clicks — close dropdown after selection
  $$('.tb-dd-item[data-idxsec]').forEach(el=>el.onclick=()=>{S.idxActiveSection=el.dataset.idxsec;S.idxPage=0;el.closest('.tb-dd')?.classList.remove('open');render()});
  $$('.tb-dd-item[data-rvfilter]').forEach(el=>el.onclick=()=>{S.reviewFilter=el.dataset.rvfilter;S.idxPage=0;el.closest('.tb-dd')?.classList.remove('open');render()});
  $$('.tb-dd-item[data-idxnav]').forEach(el=>el.onclick=()=>{S.idxNavMode=el.dataset.idxnav;if(S.idxNavMode!=='tabs')S.idxActiveSection='all';S.idxPage=0;el.closest('.tb-dd')?.classList.remove('open');render()});
  $$('.tb-dd-item[data-idxlayout]').forEach(el=>el.onclick=()=>{S.idxLayout=el.dataset.idxlayout;el.closest('.tb-dd')?.classList.remove('open');render()});
  $$('.tb-layout-btn[data-idxlayout]').forEach(el=>el.onclick=()=>{S.idxLayout=el.dataset.idxlayout;render()});
  // Close all dropdowns when clicking elsewhere
  document.addEventListener('click',(e)=>{
    if(!e.target.closest('.tb-dd'))$$('.tb-dd.open').forEach(d=>d.classList.remove('open'));
    if(!e.target.closest('[data-clipmenu]'))$$('[data-clipmenu].open').forEach(m=>m.classList.remove('open'));
  });

  // Clip dropdown toggle
  $$('[data-clipbtn]').forEach(el=>el.onclick=(e)=>{
    e.stopPropagation();
    const menu=el.closest('[data-clipmenu]');
    if(!menu)return;
    $$('[data-clipmenu].open').forEach(m=>{if(m!==menu)m.classList.remove('open')});
    menu.classList.toggle('open');
  });

  // Inline suggestion accept/deny/custom
  $$('[data-sugaccept]').forEach(el=>el.onclick=()=>{
    const[en,seg,ri]=el.dataset.sugaccept.split('|');
    acceptSuggestion(en,seg,+ri);
  });
  $$('[data-sugdeny]').forEach(el=>el.onclick=()=>{
    const[en,seg,ri]=el.dataset.sugdeny.split('|');
    denySuggestion(en,seg,+ri);
  });
  $$('[data-sugcustom]').forEach(el=>el.onclick=()=>{
    const[en,seg,ri]=el.dataset.sugcustom.split('|');
    const val=prompt('Enter custom description:');
    if(val&&val.trim())applyCustomDesc(en,seg,+ri,val.trim());
  });
  // Custom from review queue page
  $$('[data-sugcustom2]').forEach(el=>el.onclick=()=>{
    const parts=el.dataset.sugcustom2.split('|');
    const en=parts[0],seg=parts[1],ri=+parts[2],qi=+parts[3];
    const inp=$(`[data-rcinput2="${qi}"]`);
    if(inp&&inp.value.trim())applyCustomDesc(en,seg,ri,inp.value.trim());
  });

  // Revert to original description
  $$('[data-revert]').forEach(el=>el.onclick=(e)=>{
    e.stopPropagation();
    const[en,seg,ri]=el.dataset.revert.split('|');
    if(confirm('Revert to original description?'))revertToOriginal(en,seg,+ri);
  });

  // Description-level status toggle (Pending ↔ Reviewed)
  $$('[data-desc-rv]').forEach(el=>el.onclick=()=>{
    const[en,seg,ri]=el.dataset.descRv.split('|');
    toggleDescReviewed(en,seg,+ri);
    render();
  });
  // Entry-level status toggle
  $$('[data-entry-rv]').forEach(el=>el.onclick=()=>{
    const en=el.dataset.entryRv;
    const entry=findEntry(en);
    if(!entry)return;
    const allReviewed=isEntryReviewed(entry);
    entry.results.forEach(r=>{
      const k=rvKey(en,r.segType,r.rowIdx);
      const rv=getRV(k)||{};
      rv.reviewed=!allReviewed;
      setRV(k,rv);
    });
    render();

  // Bulk accept
  $$('[data-bulkaccept]').forEach(el=>el.onclick=(e)=>{
    e.stopPropagation();
    bulkAcceptEntry(el.dataset.bulkaccept);
  });

  // Audit one description inline
  $$('[data-auditone]').forEach(el=>el.onclick=()=>{
    const parts=el.dataset.auditone.split('|');
    const entryName=parts[0],rowIdx=+parts[1],segType=parts[2]||'';
    auditSingleDesc(entryName,rowIdx,segType);

  // Generate index tabs
  $$('[data-gentab]').forEach(el=>el.onclick=()=>generateIndexTab(el.dataset.gentab));

    const show=el.dataset.toggleorig==='show';

  });

  // Description editing (double-click)
  $$('[data-editdesc]').forEach(el=>el.ondblclick=()=>{
    const[entryName,segType,ri]=el.dataset.editdesc.split('|');
    S.editingDesc={entryName,segType,ri:+ri};
    const entry=findEntry(entryName);
    if(!entry)return;
    const byseg={};entry.results.forEach(r=>{if(!byseg[r.segType])byseg[r.segType]=[];byseg[r.segType].push(r)});
    const result=byseg[segType]?.[+ri];
    if(!result)return;
    el.outerHTML=`<span class="idx-inline-edit"><input class="idx-inline-input" id="desc-edit" value="${esc(result.desc||'')}"><button class="btn btn-sm btn-green" id="desc-save">${IC.check}</button><button class="btn btn-sm" id="desc-cancel">${IC.x}</button></span>`;
    const inp=$('#desc-edit');if(inp)inp.focus();
    const saveBtn=$('#desc-save');
    const cancelBtn=$('#desc-cancel');
    if(saveBtn)saveBtn.onclick=async()=>{
      const newVal=$('#desc-edit')?.value||'';

      const clipType=(S.rows[result.rowIdx]?.[S.headers.findIndex(h=>h.toLowerCase()==='type')]||'').trim();
      const st=RULES.typeMap[clipType]||result.segType||'Addresses';
      const k=rvKey(entryName,st,result.rowIdx);
      pushUndo('edit',{key:k,oldDesc:result.desc,rowIdx:result.rowIdx,entryName},`"${entryName}": "${result.desc}" → "${newVal}"`);
      const ok=await updateTagDesc(result.rowIdx,entryName,newVal);
      if(ok){
        const rv=getRV(k)||{};
        rv.reviewed=true;rv.status='manual';
        setRV(k,rv);
        syncDescToIndexTab(entryName,result,newVal).catch(()=>{});
        logActivity(`Edited: "${entryName}" → "${newVal}"`);
        buildIndex();render();
      }
    };
    if(cancelBtn)cancelBtn.onclick=()=>{S.editingDesc=null;render()};
    if(inp)inp.onkeydown=e=>{if(e.key==='Enter'&&saveBtn)saveBtn.click();if(e.key==='Escape'&&cancelBtn)cancelBtn.click()};

  on('#btn-del','click',()=>delRows(S.selected));

  $$('[data-auditscope]').forEach(el=>el.onclick=()=>{S.auditScope=el.dataset.auditscope;render()});
  $$('[data-auditsec]').forEach(el=>el.onclick=()=>{const s=el.dataset.auditsec;S.auditSections[s]=!S.auditSections[s];render()});

  // Settings — Rule toggles and edits
  $$('[data-ruletoggle]').forEach(el=>el.onclick=()=>{const i=+el.dataset.ruletoggle;RULES.tagDesc.checks[i].on=!RULES.tagDesc.checks[i].on;saveRules();render()});
  $$('[data-ruleedit]').forEach(el=>el.onblur=()=>{const i=+el.dataset.ruleedit;RULES.tagDesc.checks[i].name=el.value;saveRules()});
  $$('[data-ruledelete]').forEach(el=>el.onclick=()=>{const i=+el.dataset.ruledelete;if(confirm('Delete this rule?')){RULES.tagDesc.checks.splice(i,1);saveRules();render()}});
  on('#add-rule','click',()=>{const name=prompt('Rule name:');if(name){RULES.tagDesc.checks.push({id:'custom_'+Date.now(),name,on:true});saveRules();render()}});

  // Test audit
  on('#test-audit-btn','click',async()=>{
    S.testEntry=$('#test-entry')?.value||'';

// Keyboard shortcuts for review
function handleKeyShortcut(e){
  if(e.target.tagName==='INPUT'||e.target.tagName==='TEXTAREA')return;
  // Ctrl+Z / Cmd+Z undo
  if(e.key==='z'&&(e.ctrlKey||e.metaKey)){e.preventDefault();doUndo();return}

}

// Audit selected items from index preview
async function auditSelectedItems(){
  if(!S.claudeKey){toast('No API key','error');return}
  const items=[];
  S.auditSelected.forEach(key=>{
    const[entryName,segType,rowIdx]=key.split('|');

  toast(`Auditing ${items.length} items…`);
  render();
  
  const bs=S.auditBatch;let totalFixed=0;
  for(let i=0;i<items.length;i+=bs){
    const batch=items.slice(i,i+bs);
    try{
      const rulesText=RULES.tagDesc.checks.filter(c=>c.on).map((c,i)=>`${i+1}. ${c.name}`).join('\n');
      const goodEx=RULES.tagDesc.good.map(e=>`"${e.tag}" → "${e.desc}"`).join('\n  ');
      const badEx=RULES.tagDesc.bad.map(e=>`"${e.tag}" → "${e.desc}"`).join('\n  ');
      const spellingFixes=(RULES.tagDesc.spelling||[]).map(s=>`${s.wrong}→${s.right}`).join(', ');
      const tightenEx=(RULES.tagDesc.tightenExamples||[]).map(e=>`"${e.before}" → "${e.after}"`).join('\n  ');
      const prompt=`Audit these tag descriptions for the JEM Video Index book.

RULES — flag as "fix" if ANY rule is violated:
${rulesText}

SPELLING FIXES: ${spellingFixes}

GOOD EXAMPLES:
  ${goodEx}

BAD EXAMPLES:
  ${badEx}

TIGHTENING EXAMPLES (remove unnecessary words):
  ${tightenEx}

The description reads as "[Entry name]: [description]" like a subtitle. It must add meaning beyond the entry name.

JSON array only. Each: {idx, status:"ok"|"fix"|"generate", suggestion:"...", reason:"..."}

${batch.map((e,j)=>`[${j}] Entry:"${e.entryName}" Sec:${e.section} Rel:${e.rel}\n  Desc:"${e.desc||'[empty]'}"\n  Transcript:"${(e.transcript||'').slice(0,150)}"`).join('\n\n')}`;
      const resp=await fetch('https://api.anthropic.com/v1/messages',{method:'POST',headers:{'Content-Type':'application/json','x-api-key':S.claudeKey,'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:4096,system:'Strict editor for JEM Video Index. JSON array only.',messages:[{role:'user',content:prompt}]})});
      if(!resp.ok)throw new Error('API '+resp.status);
      const d=await resp.json(),txt=d.content.map(c=>c.text||'').join('');
      let parsed;try{parsed=JSON.parse(txt.replace(/```json?\s*/g,'').replace(/```/g,'').trim())}catch{const m2=txt.match(/\[[\s\S]*\]/);if(m2)parsed=JSON.parse(m2[0]);else throw new Error('Parse fail')}
      let fx=0;
      parsed.forEach(p=>{
        const e=batch[p.idx!=null?p.idx:p.index];
        if(!e)return;
        const k=rvKey(e.entryName,e.segType,e.rowIdx);

    S.auditProgress=Math.min(i+bs,items.length);
    if(i+bs<items.length){
      toast(`Auditing… ${S.auditProgress}/${S.auditTotal}`);
      await new Promise(r=>setTimeout(r,1500));

  }

const TIME_TAB='_TimeTracking';

async function ensureTimeTab(){
  const tabs=(S.sheetMeta?.tabs||[]).map(t=>t.title);
  if(tabs.includes(TIME_TAB))return;
  try{
    await gapi.client.sheets.spreadsheets.batchUpdate({
      spreadsheetId:S.sheetId,
      resource:{requests:[{addSheet:{properties:{title:TIME_TAB}}}]}
    });
    const m=await gapi.client.sheets.spreadsheets.get({spreadsheetId:S.sheetId});
    S.sheetMeta={title:m.result.properties.title,tabs:m.result.sheets.map(s=>({title:s.properties.title,sid:s.properties.sheetId}))};
  }catch(e){console.warn('ensureTimeTab error:',e)}
}

// Find or create a user's column section in the time tracking sheet
// Layout: each user gets 5 columns (Date, Clock In, Clock Out, Duration, Section) + 1 empty spacer
// Row 1: user names as headers spanning their columns
// Row 2: column headers (Date, In, Out, Min, Section)
// Row 3+: data
async function getUserTimeColumns(userName){
  await ensureTimeTab();
  try{
    // Read row 1 to find existing user sections
    const r=await gapi.client.sheets.spreadsheets.values.get({
      spreadsheetId:S.sheetId,
      range:`'${TIME_TAB}'!1:2`
    });
    const row1=r.result.values?.[0]||[];
    const row2=r.result.values?.[1]||[];
    
    // Find this user's starting column
    for(let i=0;i<row1.length;i++){
      if(row1[i]===userName)return{startCol:i};
    }
    
    // User not found — create new section after the last used column
    let nextCol=0;
    for(let i=row1.length-1;i>=0;i--){
      if(row1[i]){nextCol=i+6;break} // 5 data cols + 1 spacer
    }
    
    // Write user header and column headers
    await gapi.client.sheets.spreadsheets.values.update({
      spreadsheetId:S.sheetId,
      range:`'${TIME_TAB}'!${cl(nextCol)}1:${cl(nextCol+4)}2`,
      valueInputOption:'RAW',
      resource:{values:[
        [userName,'','','',''],
        ['Date','Clock In','Clock Out','Duration (min)','Section']
      ]}
    });
    
    // Bold the user name by merging cells (optional — just makes it cleaner)
    return{startCol:nextCol};
  }catch(e){console.warn('getUserTimeColumns error:',e);return{startCol:0}}
}

function startTimer(){
  if(S.timerRunning)return;
  S.timerRunning=true;
  S.timerStart=Date.now();
  S.timerElapsed=0;
  S.timerInterval=setInterval(()=>{
    S.timerElapsed=Math.floor((Date.now()-S.timerStart)/1000);
    const el=$('#timer-display');
    if(el)el.textContent=formatTimer(S.timerElapsed);
  },1000);
  toast('Timer started','success');
  render();
}

async function stopTimer(){
  if(!S.timerRunning)return;
  clearInterval(S.timerInterval);
  S.timerRunning=false;
  const durationMin=Math.round(S.timerElapsed/60);
  const now=new Date();
  const startTime=new Date(S.timerStart);
  const section=S.idxActiveSection==='all'?'All Sections':S.idxActiveSection;
  const user=S.user?.name||S.user?.email||'Unknown';
  
  try{
    const cols=await getUserTimeColumns(user);
    const sc=cols.startCol;
    
    // Find next empty row for this user (read their date column)
    const r=await gapi.client.sheets.spreadsheets.values.get({
      spreadsheetId:S.sheetId,
      range:`'${TIME_TAB}'!${cl(sc)}3:${cl(sc)}500`
    });
    const nextRow=(r.result.values?.length||0)+3; // +3 because data starts at row 3
    
    await gapi.client.sheets.spreadsheets.values.update({
      spreadsheetId:S.sheetId,
      range:`'${TIME_TAB}'!${cl(sc)}${nextRow}:${cl(sc+4)}${nextRow}`,
      valueInputOption:'RAW',
      resource:{values:[[
        now.toLocaleDateString(),
        startTime.toLocaleTimeString(),
        now.toLocaleTimeString(),
        durationMin,
        section
      ]]}
    });
    toast(`Saved ${durationMin} min to timesheet`,'success');
  }catch(e){
    toast('Failed to save time: '+(e?.result?.error?.message||e?.message||''),'error');
    console.error('Timer save error:',e);
  }
  
  S.timerElapsed=0;S.timerStart=null;
  render();
}

function formatTimer(secs){
  const h=Math.floor(secs/3600);
  const m=Math.floor((secs%3600)/60);
  const s=secs%60;
  return(h>0?h+':':'')+String(m).padStart(2,'0')+':'+String(s).padStart(2,'0');
}

async function loadTimeLog(){
  if(!S.connected)return[];
  try{
    const tabs=(S.sheetMeta?.tabs||[]).map(t=>t.title);
    if(!tabs.includes(TIME_TAB))return[];
    // Read all data
    const r=await gapi.client.sheets.spreadsheets.values.get({
      spreadsheetId:S.sheetId,
      range:`'${TIME_TAB}'!1:500`
    });
    const rows=r.result.values||[];
    if(rows.length<2)return[];
    const row1=rows[0]||[];
    
    // Find all user sections
    const users=[];
    for(let i=0;i<row1.length;i++){
      if(row1[i]&&row1[i].trim())users.push({name:row1[i],col:i});
    }
    
    // Collect entries per user
    const allEntries=[];
    users.forEach(u=>{
      for(let r=2;r<rows.length;r++){
        const row=rows[r]||[];
        const date=row[u.col]||'';
        if(!date)continue;
        allEntries.push({
          user:u.name,
          date,
          clockIn:row[u.col+1]||'',
          clockOut:row[u.col+2]||'',
          duration:+(row[u.col+3])||0,
          section:row[u.col+4]||''
        });
      }
    });
    return allEntries;
  }catch(e){return[]}
}
