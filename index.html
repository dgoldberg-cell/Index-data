// Actually write shared data to the _ReviewData tab
async function doSyncToSheet(){
  if(!S.connected||_syncPending||!checkToken())return;
  _syncPending=true;
  try{
    await ensureSharedTab();
    const data={
      reviewData:S.reviewData,
      bookmarks_by_user:S._allBookmarks||{},
      notes:S.idxNotes,
      descNotes:S.descNotes,
      teamMembers:S.teamMembers,
      notifications:S.notifications,
      sectionOverrides:S.sectionOverrides,
      tagRenames:S.tagRenames||{},
      activityLog:S.activityLog,
      rules:{tagDesc:RULES.tagDesc,consistency:RULES.consistency,segOrder:RULES.segOrder,typeMap:RULES.typeMap,sectionOrder:RULES.sectionOrder,relDefaults:RULES.relDefaults},
      lastUpdated:Date.now(),
      updatedBy:S.user?.name||'unknown'
    };
    const json=JSON.stringify(data);
    // Split into chunks of 48000 chars (stays under Google Sheets 50KB cell limit)
    const CHUNK=48000;
    const MAX_CHUNKS=9995; // Up to ~480MB of JSON capacity (9995 × 48KB)
    const WARN_AT=Math.floor(MAX_CHUNKS*0.7); // Warn at 70% full so we have time to react
    const chunks=[];
    for(let i=0;i<json.length;i+=CHUNK)chunks.push(json.slice(i,i+CHUNK));
    if(chunks.length>MAX_CHUNKS){
      console.error('Shared data too large!',json.length,'chars, '+chunks.length+' chunks');
      toast('Data too large to sync — contact admin','error');
      _syncPending=false;
      return;
    }
    if(chunks.length>WARN_AT){
      console.warn('Shared data approaching limit:',chunks.length,'of',MAX_CHUNKS,'chunks used');
      toast(`Warning: shared data at ${Math.round(chunks.length/MAX_CHUNKS*100)}% capacity`,'warn');
    }
    const rows=chunks.map((c,i)=>[i===0?'CHUNKS:'+chunks.length+'|'+c:c]);
    // Clear old data first (wide range to catch any legacy rows from older versions)
    await gapi.client.sheets.spreadsheets.values.clear({
      spreadsheetId:S.sheetId,
      range:`'${SHARED_TAB}'!A2:A${MAX_CHUNKS+5}`
    });
    await gapi.client.sheets.spreadsheets.values.update({
      spreadsheetId:S.sheetId,
      range:`'${SHARED_TAB}'!A2:A${2+rows.length-1}`,
      valueInputOption:'RAW',
      resource:{values:rows}
    });
    _lastSyncTime=Date.now();
    console.log(`Synced shared data: ${json.length} chars in ${chunks.length} chunk(s) (${Math.round(chunks.length/MAX_CHUNKS*100)}% of capacity)`);
  }catch(e){console.warn('Sync to sheet failed:',e)}
  _syncPending=false;
}

// Read shared data from the _ReviewData tab
async function loadSharedDataFromSheet(){
  if(!S.connected)return;
  try{
    const r=await gapi.client.sheets.spreadsheets.values.get({
      spreadsheetId:S.sheetId,
      range:`'${SHARED_TAB}'!A2:A10000`
    });
    const rows=r.result.values||[];
    if(!rows.length)return;
    
    // Reassemble chunked JSON
    let json='';
    const first=(rows[0]&&rows[0][0])||'';
    if(first.startsWith('CHUNKS:')){
      // New chunked format
      const pipeIdx=first.indexOf('|');
      const numChunks=parseInt(first.slice(7,pipeIdx),10);
      json=first.slice(pipeIdx+1); // First chunk after prefix
      for(let i=1;i<numChunks&&i<rows.length;i++){
        json+=(rows[i]&&rows[i][0])||'';
      }
    }else{
      // Legacy single-cell format (backward compatible)
      json=first;
    }
    
    if(!json)return;
    const data=JSON.parse(json);
    if(data.reviewData){
      S.reviewData=data.reviewData;
      // Migrate: cap any deniedHistory that grew before the cap was added (reclaim space)
      Object.values(S.reviewData).forEach(rv=>{
        if(rv&&rv.deniedHistory&&rv.deniedHistory.length>5){
          rv.deniedHistory=rv.deniedHistory.slice(-5);
        }
      });
    }
    if(data.bookmarks_by_user){
      S._allBookmarks=data.bookmarks_by_user;
      const userKey=S.user?.email||S.user?.name||'default';
      if(S._allBookmarks[userKey])S.idxBookmarks=S._allBookmarks[userKey];
    }else if(data.bookmarks){
      // Legacy: migrate old shared bookmarks to current user
      S.idxBookmarks=data.bookmarks;
      S._allBookmarks={};
      const userKey=S.user?.email||S.user?.name||'default';
      S._allBookmarks[userKey]=data.bookmarks;
    }
    if(data.notes)S.idxNotes=data.notes;
    if(data.descNotes)S.descNotes=data.descNotes;
    if(data.teamMembers&&Array.isArray(data.teamMembers)){
      // Merge — never lose existing members, only add/update
      const merged=new Map();
      // Start with what we already have in memory
      S.teamMembers.forEach(m=>{if(m.email)merged.set(m.email,m)});
      // Merge in what came from the sheet (sheet data wins for lastSeen)
      data.teamMembers.forEach(m=>{
        if(!m.email)return;
        const existing=merged.get(m.email);
        if(existing){
          // Keep the more recent lastSeen
          if(m.lastSeen>existing.lastSeen)Object.assign(existing,m);
        }else{
          merged.set(m.email,m);
        }
      });
      S.teamMembers=[...merged.values()];
    }
    if(data.notifications)S.notifications=data.notifications;
    if(data.sectionOverrides)S.sectionOverrides=data.sectionOverrides;
    if(data.tagRenames)S.tagRenames=data.tagRenames;
    if(data.activityLog)S.activityLog=data.activityLog;
    if(data.rules&&data.rules.tagDesc){
      RULES.tagDesc=data.rules.tagDesc;
      // Auto-upgrade: if saved rules don't have pairedExamples, apply new defaults
      if(!RULES.tagDesc.pairedExamples||!RULES.tagDesc.pairedExamples.length){
        RULES.tagDesc.checks=DEFAULT_RULES.tagDesc.checks;
        RULES.tagDesc.pairedExamples=DEFAULT_RULES.tagDesc.pairedExamples;
        RULES.tagDesc.good=DEFAULT_RULES.tagDesc.good;
        RULES.tagDesc.bad=DEFAULT_RULES.tagDesc.bad;
        RULES.tagDesc.tightenExamples=DEFAULT_RULES.tagDesc.tightenExamples;
        console.log('Auto-upgraded audit rules to paired examples format');
      }
      // Auto-upgrade: if saved rules don't have the new 11-rule structure with tier field, replace
      const hasTiers=(RULES.tagDesc.checks||[]).some(c=>c.tier);
      const hasFocusRule=(RULES.tagDesc.checks||[]).some(c=>c.id==='focus');
      const hasSemicolonRule=(RULES.tagDesc.checks||[]).some(c=>c.id==='semicolon');
      if(!hasTiers||!hasFocusRule||!hasSemicolonRule){
        RULES.tagDesc.checks=DEFAULT_RULES.tagDesc.checks;
        RULES.tagDesc.pairedExamples=DEFAULT_RULES.tagDesc.pairedExamples;
        RULES.tagDesc.tightenExamples=DEFAULT_RULES.tagDesc.tightenExamples;
        console.log('Auto-migrated audit rules to new 11-rule structure with priority tiers');
      }
      if(data.rules.consistency){
        RULES.consistency=data.rules.consistency;
        // Migration: detect old Ashkenazi-style transliteration list and replace with Sephardic defaults
        // Signal: old list had "Mezuzos", "Shabbos", "Simchas Torah" as canonical. New has "Mezuzot", "Shabbat", "Simchat Torah".
        const transList=RULES.consistency.transliteration||[];
        const hasOldAshkenazi=transList.some(t=>t.correct==='Mezuzos'||t.correct==='Shabbos'||t.correct==='Simchas Torah'||t.correct==='Shlichus'||t.correct==='Chassidus'||t.correct==='Teshuvah'||t.correct==='Mitzvos');
        if(hasOldAshkenazi){
          RULES.consistency.transliteration=JSON.parse(JSON.stringify(DEFAULT_RULES.consistency.transliteration));
          console.log('Auto-migrated transliteration list from Ashkenazi to Sephardic style');
        }
      }
      if(data.rules.segOrder)RULES.segOrder=data.rules.segOrder;
      if(data.rules.typeMap)RULES.typeMap=data.rules.typeMap;
      if(data.rules.sectionOrder)RULES.sectionOrder=data.rules.sectionOrder;
      if(data.rules.relDefaults)RULES.relDefaults=data.rules.relDefaults;
      RULES.sectionFromPath=sectionFromPath;
      saveRulesLocal();
    }
    localStorage.setItem('jw_rv',JSON.stringify(S.reviewData));
    localStorage.setItem('jw_bm',JSON.stringify(S.idxBookmarks));
    localStorage.setItem('jw_notes',JSON.stringify(S.idxNotes));
    _lastSyncTime=Date.now();
    console.log(`Loaded shared data: ${json.length} chars, updated by:`,data.updatedBy);
  }catch(e){
    console.log('No shared data tab yet, using localStorage');
  }
}

// Update a tag description in both the main keywords column AND the matching search.keywords_relevancy_N column
// Rename a tag across ALL rows in the sheet. Updates:
//  - Every tag.name occurrence in the keywords JSON
//  - Every matching name in the 4 search.keywords_relevancy_N JSON columns
//  - reviewData keys (reconstructs keys with new name)
//  - descNotes keys
//  - bookmarks
//  - sectionOverrides
//  - Logs history in S.tagRenames
// Returns {ok:true, rowsUpdated} or {ok:false, reason}
async function renameTag(oldName,newName){
  const o=oldName.trim();
  const n=newName.trim();
  if(!o||!n)return{ok:false,reason:'Empty name'};
  if(o===n)return{ok:false,reason:'Same name'};
  if(!S.indexData)return{ok:false,reason:'Index not loaded'};

  // Check for collision — does the target name already exist?
  const existingEntry=findEntry(n);
  if(existingEntry)return{ok:false,reason:`An entry named "${n}" already exists`};

  const kwCol=S.headers.findIndex(h=>h.toLowerCase()==='keywords');
  if(kwCol<0)return{ok:false,reason:'Cannot find keywords column'};
  const relCols=[1,2,3,4].map(i=>S.headers.findIndex(h=>h.toLowerCase()==='search.keywords_relevancy_'+i));

  toast(`Renaming "${o}" → "${n}"…`,'info');

  // Find all rows that contain this tag
  const rowsToUpdate=[];
  S.rows.forEach((row,ri)=>{
    const raw=(row[kwCol]||'').trim();
    if(!raw||raw==='[]')return;
    try{
      const tags=JSON.parse(raw);
      if(tags.some(t=>(t.name||'').trim()===o))rowsToUpdate.push(ri);
    }catch{}
  });

  if(!rowsToUpdate.length)return{ok:false,reason:`No rows contain tag "${o}"`};

  // Build batch update data
  const updates=[];
  let rowsChanged=0;
  for(const ri of rowsToUpdate){
    const row=S.rows[ri];
    let rowChanged=false;
    // Update master keywords column
    try{
      const tags=JSON.parse(row[kwCol]);
      tags.forEach(t=>{if((t.name||'').trim()===o){t.name=n;rowChanged=true}});
      if(rowChanged){
        const newJson=JSON.stringify(tags);
        row[kwCol]=newJson;
        updates.push({range:`'${activeTabTitle()}'!${colLetter(kwCol)}${ri+2}`,values:[[newJson]]});
      }
    }catch{}
    // Update each relevancy column
    relCols.forEach(rc=>{
      if(rc<0)return;
      const raw=(row[rc]||'').trim();
      if(!raw||raw==='[]')return;
      try{
        const tags=JSON.parse(raw);
        let relChanged=false;
        tags.forEach(t=>{if((t.name||'').trim()===o){t.name=n;relChanged=true}});
        if(relChanged){
          const newJson=JSON.stringify(tags);
          row[rc]=newJson;
          updates.push({range:`${S.activeTabTitle}!${colLetter(rc)}${ri+2}`,values:[[newJson]]});
        }
      }catch{}
    });
    if(rowChanged)rowsChanged++;
  }

  // Batch write
  if(updates.length){
    try{
      await gapi.client.sheets.spreadsheets.values.batchUpdate({
        spreadsheetId:S.sheetId,
        resource:{data:updates,valueInputOption:'RAW'}
      });
    }catch(e){
      return{ok:false,reason:'Sheet write failed: '+e.message};
    }
  }

  // Update reviewData keys (old name → new name)
  const newRV={};
  Object.entries(S.reviewData).forEach(([k,v])=>{
    // key format: "EntryName|SegType|RowIdx"
    const parts=k.split('|');
    if(parts.length>=3&&parts.slice(0,-2).join('|')===o){
      const newK=n+'|'+parts.slice(-2).join('|');
      newRV[newK]=v;
    }else{
      newRV[k]=v;
    }
  });
  S.reviewData=newRV;

  // Update descNotes keys (same format)
  const newDN={};
  Object.entries(S.descNotes||{}).forEach(([k,v])=>{
    const parts=k.split('|');
    // Entry-level note: "entry|EntryName"
    if(parts[0]==='entry'&&parts.slice(1).join('|')===o){
      newDN['entry|'+n]=v;
    }else if(parts.length>=3&&parts.slice(0,-2).join('|')===o){
      newDN[n+'|'+parts.slice(-2).join('|')]=v;
    }else{
      newDN[k]=v;
    }
  });
  S.descNotes=newDN;

  // Update bookmarks
  if(S.idxBookmarks){
    if(S.idxBookmarks instanceof Set){
      if(S.idxBookmarks.has(o)){S.idxBookmarks.delete(o);S.idxBookmarks.add(n)}
    }else if(Array.isArray(S.idxBookmarks)){
      const i=S.idxBookmarks.indexOf(o);
      if(i>=0)S.idxBookmarks[i]=n;
    }
  }

  // Update sectionOverrides
  if(S.sectionOverrides&&S.sectionOverrides[o]){
    S.sectionOverrides[n]=S.sectionOverrides[o];
    delete S.sectionOverrides[o];
  }

  // Log in tagRenames history
  if(!S.tagRenames)S.tagRenames={};
  const existing=S.tagRenames[o];
  const originalName=existing?.originalName||o;
  const history=existing?.history||[];
  history.push({from:o,to:n,by:S.user?.name||S.user?.email||'Unknown',at:Date.now()});
  // Remove old key, add new with full history
  delete S.tagRenames[o];
  S.tagRenames[n]={originalName,changedBy:S.user?.name||S.user?.email||'Unknown',timestamp:Date.now(),history,rowsUpdated:rowsChanged};

  // Persist
  syncSharedDataToSheet();
  logActivity(`Renamed tag "${o}" → "${n}" (${rowsChanged} rows updated)`);
  // Also log to a dedicated _TagNameChanges tab for audit trail
  appendToNameChangesLog(originalName,o,n,rowsChanged).catch(e=>console.warn('Name log write failed:',e));

  return{ok:true,rowsUpdated:rowsChanged};
}

async function updateTagDesc(rowIdx,entryName,newDesc){
  const kwCol=S.headers.findIndex(h=>h.toLowerCase()==='keywords');
  if(kwCol<0||!S.rows[rowIdx]){console.error('updateTagDesc: no kwCol or row',{kwCol,rowIdx});return false}
  try{
    let kw=JSON.parse(S.rows[rowIdx][kwCol]);
    // Try exact match first, then trimmed, then case-insensitive
    let tag=kw.find(t=>t.name===entryName);
    if(!tag)tag=kw.find(t=>(t.name||'').trim()===entryName.trim());
    if(!tag)tag=kw.find(t=>(t.name||'').trim().toLowerCase()===entryName.trim().toLowerCase());
    if(!tag){
      console.error('updateTagDesc: tag not found!',{entryName,availableTags:kw.map(t=>t.name)});
      toast('Tag "'+entryName+'" not found in row '+rowIdx+'. Tags: '+kw.map(t=>t.name).join(', '),'error');
      return false;
    }
    console.log('updateTagDesc: found tag',{entryName,matchedName:tag.name,oldDesc:tag.description,newDesc});
    const oldDesc=tag.description||'';
    
    // Save original in ALL review data entries for this tag on this row
    // We need segType but don't have it here — save under a generic key too
    // Find the segType from the result
    const clipType=(S.rows[rowIdx][S.headers.findIndex(h=>h.toLowerCase()==='type')]||'').trim();
    const segType=RULES.typeMap[clipType]||'Addresses';
    const k=rvKey(entryName,segType,rowIdx);
    const rv=getRV(k)||{};
    // Track original on first edit — include empty-string case so users can revert to empty
    // Skip if _reverting flag set (we're restoring to original, don't re-track)
    if(!rv._reverting&&(rv.originalDesc===undefined||rv.originalDesc===null)){
      rv.originalDesc=oldDesc; // Could be '' — that's intentional, means originally empty
    }
    // Always track who edited and when
    rv.editedBy=S.user?.name||S.user?.email||'Unknown';
    rv.editedAt=Date.now();
    setRV(k,rv);
    // Sync the original to the Index tab (only if there was actually content to preserve)
    if(rv.originalDesc){
      const entry=findEntry(entryName);
      const r=entry?.results.find(x=>x.rowIdx===rowIdx);
      if(r)syncOriginalToIndexTab(entryName,r,rv.originalDesc).catch(()=>{});
    }
    
    // 1. Update in main keywords column
    tag.description=newDesc;
    const saved=await saveCell(rowIdx,kwCol,JSON.stringify(kw));
    if(!saved){
      // Revert the in-memory change
      tag.description=oldDesc;
      return false;
    }
    
    // 2. Find and update in the matching relevancy column
    const rel=tag.relevancy;
    const relNum=parseInt(rel,10);
    console.log('updateTagDesc: relevancy info',{rel,relNum,tagName:tag.name});
    if(relNum>=1&&relNum<=4){
      const relColName='search.keywords_relevancy_'+relNum;
      let relCol=S.headers.findIndex(h=>h===relColName);
      if(relCol<0)relCol=S.headers.findIndex(h=>h.toLowerCase()===relColName.toLowerCase());
      if(relCol>=0){
        const cellVal=S.rows[rowIdx][relCol]||'';
        if(cellVal){
          try{
            let relKw=JSON.parse(cellVal);
            // Try exact, trimmed, case-insensitive match (same as main keywords)
            let relTag=relKw.find(t=>t.name===tag.name);
            if(!relTag)relTag=relKw.find(t=>(t.name||'').trim()===tag.name.trim());
            if(!relTag)relTag=relKw.find(t=>(t.name||'').trim().toLowerCase()===tag.name.trim().toLowerCase());
            if(relTag){
              relTag.description=newDesc;
              const newJson=JSON.stringify(relKw);
              const nm=S.sheetMeta.tabs[S.activeTab].title;
              await gapi.client.sheets.spreadsheets.values.update({
                spreadsheetId:S.sheetId,
                range:`'${nm}'!${cl(relCol)}${rowIdx+2}`,
                valueInputOption:'RAW',
                resource:{values:[[newJson]]}
              });
              S.rows[rowIdx][relCol]=newJson;
              console.log('updateTagDesc: relevancy col updated',{relCol,relColName});
            }else{
              console.warn('updateTagDesc: tag not found in relevancy col',{tagName:tag.name,availableInRelCol:relKw.map(t=>t.name)});
            }
          }catch(e2){console.warn('Relevancy col update failed:',e2)}
        }else{
          console.log('updateTagDesc: relevancy cell empty, skipping',{relCol,relColName});
        }
      }else{
        console.warn('updateTagDesc: relevancy column not found',{relColName});
      }
    }else{
      // Try ALL relevancy columns as fallback
      console.log('updateTagDesc: no valid relevancy number, trying all columns');
      for(let rn=1;rn<=4;rn++){
        const colName='search.keywords_relevancy_'+rn;
        let col=S.headers.findIndex(h=>h===colName);
        if(col<0)col=S.headers.findIndex(h=>h.toLowerCase()===colName.toLowerCase());
        if(col<0)continue;
        const cv=S.rows[rowIdx][col]||'';
        if(!cv)continue;
        try{
          let rk=JSON.parse(cv);
          let rt=rk.find(t=>t.name===tag.name);
          if(!rt)rt=rk.find(t=>(t.name||'').trim()===tag.name.trim());
          if(!rt)rt=rk.find(t=>(t.name||'').trim().toLowerCase()===tag.name.trim().toLowerCase());
          if(rt){
            rt.description=newDesc;
            const nj=JSON.stringify(rk);
            const nm=S.sheetMeta.tabs[S.activeTab].title;
            await gapi.client.sheets.spreadsheets.values.update({
              spreadsheetId:S.sheetId,
              range:`'${nm}'!${cl(col)}${rowIdx+2}`,
              valueInputOption:'RAW',
              resource:{values:[[nj]]}
            });
            S.rows[rowIdx][col]=nj;
            console.log('updateTagDesc: found tag in relevancy_'+rn+' (fallback)');
            break;
          }
        }catch{}
      }
    }
    return true;
  }catch(e){toast('Save error','error');console.error('updateTagDesc error:',e);return false}
}

// Sync original description to Index tab column C

// Revert a description back to its original (may be empty string if originally empty)
async function revertToOriginal(entryName,segType,rowIdx){
  const k=rvKey(entryName,segType,rowIdx);
  const rv=getRV(k);
  if(!rv||rv.originalDesc===undefined||rv.originalDesc===null){toast('No original to revert to','error');return}
  const origDesc=rv.originalDesc; // Save before clearing (may be '')
  // Flag so updateTagDesc doesn't re-track this as a new edit
  rv._reverting=true;
  setRV(k,rv);
  await updateTagDesc(rowIdx,entryName,origDesc);
  // Clear the edit tracking — back to pristine state
  const rv2=getRV(k)||{};
  rv2.originalDesc=undefined;rv2.status='';rv2.suggestion='';rv2.reviewed=false;rv2._reverting=false;
  setRV(k,rv2);
  const entry=findEntry(entryName);
  const r=entry?.results.find(x=>x.segType===segType&&x.rowIdx===rowIdx);
  if(r){
    syncDescToIndexTab(entryName,r,origDesc).catch(()=>{});
    syncToIndexTab(entryName,r,'','').catch(()=>{});
  }
  logActivity(`Reverted: "${entryName}" → ${origDesc?'"'+origDesc+'"':'(empty)'}`);
  buildIndex();render(true);
  toast(origDesc?'Reverted to original':'Reverted to empty','success');
}

// Review data key: entryName|segType|rowIdx
function rvKey(entryName,segType,rowIdx){return entryName+'|'+segType+'|'+rowIdx}
function getRV(key){return S.reviewData[key]||null}
function setRV(key,data){S.reviewData[key]=data;saveRV()}
function delRV(key){delete S.reviewData[key];saveRV()}

// Check if a description-level item is reviewed
function isDescReviewed(entryName,segType,rowIdx){
  const k=rvKey(entryName,segType,rowIdx);
  const rv=getRV(k);
  return rv?rv.reviewed===true:false;
}

// Check if AI audited and found OK (but not manually reviewed)
function isDescAiOk(entryName,segType,rowIdx){
  const k=rvKey(entryName,segType,rowIdx);
  const rv=getRV(k);
  return rv&&rv.status==='ok'&&!rv.reviewed;
}

// Check if ALL descriptions under an entry are reviewed (manually)
function isEntryReviewed(entry){
  if(!entry||!entry.results||!entry.results.length)return false;
  return entry.results.every(r=>isDescReviewed(entry.name,r.segType,r.rowIdx));
}

// Check if ALL descriptions under an entry are at least AI OK
function isEntryAiOk(entry){
  if(!entry||!entry.results||!entry.results.length)return false;
  return entry.results.every(r=>{
    const k=rvKey(entry.name,r.segType,r.rowIdx);
    const rv=getRV(k);
    return rv&&(rv.reviewed||rv.status==='ok');
  })&&!isEntryReviewed(entry);
}

// Check if ALL entries in a section are reviewed
function isSectionReviewed(sectionName){
  if(!S.indexData)return false;
  const entries=S.indexData.sections[sectionName]||[];
  if(!entries.length)return false;
  return entries.every(e=>isEntryReviewed(e));
}

// Count reviewed descriptions for a section
function sectionReviewProgress(sectionName){
  if(!S.indexData)return{reviewed:0,total:0};
  const entries=S.indexData.sections[sectionName]||[];
  let reviewed=0,total=0;
  entries.forEach(e=>{e.results.forEach(r=>{total++;if(isDescReviewed(e.name,r.segType,r.rowIdx))reviewed++})});
  return{reviewed,total};
}

// Toggle reviewed status for a description
function toggleDescReviewed(entryName,segType,rowIdx){
  const k=rvKey(entryName,segType,rowIdx);
  const rv=getRV(k)||{};
  rv.reviewed=!rv.reviewed;
  setRV(k,rv);
}

// Has pending suggestion
function hasPendingSuggestion(entryName,segType,rowIdx){
  const k=rvKey(entryName,segType,rowIdx);
  const rv=getRV(k);
  return rv&&rv.suggestion&&rv.status==='pending';
}

// Accept suggestion: update main sheet + Index tab, mark reviewed
async function acceptSuggestion(entryName,segType,rowIdx){
  const k=rvKey(entryName,segType,rowIdx);
  const rv=getRV(k);
  if(!rv||!rv.suggestion)return;
  // Get old desc for undo
  const entry=findEntry(entryName);
  const r=entry?.results.find(x=>x.segType===segType&&x.rowIdx===rowIdx);
  const oldDesc=r?.desc||'';
  pushUndo('accept',{key:k,suggestion:rv.suggestion,oldDesc,rowIdx,entryName},`"${entryName}": "${oldDesc}" → "${rv.suggestion}"`);
  const ok=await updateTagDesc(rowIdx,entryName,rv.suggestion);
  if(!ok)return;
  rv.status='accepted';rv.reviewed=true;rv.ruleViolations=[];rv.editedBy=S.user?.name||S.user?.email||'Unknown';rv.editedAt=Date.now();setRV(k,rv);
  if(r){
    syncToIndexTab(entryName,r,'accepted','').catch(()=>{});
    syncDescToIndexTab(entryName,r,rv.suggestion).catch(()=>{});
  }
  logActivity(`Accepted "${entryName}": "${oldDesc}" → "${rv.suggestion}"`);
  buildIndex();render(true);
}

function denySuggestion(entryName,segType,rowIdx){
  const k=rvKey(entryName,segType,rowIdx);
  const rv=getRV(k);
  if(!rv)return;
  pushUndo('deny',{key:k,suggestion:rv.suggestion},`Denied suggestion for "${entryName}"`);
  if(!rv.deniedHistory)rv.deniedHistory=[];
  rv.deniedHistory.push({suggestion:rv.suggestion,reason:rv.reason,time:Date.now()});
  if(rv.deniedHistory.length>5)rv.deniedHistory=rv.deniedHistory.slice(-5);
  rv.suggestion='';rv.reason='';rv.ruleViolations=[];rv.status='denied';
  setRV(k,rv);
  const entry=findEntry(entryName);
  const r=entry?.results.find(x=>x.segType===segType&&x.rowIdx===rowIdx);
  if(r)syncToIndexTab(entryName,r,'denied','').catch(()=>{});
  logActivity(`Denied suggestion for "${entryName}"`);
  render();
}

async function applyCustomDesc(entryName,segType,rowIdx,customText){
  const k=rvKey(entryName,segType,rowIdx);
  const entry=findEntry(entryName);
  const r=entry?.results.find(x=>x.segType===segType&&x.rowIdx===rowIdx);
  const oldDesc=r?.desc||'';
  pushUndo('edit',{key:k,oldDesc,rowIdx,entryName},`"${entryName}": "${oldDesc}" → "${customText}"`);
  const ok=await updateTagDesc(rowIdx,entryName,customText);
  if(!ok)return;
  const rv=getRV(k)||{};
  rv.status='custom';rv.reviewed=true;rv.ruleViolations=[];rv.customApplied=customText;rv.editedBy=S.user?.name||S.user?.email||'Unknown';rv.editedAt=Date.now();setRV(k,rv);
  if(r){
    syncToIndexTab(entryName,r,'custom','').catch(()=>{});
    syncDescToIndexTab(entryName,r,customText).catch(()=>{});
  }
  logActivity(`Custom edit: "${entryName}" → "${customText}"`);
  buildIndex();render(true);
}

async function bulkAcceptEntry(entryName){
  if(!S.indexData)return;
  const entry=findEntry(entryName);
  if(!entry)return;
  // Collect undo data for all pending items
  const undoItems=[];
  for(const r of entry.results){
    const k=rvKey(entryName,r.segType,r.rowIdx);
    const rv=getRV(k);
    if(rv&&rv.suggestion&&rv.status==='pending'){
      undoItems.push({key:k,suggestion:rv.suggestion,oldDesc:r.desc||'',rowIdx:r.rowIdx,entryName});
    }
  }
  if(undoItems.length)pushUndo('bulk_accept',{items:undoItems},`Bulk accept ${undoItems.length} for "${entryName}"`);
  let count=0;
  for(const r of entry.results){
    const k=rvKey(entryName,r.segType,r.rowIdx);
    const rv=getRV(k);
    if(rv&&rv.suggestion&&rv.status==='pending'){
      // Accept without pushing individual undos (bulk undo handles it)
      const ok=await updateTagDesc(r.rowIdx,entryName,rv.suggestion);
      if(ok){rv.status='accepted';rv.reviewed=true;rv.editedBy=S.user?.name||S.user?.email||'Unknown';rv.editedAt=Date.now();setRV(k,rv);count++}
    }
  }
  if(count){
    logActivity(`Bulk accepted ${count} for "${entryName}"`);
    toast(`Accepted ${count} suggestions for "${entryName}"`,'success');
    buildIndex();render(true);
  }
}

// Migrate old reviewQueue items to new inline system
function migrateOldQueue(){
  if(S.reviewQueue.length>0){
    S.reviewQueue.forEach(item=>{

      if(!getRV(k)){

// ── Build Index from Sheet Data ───────────────────────────
function buildIndex(){
  if(!S.headers.length||!S.rows.length){S.indexData=null;return}
  const kwCol=S.headers.findIndex(h=>h.toLowerCase()==='keywords');
  const nameCol=S.headers.findIndex(h=>h.toLowerCase()==='name');
  const typeCol=S.headers.findIndex(h=>h.toLowerCase()==='type');
  const idCol=S.headers.findIndex(h=>h.toLowerCase()==='id');
  const objIdCol=S.headers.findIndex(h=>h.toLowerCase()==='objectid');
  const transcriptCol=S.headers.findIndex(h=>h.toLowerCase()==='transcript');
  const summaryCol=S.headers.findIndex(h=>h.toLowerCase()==='summary');
  const imageCol=4; // Column E (0-indexed)
  const progCol=S.headers.findIndex(h=>h.toLowerCase()==='program_number');
  const pvNameCol=S.headers.findIndex(h=>h.toLowerCase()==='produced_video_name');
  const pvTypeCol=S.headers.findIndex(h=>h.toLowerCase()==='produced_video_type');
  // Relevancy columns (1=lowest, 4=highest)
  const relCols=[1,2,3,4].map(n=>S.headers.findIndex(h=>h.toLowerCase()==='search.keywords_relevancy_'+n));

  if(kwCol===-1){toast('Cannot find "keywords" column','error');return}

  const entries={}; // key: tagName → {name, path, section, results:[{desc, rel, relevancy, clipName, clipId, segType, transcript, progNum, ...}]}

  S.rows.forEach((row,ri)=>{
    const kwRaw=(row[kwCol]||'').trim();
    if(!kwRaw||kwRaw==='[]')return;
    let tags;
    try{tags=JSON.parse(kwRaw)}catch{return}

    const clipType=(row[typeCol]||'').trim();
    const segType=RULES.typeMap[clipType]||'Addresses';
    const clipName=(row[nameCol]||'').trim();
    const clipId=row[idCol]||'';
    const objId=(row[objIdCol]||'').trim();
    const transcript=(row[transcriptCol]||'').trim();
    const summary=(row[summaryCol]||'').trim();
    const image=(row[imageCol]||'').trim();
    const progNum=(row[progCol]||'').trim();
    const pvName=(row[pvNameCol]||'').trim();
    const pvType=(row[pvTypeCol]||'').trim();

    // Build tagName → relevancy (1-4) map by checking which relevancy column each tag appears in
    // Highest-numbered column wins (in case a tag somehow appears in multiple)
    const relMap={};
    relCols.forEach((colIdx,i)=>{
      if(colIdx===-1)return;
      const raw=(row[colIdx]||'').trim();
      if(!raw||raw==='[]')return;
      let relTags;
      try{relTags=JSON.parse(raw)}catch{return}
      const score=i+1; // 1, 2, 3, or 4
      relTags.forEach(rt=>{
        const n=(rt.name||'').trim();
        if(n)relMap[n]=Math.max(relMap[n]||0,score);
      });
    });

    tags.forEach(tag=>{
      const name=(tag.name||'').trim();
      const path=tag.path||'';
      const desc=(tag.description||'').trim();
      const rel=tag.relationship||'';
      const relevancy=relMap[name]||0; // 0 means unranked (shouldn't happen per user)
      if(!name)return;

      if(!entries[name]){
        entries[name]={name,path,section:RULES.sectionFromPath(path),results:[],seealso:[],bestbet:null};
      }
      entries[name].results.push({
        desc,rel,relevancy,clipName,clipId,objId,segType,transcript:transcript||summary||'',
        summary,image,
        progNum,pvName,pvType,rowIdx:ri,clipType
      });
    });
  });

  // Group by section and sort — apply sectionOverrides
  const sections={};
  RULES.sectionOrder.forEach(sec=>{sections[sec]=[]});
  Object.values(entries).forEach(e=>{
    // Check if this entry has been moved to a different section
    const overrideSec=S.sectionOverrides[e.name];
    const sec=overrideSec||e.section;
    if(!sections[sec])sections[sec]=[];
    e.section=sec; // Update the entry's section so everything downstream uses it
    e.results.sort((a,b)=>{
      const oa=RULES.segOrder.indexOf(a.segType),ob=RULES.segOrder.indexOf(b.segType);
      if(oa!==ob)return oa-ob;
      return(a.desc||'').localeCompare(b.desc||'');
    });
    sections[sec].push(e);
  });
  // Sort entries within each section alphabetically
  Object.keys(sections).forEach(sec=>{sections[sec].sort((a,b)=>a.name.localeCompare(b.name))});

  S.indexData={sections,totalEntries:Object.keys(entries).length,totalResults:Object.values(entries).reduce((s,e)=>s+e.results.length,0)};
}

// ── Google Sheets API ─────────────────────────────────────
let gapiOk=false;
function initG(){return new Promise((r,j)=>{if(gapiOk)return r();gapi.load('client',async()=>{try{await gapi.client.init({discoveryDocs:[DISC]});gapiOk=true;r()}catch(e){j(e)}})})}
async function doConnect(cid,sid,ck,silent=false){
  S.clientId=cid;S.sheetId=sid;if(ck)S.claudeKey=ck;
  localStorage.setItem('jw_cid',cid);localStorage.setItem('jw_sid',sid);if(ck)localStorage.setItem('jw_ckey',ck);
  await initG();
  return new Promise((r,j)=>{
    S._tokenClient=google.accounts.oauth2.initTokenClient({
      client_id:cid,
      scope:SCOPES,
      callback:async resp=>{
        if(resp.error){j(new Error(resp.error_description||resp.error));return}
        S._tokenTime=Date.now();
        try{const u=await(await fetch('https://www.googleapis.com/oauth2/v3/userinfo',{headers:{Authorization:'Bearer '+resp.access_token}})).json();S.user={name:u.name||u.email||'User',email:u.email||'',pic:u.picture||''}}catch{S.user={name:'User',email:'',pic:''}}
        try{const m=await gapi.client.sheets.spreadsheets.get({spreadsheetId:sid});S.sheetMeta={title:m.result.properties.title,tabs:m.result.sheets.map(s=>({title:s.properties.title,sid:s.properties.sheetId}))}}catch(e){console.error(e)}
        S.connected=true;
        scheduleTokenRefresh();
        r();
      }
    });
    S._tokenClient.requestAccessToken(silent?{prompt:''}:{});
  });
}

// Auto-refresh token before it expires (tokens last ~60 min, refresh at 50)
let _tokenRefreshTimer=null;
function scheduleTokenRefresh(){
  if(_tokenRefreshTimer)clearTimeout(_tokenRefreshTimer);
  _tokenRefreshTimer=setTimeout(()=>{
    console.log('Refreshing OAuth token…');
    if(S._tokenClient){
      try{
        S._tokenClient.requestAccessToken({prompt:''});
        // The callback in doConnect will fire again, updating _tokenTime and rescheduling
      }catch(e){
        console.error('Token refresh failed:',e);
        S.connected=false;
        toast('Session expired — click to reconnect','error');
        render();
      }
    }
  },50*60*1000); // 50 minutes
}

// Check if token might be expired before any API call
function checkToken(){
  if(!S._tokenTime)return true;
  const age=(Date.now()-S._tokenTime)/1000/60; // minutes
  if(age>58){
    // Token likely expired
    toast('Session expired — reconnecting…','error');
    if(S._tokenClient){
      try{S._tokenClient.requestAccessToken({prompt:''})}catch(e){
        S.connected=false;render();
      }
    }
    return false;
  }
  return true;
}

// ── Bulk delete by type ───────────────────────────────────
async function bulkDeleteByType(type){
  const typeCol=S.headers.findIndex(h=>h.toLowerCase()==='type');
  const pvTypeCol=S.headers.findIndex(h=>h.toLowerCase()==='produced_video_type');
  if(typeCol===-1&&pvTypeCol===-1){toast('Cannot find type column','error');return}
  const matchRows=new Set();
  S.rows.forEach((r,i)=>{
    const t=(r[typeCol]||'').trim().toLowerCase();
    const pv=(r[pvTypeCol]||'').trim().toLowerCase();
    const q=type.toLowerCase();
    if(t.includes(q)||pv.includes(q))matchRows.add(i);
  });
  if(matchRows.size===0){toast('No matching rows found','error');return}
  if(!await customConfirm(`Delete ${matchRows.size} rows matching "${type}"?`))return;
  await delRows(matchRows);
}

// ── Claude AI Assistant ──────────────────────────────────
async function aiChat(msg){
  if(!S.claudeKey){toast('No API key','error');return}

      ctx+=`  ${sec}: ${entries.length} entries, ${prog.reviewed}/${prog.total} reviewed\n`;

    if(curSection&&curSection!=='all'&&S.indexData.sections[curSection]){

// Build the full audit rules text for AI prompts
function buildAuditRulesText(){
  let t='INDEX ENTRY STYLE GUIDE — JEM Video Index\n\n';
  t+='Descriptions are SHORT INDEX ENTRIES, not sentences. They complete the tag: reading "[tag]: [description]" should form a natural phrase.\n\n';
  const activeRules=RULES.tagDesc.checks.filter(c=>c.on);
  // Group by tier if tier field exists; otherwise flat list
  const hasTiers=activeRules.some(r=>r.tier);
  if(hasTiers){
    const crit=activeRules.filter(r=>r.tier==='critical');
    const strong=activeRules.filter(r=>r.tier==='strong');
    const soft=activeRules.filter(r=>r.tier==='soft');
    const none=activeRules.filter(r=>!r.tier);
    if(crit.length){
      t+='╔══ CRITICAL RULES (violation = always fix) ══╗\n';
      crit.forEach(c=>{t+=c.name+'\n\n'});
    }
    if(strong.length){
      t+='╔══ STRONG RULES (violation = fix unless stylistically justified) ══╗\n';
      strong.forEach(c=>{t+=c.name+'\n\n'});
    }
    if(soft.length){
      t+='╔══ SOFT PREFERENCES (suggest alternative, don\'t force on already-fine descriptions) ══╗\n';
      soft.forEach(c=>{t+=c.name+'\n\n'});
    }
    if(none.length){
      t+='╔══ OTHER ACTIVE RULES ══╗\n';
      none.forEach(c=>{t+=c.name+'\n\n'});
    }
  }else{
    t+='ACTIVE RULES (any rules not listed here are intentionally disabled and must not be applied):\n';
    activeRules.forEach((c,i)=>{t+=`${i+1}. ${c.name}\n`});
  }
  t+='\nEvery suggestion must pass ALL active rules simultaneously. Before outputting, run the "tag + description" test: read them together as one phrase and verify it reads naturally.\n';
  if(RULES.tagDesc.pairedExamples&&RULES.tagDesc.pairedExamples.length){
    t+='\nPAIRED EXAMPLES (each passes ALL rules):\n';
    RULES.tagDesc.pairedExamples.forEach(e=>{
      t+=`\n  Tag: "${e.tag}" [${e.rule}]\n`;
      t+=`  ✓ "${e.good}" — ${e.goodNote}\n`;
      t+=`  ✗ "${e.bad}" — ${e.badNote}\n`;
    });
  }
  // Fallback for old format
  if(RULES.tagDesc.good&&RULES.tagDesc.good.length){
    t+='\nGOOD EXAMPLES:\n';
    RULES.tagDesc.good.forEach(e=>{t+=`  Tag: "${e.tag}" → "${e.desc}"${e.note?' ('+e.note+')':''}\n`});
  }
  if(RULES.tagDesc.bad&&RULES.tagDesc.bad.length){
    t+='\nBAD EXAMPLES (DO NOT PRODUCE THESE):\n';
    RULES.tagDesc.bad.forEach(e=>{t+=`  Tag: "${e.tag}" → "${e.desc}"${e.note?' — '+e.note:''}\n`});
  }
  if(RULES.tagDesc.tightenExamples&&RULES.tagDesc.tightenExamples.length){
    t+='\nTIGHTENING EXAMPLES (verbose → concise):\n';
    RULES.tagDesc.tightenExamples.forEach(e=>{t+=`  "${e.before}" → "${e.after}"\n`});
  }
  if(RULES.tagDesc.spelling&&RULES.tagDesc.spelling.length){
    t+='\nSPELLING AUTO-CORRECTIONS:\n';
    RULES.tagDesc.spelling.forEach(e=>{t+=`  "${e.wrong}" → "${e.right}"\n`});
  }
  return t;
}

// ── Generate Index Tab in Google Sheet ────────────────────
async function generateIndexTab(sectionName){
  if(!S.indexData||!S.indexData.sections[sectionName]){toast('No data for '+sectionName,'error');return}
  const tabName='Index - '+sectionName;
  
  // If tab already exists, delete it first
  const existingTabs=(S.sheetMeta?.tabs||[]).map(t=>t.title);
  if(existingTabs.includes(tabName)){
    try{
      const tabInfo=S.sheetMeta.tabs.find(t=>t.title===tabName);
      if(tabInfo){
        await gapi.client.sheets.spreadsheets.batchUpdate({
          spreadsheetId:S.sheetId,
          resource:{requests:[{deleteSheet:{sheetId:tabInfo.sid}}]}
        });
        // Clear tab map cache for this tab
        delete _tabMapCache[tabName];
      }
    }catch(e){toast(`Failed to delete old "${tabName}": `+(e?.result?.error?.message||e?.message||''),'error');return}
  }
  
  S.loading=true;render();
  toast(`Generating "${tabName}"…`);
  
  try{
    // Step 1: Create the new tab
    await gapi.client.sheets.spreadsheets.batchUpdate({
      spreadsheetId:S.sheetId,
      resource:{requests:[{addSheet:{properties:{title:tabName}}}]}
    });
    
    const entries=S.indexData.sections[sectionName]||[];
    // Column layout: A=Entry, B=Segment, C=Original Desc, D=Description, E=Relationship, F=Reference, G=Chapter, H=Relevancy, I=Review, J=AI Suggestion, K=spacer, L=Clip Link, M=Clip Title, N=Transcript, O=spacer, P=Notes, Q=Bookmarked
    var EC=18; // total columns (added Original Description)
    var headers=['Entry Name','Segment Type','Original Description','Description','Relationship','Reference','Chapter Name For Film','Relevancy','Review Status','AI Suggestion','','Clip Link','Clip Title','Transcript (excerpt)','','Notes','Bookmarked'];
    
    // Step 2: Build rows in indented format
    const dataRows=[headers];
    
    // Safe relationship defaults lookup
    const relDefaults=(RULES.relDefaults&&RULES.relDefaults[sectionName])?RULES.relDefaults[sectionName]:(RULES.relDefaults&&RULES.relDefaults.Topics?RULES.relDefaults.Topics:{});
    
    entries.forEach(function(entry){
      var entryRow=[];for(var z=0;z<EC;z++)entryRow.push('');
      entryRow[0]=entry.name||'';
      dataRows.push(entryRow);
      
      var bySeg={};
      (entry.results||[]).forEach(function(r){
        var st=r.segType||'Other';
        if(!bySeg[st])bySeg[st]=[];
        bySeg[st].push(r);
      });
      
      RULES.segOrder.forEach(function(seg){
        if(!bySeg[seg])return;
        
        var segRow=[];for(var z=0;z<EC;z++)segRow.push('');
        segRow[1]=seg;
        dataRows.push(segRow);
        
        bySeg[seg].sort(function(a,b){return(a.desc||'').localeCompare(b.desc||'')});
        
        bySeg[seg].forEach(function(r){
          var row=[];for(var z=0;z<EC;z++)row.push('');
          // C: Original Description — from reviewData if available
          var rvk=rvKey(entry.name,seg,r.rowIdx);
          var rvd=getRV(rvk);
          row[2]=(rvd&&rvd.originalDesc)?rvd.originalDesc:'';
          // D: Description (current)
          row[3]=r.desc||'';
          // E: Relationship (only if non-default)
          var defRel=relDefaults[seg]||'spoken_about';
          if(r.rel&&r.rel!==defRel){
            if(sectionName==='Nigunim'){if(r.rel==='spoken_about')row[4]=r.rel}
            else row[4]=r.rel;
          }
          // F: Reference — for films show film title, for others show program number
          if(r.clipType==='Film Chapter'){
            row[5]=r.pvName||''; // Film title
          }else if(r.clipType==='Film'){
            row[5]=r.clipName||''; // Film name
          }else{
            row[5]=r.progNum?('#'+r.progNum):'';
          }
          // G: Chapter Name For Film (only for Film Chapters)
          if(r.clipType==='Film Chapter'){
            row[6]=r.clipName||''; // Chapter title
          }
          // H: Relevancy
          row[7]=(r.relevancy||'').toString();
          // I: Review Status — fill from existing reviewData if available
          if(rvd){
            var statusLabels={pending:'⏳ Pending',accepted:'✅ Accepted',denied:'❌ Denied',custom:'✏️ Custom',ok:'✓ OK'};
            row[8]=statusLabels[rvd.status]||(rvd.reviewed?'✓ Reviewed':'');
            // J: AI Suggestion
            row[9]=rvd.suggestion||'';
          }else{
            row[8]='';
            row[9]='';
          }
          // K: spacer (row[10])
          // L: Clip link
          var cid=r.clipId||(r.objId?(r.objId.replace('video_clip-','')):'');
          row[11]=cid?('https://videos.jem.tv/video-player?clip='+cid):'';
          // M: Clip title
          row[12]=r.clipName||'';
          // N: Transcript excerpt
          row[13]=(r.transcript||'').substring(0,500);
          dataRows.push(row);
        });
      });
    });
    
    console.log('Total rows to write:',dataRows.length);
    toast(`Built ${dataRows.length} rows, writing to sheet…`);
    
    // Step 3: Write in small batches using append
    var batchSize=100;
    for(var i=0;i<dataRows.length;i+=batchSize){
      var chunk=dataRows.slice(i,i+batchSize);
      try{
        await gapi.client.sheets.spreadsheets.values.append({
          spreadsheetId:S.sheetId,
          range:tabName+'!A1',
          valueInputOption:'RAW',
          insertDataOption:'INSERT_ROWS',
          resource:{values:chunk}
        });
        console.log('Wrote rows '+i+' to '+(i+chunk.length));
      }catch(writeErr){
        console.error('Batch write error at row '+i+':',writeErr);
        toast('Write error at row '+i+', retrying one by one…','error');
        // Fallback: write one row at a time
        for(var j=0;j<chunk.length;j++){
          try{
            await gapi.client.sheets.spreadsheets.values.append({
              spreadsheetId:S.sheetId,
              range:tabName+'!A1',
              valueInputOption:'RAW',
              insertDataOption:'INSERT_ROWS',
              resource:{values:[chunk[j]]}
            });
          }catch(singleErr){console.error('Row '+(i+j)+' failed:',singleErr)}
        }
      }
      // Progress toast every 500 rows
      if(i%500<batchSize)toast('Writing… '+Math.min(i+batchSize,dataRows.length)+'/'+dataRows.length+' rows');
      await new Promise(function(r){setTimeout(r,250)});
    }
    
    // Refresh sheet metadata
    var meta=await gapi.client.sheets.spreadsheets.get({spreadsheetId:S.sheetId});
    S.sheetMeta={title:meta.result.properties.title,tabs:meta.result.sheets.map(function(s){return{title:s.properties.title,sid:s.properties.sheetId}})};
    invalidateTabMapCache(tabName);
    
    // Auto-hide Original Description (col C, index 2) and Review columns (I-J, index 8-9)
    try{
      var newSheet=meta.result.sheets.find(function(s){return s.properties.title===tabName});
      if(newSheet){
        var newSid=newSheet.properties.sheetId;
        await gapi.client.sheets.spreadsheets.batchUpdate({
          spreadsheetId:S.sheetId,
          resource:{requests:[
            {updateDimensionProperties:{range:{sheetId:newSid,dimension:'COLUMNS',startIndex:2,endIndex:3},properties:{hiddenByUser:true},fields:'hiddenByUser'}},
            {updateDimensionProperties:{range:{sheetId:newSid,dimension:'COLUMNS',startIndex:8,endIndex:10},properties:{hiddenByUser:true},fields:'hiddenByUser'}}
          ]}
        });
      }
    }catch(hideErr){console.warn('Auto-hide columns error:',hideErr)}
    
    toast('"'+tabName+'" created with '+(dataRows.length-1)+' rows!','success');
  }catch(e){
    toast('Failed: '+e.message,'error');
    console.error('generateIndexTab error:',e);
  }
  S.loading=false;render();
}

// Build a map from (entryName, clipLink) → sheet row number in an Index tab.
// The indented format: entry rows have col A filled, segment rows have col B filled,
// result rows have col C (description) filled and col K (clip link).
// We use clip link as the unique identifier for a result row.
async function buildIndexTabMap(tabName){
  try{
    const r=await gapi.client.sheets.spreadsheets.values.get({
      spreadsheetId:S.sheetId,
      range:`'${tabName}'!A:M`
    });
    const rows=r.result.values||[];
    const map={}; // key: "entryName|clipLink" → {sheetRow (1-indexed), tabName}
    let currentEntry='';
    let currentSeg='';
    for(let i=1;i<rows.length;i++){ // skip header
      const row=rows[i]||[];
      const colA=(row[0]||'').trim();
      const colB=(row[1]||'').trim();
      const colL=(row[11]||'').trim(); // clip link (column L)
      if(colA){currentEntry=colA;currentSeg='';continue}
      if(colB){currentSeg=colB;continue}
      // Result row — has clip link in col L
      if(colL&&currentEntry){
        const mapKey=currentEntry+'|'+colL;
        map[mapKey]={sheetRow:i+1,tabName,entry:currentEntry,seg:currentSeg}; // +1 because sheets are 1-indexed
      }
    }
    return map;
  }catch(e){
    console.error('buildIndexTabMap error:',e);
    return{};
  }
}

// Find the Index tab name for a given section
function indexTabForSection(sectionName){
  return'Index - '+sectionName;
}

// Find which section an entry belongs to
function sectionForEntry(entryName){
  if(!S.indexData)return null;
  for(const sec of RULES.sectionOrder){
    const entries=S.indexData.sections[sec]||[];
    if(entries.find(e=>e.name===entryName))return sec;
  }
  return null;
}

// Build clip link from a result object (same logic as generateIndexTab)
function clipLinkForResult(r){
  const cid=r.clipId||(r.objId?(r.objId.replace('video_clip-','')):'');
  return cid?('https://videos.jem.tv/video-player?clip='+cid):'';
}

// Build book-style reference code: A345 / C457 / M123 / T456 / S789 for non-films.
// Films get their own shortened format (returns null here — caller handles Film specially).
function refCodeForResult(r){
  const prefixMap={
    'Addresses':'A',
    'Conversations':'C',
    'My Encounter':'M',
    'Timeless Moments':'T',
    'Short Films':'S'
  };
  const prefix=prefixMap[r.segType];
  if(!prefix)return null; // Films or unknown segment — handle separately
  const num=(r.progNum||'').toString().replace(/[^0-9]/g,'');
  if(!num)return prefix; // Fallback to bare prefix if no program number
  return prefix+num;
}

// Shortened film reference: auto-derive shortened name from first meaningful word,
// with user overrides stored in RULES.filmShortNames (tag name → short name).
// Example: "Faithful and Fortified: Israel's Prime Ministers" → "Faithful 1 · Ch2"
function filmRefForResult(r){
  const rawTitle=r.pvName||r.clipName||'';
  if(!rawTitle)return '';
  // Extract main film name (strip Vol/chapter suffix)
  const mainTitle=rawTitle.split(/[·:|\-–—]|Vol\.?|Chapter|Ch\.?/i)[0].trim();
  // Check for user override
  const overrides=RULES.filmShortNames||{};
  let shortName=overrides[mainTitle]||overrides[rawTitle];
  if(!shortName){
    // Auto-shorten: first meaningful word (skip articles/possessives)
    const skipWords=new Set(['a','an','the','my','our','your','his','her','its','their']);
    const words=mainTitle.split(/\s+/).filter(w=>w.length>0);
    shortName=words.find(w=>!skipWords.has(w.toLowerCase()))||words[0]||'Film';
  }
  // Detect volume number (e.g., "Vol 1", "Volume 2")
  let volPart='';
  const volMatch=rawTitle.match(/Vol(?:ume)?\.?\s*(\d+)/i);
  if(volMatch)volPart=' '+volMatch[1];
  // Detect chapter — use detected number if present, else placeholder "?" (TODO: pull real chapter order from JEM.tv)
  let chNum='?';
  const chMatch=rawTitle.match(/Ch(?:apter)?\.?\s*(\d+)/i);
  if(chMatch)chNum=chMatch[1];
  // Always show Ch — placeholder reminds us the data needs to be filled in
  return shortName+volPart+' · Ch'+chNum;
}

// Cache for tab maps to avoid re-reading on every action
let _tabMapCache={};
let _tabMapCacheTime={};
const TAB_MAP_TTL=60000; // 1 minute cache

async function getTabMap(tabName){
  const now=Date.now();
  if(_tabMapCache[tabName]&&_tabMapCacheTime[tabName]&&(now-_tabMapCacheTime[tabName]<TAB_MAP_TTL)){
    return _tabMapCache[tabName];
  }
  // Check tab exists
  const existingTabs=(S.sheetMeta?.tabs||[]).map(t=>t.title);
  if(!existingTabs.includes(tabName))return null;
  const map=await buildIndexTabMap(tabName);
  _tabMapCache[tabName]=map;
  _tabMapCacheTime[tabName]=now;
  return map;
}

function invalidateTabMapCache(tabName){
  if(tabName){delete _tabMapCache[tabName];delete _tabMapCacheTime[tabName]}
  else{_tabMapCache={};_tabMapCacheTime={}}
}

// Write Review Status and AI Suggestion to the Index tab for a specific result
// reviewStatus: 'pending', 'accepted', 'denied', 'custom', 'ok', 'reviewed'
// suggestion: the AI suggestion text (or empty)
async function syncToIndexTab(entryName,result,reviewStatus,suggestion){
  const section=sectionForEntry(entryName);
  if(!section)return;
  const tabName=indexTabForSection(section);
  const map=await getTabMap(tabName);
  if(!map)return; // Tab doesn't exist yet, skip silently

  const clipLink=clipLinkForResult(result);
  if(!clipLink)return;
  const mapKey=entryName+'|'+clipLink;
  const info=map[mapKey];
  if(!info)return; // Row not found in tab

  // Write H (Review Status) and I (AI Suggestion) — columns index 7 and 8
  const statusLabel={pending:'⏳ Pending',accepted:'✅ Accepted',denied:'❌ Denied',custom:'✏️ Custom',ok:'✓ OK',reviewed:'✓ Reviewed'}[reviewStatus]||reviewStatus;
  try{
    await gapi.client.sheets.spreadsheets.values.batchUpdate({
      spreadsheetId:S.sheetId,
      resource:{
        valueInputOption:'RAW',
        data:[
          {range:`'${tabName}'!I${info.sheetRow}`,values:[[statusLabel]]},
          {range:`'${tabName}'!J${info.sheetRow}`,values:[[suggestion||'']]}
        ]
      }
    });
  }catch(e){console.warn('syncToIndexTab write error:',e)}
}

// Also update the Description column (C) in the Index tab when a description changes
async function syncDescToIndexTab(entryName,result,newDesc){
  if(!newDesc&&newDesc!=='')return; // Skip if undefined/null (but allow explicit empty string)
  const section=sectionForEntry(entryName);
  if(!section)return;
  const tabName=indexTabForSection(section);
  const map=await getTabMap(tabName);
  if(!map)return;

  const clipLink=clipLinkForResult(result);
  if(!clipLink)return;
  const mapKey=entryName+'|'+clipLink;
  const info=map[mapKey];
  if(!info)return;

  try{
    await gapi.client.sheets.spreadsheets.values.update({
      spreadsheetId:S.sheetId,
      range:`'${tabName}'!D${info.sheetRow}`,
      valueInputOption:'RAW',
      resource:{values:[[newDesc]]}
    });
  }catch(e){console.warn('syncDescToIndexTab write error:',e)}
}

// Batch sync: write all current review data to Index tabs
// Called manually from dashboard or settings
async function fullSyncToSheets(){
  if(!S.indexData){toast('No index data','error');return}
  toast('Syncing review data to sheets…');
  let synced=0,skipped=0;
  for(const sec of RULES.sectionOrder){
    const tabName=indexTabForSection(sec);
    const map=await getTabMap(tabName);
    if(!map){skipped++;continue}

    const entries=S.indexData.sections[sec]||[];
    const batchData=[];
    entries.forEach(entry=>{
      entry.results.forEach(r=>{
        const k=rvKey(entry.name,r.segType,r.rowIdx);
        const rv=getRV(k);
        if(!rv)return;
        const clipLink=clipLinkForResult(r);
        if(!clipLink)return;
        const mapKey=entry.name+'|'+clipLink;
        const info=map[mapKey];
        if(!info)return;
        const statusLabel={pending:'⏳ Pending',accepted:'✅ Accepted',denied:'❌ Denied',custom:'✏️ Custom',ok:'✓ OK'}[rv.status]||(rv.reviewed?'✓ Reviewed':'');
        batchData.push(
          {range:`'${tabName}'!I${info.sheetRow}`,values:[[statusLabel]]},
          {range:`'${tabName}'!J${info.sheetRow}`,values:[[rv.suggestion||'']]}
        );
      });
    });

    if(batchData.length){
      // Write in chunks of 200 ranges (100 rows × 2 cols)
      for(let i=0;i<batchData.length;i+=200){
        try{
          await gapi.client.sheets.spreadsheets.values.batchUpdate({
            spreadsheetId:S.sheetId,
            resource:{valueInputOption:'RAW',data:batchData.slice(i,i+200)}
          });
          synced+=Math.min(200,batchData.length-i)/2;
        }catch(e){console.warn('Batch sync error:',e)}
        if(i+200<batchData.length)await new Promise(r=>setTimeout(r,300));
      }
    }
  }
  toast(`Synced ${Math.round(synced)} items to ${RULES.sectionOrder.length-skipped} tabs`,'success');
}


async function runAudit(){
  if(!S.claudeKey||!S.indexData){toast('Need API key and data','error');return}
  // Gather entries based on audit scope
  const allEntries=[];
  const scope=S.auditScope||'all';
  
  if(scope==='sections'){
    const selectedSections=Object.keys(S.auditSections).filter(s=>S.auditSections[s]);
    if(!selectedSections.length){toast('Select at least one section','error');return}
    selectedSections.forEach(sec=>{
      (S.indexData.sections[sec]||[]).forEach(e=>{
        e.results.forEach(r=>{
          allEntries.push({entryName:e.name,section:e.section,desc:r.desc,rel:r.rel,transcript:r.transcript,rowIdx:r.rowIdx,clipName:r.clipName,segType:r.segType});
        });
      });
    });
  }else if(scope==='visible'){
    // Audit what's currently visible in index preview
    const q=S.idxSearch.toLowerCase();
    let sectionsToShow=S.idxActiveSection==='all'?RULES.sectionOrder:[S.idxActiveSection];
    sectionsToShow.forEach(sec=>{
      let entries=S.indexData.sections[sec]||[];
      if(q)entries=entries.filter(e=>e.name.toLowerCase().includes(q)||e.results.some(r=>(r.desc||'').toLowerCase().includes(q)));
      if(S.idxNavMode==='tree'&&S.idxActiveEntry)entries=entries.filter(e=>e.name===S.idxActiveEntry);
      entries.forEach(e=>{
        e.results.forEach(r=>{
          allEntries.push({entryName:e.name,section:e.section,desc:r.desc,rel:r.rel,transcript:r.transcript,rowIdx:r.rowIdx,clipName:r.clipName,segType:r.segType});
        });
      });
    });
  }else{
    // 'all' — everything
    Object.values(S.indexData.sections).forEach(sec=>sec.forEach(e=>{
      e.results.forEach(r=>{
        allEntries.push({entryName:e.name,section:e.section,desc:r.desc,rel:r.rel,transcript:r.transcript,rowIdx:r.rowIdx,clipName:r.clipName,segType:r.segType});
      });
    }));
  }
  
  if(!allEntries.length){toast('No entries to audit','error');return}
  
  S.auditRunning=true;S.auditProgress=0;S.auditTotal=allEntries.length;S.auditLog=[];const _pill=$('#audit-float');if(_pill)_pill.remove();render();
  const bs=S.auditBatch;let totalFixed=0;
  const fullRules=buildAuditRulesText();
  const antiPatterns=`
COMMON MISTAKES YOU MUST NOT MAKE:
- Do NOT flag a description just because the clip's overall topic differs from the description. Rule 1 (FOCUS) requires that descriptions reflect THIS TAG's role in the clip, not the clip's main theme.
- Do NOT rewrite soft-preference items (Rules 7, 8, 10) when the existing description already reads well. Only suggest alternatives for soft rules when clearly better.
- Do NOT just lowercase the first letter and call it fixed. Restructure if needed.
- Do NOT leave the description essentially unchanged. If you flag it as "fix", your suggestion MUST be meaningfully different.
- Your suggestion must ALSO pass ALL active rules. Before outputting, run the "tag + description" test: read them together and verify the phrase is natural.`;

  // Build per-tier checklist for the system prompt
  const activeRules=RULES.tagDesc.checks.filter(c=>c.on);
  const critical=activeRules.filter(r=>r.tier==='critical');
  const strong=activeRules.filter(r=>r.tier==='strong');
  const soft=activeRules.filter(r=>r.tier==='soft');
  const ruleChecklist=[
    critical.length?'CRITICAL (always fix):\n'+critical.map(c=>'  • '+c.name.split(':')[0]).join('\n'):'',
    strong.length?'\nSTRONG (fix unless stylistically justified):\n'+strong.map(c=>'  • '+c.name.split(':')[0]).join('\n'):'',
    soft.length?'\nSOFT (suggest only when clearly better):\n'+soft.map(c=>'  • '+c.name.split(':')[0]).join('\n'):''
  ].filter(Boolean).join('\n');

  for(let i=0;i<allEntries.length;i+=bs){
    const batch=allEntries.slice(i,i+bs);
    const batchNum=Math.floor(i/bs)+1;
    const totalBatches=Math.ceil(allEntries.length/bs);
    S.auditLog.push(`Batch ${batchNum}/${totalBatches} — Pass 1: analyzing ${batch.length} descriptions…`);
    S.auditProgress=i;
    render();
    await new Promise(r=>setTimeout(r,50));
    try{
      const prompt1=`Audit these tag descriptions for a printed book index.

${fullRules}
${antiPatterns}

RULE 1 IS PARAMOUNT (FOCUS):
Each description describes the portion of the clip connected to THIS SPECIFIC TAG — NOT the main topic of the clip. Tags are ranked by relevancy 1-4. Even relevancy-1 tags (brief mentions) are legitimate; their descriptions should capture the tag-specific moment, however small. When checking transcripts: look for ANY connection between THIS TAG and the transcript content. A description that accurately describes a brief mention is CORRECT and should not be flagged.

FOR EACH DESCRIPTION — walk through the rules IN ORDER (by tier):
1. First: verify Rule 1 (focus) — is the description about THIS tag, or is it just describing the clip's main theme? If it's describing the clip's main theme and the tag is minor, this fails Rule 1.
2. Then: check each CRITICAL rule (G-d convention, Sephardic spelling)
3. Then: check each STRONG rule (length, no tag repeat, no articles, no speech verbs, fragment style)
4. Soft rules: only flag if the description is CLEARLY improvable — not if it's acceptable
5. If ANY rule is violated, provide a restructured suggestion that passes ALL active rules
6. Run the "tag + description" test before submitting

Respond with JSON array. Each item:
{
  "idx": 0,
  "original": "the original text",
  "status": "ok"|"fix"|"generate",
  "rule_violations": ["Rule 3 — repeats tag name"],
  "suggestion": "your fixed version",
  "verification": "brief check that suggestion passes all rules"
}

${batch.map((e,j)=>`[${j}] Entry(TAG):"${e.entryName}" Sec:${e.section} Rel:${e.rel} Relevancy:${e.relevancy||'?'}\n  Desc:"${e.desc||'[empty]'}"\n  Transcript:"${(e.transcript||'').slice(0,800)}"`).join('\n\n')}`;

      const sys1=`You are a professional index editor auditing descriptions for a printed book index.\n\nRULE 1 (FOCUS) IS PARAMOUNT: Each description reflects THIS SPECIFIC TAG's role in the clip — not the clip's main topic. Tags ranked 1-4 by relevancy; even rank-1 (brief mention) tags are legitimate and their descriptions should capture the tag-specific moment. Don't flag a description just because it isn't the clip's central theme.\n\nRule priority tiers:\n${ruleChecklist}\n\nJSON array only. No preamble.`;

      const resp1=await fetch('https://api.anthropic.com/v1/messages',{method:'POST',headers:{'Content-Type':'application/json','x-api-key':S.claudeKey,'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:4096,system:sys1,messages:[{role:'user',content:prompt1}]})});
      if(!resp1.ok)throw new Error('API '+resp1.status);
      const d1=await resp1.json(),txt1=d1.content.map(c=>c.text||'').join('');
      let pass1;try{pass1=JSON.parse(txt1.replace(/```json?\s*/g,'').replace(/```/g,'').trim())}catch{const m=txt1.match(/\[[\s\S]*\]/);if(m)pass1=JSON.parse(m[0]);else throw new Error('Pass 1 parse fail')}

      S.auditLog.push(`  Pass 1 complete. Running Pass 2: verifying suggestions…`);
      S.auditProgress=i+Math.ceil(bs/2); // Show halfway progress during pass 2
      render();
      await new Promise(r=>setTimeout(r,50));

      // ── PASS 2: Verify the AI's own suggestions ──
      const needsVerify=pass1.filter(p=>p.status==='fix'||p.status==='generate');
      let finalResults=pass1;

      if(needsVerify.length>0){
        const prompt2=`You are reviewing another editor's suggestions for a book index. Check if each suggestion ACTUALLY follows the rules.

RULES:
${ruleChecklist}

For each suggestion below, verify:
- Does it repeat the entry name?
- Is it 2-6 words?
- Is it meaningfully different from the original?
- Is the word choice elevated and precise (not casual)?

If the suggestion is lazy or still violates rules, provide a BETTER suggestion.

JSON array. Each: {idx, status:"ok"|"fix", suggestion:"...", reason:"..."}

${needsVerify.map((p,j)=>`[${p.idx}] Entry:"${batch[p.idx]?.entryName}" Original:"${p.original||batch[p.idx]?.desc}" Suggestion:"${p.suggestion}" Violations:${JSON.stringify(p.rule_violations||[])}`).join('\n')}`;

        const resp2=await fetch('https://api.anthropic.com/v1/messages',{method:'POST',headers:{'Content-Type':'application/json','x-api-key':S.claudeKey,'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:4096,system:'You are a senior editor reviewing a junior editor\'s work. Be ruthless. If a suggestion is lazy (just lowercased, still casual), reject it and provide a better one. JSON array only.',messages:[{role:'user',content:prompt2}]})});

        if(resp2.ok){
          const d2=await resp2.json(),txt2=d2.content.map(c=>c.text||'').join('');
          try{
            let pass2=JSON.parse(txt2.replace(/```json?\s*/g,'').replace(/```/g,'').trim());
            if(!Array.isArray(pass2)){const m2=txt2.match(/\[[\s\S]*\]/);if(m2)pass2=JSON.parse(m2[0])}
            // Merge pass 2 improvements back
            if(Array.isArray(pass2)){
              pass2.forEach(p2=>{
                const orig=finalResults.find(r=>r.idx===p2.idx);
                if(orig&&p2.suggestion&&p2.suggestion!==orig.suggestion){
                  orig.suggestion=p2.suggestion;
                  orig.reason=(orig.reason||'')+' [refined by pass 2]';
                }
              });
            }
          }catch(e2){S.auditLog.push(`  Pass 2 parse warning: ${e2.message}`)}
        }
      }

      // ── TRANSCRIPT VERIFICATION — only for items flagged as transcript mismatch ──
      const transcriptFlags=finalResults.filter(p=>(p.status==='fix'||p.status==='generate')&&p.reason&&/rule 12|transcript/i.test(p.reason));
      if(transcriptFlags.length>0){
        S.auditLog.push(`  Verifying ${transcriptFlags.length} transcript flag(s) with full transcript…`);
        render();
        await new Promise(r=>setTimeout(r,50));
        for(const tf of transcriptFlags){
          const e=batch[tf.idx!=null?tf.idx:tf.index];
          if(!e||!e.transcript)continue;
          try{
            const vPrompt=`Does this index description describe ANY portion of the clip that relates to the TAG "${e.entryName}"?

Entry/Tag: "${e.entryName}"
Description: "${e.desc||'[empty]'}"

FULL TRANSCRIPT:
${e.transcript}

CRITICAL: This description does NOT need to describe the main point of the clip. It describes the specific part of the clip connected to the tag "${e.entryName}". The tag may refer to a small detail, a brief mention, or a minor moment — that is LEGITIMATE. Tags are ranked by relevancy precisely because they often are NOT central.

Answer TRUE if ANY part of the transcript involves the tag "${e.entryName}" in a way that connects to this description — even tangentially, even briefly.
Answer FALSE only if there is zero connection between the description and any mention/context of "${e.entryName}" in the transcript.

Answer with JSON only: {"matches": true/false, "reason": "brief explanation focused on the tag-specific connection"}`;
            const vResp=await fetch('https://api.anthropic.com/v1/messages',{method:'POST',headers:{'Content-Type':'application/json','x-api-key':S.claudeKey,'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:200,system:'You verify if index descriptions describe the portion of a clip relating to a specific tag. Be VERY generous — descriptions describe tag-specific content, which is often a small detail of the clip, NOT the main topic. Only say false if there is zero connection. JSON only.',messages:[{role:'user',content:vPrompt}]})});
            if(vResp.ok){
              const vd=await vResp.json(),vt=vd.content.map(c=>c.text||'').join('');
              try{
                const vr=JSON.parse(vt.replace(/```json?\s*/g,'').replace(/```/g,'').trim());
                if(vr.matches===true){
                  // Override — transcript actually matches, remove the flag
                  tf.status='ok';
                  tf.reason='Transcript verified ✓ (initially flagged but full transcript confirmed match)';
                  S.auditLog.push(`    ✓ "${e.entryName}" — transcript confirmed match`);
                }else{
                  S.auditLog.push(`    ✗ "${e.entryName}" — transcript mismatch confirmed`);
                }
              }catch{}
            }
          }catch(ve){S.auditLog.push(`    Verify error: ${ve.message}`)}
        }
      }

      // ── PASS 3: Programmatic verification ──
      let fx=0;const syncQueue=[];
      finalResults.forEach(p=>{
        const e=batch[p.idx!=null?p.idx:p.index];
        if(!e)return;
        if(p.status==='fix'||p.status==='generate'){
          let sug=p.suggestion||'';
          // Programmatic checks on the suggestion
          const entryWords=e.entryName.toLowerCase().split(/[\s,]+/);
          const sugWords=sug.toLowerCase().split(/\s+/);
          let flagged=false;
          // Check: suggestion still contains entry name words
          if(entryWords.some(w=>w.length>3&&sugWords.includes(w))){
            p.reason=(p.reason||'')+' [WARNING: suggestion may still contain entry name]';
          }
          // Check: suggestion is just a case change of original
          if(sug.toLowerCase()===e.desc?.toLowerCase()){
            p.reason=(p.reason||'')+' [WARNING: only case change — may need restructure]';
          }
          // Check: suggestion is same length or longer
          if(sug.split(/\s+/).length>=(e.desc||'').split(/\s+/).length+2){
            p.reason=(p.reason||'')+' [WARNING: suggestion is longer than original]';
          }

          const k=rvKey(e.entryName,e.segType,e.rowIdx);
          const existing=getRV(k);
          if(!existing||(!existing.reviewed&&existing.status!=='pending')){
            // Normalize rule_violations into an array of short labels
            const violations=Array.isArray(p.rule_violations)?p.rule_violations.filter(Boolean):[];
            setRV(k,{suggestion:sug,reason:p.reason||'',ruleViolations:violations,status:'pending',reviewed:false,deniedHistory:(existing?.deniedHistory||[])});
            syncQueue.push({entryName:e.entryName,segType:e.segType,rowIdx:e.rowIdx,status:'pending',suggestion:sug});
          }
          fx++;
        }else{
          const k=rvKey(e.entryName,e.segType,e.rowIdx);
          const existing=getRV(k);
          if(!existing||!existing.reviewed){
            setRV(k,{...(existing||{}),status:'ok'});
            syncQueue.push({entryName:e.entryName,segType:e.segType,rowIdx:e.rowIdx,status:'ok',suggestion:''});
          }
        }
      });
      // Sync to Index tabs
      if(syncQueue.length){
        (async()=>{
          for(const sq of syncQueue){

            if(r)syncToIndexTab(sq.entryName,r,sq.status,sq.suggestion).catch(()=>{});
          }
        })();
      }
      totalFixed+=fx;
      S.auditLog.push(`  ✓ ${fx} need review, ${batch.length-fx} passed`);
    }catch(e){S.auditLog.push(`  ✗ Error: ${e.message}`)}
    S.auditProgress=Math.min(i+bs,allEntries.length);render();
    if(i+bs<allEntries.length)await new Promise(r=>setTimeout(r,500));
  }
  S.auditRunning=false;
  S.auditSelected=new Set();
  S.auditLog.push(`\nDone! ${totalFixed} need changes, ${S.auditTotal-totalFixed} look good.`);
  toast(`Audit complete: ${totalFixed} need changes, ${S.auditTotal-totalFixed} look good`,'success');
  buildIndex();render();
}

// Partial render — only update the chat messages area, not the whole app
function renderChatOnly(){
  if(!S.clipPanel||!S.clipPanel.chat)return;
  const cp=S.clipPanel;
  const sc=cp.chat;
  const container=$('#clip-chat-msgs');
  if(!container)return;
  let h='';
  if(!sc.messages.length){
    h+=`<div style="color:var(--tx-3);font-size:13px;text-align:center;padding:14px;background:var(--bg-1);border-radius:8px">Ask for alternatives, explain why a suggestion is wrong, or request specific changes.</div>`;
  }
  sc.messages.forEach(m=>{
    if(m.role==='assistant'&&m.suggestions&&m.suggestions.length){
      h+=`<div class="sug-chat-msg ${m.role}"><div class="bubble">`;
      const lines=m.content.split('\n');
      lines.forEach(line=>{
        const numMatch=line.match(/^\d+[\.\)]\s*/);
        if(numMatch){
          const cleaned=line.replace(/^\d+[\.\)]\s*→?\s*/,'').replace(/^["""'']+|["""'']+$/g,'').replace(/^\*+|\*+$/g,'').trim();
          if(cleaned){
            h+=`<div style="display:flex;align-items:center;gap:8px;margin:4px 0">`;
            h+=`<span style="flex:1;font-size:14px">${numMatch[0]}${esc(cleaned)}</span>`;
            h+=`<button class="use-btn" data-usesug="${esc(cleaned)}" style="flex-shrink:0;margin:0;white-space:nowrap;font-size:12px;padding:4px 12px">Use</button>`;
            h+=`</div>`;
          }
        }else if(line.trim()){
          h+=`${esc(line)}<br>`;
        }
      });
      h+=`</div></div>`;
    }else if(m.role==='assistant'){
      h+=`<div class="sug-chat-msg ${m.role}"><div class="bubble">${esc(m.content).replace(/\n/g,'<br>')}`;
      if(m.suggestion){
        h+=`<div style="display:flex;align-items:center;gap:8px;margin-top:6px">`;
        h+=`<span style="color:var(--green);font-weight:600;font-size:13px">→ ${esc(m.suggestion)}</span>`;
        h+=`<button class="use-btn" data-usesug="${esc(m.suggestion)}" style="flex-shrink:0;margin:0;font-size:12px;padding:4px 12px">Use</button>`;
        h+=`</div>`;
      }
      h+=`</div></div>`;
    }else{
      h+=`<div class="sug-chat-msg ${m.role}"><div class="bubble">${esc(m.content).replace(/\n/g,'<br>')}</div></div>`;
    }
  });
  if(sc.typing)h+=`<div class="sug-chat-msg assistant"><div class="bubble" style="color:var(--tx-3)">Thinking…</div></div>`;
  container.innerHTML=h;
  // Re-bind Use this buttons
  container.querySelectorAll('[data-usesug]').forEach(el=>el.onclick=async()=>{
    const newDesc=el.dataset.usesug;
    if(!cp||!newDesc)return;
    const ok=await updateTagDesc(cp.rowIdx,cp.entryName,newDesc);
    if(ok){
      const k=rvKey(cp.entryName,cp.segType,cp.rowIdx);
      const rv=getRV(k)||{};
      rv.reviewed=true;rv.status='manual';
      rv.editedBy=S.user?.name||'Unknown';rv.editedAt=Date.now();
      rv.suggestion='';rv.reason='';
      setRV(k,rv);
      logActivity(`Used AI suggestion for "${cp.entryName}": "${newDesc}"`);
      toast('Description updated','success');
      S.clipPanel=null;
      buildIndex();render();
    }else{toast('Failed to save','error')}
  });
  // Scroll to bottom
  const target=$('#clip-section-chat');
  if(target)target.scrollIntoView({behavior:'smooth',block:'start'});
}

function render(force=true){
  // Don't rebuild DOM while user is actively typing — UNLESS forced
  if(!force){
    const active=document.activeElement;
    if(active&&(active.tagName==='INPUT'||active.tagName==='TEXTAREA'||active.id==='desc-edit'||active.id==='note-input')){return}
  }
  // Always clean up any body-level floating pills (legacy from updateAuditFloat)
  document.querySelectorAll('body > .audit-float').forEach(el=>el.remove());
  const app=$('#app');
  if(!S.connected){rSetup(app);return}
  if(S.loading&&!S.headers.length){app.innerHTML='<div class="loading-state"><div class="spinner"></div>Loading…</div>';return}
  // Focus mode takes over the full screen
  if(S.focusMode){
    app.innerHTML=rFocus();
    wireFocusModeHandlers();
    return;
  }
  let h='';
  h+=rSidebar();
  const isIdx=S.view==='index';
  h+=`<div class="main"><div class="main-content">`;
  h+=`<div class="content${isIdx?' content-index':''}">`;
  if(S.view==='dashboard')h+=rDash();
  else if(S.view==='book')h+=rBook();
  else if(isIdx)h+=rIndex();
  else if(S.view==='sheet')h+=rSheet();
  else if(S.view==='auditor')h+=rAuditor();
  else if(S.view==='review')h+=rReview();
  else if(S.view==='settings')h+=rSettings();
  else if(S.view==='consistency')h+=rConsistency();
  else if(S.view==='notes')h+=rNotes();
  else if(S.view==='tools')h+=rTools();
  else if(S.view==='team')h+=rTeam();
  h+='</div>';
  if(S.aiOpen)h+=rAI();
  h+='</div></div>';
  // Transcript popup
  if(S.transcriptPopup)h+=rTranscript();
  // Note popup

      h+=`<div class="note-msg">`;

  // Custom edit popup (themed)

// Inline back button for page headers. Returns '' if no history, else the button HTML.

  if(!S.viewHistory||!S.viewHistory.length)return '';

  if(prev.view==='book'){
    const scope=prev.bookScope||'all';
    destLabel=scope==='all'?'Book View (Full Index)':`Book View (${scope})`;
  }else if(prev.view==='dashboard')destLabel='Dashboard';
  else if(prev.view==='index')destLabel='Index Preview';
  else if(prev.view==='notes')destLabel='Notes';
  else if(prev.view==='settings')destLabel='AI Audit Rules';
  else if(prev.view==='auditor')destLabel='Auditor';

  else if(prev.view==='consistency')destLabel='Consistency Check';
  else if(prev.view)destLabel=prev.view;
  return `<button class="page-back-btn" id="page-back" title="Back to ${esc(destLabel)}">← Back</button>`;
}
