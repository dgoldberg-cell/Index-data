<style>
:root{
--bg-0:#faf8f4;--bg-1:#f3f0ea;--bg-2:#ece8e0;--bg-3:#e2ddd4;
--bg-hover:#ddd8ce;--bg-active:#d4cfc4;--bg-white:#fffdf9;
--border:#d8d2c6;--border-hi:#c8c2b4;--border-focus:#7c6a4f;
--tx-1:#2c2418;--tx-2:#5c5243;--tx-3:#8a7e6d;--tx-4:#b0a594;
--blue:#4a6898;--blue-hi:#5a7ab0;--blue-bg:rgba(74,104,152,.08);--blue-bd:rgba(74,104,152,.22);
--purple:#7c5e9a;--purple-bg:rgba(124,94,154,.07);--purple-bd:rgba(124,94,154,.22);
--red:#b05050;--red-bg:rgba(176,80,80,.07);--red-bd:rgba(176,80,80,.22);
--green:#4a8a5a;--green-bg:rgba(74,138,90,.07);--green-bd:rgba(74,138,90,.22);
--amber:#9a7a30;--amber-bg:rgba(154,122,48,.07);
--gold:#8c7a50;--gold-bg:rgba(140,122,80,.06);
--sidebar-w:210px;
--font:'DM Sans',system-ui,sans-serif;--mono:'JetBrains Mono',monospace;--serif:'Source Serif 4',Georgia,serif;
--radius:7px;--radius-lg:11px;
}
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;overflow:hidden;background:var(--bg-0);color:var(--tx-1);font-family:var(--font)}
::-webkit-scrollbar{width:7px;height:7px}::-webkit-scrollbar-track{background:var(--bg-1)}::-webkit-scrollbar-thumb{background:var(--border-hi);border-radius:4px}
button{font-family:var(--font);cursor:pointer}input,textarea,select{font-family:var(--font)}
a{color:var(--blue);text-decoration:none}a:hover{text-decoration:underline}

#app{display:flex;height:100vh}

/* Sidebar */
.sidebar{width:var(--sidebar-w);background:var(--bg-white);border-right:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0;z-index:50}
.sidebar-logo{padding:16px 18px 12px;font-family:var(--serif);font-size:16px;font-weight:700;color:var(--tx-1);border-bottom:1px solid var(--border);letter-spacing:-.3px}
.sidebar-logo span{color:var(--gold);font-weight:400;font-style:italic;font-size:13px;display:block;margin-top:1px}
.sidebar-sheet{padding:7px 18px;font-size:10px;color:var(--tx-4);font-family:var(--mono);border-bottom:1px solid var(--border);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.sidebar-nav{flex:1;padding:8px;overflow-y:auto}
.nav-sec{font-size:9px;font-weight:600;text-transform:uppercase;letter-spacing:.8px;color:var(--tx-4);padding:12px 10px 5px}
.nav-item{display:flex;align-items:center;gap:9px;padding:8px 11px;border-radius:6px;font-size:12.5px;font-weight:500;color:var(--tx-3);cursor:pointer;transition:all .1s;margin-bottom:1px}
.nav-item:hover{background:var(--bg-1);color:var(--tx-2)}
.nav-item.active{background:var(--gold-bg);color:var(--gold);border:1px solid rgba(140,122,80,.18);font-weight:600}
.nav-item .badge{margin-left:auto;background:var(--purple-bg);color:var(--purple);font-size:10px;font-weight:600;padding:1px 7px;border-radius:10px}
.nav-item svg{width:16px;height:16px;flex-shrink:0;opacity:.6}
.nav-item.active svg{opacity:1}
.sidebar-tabs{padding:6px 8px;border-top:1px solid var(--border);max-height:140px;overflow-y:auto}
.sidebar-tabs h4{font-size:9px;font-weight:600;text-transform:uppercase;letter-spacing:.8px;color:var(--tx-4);padding:4px 10px 4px}
.stab{padding:5px 11px;border-radius:5px;font-size:11px;color:var(--tx-3);cursor:pointer;transition:all .1s}
.stab:hover{background:var(--bg-1);color:var(--tx-2)}.stab.active{color:var(--gold);font-weight:600}
.sidebar-user{padding:10px 14px;border-top:1px solid var(--border);display:flex;align-items:center;gap:9px}
.sidebar-avatar{width:28px;height:28px;border-radius:50%;background:var(--bg-2);border:1.5px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:600;color:var(--gold);overflow:hidden;flex-shrink:0}
.sidebar-avatar img{width:100%;height:100%;object-fit:cover}
.sidebar-uname{font-size:11px;color:var(--tx-2);flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}

/* Main */
.main{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0}
.main-content{flex:1;display:flex;overflow:hidden}
.content{flex:1;overflow-y:auto;overflow-x:hidden}
.content.content-index{overflow:hidden;display:flex;flex-direction:column}
.idx-wrap{display:flex;flex-direction:column;flex:1;min-height:0;overflow:hidden}

/* Buttons */
.btn{display:inline-flex;align-items:center;gap:5px;padding:0 13px;height:32px;border-radius:var(--radius);font-size:12px;font-weight:500;border:1px solid var(--border);background:var(--bg-white);color:var(--tx-2);transition:all .12s;white-space:nowrap}
.btn:hover{background:var(--bg-1);color:var(--tx-1);border-color:var(--border-hi)}
.btn-gold{background:var(--gold);color:#fff;border-color:var(--gold)}.btn-gold:hover{background:#9a8860}
.btn-blue{background:var(--blue-bg);color:var(--blue);border-color:var(--blue-bd)}.btn-blue:hover{background:rgba(74,104,152,.14)}
.btn-purple{background:var(--purple-bg);color:var(--purple);border-color:var(--purple-bd)}.btn-purple:hover{background:rgba(124,94,154,.14)}
.btn-red{background:var(--red-bg);color:var(--red);border-color:var(--red-bd)}.btn-red:hover{background:rgba(176,80,80,.14)}
.btn-green{background:var(--green-bg);color:var(--green);border-color:var(--green-bd)}.btn-green:hover{background:rgba(74,138,90,.14)}
.btn-sm{height:26px;padding:0 9px;font-size:11px}
.btn-icon{width:32px;padding:0;justify-content:center}.btn-icon.btn-sm{width:26px}

/* Page header */
.page-hd{padding:20px 28px 14px;border-bottom:1px solid var(--border);flex-shrink:0;background:var(--bg-white)}
.page-hd h1{font-family:var(--serif);font-size:20px;font-weight:700;letter-spacing:-.3px;color:var(--tx-1)}
.page-hd p{font-size:12px;color:var(--tx-3);margin-top:2px}
.page-hd-actions{display:flex;gap:8px;margin-top:10px;flex-wrap:wrap}

/* Cards */
.card{background:var(--bg-white);border:1px solid var(--border);border-radius:var(--radius-lg);padding:18px;transition:border-color .12s}
.card:hover{border-color:var(--border-hi)}
.card h4{font-size:9.5px;font-weight:600;text-transform:uppercase;letter-spacing:.5px;color:var(--tx-4);margin-bottom:7px}
.card .val{font-size:24px;font-weight:700;font-family:var(--serif);letter-spacing:-.5px}
.card .sub{font-size:10px;color:var(--tx-4);margin-top:2px}
.grid{display:grid;gap:12px}.grid-4{grid-template-columns:repeat(auto-fill,minmax(170px,1fr))}.grid-2{grid-template-columns:1fr 1fr}
.pad{padding:22px 28px}

/* Index Preview */
.idx-toolbar{display:flex;align-items:center;gap:6px;padding:8px 24px;border-bottom:1px solid var(--border);background:var(--bg-white);flex-shrink:0}
.idx-search{display:flex;align-items:center;gap:7px;background:var(--bg-white);border:1px solid var(--border);border-radius:var(--radius);padding:0 10px;height:30px;min-width:160px;flex:1;max-width:260px}
.idx-search:focus-within{border-color:var(--gold)}
.idx-search input{background:none;border:none;outline:none;color:var(--tx-1);font-size:12px;width:100%}
.idx-search input::placeholder{color:var(--tx-4)}
/* Toolbar dropdown button */
.tb-dd{position:relative}
.tb-dd-btn{display:flex;align-items:center;gap:4px;padding:4px 10px;border:1px solid var(--border);border-radius:var(--radius);background:var(--bg-white);color:var(--tx-2);font-size:11px;font-weight:500;cursor:pointer;white-space:nowrap;font-family:var(--font);transition:all .1s;height:28px}
.tb-dd-btn:hover{background:var(--bg-1);border-color:var(--border-hi)}
.tb-dd-btn .tb-dd-val{color:var(--gold);font-weight:600}
.tb-dd-btn::after{content:'▾';font-size:8px;color:var(--tx-4);margin-left:2px}
.tb-dd-panel{display:none;position:absolute;top:100%;left:0;margin-top:4px;background:var(--bg-white);border:1px solid var(--border);border-radius:var(--radius);box-shadow:0 6px 20px rgba(0,0,0,.1);z-index:90;min-width:150px;padding:4px}
.tb-dd.open .tb-dd-panel{display:block}
.tb-dd-item{display:flex;align-items:center;gap:6px;padding:5px 10px;border-radius:4px;font-size:11px;color:var(--tx-2);cursor:pointer;white-space:nowrap}
.tb-dd-item:hover{background:var(--bg-1);color:var(--tx-1)}
.tb-dd-item.active{color:var(--gold);font-weight:600;background:var(--gold-bg)}
.tb-dd-item .tb-dd-cnt{font-size:9px;color:var(--tx-4);margin-left:auto;font-family:var(--mono)}
.tb-layout-toggle{display:flex;border:1px solid var(--border);border-radius:var(--radius);overflow:hidden}
.tb-layout-btn{padding:4px 8px;font-size:11px;color:var(--tx-3);background:var(--bg-white);cursor:pointer;transition:all .1s;border-right:1px solid var(--border);letter-spacing:-1px}
.tb-layout-btn:last-child{border-right:none}
.tb-layout-btn:hover{background:var(--bg-1);color:var(--tx-2)}
.tb-layout-btn.active{background:var(--gold-bg);color:var(--gold);font-weight:600}

.idx-main{display:flex;flex:1;overflow:hidden;min-height:0}

.idx-body{overflow-y:auto;overflow-x:hidden;padding:20px 32px;font-size:13px;flex:1;width:100%}
/* Two-col content wrapper inside idx-body */
.idx-cols{display:flex;gap:28px;width:100%}
.idx-cols .idx-col{flex:1;min-width:0}
.idx-cols .idx-col-divider{width:1px;background:var(--border);flex-shrink:0}
/* Pagination bar */
.idx-pager{display:flex;align-items:center;justify-content:center;gap:8px;padding:10px 0;font-size:11px;color:var(--tx-3)}
.idx-pager input{width:36px;text-align:center;border:1px solid var(--border);border-radius:4px;padding:2px;font-size:11px;font-family:var(--mono);color:var(--tx-1);outline:none}
.idx-pager input:focus{border-color:var(--gold)}
.idx-top-bar{display:flex;align-items:center;gap:10px;margin-bottom:12px}

/* Section headers in index */
.idx-section-hd{font-family:var(--serif);font-size:22px;font-weight:700;color:var(--tx-1);padding:16px 0 10px;border-bottom:2px solid var(--gold);margin-bottom:16px;break-after:avoid;letter-spacing:-.3px}
.idx-section-hd:first-child{padding-top:0}

/* Index entry */
.idx-entry{margin-bottom:14px;break-inside:avoid;position:relative}
.idx-entry.flagged{border-left:3px solid var(--amber);padding-left:10px}
.idx-entry.bookmarked::before{content:'🔖';position:absolute;left:-20px;top:0;font-size:12px}
.idx-entry-name{font-family:var(--serif);font-size:15px;font-weight:700;color:var(--tx-1);margin-bottom:2px;display:flex;align-items:center;gap:6px}
.idx-entry-badge{font-size:9px;font-weight:500;font-family:var(--font);padding:1px 6px;border-radius:8px;vertical-align:middle}
.idx-entry-badge.warn{background:var(--amber-bg);color:var(--amber);border:1px solid rgba(154,122,48,.2)}
.idx-entry-badge.empty{background:var(--red-bg);color:var(--red);border:1px solid var(--red-bd)}
.idx-entry-meta{font-size:10px;color:var(--tx-4);margin-bottom:4px;font-family:var(--mono)}
.idx-seealso{font-size:11px;color:var(--tx-3);font-style:italic;margin-bottom:4px}
.idx-seealso a{color:var(--blue);font-style:normal}
.idx-bestbet{display:inline-block;font-size:10px;background:var(--gold-bg);color:var(--gold);padding:1px 8px;border-radius:8px;margin-bottom:4px;border:1px solid rgba(140,122,80,.2)}

/* Segment group */
.idx-seg{margin-bottom:8px}
.idx-seg-label{font-size:9.5px;font-weight:600;text-transform:uppercase;letter-spacing:.4px;color:var(--tx-4);margin-bottom:3px}

/* Individual result — full width row, actions pushed right */
.idx-result{display:flex;align-items:center;gap:6px;padding:4px 0;font-size:13px;line-height:1.6}
.idx-result-desc{color:var(--tx-2);flex:1}
.idx-result-desc.empty-desc{color:var(--red);font-style:italic;background:rgba(176,80,80,.05);padding:0 4px;border-radius:3px}
.idx-result-desc.editable:hover{background:var(--bg-1);cursor:text;border-radius:3px;padding:0 4px}
.idx-result-rel{font-size:10px;color:var(--tx-4);font-style:italic;flex-shrink:0}
.idx-result-ref{font-family:var(--mono);font-size:10.5px;color:var(--blue);white-space:nowrap;flex-shrink:0}
.idx-result-ref a{color:var(--blue)}

/* Single column — bigger text, more spread out */
.idx-body:not(.two-col-mode) .idx-entry{margin-bottom:20px}
.idx-body:not(.two-col-mode) .idx-entry-name{font-size:18px}
.idx-body:not(.two-col-mode) .idx-result{font-size:14px;padding:5px 0}
.idx-body:not(.two-col-mode) .idx-seg{margin-bottom:10px}
.idx-body:not(.two-col-mode) .idx-seg-label{font-size:10px;margin-bottom:4px}
.idx-body:not(.two-col-mode) .idx-entry-meta{font-size:11px;margin-bottom:6px}
.idx-body:not(.two-col-mode) .idx-result-rel{font-size:11px}
.idx-body:not(.two-col-mode) .idx-result-ref{font-size:11px}
/* Original description shown inline — crossed out, clickable to revert */
.idx-orig-inline{display:inline-flex;align-items:baseline;gap:4px;flex-shrink:0}
.idx-orig-text{color:var(--tx-4);text-decoration:line-through;font-size:11px;cursor:pointer;padding:0 3px;border-radius:3px;transition:all .1s}
.idx-orig-text:hover{background:var(--amber-bg);color:var(--amber);text-decoration:line-through}
.idx-orig-revert{font-size:9px;color:var(--amber);cursor:pointer;padding:1px 5px;border:1px solid rgba(154,122,48,.3);border-radius:8px;background:var(--bg-white);white-space:nowrap;transition:all .1s;font-family:var(--font)}
.idx-orig-revert:hover{background:var(--amber-bg);border-color:var(--amber)}
.idx-orig-sep{color:var(--tx-4);font-size:10px}
.idx-mini-btn{width:20px;height:20px;border:1px solid var(--border);border-radius:4px;background:var(--bg-white);display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--tx-4);font-size:10px;transition:all .1s}
.idx-mini-btn:hover{background:var(--bg-1);color:var(--tx-2);border-color:var(--border-hi)}
.idx-mini-btn.active{color:var(--gold);border-color:var(--gold)}

/* Transcript popup */
.transcript-popup{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);width:600px;max-height:70vh;background:var(--bg-white);border:1px solid var(--border);border-radius:var(--radius-lg);box-shadow:0 12px 40px rgba(0,0,0,.12);z-index:300;display:flex;flex-direction:column}
.transcript-popup-hd{padding:14px 18px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.transcript-popup-hd h3{font-family:var(--serif);font-size:14px;font-weight:600}
.transcript-popup-body{flex:1;overflow-y:auto;padding:18px;font-family:var(--serif);font-size:14px;line-height:1.7;color:var(--tx-2)}
.popup-overlay{position:fixed;inset:0;background:rgba(0,0,0,.15);z-index:299}

/* Inline edit */
.idx-inline-edit{display:flex;gap:4px;align-items:center}
.idx-inline-input{border:1px solid var(--gold);border-radius:4px;padding:2px 8px;font-size:12px;font-family:var(--font);color:var(--tx-1);outline:none;background:var(--bg-white);flex:1;min-width:150px}

/* Bulk bar */
.bulk-bar{display:flex;align-items:center;gap:8px;padding:8px 24px;background:var(--blue-bg);border-bottom:1px solid var(--blue-bd);font-size:12px;color:var(--blue);font-weight:500;flex-shrink:0}

/* Table (Sheet View) */
.table-toolbar{display:flex;align-items:center;gap:8px;padding:8px 20px;border-bottom:1px solid var(--border);flex-wrap:wrap;background:var(--bg-white)}
table{width:max-content;min-width:100%;border-collapse:separate;border-spacing:0}
thead{position:sticky;top:0;z-index:10}
th{background:var(--bg-1);padding:0 12px;height:34px;font-size:10px;font-weight:600;color:var(--tx-4);text-transform:uppercase;letter-spacing:.5px;text-align:left;border-bottom:1px solid var(--border);border-right:1px solid var(--border);white-space:nowrap;cursor:pointer;user-select:none}
th:hover{color:var(--tx-3);background:var(--bg-2)}
td{padding:0 12px;height:32px;font-size:12px;border-bottom:1px solid var(--border);border-right:1px solid var(--border);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:280px;background:var(--bg-white)}
tr:hover td{background:var(--bg-0)}
tr.sel td{background:var(--blue-bg)}
td.editing{background:var(--bg-1)!important;outline:2px solid var(--gold);outline-offset:-2px}
.cell-input{background:none;border:none;outline:none;color:var(--tx-1);font-size:12px;width:100%;height:100%}
.col-chk{width:36px;min-width:36px;text-align:center}
.col-num{width:42px;min-width:42px;text-align:center;font-family:var(--mono)}
input[type="checkbox"]{appearance:none;width:14px;height:14px;border:1.5px solid var(--border-hi);border-radius:3px;background:var(--bg-white);cursor:pointer;position:relative;transition:all .08s;vertical-align:middle}
input[type="checkbox"]:checked{background:var(--gold);border-color:var(--gold)}
input[type="checkbox"]:checked::after{content:'✓';position:absolute;top:-2px;left:1px;font-size:11px;color:#fff;font-weight:700}
.toolbar-spacer{flex:1}
.toolbar-count{font-size:10px;color:var(--tx-4);font-family:var(--mono)}

/* Review */
.review-item{background:var(--bg-white);border:1px solid var(--border);border-radius:var(--radius-lg);padding:18px;margin-bottom:10px}
.review-item:hover{border-color:var(--border-hi)}
.review-tag{font-family:var(--serif);font-size:15px;font-weight:600;margin-bottom:3px}
.review-section{font-size:10px;color:var(--tx-4);text-transform:uppercase;letter-spacing:.4px;margin-bottom:10px}
.review-row{display:flex;gap:16px;margin-bottom:8px;font-size:12.5px}
.review-label{font-size:9px;font-weight:600;color:var(--tx-4);text-transform:uppercase;letter-spacing:.4px;margin-bottom:2px}
.review-old{color:var(--tx-4);text-decoration:line-through}
.review-new{color:var(--green);font-weight:500}
.review-reason{font-size:11px;color:var(--tx-3);font-style:italic;margin-bottom:10px;padding:8px 12px;background:var(--bg-0);border-radius:6px;border-left:3px solid var(--purple)}
.review-actions{display:flex;gap:6px;align-items:center}
.review-custom-input{flex:1;background:var(--bg-white);border:1px solid var(--border);border-radius:var(--radius);padding:5px 10px;color:var(--tx-1);font-size:12px;outline:none}
.review-custom-input:focus{border-color:var(--gold)}
.review-transcript{font-size:11px;color:var(--tx-3);margin-top:8px;padding:8px 12px;background:var(--bg-0);border-radius:6px;max-height:70px;overflow-y:auto;font-family:var(--serif);line-height:1.5}

/* Auditor */
.audit-stat{text-align:center;padding:14px;background:var(--bg-white);border-radius:var(--radius);border:1px solid var(--border)}
.audit-stat .num{font-size:28px;font-weight:700;font-family:var(--serif)}
.audit-stat .lbl{font-size:9px;color:var(--tx-4);text-transform:uppercase;letter-spacing:.5px;margin-top:2px}
.audit-progress-bar{height:6px;background:var(--bg-2);border-radius:3px;overflow:hidden;margin:8px 0}
.audit-progress-fill{height:100%;background:linear-gradient(90deg,var(--gold),var(--blue));border-radius:3px}
.audit-log{max-height:180px;overflow-y:auto;font-family:var(--mono);font-size:10px;color:var(--tx-3);padding:10px;background:var(--bg-0);border-radius:6px;border:1px solid var(--border)}

/* AI Panel */
.ai-panel{width:360px;min-width:360px;background:var(--bg-white);border-left:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0}
.ai-panel.hidden{display:none}
.ai-head{display:flex;align-items:center;gap:8px;padding:12px 14px;border-bottom:1px solid var(--border)}
.ai-head h3{font-size:13px;font-weight:600;flex:1;font-family:var(--serif)}
.ai-dot{width:7px;height:7px;border-radius:50%;background:var(--purple);box-shadow:0 0 6px var(--purple)}
.ai-msgs{flex:1;overflow-y:auto;padding:14px;display:flex;flex-direction:column;gap:10px}
.ai-msg{padding:10px 12px;border-radius:9px;font-size:12.5px;line-height:1.5;max-width:92%;word-wrap:break-word;animation:msgIn .15s ease-out}
@keyframes msgIn{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:translateY(0)}}
.ai-msg.user{background:var(--blue-bg);border:1px solid var(--blue-bd);color:var(--tx-1);align-self:flex-end;border-bottom-right-radius:3px}
.ai-msg.assistant{background:var(--bg-0);border:1px solid var(--border);color:var(--tx-2);align-self:flex-start;border-bottom-left-radius:3px}
.ai-msg.system{background:var(--purple-bg);border:1px solid var(--purple-bd);color:var(--purple);font-size:11px;align-self:center;text-align:center}
.ai-msg strong{color:var(--tx-1)}.ai-msg code{font-family:var(--mono);font-size:10.5px;background:var(--bg-2);padding:1px 4px;border-radius:3px}
.ai-msg pre{background:var(--bg-1);padding:8px;border-radius:6px;font-family:var(--mono);font-size:10px;overflow-x:auto;margin:5px 0;white-space:pre-wrap;color:var(--tx-1)}
.ai-typing{color:var(--tx-4);font-size:11px;font-style:italic;padding:4px 12px}
.ai-input-area{display:flex;gap:8px;padding:10px 14px;border-top:1px solid var(--border)}
.ai-input{flex:1;background:var(--bg-0);border:1px solid var(--border);border-radius:var(--radius);padding:8px 12px;color:var(--tx-1);font-size:12px;outline:none;resize:none;min-height:36px;max-height:90px}
.ai-input:focus{border-color:var(--purple)}.ai-input::placeholder{color:var(--tx-4)}
.ai-send{width:36px;height:36px;border-radius:var(--radius);background:var(--purple);border:none;color:#fff;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.ai-send:hover{background:#8e70aa}.ai-send:disabled{opacity:.4}

/* Setup */
.setup-screen{display:flex;align-items:center;justify-content:center;width:100%;height:100vh;background:var(--bg-0);background-image:radial-gradient(ellipse at 30% 20%,rgba(140,122,80,.06) 0%,transparent 55%)}
.setup-card{background:var(--bg-white);border:1px solid var(--border);border-radius:var(--radius-lg);padding:36px;max-width:520px;width:100%;box-shadow:0 8px 32px rgba(0,0,0,.06)}
.setup-card h1{font-family:var(--serif);font-size:22px;font-weight:700;letter-spacing:-.4px;margin-bottom:3px}
.setup-card .sub{font-size:12px;color:var(--tx-3);line-height:1.6;margin-bottom:18px}
.setup-card label{display:block;font-size:10px;font-weight:600;color:var(--tx-4);margin-bottom:5px;text-transform:uppercase;letter-spacing:.5px}
.s-input{width:100%;padding:9px 12px;background:var(--bg-0);border:1px solid var(--border);border-radius:var(--radius);color:var(--tx-1);font-size:12px;font-family:var(--mono);outline:none;margin-bottom:12px}
.s-input:focus{border-color:var(--gold)}.s-input::placeholder{color:var(--tx-4)}
.setup-steps{background:var(--bg-0);border:1px solid var(--border);border-radius:var(--radius);padding:12px 16px;margin-bottom:16px}
.setup-steps h3{font-size:11px;font-weight:600;color:var(--tx-2);margin-bottom:6px}
.setup-steps ol{padding-left:18px;font-size:11px;color:var(--tx-3);line-height:1.9}
.setup-steps code{background:var(--bg-2);padding:1px 5px;border-radius:3px;font-family:var(--mono);font-size:10px;color:var(--gold)}
.setup-ai{background:var(--purple-bg);border:1px solid var(--purple-bd);border-radius:var(--radius);padding:12px 16px;margin-bottom:16px}
.setup-ai h3{font-size:11px;font-weight:600;color:var(--purple);margin-bottom:3px}
.setup-ai p{font-size:10px;color:var(--tx-3);margin-bottom:6px}
.setup-err{color:var(--red);font-size:11px;margin-bottom:8px}

/* Settings */
.rule-item{display:flex;align-items:center;gap:8px;padding:8px 10px;background:var(--bg-0);border:1px solid var(--border);border-radius:6px;margin-bottom:5px;font-size:12px}
.rule-name{font-weight:600;color:var(--tx-1);flex:1}.rule-desc{font-size:11px;color:var(--tx-3);flex:2}
.rule-toggle{width:34px;height:18px;border-radius:9px;background:var(--bg-3);border:none;cursor:pointer;position:relative;transition:background .15s}
.rule-toggle.on{background:var(--gold)}
.rule-toggle::after{content:'';position:absolute;top:2px;left:2px;width:14px;height:14px;border-radius:50%;background:#fff;transition:transform .15s;box-shadow:0 1px 3px rgba(0,0,0,.15)}
.rule-toggle.on::after{transform:translateX(16px)}

/* Loading + Toasts */
.loading-state{display:flex;flex-direction:column;align-items:center;justify-content:center;width:100%;height:100vh;gap:12px;color:var(--tx-4)}
.spinner{width:22px;height:22px;border:2.5px solid var(--border);border-top-color:var(--gold);border-radius:50%;animation:sp .7s linear infinite}
@keyframes sp{to{transform:rotate(360deg)}}
.toasts{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);z-index:999;display:flex;flex-direction:column;gap:6px;align-items:center}

/* Floating audit selection bar — fixed at bottom center */
.audit-float{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);z-index:200;display:flex;align-items:center;gap:8px;padding:6px 16px;background:var(--tx-1);color:#fff;border-radius:20px;box-shadow:0 4px 16px rgba(0,0,0,.2);font-size:11px;font-weight:500;animation:floatIn .15s ease-out}
@keyframes floatIn{from{opacity:0;transform:translateX(-50%) translateY(10px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}
.audit-float .af-count{font-family:var(--mono);background:rgba(255,255,255,.2);padding:1px 7px;border-radius:6px;font-size:11px}
.audit-float button{background:rgba(255,255,255,.2);color:#fff;border:1px solid rgba(255,255,255,.3);border-radius:6px;padding:3px 10px;font-size:10px;font-weight:600;cursor:pointer;font-family:var(--font);transition:all .1s}
.audit-float button:hover{background:rgba(255,255,255,.35)}
.audit-float button.af-run{background:#fff;color:var(--tx-1);border-color:#fff}
.audit-float button.af-run:hover{background:rgba(255,255,255,.9)}
.audit-float .af-close{background:none;border:none;color:rgba(255,255,255,.5);font-size:14px;padding:0 2px;cursor:pointer;line-height:1}
.audit-float .af-close:hover{color:#fff}
.audit-float .af-spinner{width:14px;height:14px;border:2px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:sp .7s linear infinite}
.toast{padding:8px 18px;background:var(--bg-white);border:1px solid var(--border);border-radius:var(--radius);font-size:11px;color:var(--tx-2);box-shadow:0 4px 16px rgba(0,0,0,.08);animation:toastIn .2s ease-out}
.toast.success{border-color:var(--green);color:var(--green)}.toast.error{border-color:var(--red);color:var(--red)}
@keyframes toastIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}

/* Filter dropdown */
.filter-dd{position:absolute;top:100%;left:0;background:var(--bg-white);border:1px solid var(--border);border-radius:var(--radius);box-shadow:0 8px 24px rgba(0,0,0,.08);padding:6px;z-index:100;min-width:200px;max-height:300px;overflow-y:auto}
.filter-dd-item{padding:5px 10px;border-radius:4px;font-size:12px;color:var(--tx-2);cursor:pointer}
.filter-dd-item:hover{background:var(--bg-1);color:var(--tx-1)}
.filter-dd-item .cnt{font-family:var(--mono);font-size:10px;color:var(--tx-4);float:right}

/* ═══ Inline Review System ═══ */
@keyframes sugIn{from{opacity:0;transform:translateX(-4px)}to{opacity:1;transform:translateX(0)}}
.idx-sug-old{color:var(--red);font-size:12px}
.idx-sug-arrow{color:var(--tx-4);font-size:11px;flex-shrink:0}
.idx-sug-new{color:var(--green);font-weight:600;font-size:12.5px}
.idx-sug-reason{position:relative;font-size:9px;color:var(--purple);background:var(--purple-bg);padding:1px 6px;border-radius:8px;cursor:help;white-space:nowrap;max-width:120px;overflow:hidden;text-overflow:ellipsis}
.idx-sug-reason:hover{overflow:visible;max-width:none;z-index:20}
.idx-sug-reason:hover::after{content:attr(data-reason);position:absolute;left:0;top:100%;margin-top:4px;background:var(--tx-1);color:#fff;padding:6px 10px;border-radius:6px;font-size:11px;line-height:1.4;white-space:normal;width:280px;z-index:100;box-shadow:0 4px 12px rgba(0,0,0,.15);pointer-events:none}
.idx-sug-actions{display:flex;gap:2px;flex-shrink:0}
.idx-sug-btn{width:20px;height:20px;border:1px solid var(--border);border-radius:4px;background:var(--bg-white);display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:10px;transition:all .1s}
.idx-sug-btn.accept{color:var(--green);border-color:var(--green-bd)}.idx-sug-btn.accept:hover{background:var(--green-bg)}
.idx-sug-btn.deny{color:var(--red);border-color:var(--red-bd)}.idx-sug-btn.deny:hover{background:var(--red-bg)}
.idx-sug-btn.custom{color:var(--blue);border-color:var(--blue-bd)}.idx-sug-btn.custom:hover{background:var(--blue-bg)}

/* Audit selection checkbox — only visible in select mode */
.idx-audit-chk,.idx-audit-chk[type="checkbox"]{width:14px;height:14px;border-radius:2px!important;flex-shrink:0;cursor:pointer;appearance:none;border:2px solid var(--purple)!important;background:var(--bg-white)!important;position:relative;transition:all .1s;display:none}
.select-mode .idx-audit-chk{display:inline-block}

/* Move checkbox — orange, entry level only, hidden unless move mode */
.idx-move-chk,.idx-move-chk[type="checkbox"]{width:14px;height:14px;border-radius:2px!important;flex-shrink:0;cursor:pointer;appearance:none;border:2px solid var(--amber)!important;background:var(--bg-white)!important;position:relative;transition:all .1s;display:none}
.move-mode .idx-move-chk{display:inline-block}
.idx-move-chk:checked,.idx-move-chk[type="checkbox"]:checked{background:var(--amber)!important;border-color:var(--amber)!important}
.idx-move-chk:checked::after{content:'✓';position:absolute;top:-2px;left:1px;font-size:11px;color:#fff;font-weight:700}

/* Move floating bar */
.move-float{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);z-index:200;display:flex;align-items:center;gap:8px;padding:6px 16px;background:var(--tx-1);color:#fff;border-radius:20px;box-shadow:0 4px 16px rgba(0,0,0,.2);font-size:11px;font-weight:500;animation:floatIn .15s ease-out}
.move-float select{background:rgba(255,255,255,.15);color:#fff;border:1px solid rgba(255,255,255,.3);border-radius:6px;padding:3px 8px;font-size:10px;font-family:var(--font);cursor:pointer;outline:none}
.move-float select option{color:var(--tx-1);background:var(--bg-white)}
.idx-audit-chk:checked,.idx-audit-chk[type="checkbox"]:checked{background:var(--purple)!important;border-color:var(--purple)!important}
.idx-audit-chk:checked::after{content:'✓';position:absolute;top:-2px;left:1px;font-size:11px;color:#fff;font-weight:700}
.idx-audit-chk:hover{border-color:var(--purple)!important}

/* Status toggle — Pending/Reviewed */
.idx-status{font-size:9px;padding:2px 8px;border-radius:10px;cursor:pointer;white-space:nowrap;transition:all .12s;flex-shrink:0;font-family:var(--font);font-weight:500;border:1.5px solid var(--border);background:var(--bg-white);color:var(--tx-4)}
.idx-status:hover{border-color:var(--green);color:var(--green);background:var(--green-bg)}
.idx-status.reviewed{background:var(--green);color:#fff;border-color:var(--green);font-weight:600}
.idx-status.reviewed:hover{background:#3a7a4a}

/* Entry-level status */
.idx-entry-status{font-size:9.5px;padding:2px 10px;border-radius:10px;cursor:pointer;white-space:nowrap;transition:all .12s;font-family:var(--font);margin-left:6px;font-weight:500;border:1.5px solid var(--border);background:var(--bg-white);color:var(--tx-4)}
.idx-entry-status:hover{border-color:var(--green);color:var(--green);background:var(--green-bg)}
.idx-entry-status.reviewed{background:var(--green);color:#fff;border-color:var(--green);font-weight:600}
.idx-entry-status.reviewed:hover{background:#3a7a4a}

/* Clip dropdown menu */
.idx-clip-menu{position:relative;flex-shrink:0}
.idx-clip-btn{width:20px;height:20px;border:1px solid var(--border);border-radius:4px;background:var(--bg-white);display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--tx-4);font-size:12px;transition:all .1s}
.idx-clip-btn:hover{background:var(--bg-1);color:var(--tx-2);border-color:var(--border-hi)}
.idx-clip-dd{display:none;position:absolute;top:100%;right:0;margin-top:4px;background:var(--bg-white);border:1px solid var(--border);border-radius:6px;box-shadow:0 6px 20px rgba(0,0,0,.1);z-index:80;min-width:140px;padding:4px}
.idx-clip-menu.open .idx-clip-dd{display:block}
.idx-clip-dd a,.idx-clip-dd span{display:flex;align-items:center;gap:6px;padding:5px 10px;border-radius:4px;font-size:11px;color:var(--tx-2);cursor:pointer;text-decoration:none}
.idx-clip-dd a:hover,.idx-clip-dd span:hover{background:var(--bg-1);color:var(--tx-1)}

/* Section progress in sidebar */
.sidebar-progress{padding:4px 8px;margin:0 10px 2px}
.sidebar-progress-bar{height:3px;background:var(--bg-2);border-radius:2px;overflow:hidden}
.sidebar-progress-fill{height:100%;background:var(--green);border-radius:2px;transition:width .3s}
.sidebar-progress-text{font-size:8px;color:var(--tx-4);font-family:var(--mono);margin-top:1px}

/* Review mode banner */
.review-mode-bar{display:flex;align-items:center;gap:8px;padding:6px 16px;background:var(--purple-bg);border-bottom:1px solid var(--purple-bd);font-size:11px;color:var(--purple);font-weight:500;flex-shrink:0}
.review-mode-bar .rm-count{font-family:var(--mono);font-weight:600}

/* Review filter pills */
.idx-filter-pills{display:flex;gap:4px;margin-left:8px}
.idx-filter-pill{padding:3px 10px;border-radius:12px;font-size:10px;font-weight:500;cursor:pointer;border:1px solid var(--border);background:var(--bg-white);color:var(--tx-3);transition:all .12s}
.idx-filter-pill:hover{background:var(--bg-1);color:var(--tx-2)}
.idx-filter-pill.active{background:var(--purple-bg);color:var(--purple);border-color:var(--purple-bd)}

/* Audit scope selector */
.audit-scope{background:var(--bg-0);border:1px solid var(--border);border-radius:var(--radius);padding:14px;margin-bottom:14px}
.audit-scope h4{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.5px;color:var(--tx-4);margin-bottom:8px}
.audit-scope-options{display:flex;flex-wrap:wrap;gap:6px}
.audit-scope-opt{padding:5px 12px;border-radius:var(--radius);font-size:11px;font-weight:500;cursor:pointer;border:1px solid var(--border);background:var(--bg-white);color:var(--tx-3);transition:all .12s}
.audit-scope-opt:hover{background:var(--bg-1);color:var(--tx-2);border-color:var(--border-hi)}
.audit-scope-opt.active{background:var(--gold-bg);color:var(--gold);border-color:rgba(140,122,80,.3)}
.audit-scope-opt.section-opt{font-size:10px}

/* Settings editable rules */
.rule-edit-row{display:flex;align-items:flex-start;gap:6px;padding:6px 8px;background:var(--bg-0);border:1px solid var(--border);border-radius:6px;margin-bottom:4px;font-size:12px}
.rule-edit-input{flex:1;background:var(--bg-white);border:1px solid var(--border);border-radius:4px;padding:4px 8px;font-size:11.5px;color:var(--tx-1);outline:none;font-family:var(--font);resize:vertical;line-height:1.4}
.rule-edit-input:focus{border-color:var(--gold)}
.example-row{display:flex;align-items:center;gap:8px;padding:5px 8px;background:var(--bg-0);border:1px solid var(--border);border-radius:6px;margin-bottom:4px;font-size:12px}
.example-tag{font-weight:600;color:var(--tx-1);min-width:80px}
.example-desc{color:var(--tx-2);flex:1}
.spelling-row{display:flex;align-items:center;gap:6px;padding:4px 8px;background:var(--bg-0);border:1px solid var(--border);border-radius:6px;margin-bottom:3px;font-size:11px;font-family:var(--mono)}
.spelling-wrong{color:var(--red);text-decoration:line-through}
.spelling-right{color:var(--green);font-weight:500}

/* Bulk accept bar */
.bulk-accept-bar{display:flex;align-items:center;gap:6px;padding:4px 8px;margin-top:4px}
.bulk-accept-btn{font-size:10px;padding:2px 8px;height:22px}

// Load persisted rules or use defaults
function loadRules(){
  const rules={tagDesc:JSON.parse(JSON.stringify(DEFAULT_RULES.tagDesc)),
    consistency:JSON.parse(JSON.stringify(DEFAULT_RULES.consistency)),
    segOrder:[...DEFAULT_RULES.segOrder],typeMap:{...DEFAULT_RULES.typeMap},
    sectionOrder:[...DEFAULT_RULES.sectionOrder],relDefaults:JSON.parse(JSON.stringify(DEFAULT_RULES.relDefaults)),
    sectionFromPath:sectionFromPath};
  try{
    const saved=localStorage.getItem('jw_rules');
    if(saved){
      const p=JSON.parse(saved);
      if(p.tagDesc)rules.tagDesc=p.tagDesc;
      if(!rules.tagDesc.spelling)rules.tagDesc.spelling=DEFAULT_RULES.tagDesc.spelling;
      if(p.consistency)rules.consistency=p.consistency;
      if(p.segOrder)rules.segOrder=p.segOrder;
      if(p.typeMap)rules.typeMap=p.typeMap;
      if(p.sectionOrder)rules.sectionOrder=p.sectionOrder;
      if(p.relDefaults)rules.relDefaults=p.relDefaults;
    }
  }catch(e){console.warn('Rules load error',e)}
  // Always ensure function is set
  rules.sectionFromPath=sectionFromPath;
  return rules;
}
function saveRulesLocal(){
  const toSave={tagDesc:RULES.tagDesc,consistency:RULES.consistency,segOrder:RULES.segOrder,typeMap:RULES.typeMap,sectionOrder:RULES.sectionOrder,relDefaults:RULES.relDefaults};
  localStorage.setItem('jw_rules',JSON.stringify(toSave));
}
function saveRules(){
  saveRulesLocal();
  syncSharedDataToSheet();
}

// ── Helpers ───────────────────────────────────────────────
const $=s=>document.querySelector(s),$$=s=>document.querySelectorAll(s);
function esc(s){const d=document.createElement('div');d.textContent=s;return d.innerHTML.replace(/"/g,'&quot;')}
function cl(n){let s='',c=n;while(c>=0){s=String.fromCharCode(c%26+65)+s;c=Math.floor(c/26)-1}return s}
function toast(m,t=''){const tid=++S.tid;S.toasts.push({id:tid,m,t});render();setTimeout(()=>{S.toasts=S.toasts.filter(x=>x.id!==tid);render()},3500)}
function rmd(t){return t.replace(/```action[\s\S]*?```/g,'').replace(/```([\s\S]*?)```/g,'<pre>$1</pre>').replace(/`([^`]+)`/g,'<code>$1</code>').replace(/\*\*([^*]+)\*\*/g,'<strong>$1</strong>').replace(/\n/g,'<br>')}
function saveBM(){localStorage.setItem('jw_bm',JSON.stringify(S.idxBookmarks));syncSharedDataToSheet()}
function saveNotes(){localStorage.setItem('jw_notes',JSON.stringify(S.idxNotes));syncSharedDataToSheet()}
function saveRQ(){localStorage.setItem('jw_rq',JSON.stringify(S.reviewQueue))}

function pushUndo(type,data,label){
  S.undoStack.push({type,data,label,timestamp:Date.now()});
  if(S.undoStack.length>50)S.undoStack.shift();
}

function doUndo(){
  if(!S.undoStack.length){toast('Nothing to undo');return}
  const action=S.undoStack.pop();
  switch(action.type){
    case 'move': {
      (action.data.entries||[]).forEach(e=>{
        if(action.data.originalSections[e]){
          S.sectionOverrides[e]=action.data.originalSections[e];
        }else{
          delete S.sectionOverrides[e];
        }
      });
      syncSharedDataToSheet();
      buildIndex();
      logActivity(`Undid move: ${action.label}`);
      toast(`Undid: ${action.label}`,'success');
      render();
      (async()=>{
        const existingTabs=(S.sheetMeta?.tabs||[]).map(t=>t.title);
        const affectedSections=new Set([action.data.target]);
        Object.values(action.data.originalSections).forEach(s=>{if(s)affectedSections.add(s)});
        for(const sec of affectedSections){
          const tabName='Index - '+sec;
          if(existingTabs.includes(tabName)){
            toast(`Regenerating ${tabName}…`);
            _tabMapCache={};
            await generateIndexTab(sec);
          }
        }
      })();
      break;
    }
    case 'accept': {
      const k=action.data.key;
      const rv=getRV(k)||{};
      rv.status='pending';rv.suggestion=action.data.suggestion;rv.reviewed=false;
      setRV(k,rv);
      if(action.data.rowIdx!=null&&action.data.entryName&&action.data.oldDesc!=null){
        updateTagDesc(action.data.rowIdx,action.data.entryName,action.data.oldDesc).catch(()=>{});
      }
      logActivity(`Undid accept: ${action.label}`);
      toast(`Undid: ${action.label}`,'success');
      buildIndex();render();
      break;
    }
    case 'deny': {
      const k=action.data.key;
      const rv=getRV(k)||{};
      rv.status='pending';rv.suggestion=action.data.suggestion;
      setRV(k,rv);
      logActivity(`Undid deny: ${action.label}`);
      toast(`Undid: ${action.label}`,'success');
      render();
      break;
    }
    case 'edit': {
      if(action.data.rowIdx!=null&&action.data.entryName&&action.data.oldDesc!=null){
        updateTagDesc(action.data.rowIdx,action.data.entryName,action.data.oldDesc).catch(()=>{});
        const k=action.data.key;
        if(k){const rv=getRV(k)||{};rv.reviewed=false;rv.status='';setRV(k,rv)}
      }
      logActivity(`Undid edit: ${action.label}`);
      toast(`Undid: ${action.label}`,'success');
      buildIndex();render();
      break;
    }
    case 'bulk_accept': {
      (action.data.items||[]).forEach(item=>{
        const rv=getRV(item.key)||{};
        rv.status='pending';rv.suggestion=item.suggestion;rv.reviewed=false;
        setRV(item.key,rv);
        if(item.rowIdx!=null&&item.entryName&&item.oldDesc!=null){
          updateTagDesc(item.rowIdx,item.entryName,item.oldDesc).catch(()=>{});
        }
      });
      logActivity(`Undid bulk accept: ${action.label}`);
      toast(`Undid: ${action.label}`,'success');
      buildIndex();render();
      break;
    }
    default:
      toast('Cannot undo this action');
  }
}

function logActivity(action){

function syncSharedDataToSheet(){
  if(!S.connected)return;
  if(_syncDebounce)clearTimeout(_syncDebounce);
  _syncDebounce=setTimeout(()=>doSyncToSheet(),2000);
}

// Actually write shared data to the _ReviewData tab
async function doSyncToSheet(){
  if(!S.connected||_syncPending||!checkToken())return;
  _syncPending=true;
  try{
    await ensureSharedTab();
    const data={
      reviewData:S.reviewData,
      bookmarks:S.idxBookmarks,
      notes:S.idxNotes,
      sectionOverrides:S.sectionOverrides,
      activityLog:S.activityLog,
      rules:{tagDesc:RULES.tagDesc,consistency:RULES.consistency,segOrder:RULES.segOrder,typeMap:RULES.typeMap,sectionOrder:RULES.sectionOrder,relDefaults:RULES.relDefaults},
      lastUpdated:Date.now(),
      updatedBy:S.user?.name||'unknown'
    };
    const json=JSON.stringify(data);
    // Split into chunks of 40000 chars to stay under cell limit
    const CHUNK=40000;
    const chunks=[];
    for(let i=0;i<json.length;i+=CHUNK)chunks.push(json.slice(i,i+CHUNK));
    // Write chunks to A2, A3, A4... First cell has chunk count prefix
    const rows=chunks.map((c,i)=>[i===0?'CHUNKS:'+chunks.length+'|'+c:c]);
    // Clear old data first (up to 50 rows to be safe)
    await gapi.client.sheets.spreadsheets.values.clear({
      spreadsheetId:S.sheetId,
      range:`'${SHARED_TAB}'!A2:A50`
    });
    await gapi.client.sheets.spreadsheets.values.update({
      spreadsheetId:S.sheetId,
      range:`'${SHARED_TAB}'!A2:A${2+rows.length-1}`,
      valueInputOption:'RAW',
      resource:{values:rows}
    });
    _lastSyncTime=Date.now();
    console.log(`Synced shared data: ${json.length} chars in ${chunks.length} chunk(s)`);
  }catch(e){console.warn('Sync to sheet failed:',e)}
  _syncPending=false;
}

// Read shared data from the _ReviewData tab
async function loadSharedDataFromSheet(){
  if(!S.connected)return;
  try{
    const r=await gapi.client.sheets.spreadsheets.values.get({
      spreadsheetId:S.sheetId,
      range:`'${SHARED_TAB}'!A2:A50`
    });
    const rows=r.result.values||[];
    if(!rows.length)return;
    
    // Reassemble chunked JSON
    let json='';
    const first=(rows[0]&&rows[0][0])||'';
    if(first.startsWith('CHUNKS:')){
      // New chunked format
      const pipeIdx=first.indexOf('|');
      const numChunks=parseInt(first.slice(7,pipeIdx),10);
      json=first.slice(pipeIdx+1); // First chunk after prefix
      for(let i=1;i<numChunks&&i<rows.length;i++){
        json+=(rows[i]&&rows[i][0])||'';
      }
    }else{
      // Legacy single-cell format (backward compatible)
      json=first;
    }
    
    if(!json)return;
    const data=JSON.parse(json);
    if(data.reviewData)S.reviewData=data.reviewData;
    if(data.bookmarks)S.idxBookmarks=data.bookmarks;
    if(data.notes)S.idxNotes=data.notes;
    if(data.sectionOverrides)S.sectionOverrides=data.sectionOverrides;
    if(data.activityLog)S.activityLog=data.activityLog;
    if(data.rules&&data.rules.tagDesc){
      RULES.tagDesc=data.rules.tagDesc;
      if(data.rules.consistency)RULES.consistency=data.rules.consistency;
      if(data.rules.segOrder)RULES.segOrder=data.rules.segOrder;
      if(data.rules.typeMap)RULES.typeMap=data.rules.typeMap;
      if(data.rules.sectionOrder)RULES.sectionOrder=data.rules.sectionOrder;
      if(data.rules.relDefaults)RULES.relDefaults=data.rules.relDefaults;
      RULES.sectionFromPath=sectionFromPath;
      saveRulesLocal();
    }
    localStorage.setItem('jw_rv',JSON.stringify(S.reviewData));
    localStorage.setItem('jw_bm',JSON.stringify(S.idxBookmarks));
    localStorage.setItem('jw_notes',JSON.stringify(S.idxNotes));
    _lastSyncTime=Date.now();
    console.log(`Loaded shared data: ${json.length} chars, updated by:`,data.updatedBy);
  }catch(e){
    console.log('No shared data tab yet, using localStorage');
  }
}

// Update a tag description in both the main keywords column AND the matching search.keywords_relevancy_N column
async function updateTagDesc(rowIdx,entryName,newDesc){
  const kwCol=S.headers.findIndex(h=>h.toLowerCase()==='keywords');
  if(kwCol<0||!S.rows[rowIdx])return false;
  try{
    // 0. Capture original description before first change
    let kw=JSON.parse(S.rows[rowIdx][kwCol]);
    const tag=kw.find(t=>t.name===entryName);
    if(!tag)return false;
    const oldDesc=tag.description||'';
    
    // Save original in ALL review data entries for this tag on this row
    // We need segType but don't have it here — save under a generic key too
    // Find the segType from the result
    const clipType=(S.rows[rowIdx][S.headers.findIndex(h=>h.toLowerCase()==='type')]||'').trim();
    const segType=RULES.typeMap[clipType]||'Addresses';
    const k=rvKey(entryName,segType,rowIdx);
    const rv=getRV(k)||{};
    if(!rv.originalDesc&&oldDesc){
      rv.originalDesc=oldDesc;
      setRV(k,rv);
      // Also sync original to Index tab column C
      const entry=findEntry(entryName);
      const r=entry?.results.find(x=>x.rowIdx===rowIdx);
      if(r)syncOriginalToIndexTab(entryName,r,oldDesc).catch(()=>{});
    }
    
    // 1. Update in main keywords column
    tag.description=newDesc;
    await saveCell(rowIdx,kwCol,JSON.stringify(kw));
    
    // 2. Find and update in the matching relevancy column
    const rel=tag.relevancy;
    const relNum=parseInt(rel,10);
    if(relNum>=1&&relNum<=4){
      const relColName='search.keywords_relevancy_'+relNum;
      let relCol=S.headers.findIndex(h=>h===relColName);
      if(relCol<0)relCol=S.headers.findIndex(h=>h.toLowerCase()===relColName.toLowerCase());
      if(relCol>=0){
        const cellVal=S.rows[rowIdx][relCol]||'';
        if(cellVal){
          try{
            let relKw=JSON.parse(cellVal);
            const relTag=relKw.find(t=>t.name===entryName);
            if(relTag){
              relTag.description=newDesc;
              const newJson=JSON.stringify(relKw);
              const nm=S.sheetMeta.tabs[S.activeTab].title;
              await gapi.client.sheets.spreadsheets.values.update({
                spreadsheetId:S.sheetId,
                range:`'${nm}'!${cl(relCol)}${rowIdx+2}`,
                valueInputOption:'RAW',
                resource:{values:[[newJson]]}
              });
              S.rows[rowIdx][relCol]=newJson;
            }
          }catch(e2){console.warn('Relevancy col update failed:',e2)}
        }
      }
    }
    return true;
  }catch(e){toast('Save error','error');console.error('updateTagDesc error:',e);return false}
}

// Sync original description to Index tab column C
async function syncOriginalToIndexTab(entryName,result,originalDesc){
  const section=sectionForEntry(entryName);
  if(!section)return;
  const tabName=indexTabForSection(section);
  const map=await getTabMap(tabName);
  if(!map)return;
  const clipLink=clipLinkForResult(result);
  if(!clipLink)return;
  const mapKey=entryName+'|'+clipLink;
  const info=map[mapKey];
  if(!info)return;
  try{
    await gapi.client.sheets.spreadsheets.values.update({
      spreadsheetId:S.sheetId,
      range:`'${tabName}'!C${info.sheetRow}`,
      valueInputOption:'RAW',
      resource:{values:[[originalDesc||'']]}
    });
  }catch(e){console.warn('syncOriginalToIndexTab error:',e)}
}

// Revert a description back to its original
async function revertToOriginal(entryName,segType,rowIdx){
  const k=rvKey(entryName,segType,rowIdx);
  const rv=getRV(k);
  if(!rv||!rv.originalDesc){toast('No original to revert to','error');return}
  const origDesc=rv.originalDesc; // Save before clearing
  await updateTagDesc(rowIdx,entryName,origDesc);
  // Clear the original since we're back to it
  rv.originalDesc='';rv.status='';rv.suggestion='';rv.reviewed=false;
  setRV(k,rv);
  // Sync to Index tab — use saved origDesc, not the cleared rv.originalDesc
  const entry=findEntry(entryName);
  const r=entry?.results.find(x=>x.segType===segType&&x.rowIdx===rowIdx);
  if(r){
    syncDescToIndexTab(entryName,r,origDesc).catch(()=>{});
    syncToIndexTab(entryName,r,'','').catch(()=>{});
  }
  logActivity(`Reverted: "${entryName}" → "${origDesc}"`);
  buildIndex();render();
  toast('Reverted to original','success');
}

// Review data key: entryName|segType|rowIdx
function rvKey(entryName,segType,rowIdx){return entryName+'|'+segType+'|'+rowIdx}
function getRV(key){return S.reviewData[key]||null}
function setRV(key,data){S.reviewData[key]=data;saveRV()}
function delRV(key){delete S.reviewData[key];saveRV()}

// Check if a description-level item is reviewed
function isDescReviewed(entryName,segType,rowIdx){
  const k=rvKey(entryName,segType,rowIdx);
  const rv=getRV(k);
  return rv?rv.reviewed===true:false;
}

// Check if AI audited and found OK (but not manually reviewed)
function isDescAiOk(entryName,segType,rowIdx){
  const k=rvKey(entryName,segType,rowIdx);
  const rv=getRV(k);
  return rv&&rv.status==='ok'&&!rv.reviewed;
}

// Check if ALL descriptions under an entry are reviewed (manually)
function isEntryReviewed(entry){
  if(!entry||!entry.results||!entry.results.length)return false;
  return entry.results.every(r=>isDescReviewed(entry.name,r.segType,r.rowIdx));
}

// Check if ALL descriptions under an entry are at least AI OK
function isEntryAiOk(entry){
  if(!entry||!entry.results||!entry.results.length)return false;
  return entry.results.every(r=>{
    const k=rvKey(entry.name,r.segType,r.rowIdx);
    const rv=getRV(k);
    return rv&&(rv.reviewed||rv.status==='ok');
  })&&!isEntryReviewed(entry);
}

// Check if ALL entries in a section are reviewed
function isSectionReviewed(sectionName){
  if(!S.indexData)return false;
  const entries=S.indexData.sections[sectionName]||[];
  if(!entries.length)return false;
  return entries.every(e=>isEntryReviewed(e));
}

// Count reviewed descriptions for a section
function sectionReviewProgress(sectionName){
  if(!S.indexData)return{reviewed:0,total:0};
  const entries=S.indexData.sections[sectionName]||[];
  let reviewed=0,total=0;
  entries.forEach(e=>{e.results.forEach(r=>{total++;if(isDescReviewed(e.name,r.segType,r.rowIdx))reviewed++})});
  return{reviewed,total};
}

// Toggle reviewed status for a description
function toggleDescReviewed(entryName,segType,rowIdx){
  const k=rvKey(entryName,segType,rowIdx);
  const rv=getRV(k)||{};
  rv.reviewed=!rv.reviewed;
  setRV(k,rv);
}

// Has pending suggestion
function hasPendingSuggestion(entryName,segType,rowIdx){
  const k=rvKey(entryName,segType,rowIdx);
  const rv=getRV(k);
  return rv&&rv.suggestion&&rv.status==='pending';
}

// Accept suggestion: update main sheet + Index tab, mark reviewed
async function acceptSuggestion(entryName,segType,rowIdx){
  const k=rvKey(entryName,segType,rowIdx);
  const rv=getRV(k);
  if(!rv||!rv.suggestion)return;
  // Get old desc for undo
  const entry=findEntry(entryName);
  const r=entry?.results.find(x=>x.segType===segType&&x.rowIdx===rowIdx);
  const oldDesc=r?.desc||'';
  pushUndo('accept',{key:k,suggestion:rv.suggestion,oldDesc,rowIdx,entryName},`"${entryName}": "${oldDesc}" → "${rv.suggestion}"`);
  const ok=await updateTagDesc(rowIdx,entryName,rv.suggestion);
  if(!ok)return;
  rv.status='accepted';rv.reviewed=true;setRV(k,rv);
  if(r){
    syncToIndexTab(entryName,r,'accepted','').catch(()=>{});
    syncDescToIndexTab(entryName,r,rv.suggestion).catch(()=>{});
  }
  logActivity(`Accepted: "${entryName}" → "${rv.suggestion}"`);
  buildIndex();render();
}

function denySuggestion(entryName,segType,rowIdx){
  const k=rvKey(entryName,segType,rowIdx);
  const rv=getRV(k);
  if(!rv)return;
  pushUndo('deny',{key:k,suggestion:rv.suggestion},`Denied suggestion for "${entryName}"`);
  if(!rv.deniedHistory)rv.deniedHistory=[];
  rv.deniedHistory.push({suggestion:rv.suggestion,reason:rv.reason,time:Date.now()});
  rv.suggestion='';rv.reason='';rv.status='denied';
  setRV(k,rv);
  const entry=findEntry(entryName);
  const r=entry?.results.find(x=>x.segType===segType&&x.rowIdx===rowIdx);
  if(r)syncToIndexTab(entryName,r,'denied','').catch(()=>{});
  logActivity(`Denied suggestion for "${entryName}"`);
  render();
}

async function applyCustomDesc(entryName,segType,rowIdx,customText){
  const k=rvKey(entryName,segType,rowIdx);
  const entry=findEntry(entryName);
  const r=entry?.results.find(x=>x.segType===segType&&x.rowIdx===rowIdx);
  const oldDesc=r?.desc||'';
  pushUndo('edit',{key:k,oldDesc,rowIdx,entryName},`"${entryName}": "${oldDesc}" → "${customText}"`);
  const ok=await updateTagDesc(rowIdx,entryName,customText);
  if(!ok)return;
  const rv=getRV(k)||{};
  rv.status='custom';rv.reviewed=true;rv.customApplied=customText;setRV(k,rv);
  if(r){
    syncToIndexTab(entryName,r,'custom','').catch(()=>{});
    syncDescToIndexTab(entryName,r,customText).catch(()=>{});
  }
  logActivity(`Custom edit: "${entryName}" → "${customText}"`);
  buildIndex();render();
}

async function bulkAcceptEntry(entryName){
  if(!S.indexData)return;
  const entry=findEntry(entryName);
  if(!entry)return;
  // Collect undo data for all pending items
  const undoItems=[];
  for(const r of entry.results){
    const k=rvKey(entryName,r.segType,r.rowIdx);
    const rv=getRV(k);
    if(rv&&rv.suggestion&&rv.status==='pending'){
      undoItems.push({key:k,suggestion:rv.suggestion,oldDesc:r.desc||'',rowIdx:r.rowIdx,entryName});
    }
  }
  if(undoItems.length)pushUndo('bulk_accept',{items:undoItems},`Bulk accept ${undoItems.length} for "${entryName}"`);
  let count=0;
  for(const r of entry.results){
    const k=rvKey(entryName,r.segType,r.rowIdx);
    const rv=getRV(k);
    if(rv&&rv.suggestion&&rv.status==='pending'){
      // Accept without pushing individual undos (bulk undo handles it)
      const ok=await updateTagDesc(r.rowIdx,entryName,rv.suggestion);
      if(ok){rv.status='accepted';rv.reviewed=true;setRV(k,rv);count++}
    }
  }
  if(count){
    logActivity(`Bulk accepted ${count} for "${entryName}"`);
    toast(`Accepted ${count} suggestions for "${entryName}"`,'success');
    buildIndex();render();
  }
}

// Migrate old reviewQueue items to new inline system
function migrateOldQueue(){
  if(S.reviewQueue.length>0){
    S.reviewQueue.forEach(item=>{
      const k=rvKey(item.entryName,item.section||'',item.rowIdx);
      if(!getRV(k)){
        setRV(k,{suggestion:item.suggestion||'',reason:item.reason||'',status:'pending',reviewed:false,deniedHistory:[]});
      }
    });
    S.reviewQueue=[];saveRQ();
  }
}

// ── Build Index from Sheet Data ───────────────────────────
function buildIndex(){
  if(!S.headers.length||!S.rows.length){S.indexData=null;return}
  const kwCol=S.headers.findIndex(h=>h.toLowerCase()==='keywords');
  const nameCol=S.headers.findIndex(h=>h.toLowerCase()==='name');
  const typeCol=S.headers.findIndex(h=>h.toLowerCase()==='type');
  const idCol=S.headers.findIndex(h=>h.toLowerCase()==='id');
  const objIdCol=S.headers.findIndex(h=>h.toLowerCase()==='objectid');
  const transcriptCol=S.headers.findIndex(h=>h.toLowerCase()==='transcript');
  const summaryCol=S.headers.findIndex(h=>h.toLowerCase()==='summary');
  const progCol=S.headers.findIndex(h=>h.toLowerCase()==='program_number');
  const pvNameCol=S.headers.findIndex(h=>h.toLowerCase()==='produced_video_name');
  const pvTypeCol=S.headers.findIndex(h=>h.toLowerCase()==='produced_video_type');

  if(kwCol===-1){toast('Cannot find "keywords" column','error');return}

  const entries={}; // key: tagName → {name, path, section, results:[{desc, rel, relevancy, clipName, clipId, segType, transcript, progNum, ...}]}

  S.rows.forEach((row,ri)=>{
    const kwRaw=(row[kwCol]||'').trim();
    if(!kwRaw||kwRaw==='[]')return;
    let tags;
    try{tags=JSON.parse(kwRaw)}catch{return}

    const clipType=(row[typeCol]||'').trim();
    const segType=RULES.typeMap[clipType]||'Addresses';
    const clipName=(row[nameCol]||'').trim();
    const clipId=row[idCol]||'';
    const objId=(row[objIdCol]||'').trim();
    const transcript=(row[transcriptCol]||'').trim();
    const summary=(row[summaryCol]||'').trim();
    const progNum=(row[progCol]||'').trim();
    const pvName=(row[pvNameCol]||'').trim();
    const pvType=(row[pvTypeCol]||'').trim();

    tags.forEach(tag=>{
      const name=(tag.name||'').trim();
      const path=tag.path||'';
      const desc=(tag.description||'').trim();
      const rel=tag.relationship||'';
      const relevancy=tag.relevancy||0;
      if(!name)return;

      if(!entries[name]){
        entries[name]={name,path,section:RULES.sectionFromPath(path),results:[],seealso:[],bestbet:null};
      }
      entries[name].results.push({
        desc,rel,relevancy,clipName,clipId,objId,segType,transcript:transcript||summary||'',
        progNum,pvName,pvType,rowIdx:ri,clipType
      });
    });
  });

  // Group by section and sort — apply sectionOverrides
  const sections={};
  RULES.sectionOrder.forEach(sec=>{sections[sec]=[]});
  Object.values(entries).forEach(e=>{
    // Check if this entry has been moved to a different section
    const overrideSec=S.sectionOverrides[e.name];
    const sec=overrideSec||e.section;
    if(!sections[sec])sections[sec]=[];
    e.section=sec; // Update the entry's section so everything downstream uses it
    e.results.sort((a,b)=>{
      const oa=RULES.segOrder.indexOf(a.segType),ob=RULES.segOrder.indexOf(b.segType);
      if(oa!==ob)return oa-ob;
      return(a.desc||'').localeCompare(b.desc||'');
    });
    sections[sec].push(e);
  });
  // Sort entries within each section alphabetically
  Object.keys(sections).forEach(sec=>{sections[sec].sort((a,b)=>a.name.localeCompare(b.name))});

  S.indexData={sections,totalEntries:Object.keys(entries).length,totalResults:Object.values(entries).reduce((s,e)=>s+e.results.length,0)};
}

// ── Google Sheets API ─────────────────────────────────────
let gapiOk=false;
function initG(){return new Promise((r,j)=>{if(gapiOk)return r();gapi.load('client',async()=>{try{await gapi.client.init({discoveryDocs:[DISC]});gapiOk=true;r()}catch(e){j(e)}})})}
async function doConnect(cid,sid,ck){
  S.clientId=cid;S.sheetId=sid;S.claudeKey=ck||'';
  localStorage.setItem('jw_cid',cid);localStorage.setItem('jw_sid',sid);if(ck)localStorage.setItem('jw_ckey',ck);
  await initG();
  return new Promise((r,j)=>{
    S._tokenClient=google.accounts.oauth2.initTokenClient({
      client_id:cid,
      scope:SCOPES,
      callback:async resp=>{
        if(resp.error){j(new Error(resp.error_description||resp.error));return}
        S._tokenTime=Date.now();
        try{const u=await(await fetch('https://www.googleapis.com/oauth2/v3/userinfo',{headers:{Authorization:'Bearer '+resp.access_token}})).json();S.user={name:u.name||u.email||'User',email:u.email||'',pic:u.picture||''}}catch{S.user={name:'User',email:'',pic:''}}
        try{const m=await gapi.client.sheets.spreadsheets.get({spreadsheetId:sid});S.sheetMeta={title:m.result.properties.title,tabs:m.result.sheets.map(s=>({title:s.properties.title,sid:s.properties.sheetId}))}}catch(e){console.error(e)}
        S.connected=true;
        // Schedule token refresh every 50 minutes
        scheduleTokenRefresh();
        r();
      }
    });
    S._tokenClient.requestAccessToken();
  });
}

// Auto-refresh token before it expires (tokens last ~60 min, refresh at 50)
let _tokenRefreshTimer=null;
function scheduleTokenRefresh(){
  if(_tokenRefreshTimer)clearTimeout(_tokenRefreshTimer);
  _tokenRefreshTimer=setTimeout(()=>{
    console.log('Refreshing OAuth token…');
    if(S._tokenClient){
      try{
        S._tokenClient.requestAccessToken({prompt:''});
        // The callback in doConnect will fire again, updating _tokenTime and rescheduling
      }catch(e){
        console.error('Token refresh failed:',e);
        S.connected=false;
        toast('Session expired — click to reconnect','error');
        render();
      }
    }
  },50*60*1000); // 50 minutes
}

// Check if token might be expired before any API call
function checkToken(){
  if(!S._tokenTime)return true;
  const age=(Date.now()-S._tokenTime)/1000/60; // minutes
  if(age>58){
    // Token likely expired
    toast('Session expired — reconnecting…','error');
    if(S._tokenClient){
      try{S._tokenClient.requestAccessToken({prompt:''})}catch(e){
        S.connected=false;render();
      }
    }
    return false;
  }
  return true;
}
async function loadTab(idx){
  if(!S.sheetMeta?.tabs?.[idx])return;S.loading=true;render();
  try{const r=await gapi.client.sheets.spreadsheets.values.get({spreadsheetId:S.sheetId,range:`'${S.sheetMeta.tabs[idx].title}'`});const v=r.result.values||[];S.headers=v.length?v[0]:[];S.rows=v.length>1?v.slice(1).map(r=>{while(r.length<S.headers.length)r.push('');return r}):[];S.visibleCols=new Set(S.headers.map((_,i)=>i));S.selected=new Set();S.sortCol=null;S.search='';S.editCell=null;S.activeTab=idx;buildIndex()}catch(e){toast('Load failed: '+e.message,'error')}
  S.loading=false;render();
}
async function saveCell(ri,ci,val){if(!checkToken())return;const nm=S.sheetMeta.tabs[S.activeTab].title;try{await gapi.client.sheets.spreadsheets.values.update({spreadsheetId:S.sheetId,range:`'${nm}'!${cl(ci)}${ri+2}`,valueInputOption:'USER_ENTERED',resource:{values:[[val]]}});S.rows[ri][ci]=val;toast('Saved','success')}catch(e){console.error('saveCell error:',e);toast('Save failed: '+(e?.result?.error?.message||e?.message||JSON.stringify(e)),'error')}}
async function saveCells(changes){const nm=S.sheetMeta.tabs[S.activeTab].title;try{await gapi.client.sheets.spreadsheets.values.batchUpdate({spreadsheetId:S.sheetId,resource:{valueInputOption:'USER_ENTERED',data:changes.map(c=>({range:`'${nm}'!${cl(c.col)}${c.row+2}`,values:[[c.value]]}))}});changes.forEach(c=>{if(S.rows[c.row])S.rows[c.row][c.col]=c.value});toast(`Updated ${changes.length} cells`,'success')}catch(e){toast('Batch save failed','error')}}
async function delRows(idxs){const nm=S.sheetMeta.tabs[S.activeTab].title;const sorted=[...idxs].sort((a,b)=>b-a);try{const sid=S.sheetMeta.tabs[S.activeTab].sid;await gapi.client.sheets.spreadsheets.batchUpdate({spreadsheetId:S.sheetId,resource:{requests:sorted.map(i=>({deleteDimension:{range:{sheetId:sid,dimension:'ROWS',startIndex:i+1,endIndex:i+2}}}))}});S.rows=S.rows.filter((_,i)=>!idxs.has(i));S.selected=new Set();toast(`Deleted ${sorted.length} rows`,'success');buildIndex()}catch(e){toast('Delete failed','error')}render()}
function logout(){try{google.accounts.oauth2.revoke(gapi.client.getToken()?.access_token)}catch{}S.connected=false;S.sheetMeta=null;S.user=null;S.headers=[];S.rows=[];S.indexData=null;S.aiMsgs=[];localStorage.removeItem('jw_cid');localStorage.removeItem('jw_sid');render()}

// ── Bulk delete by type ───────────────────────────────────
async function bulkDeleteByType(type){
  const typeCol=S.headers.findIndex(h=>h.toLowerCase()==='type');
  const pvTypeCol=S.headers.findIndex(h=>h.toLowerCase()==='produced_video_type');
  if(typeCol===-1&&pvTypeCol===-1){toast('Cannot find type column','error');return}
  const matchRows=new Set();
  S.rows.forEach((r,i)=>{
    const t=(r[typeCol]||'').trim().toLowerCase();
    const pv=(r[pvTypeCol]||'').trim().toLowerCase();
    const q=type.toLowerCase();
    if(t.includes(q)||pv.includes(q))matchRows.add(i);
  });
  if(matchRows.size===0){toast('No matching rows found','error');return}
  if(!confirm(`Delete ${matchRows.size} rows matching "${type}"?`))return;
  await delRows(matchRows);
}

// ── Claude AI ─────────────────────────────────────────────
async function aiChat(msg){
  if(!S.claudeKey){toast('No API key','error');return}
  S.aiMsgs.push({role:'user',content:msg});S.aiTyping=true;S.aiInput='';render();scrollAI();
  const tabN=S.sheetMeta?.tabs?.[S.activeTab]?.title||'';
  // Build a lightweight context: schema + index summary, NOT raw rows
  let idxSummary='';
  if(S.indexData){
    idxSummary='\nIndex summary:\n';
    RULES.sectionOrder.forEach(sec=>{
      const entries=S.indexData.sections[sec]||[];
      if(!entries.length)return;
      idxSummary+=`${sec}: ${entries.length} entries (e.g., ${entries.slice(0,5).map(e=>e.name).join(', ')})\n`;
    });
  }
  // If user mentions a specific entry, include that entry's data
  let entryCtx='';
  if(S.indexData){
    const msgLow=msg.toLowerCase();
    for(const sec of Object.values(S.indexData.sections)){
      for(const e of sec){
        if(msgLow.includes(e.name.toLowerCase())){
          entryCtx+=`\nEntry "${e.name}" (${e.section}, ${e.results.length} results):\n`;
          e.results.slice(0,15).forEach(r=>{
            entryCtx+=`  - [${r.segType}] "${r.desc||'[empty]'}" (${r.rel}) clip:${r.clipId} prog:${r.progNum}\n`;
          });
          if(e.results.length>15)entryCtx+=`  ...+${e.results.length-15} more\n`;
          break; // Only include first matching entry to keep context small
        }
      }
      if(entryCtx)break;
    }
  }
  // Slim sample: just 3 rows with truncated columns (skip keywords/transcript)
  const skipCols=new Set(['keywords','transcript','summary','long_description','search.keywords_relevancy_1','search.keywords_relevancy_2','search.keywords_relevancy_3','search.keywords_relevancy_4']);
  const slimHeaders=S.headers.filter(h=>!skipCols.has(h.toLowerCase()));
  const slimIdx=slimHeaders.map(h=>S.headers.indexOf(h));
  const sample=S.rows.slice(0,3).map(r=>slimIdx.map(i=>(r[i]||'').toString().slice(0,60)).join(' | ')).join('\n');
  const ctx=`Tab: "${tabN}"\nColumns: ${S.headers.join(', ')}\nTotal rows: ${S.rows.length}\nSample (3 rows, key cols only):\n${slimHeaders.join(' | ')}\n${sample}${idxSummary}${entryCtx}`;
  const sys=`You are an AI assistant in the JEM Index Workstation managing video index data from JEM.tv about the Lubavitcher Rebbe. The sheet has ${S.rows.length} clips with tags in a "keywords" JSON column. Each tag has name, path, description, relevancy, relationship.\n\n${ctx}\n\nTo make changes use:\n\`\`\`action\n{"type":"update_cells","changes":[{"row":0,"col":2,"value":"new"}]}\n\`\`\`\nor {"type":"delete_rows","indices":[0,1]}. Be concise.`;
  try{const resp=await fetch('https://api.anthropic.com/v1/messages',{method:'POST',headers:{'Content-Type':'application/json','x-api-key':S.claudeKey,'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:2048,system:sys,messages:S.aiMsgs.slice(-12).map(m=>({role:m.role,content:m.content}))})});
    if(!resp.ok){const e=await resp.json().catch(()=>({}));throw new Error(e.error?.message||'API error')}
    const data=await resp.json(),text=data.content.map(c=>c.text||'').join('');S.aiMsgs.push({role:'assistant',content:text});
    const am=text.match(/```action\s*([\s\S]*?)```/);if(am){try{const a=JSON.parse(am[1].trim());if(a.type==='update_cells')await saveCells(a.changes);else if(a.type==='update_cell')await saveCell(a.row,a.col,a.value);else if(a.type==='delete_rows')await delRows(new Set(a.indices));buildIndex()}catch{}}
  }catch(e){S.aiMsgs.push({role:'assistant',content:'Error: '+e.message})}
  S.aiTyping=false;render();scrollAI();
}

// ── Generate Index Tab in Google Sheet ────────────────────
async function generateIndexTab(sectionName){
  if(!S.indexData||!S.indexData.sections[sectionName]){toast('No data for '+sectionName,'error');return}
  const tabName='Index - '+sectionName;
  
  // If tab already exists, delete it first
  const existingTabs=(S.sheetMeta?.tabs||[]).map(t=>t.title);
  if(existingTabs.includes(tabName)){
    try{
      const tabInfo=S.sheetMeta.tabs.find(t=>t.title===tabName);
      if(tabInfo){
        await gapi.client.sheets.spreadsheets.batchUpdate({
          spreadsheetId:S.sheetId,
          resource:{requests:[{deleteSheet:{sheetId:tabInfo.sid}}]}
        });
        // Clear tab map cache for this tab
        delete _tabMapCache[tabName];
      }
    }catch(e){toast(`Failed to delete old "${tabName}": `+(e?.result?.error?.message||e?.message||''),'error');return}
  }
  
  S.loading=true;render();
  toast(`Generating "${tabName}"…`);
  
  try{
    // Step 1: Create the new tab
    await gapi.client.sheets.spreadsheets.batchUpdate({
      spreadsheetId:S.sheetId,
      resource:{requests:[{addSheet:{properties:{title:tabName}}}]}
    });
    
    const entries=S.indexData.sections[sectionName]||[];
    // Column layout: A=Entry, B=Segment, C=Original Desc, D=Description, E=Relationship, F=Reference, G=Chapter, H=Relevancy, I=Review, J=AI Suggestion, K=spacer, L=Clip Link, M=Clip Title, N=Transcript, O=spacer, P=Notes, Q=Bookmarked
    var EC=18; // total columns (added Original Description)
    var headers=['Entry Name','Segment Type','Original Description','Description','Relationship','Reference','Chapter Name For Film','Relevancy','Review Status','AI Suggestion','','Clip Link','Clip Title','Transcript (excerpt)','','Notes','Bookmarked'];
    
    // Step 2: Build rows in indented format
    const dataRows=[headers];
    
    // Safe relationship defaults lookup
    const relDefaults=(RULES.relDefaults&&RULES.relDefaults[sectionName])?RULES.relDefaults[sectionName]:(RULES.relDefaults&&RULES.relDefaults.Topics?RULES.relDefaults.Topics:{});
    
    entries.forEach(function(entry){
      var entryRow=[];for(var z=0;z<EC;z++)entryRow.push('');
      entryRow[0]=entry.name||'';
      dataRows.push(entryRow);
      
      var bySeg={};
      (entry.results||[]).forEach(function(r){
        var st=r.segType||'Other';
        if(!bySeg[st])bySeg[st]=[];
        bySeg[st].push(r);
      });
      
      RULES.segOrder.forEach(function(seg){
        if(!bySeg[seg])return;
        
        var segRow=[];for(var z=0;z<EC;z++)segRow.push('');
        segRow[1]=seg;
        dataRows.push(segRow);
        
        bySeg[seg].sort(function(a,b){return(a.desc||'').localeCompare(b.desc||'')});
        
        bySeg[seg].forEach(function(r){
          var row=[];for(var z=0;z<EC;z++)row.push('');
          // C: Original Description — from reviewData if available
          var rvk=rvKey(entry.name,seg,r.rowIdx);
          var rvd=getRV(rvk);
          row[2]=(rvd&&rvd.originalDesc)?rvd.originalDesc:'';
          // D: Description (current)
          row[3]=r.desc||'';
          // E: Relationship (only if non-default)
          var defRel=relDefaults[seg]||'spoken_about';
          if(r.rel&&r.rel!==defRel){
            if(sectionName==='Nigunim'){if(r.rel==='spoken_about')row[4]=r.rel}
            else row[4]=r.rel;
          }
          // F: Reference — for films show film title, for others show program number
          if(r.clipType==='Film Chapter'){
            row[5]=r.pvName||''; // Film title
          }else if(r.clipType==='Film'){
            row[5]=r.clipName||''; // Film name
          }else{
            row[5]=r.progNum?('#'+r.progNum):'';
          }
          // G: Chapter Name For Film (only for Film Chapters)
          if(r.clipType==='Film Chapter'){
            row[6]=r.clipName||''; // Chapter title
          }
          // H: Relevancy
          row[7]=(r.relevancy||'').toString();
          // I: Review Status — fill from existing reviewData if available
          if(rvd){
            var statusLabels={pending:'⏳ Pending',accepted:'✅ Accepted',denied:'❌ Denied',custom:'✏️ Custom',ok:'✓ OK'};
            row[8]=statusLabels[rvd.status]||(rvd.reviewed?'✓ Reviewed':'');
            // J: AI Suggestion
            row[9]=rvd.suggestion||'';
          }else{
            row[8]='';
            row[9]='';
          }
          // K: spacer (row[10])
          // L: Clip link
          var cid=r.clipId||(r.objId?(r.objId.replace('video_clip-','')):'');
          row[11]=cid?('https://videos.jem.tv/video-player?clip='+cid):'';
          // M: Clip title
          row[12]=r.clipName||'';
          // N: Transcript excerpt
          row[13]=(r.transcript||'').substring(0,500);
          dataRows.push(row);
        });
      });
    });
    
    console.log('Total rows to write:',dataRows.length);
    toast(`Built ${dataRows.length} rows, writing to sheet…`);
    
    // Step 3: Write in small batches using append
    var batchSize=100;
    for(var i=0;i<dataRows.length;i+=batchSize){
      var chunk=dataRows.slice(i,i+batchSize);
      try{
        await gapi.client.sheets.spreadsheets.values.append({
          spreadsheetId:S.sheetId,
          range:tabName+'!A1',
          valueInputOption:'RAW',
          insertDataOption:'INSERT_ROWS',
          resource:{values:chunk}
        });
        console.log('Wrote rows '+i+' to '+(i+chunk.length));
      }catch(writeErr){
        console.error('Batch write error at row '+i+':',writeErr);
        toast('Write error at row '+i+', retrying one by one…','error');
        // Fallback: write one row at a time
        for(var j=0;j<chunk.length;j++){
          try{
            await gapi.client.sheets.spreadsheets.values.append({
              spreadsheetId:S.sheetId,
              range:tabName+'!A1',
              valueInputOption:'RAW',
              insertDataOption:'INSERT_ROWS',
              resource:{values:[chunk[j]]}
            });
          }catch(singleErr){console.error('Row '+(i+j)+' failed:',singleErr)}
        }
      }
      // Progress toast every 500 rows
      if(i%500<batchSize)toast('Writing… '+Math.min(i+batchSize,dataRows.length)+'/'+dataRows.length+' rows');
      await new Promise(function(r){setTimeout(r,250)});
    }
    
    // Refresh sheet metadata
    var meta=await gapi.client.sheets.spreadsheets.get({spreadsheetId:S.sheetId});
    S.sheetMeta={title:meta.result.properties.title,tabs:meta.result.sheets.map(function(s){return{title:s.properties.title,sid:s.properties.sheetId}})};
    invalidateTabMapCache(tabName);
    
    // Auto-hide Original Description (col C, index 2) and Review columns (I-J, index 8-9)
    try{
      var newSheet=meta.result.sheets.find(function(s){return s.properties.title===tabName});
      if(newSheet){
        var newSid=newSheet.properties.sheetId;
        await gapi.client.sheets.spreadsheets.batchUpdate({
          spreadsheetId:S.sheetId,
          resource:{requests:[
            {updateDimensionProperties:{range:{sheetId:newSid,dimension:'COLUMNS',startIndex:2,endIndex:3},properties:{hiddenByUser:true},fields:'hiddenByUser'}},
            {updateDimensionProperties:{range:{sheetId:newSid,dimension:'COLUMNS',startIndex:8,endIndex:10},properties:{hiddenByUser:true},fields:'hiddenByUser'}}
          ]}
        });
      }
    }catch(hideErr){console.warn('Auto-hide columns error:',hideErr)}
    
    toast('"'+tabName+'" created with '+(dataRows.length-1)+' rows!','success');
  }catch(e){
    toast('Failed: '+e.message,'error');
    console.error('generateIndexTab error:',e);
  }
  S.loading=false;render();
}
