SPELLING FIXES: ${spellingFixes}

GOOD EXAMPLES:
  ${goodEx}

BAD EXAMPLES:
  ${badEx}

TIGHTENING EXAMPLES:
  ${tightenEx}

The description reads as "[Entry name]: [description]" like a subtitle.

JSON array only. Each: {idx, status:"ok"|"fix"|"generate", suggestion:"...", reason:"..."}

${batch.map((e,j)=>`[${j}] Entry:"${e.entryName}" Sec:${e.section} Rel:${e.rel}\n  Desc:"${e.desc||'[empty]'}"\n  Transcript:"${(e.transcript||'').slice(0,150)}"`).join('\n\n')}`;
      const resp=await fetch('https://api.anthropic.com/v1/messages',{method:'POST',headers:{'Content-Type':'application/json','x-api-key':S.claudeKey,'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:4096,system:'Strict editor for JEM Video Index. JSON array only.',messages:[{role:'user',content:prompt}]})});
      if(!resp.ok)throw new Error('API '+resp.status);
      const d=await resp.json(),txt=d.content.map(c=>c.text||'').join('');
      let parsed;try{parsed=JSON.parse(txt.replace(/```json?\s*/g,'').replace(/```/g,'').trim())}catch{const m2=txt.match(/\[[\s\S]*\]/);if(m2)parsed=JSON.parse(m2[0]);else throw new Error('Parse fail')}
      let fx=0;
      parsed.forEach(p=>{
        const e=batch[p.idx!=null?p.idx:p.index];
        if(!e)return;
        const k=rvKey(e.entryName,e.segType,e.rowIdx);
        if(p.status==='fix'||p.status==='generate'){
          const existing=getRV(k);
          setRV(k,{suggestion:p.suggestion||'',reason:p.reason||'',status:'pending',reviewed:false,deniedHistory:(existing?.deniedHistory||[]),originalDesc:existing?.originalDesc||''});
          fx++;
        }else{
          setRV(k,{...(getRV(k)||{}),status:'ok'});
        }
      });
      totalFixed+=fx;
    }catch(e){toast('Audit error: '+e.message,'error')}
    S.auditProgress=Math.min(i+bs,items.length);
    if(i+bs<items.length){
      toast(`Auditing ${sectionName}… ${S.auditProgress}/${S.auditTotal}`);
      await new Promise(r=>setTimeout(r,1500));
    }
  }
  S.auditRunning=false;
  const keptCount=items.length-totalFixed;
  logActivity(`Audited ${sectionName}: ${totalFixed} need changes, ${keptCount} look good`);
  toast(`${sectionName}: ${totalFixed} need changes, ${keptCount} look good`,'success');
  render();
}

// Export final index as downloadable HTML (print-ready book format)
function exportIndex(){
  if(!S.indexData){toast('No index data','error');return}
  const ix=S.indexData;
  let html=`<!DOCTYPE html><html><head><meta charset="UTF-8"><title>JEM Video Index</title>
<style>
body{font-family:'Source Serif 4',Georgia,serif;max-width:800px;margin:0 auto;padding:40px;color:#1a1a1a;font-size:12px;line-height:1.5}
h1{font-size:28px;text-align:center;margin-bottom:40px;border-bottom:2px solid #8c7a50;padding-bottom:10px}
h2{font-size:20px;margin-top:30px;border-bottom:1px solid #8c7a50;padding-bottom:6px;color:#3a3226;page-break-after:avoid}
.entry{margin-bottom:10px;page-break-inside:avoid}
.entry-name{font-weight:700;font-size:14px}
.seg-label{font-size:9px;text-transform:uppercase;letter-spacing:0.5px;color:#888;margin-top:4px}
.result{margin-left:16px;font-size:11.5px}
.desc{color:#333}
.rel{color:#888;font-style:italic;font-size:10px}
.ref{color:#4a6898;font-family:monospace;font-size:10px}
@media print{h2{page-break-before:always}h2:first-of-type{page-break-before:avoid}}
</style></head><body>
<h1>JEM Video Index</h1>`;

  RULES.sectionOrder.forEach(sec=>{
    const entries=ix.sections[sec]||[];
    if(!entries.length)return;
    html+=`<h2>${sec}</h2>`;
    entries.forEach(e=>{
      html+=`<div class="entry"><div class="entry-name">${esc(e.name)}</div>`;
      const byseg={};
      e.results.forEach(r=>{if(!byseg[r.segType])byseg[r.segType]=[];byseg[r.segType].push(r)});
      RULES.segOrder.forEach(seg=>{
        if(!byseg[seg])return;
        html+=`<div class="seg-label">${seg}</div>`;
        byseg[seg].forEach(r=>{
          html+=`<div class="result">`;
          if(r.desc)html+=`<span class="desc">${esc(r.desc)}</span>`;
          if(r.rel)html+=` <span class="rel">[${esc(r.rel)}]</span>`;
          if(r.clipType==='Film Chapter'||r.clipType==='Film'){
            html+=` <span class="ref">${esc(r.pvName||r.clipName)}</span>`;
          }else if(r.progNum){
            html+=` <span class="ref">#${esc(r.progNum)}</span>`;
          }
          html+=`</div>`;
        });
      });
      html+=`</div>`;
    });
  });

  html+=`</body></html>`;
  const blob=new Blob([html],{type:'text/html'});
  const a=document.createElement('a');
  a.href=URL.createObjectURL(blob);
  a.download='JEM-Video-Index.html';
  a.click();
  toast('Index exported as HTML','success');
}

async function runConsistencyCheck(){
  if(!S.claudeKey){toast('No API key','error');return}
  if(!S.indexData){toast('No index data','error');return}
  
  S.consistencyRunning=true;S.consistencyProgress=0;S.consistencyResults=[];
  toast('Running consistency check…');render();
  
  // Collect all reviewed/finalized descriptions grouped by section
  const allDescs=[];
  const ix=S.indexData;
  RULES.sectionOrder.forEach(sec=>{
    (ix.sections[sec]||[]).forEach(entry=>{
      entry.results.forEach(r=>{
        if(r.desc&&r.desc.trim()){
          allDescs.push({entry:entry.name,section:sec,desc:r.desc,segType:r.segType,rowIdx:r.rowIdx});
        }
      });
    });
  });
  
  S.consistencyTotal=allDescs.length;
  
  // Build transliteration rules text
  const transRules=(RULES.consistency?.transliteration||[]).map(t=>`"${t.correct}" (never: ${t.wrong.join(', ')})`).join('\n  ');
  const checkRules=(RULES.consistency?.checks||[]).filter(c=>c.on).map(c=>c.name).join('\n');
  
  // Process in batches of 100 descriptions
  const bs=100;
  const allIssues=[];
  for(let i=0;i<allDescs.length;i+=bs){
    const batch=allDescs.slice(i,i+bs);
    S.consistencyProgress=Math.min(i+bs,allDescs.length);
    toast(`Checking consistency… ${S.consistencyProgress}/${S.consistencyTotal}`);
    
    try{
      const prompt=`You are reviewing ${batch.length} tag descriptions from the JEM Video Index for CONSISTENCY issues.

CONSISTENCY RULES:
${checkRules}

STANDARD TRANSLITERATIONS (always use the first spelling):
  ${transRules}

Look at ALL descriptions below as a group. Find:
1. Same concept described with different words across entries (e.g. "Establishment of" vs "Inception of")
2. Same multi-word phrases in different word orders (e.g. "tefillin and mezuzos" vs "mezuzos and tefillin")
3. Hebrew/Yiddish words spelled differently across entries
4. Inconsistent capitalization of the same term
5. Style/voice inconsistencies — all should read like one person wrote them

For each issue found, return the pair of entries that conflict and suggest which version to standardize on.

JSON array only. Each issue: {type:"phrase"|"word_order"|"transliteration"|"capitalization"|"style", entry1:{name:"...",desc:"..."}, entry2:{name:"...",desc:"..."}, issue:"what's inconsistent", suggestion:"standardize to this"}

If no issues found, return empty array [].

DESCRIPTIONS:
${batch.map((d,j)=>`[${j}] ${d.section} > "${d.entry}": "${d.desc}"`).join('\n')}`;

      const resp=await fetch('https://api.anthropic.com/v1/messages',{method:'POST',headers:{'Content-Type':'application/json','x-api-key':S.claudeKey,'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:4096,system:'You are a meticulous consistency checker for a book index. Find inconsistencies across descriptions. JSON array only.',messages:[{role:'user',content:prompt}]})});
      if(!resp.ok)throw new Error('API '+resp.status);
      const d=await resp.json(),txt=d.content.map(c=>c.text||'').join('');
      let parsed;
      try{parsed=JSON.parse(txt.replace(/```json?\s*/g,'').replace(/```/g,'').trim())}
      catch{const m2=txt.match(/\[[\s\S]*\]/);if(m2)parsed=JSON.parse(m2[0]);else parsed=[]}
      if(Array.isArray(parsed))allIssues.push(...parsed);
    }catch(e){console.warn('Consistency batch error:',e)}
    
    if(i+bs<allDescs.length)await new Promise(r=>setTimeout(r,1500));
  }
  
  S.consistencyRunning=false;
  S.consistencyResults=allIssues;
  toast(`Done! ${allIssues.length} consistency issues found`,'success');
  S.view='consistency';render();
}

function rConsistency(){
  let h='<div class="page-hd"><h1>Consistency Check Results</h1>';
  h+=`<p>${(S.consistencyResults||[]).length} issues found across the index</p>`;
  h+='<div class="page-hd-actions">';
  h+=`<button class="btn btn-gold" data-nav="index">← Back to Index</button>`;
  h+=`<button class="btn btn-purple" id="rerun-consistency">⟳ Run Again</button>`;
  h+='</div></div><div class="pad">';
  
  if(!S.consistencyResults||!S.consistencyResults.length){
    h+='<div style="text-align:center;padding:40px;color:var(--tx-3)">No consistency issues found. Everything looks uniform!</div>';
    return h+'</div>';
  }
  
  // Group by type
  const byType={};
  S.consistencyResults.forEach((issue,i)=>{
    const t=issue.type||'other';
    if(!byType[t])byType[t]=[];
    byType[t].push({...issue,idx:i});
  });
  
  const typeLabels={phrase:'Phrasing Differences',word_order:'Word Order',transliteration:'Spelling/Transliteration',capitalization:'Capitalization',style:'Style/Voice',other:'Other'};
  const typeColors={phrase:'var(--purple)',word_order:'var(--blue)',transliteration:'var(--amber)',capitalization:'var(--green)',style:'var(--red)',other:'var(--tx-3)'};
  
  // Summary badges
  h+='<div style="display:flex;gap:8px;margin-bottom:20px;flex-wrap:wrap">';
  Object.keys(byType).forEach(t=>{
    h+=`<span style="font-size:12px;padding:4px 12px;border-radius:12px;background:var(--bg-1);border:1px solid var(--border);color:${typeColors[t]||'var(--tx-2)'};font-weight:500">${typeLabels[t]||t}: ${byType[t].length}</span>`;
  });
  h+='</div>';
  
  // List issues
  Object.keys(byType).forEach(t=>{
    h+=`<div style="margin-bottom:24px">`;
    h+=`<h3 style="font-family:var(--serif);font-size:16px;color:${typeColors[t]||'var(--tx-1)'};margin-bottom:10px">${typeLabels[t]||t}</h3>`;
    byType[t].forEach(issue=>{
      const dismissed=S.consistencyDismissed&&S.consistencyDismissed[issue.idx];
      h+=`<div class="card" style="margin-bottom:8px;${dismissed?'opacity:0.4':''}">`;
      h+=`<div style="display:flex;gap:12px;align-items:flex-start">`;
      h+=`<div style="flex:1;font-size:12px">`;
      if(issue.entry1)h+=`<div style="margin-bottom:4px"><strong>${esc(issue.entry1.name||'')}</strong>: <span style="color:var(--red)">${esc(issue.entry1.desc||'')}</span></div>`;
      if(issue.entry2)h+=`<div style="margin-bottom:4px"><strong>${esc(issue.entry2.name||'')}</strong>: <span style="color:var(--red)">${esc(issue.entry2.desc||'')}</span></div>`;
      if(issue.issue)h+=`<div style="color:var(--tx-3);font-size:11px;margin-bottom:4px">${esc(issue.issue)}</div>`;
      if(issue.suggestion)h+=`<div style="color:var(--green);font-weight:500">→ ${esc(issue.suggestion)}</div>`;
      h+=`</div>`;
      h+=`<button class="btn btn-sm" data-dismiss-issue="${issue.idx}" style="flex-shrink:0">${dismissed?'Restore':'Dismiss'}</button>`;
      h+=`</div></div>`;
    });
    h+=`</div>`;
  });
  
  return h+'</div>';
}
