<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>JEM Index Workstation</title>
<link href="https://fonts.googleapis.com/css2?family=Source+Serif+4:ital,wght@0,400;0,600;0,700;1,400&family=DM+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{
--bg-0:#faf8f4;--bg-1:#f3f0ea;--bg-2:#ece8e0;--bg-3:#e2ddd4;
--bg-hover:#ddd8ce;--bg-active:#d4cfc4;--bg-white:#fffdf9;
--border:#d8d2c6;--border-hi:#c8c2b4;--border-focus:#7c6a4f;
--tx-1:#2c2418;--tx-2:#5c5243;--tx-3:#8a7e6d;--tx-4:#b0a594;
--blue:#4a6898;--blue-hi:#5a7ab0;--blue-bg:rgba(74,104,152,.08);--blue-bd:rgba(74,104,152,.22);
--purple:#7c5e9a;--purple-bg:rgba(124,94,154,.07);--purple-bd:rgba(124,94,154,.22);
--red:#b05050;--red-bg:rgba(176,80,80,.07);--red-bd:rgba(176,80,80,.22);
--green:#4a8a5a;--green-bg:rgba(74,138,90,.07);--green-bd:rgba(74,138,90,.22);
--amber:#9a7a30;--amber-bg:rgba(154,122,48,.07);
--gold:#8c7a50;--gold-bg:rgba(140,122,80,.06);
--sidebar-w:210px;
--font:'DM Sans',system-ui,sans-serif;--mono:'JetBrains Mono',monospace;--serif:'Source Serif 4',Georgia,serif;
--radius:7px;--radius-lg:11px;
}
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;overflow:hidden;background:var(--bg-0);color:var(--tx-1);font-family:var(--font)}
::-webkit-scrollbar{width:7px;height:7px}::-webkit-scrollbar-track{background:var(--bg-1)}::-webkit-scrollbar-thumb{background:var(--border-hi);border-radius:4px}
button{font-family:var(--font);cursor:pointer}input,textarea,select{font-family:var(--font)}
a{color:var(--blue);text-decoration:none}a:hover{text-decoration:underline}

#app{display:flex;height:100vh}

/* Sidebar */
.sidebar{width:var(--sidebar-w);background:var(--bg-white);border-right:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0;z-index:50}
.sidebar-logo{padding:16px 18px 12px;font-family:var(--serif);font-size:16px;font-weight:700;color:var(--tx-1);border-bottom:1px solid var(--border);letter-spacing:-.3px}
.sidebar-logo span{color:var(--gold);font-weight:400;font-style:italic;font-size:13px;display:block;margin-top:1px}
.sidebar-sheet{padding:7px 18px;font-size:10px;color:var(--tx-4);font-family:var(--mono);border-bottom:1px solid var(--border);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.sidebar-nav{flex:1;padding:8px;overflow-y:auto}
.nav-sec{font-size:9px;font-weight:600;text-transform:uppercase;letter-spacing:.8px;color:var(--tx-4);padding:12px 10px 5px}
.nav-item{display:flex;align-items:center;gap:9px;padding:8px 11px;border-radius:6px;font-size:12.5px;font-weight:500;color:var(--tx-3);cursor:pointer;transition:all .1s;margin-bottom:1px}
.nav-item:hover{background:var(--bg-1);color:var(--tx-2)}
.nav-item.active{background:var(--gold-bg);color:var(--gold);border:1px solid rgba(140,122,80,.18);font-weight:600}
.nav-item .badge{margin-left:auto;background:var(--purple-bg);color:var(--purple);font-size:10px;font-weight:600;padding:1px 7px;border-radius:10px}
.nav-item svg{width:16px;height:16px;flex-shrink:0;opacity:.6}
.nav-item.active svg{opacity:1}
.sidebar-tabs{padding:6px 8px;border-top:1px solid var(--border);max-height:140px;overflow-y:auto}
.sidebar-tabs h4{font-size:9px;font-weight:600;text-transform:uppercase;letter-spacing:.8px;color:var(--tx-4);padding:4px 10px 4px}
.stab{padding:5px 11px;border-radius:5px;font-size:11px;color:var(--tx-3);cursor:pointer;transition:all .1s}
.stab:hover{background:var(--bg-1);color:var(--tx-2)}.stab.active{color:var(--gold);font-weight:600}
.sidebar-user{padding:10px 14px;border-top:1px solid var(--border);display:flex;align-items:center;gap:9px}
.sidebar-avatar{width:28px;height:28px;border-radius:50%;background:var(--bg-2);border:1.5px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:600;color:var(--gold);overflow:hidden;flex-shrink:0}
.sidebar-avatar img{width:100%;height:100%;object-fit:cover}
.sidebar-uname{font-size:11px;color:var(--tx-2);flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}

/* Main */
.main{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0}
.main-content{flex:1;display:flex;overflow:hidden}
.content{flex:1;overflow-y:auto;overflow-x:hidden}

/* Buttons */
.btn{display:inline-flex;align-items:center;gap:5px;padding:0 13px;height:32px;border-radius:var(--radius);font-size:12px;font-weight:500;border:1px solid var(--border);background:var(--bg-white);color:var(--tx-2);transition:all .12s;white-space:nowrap}
.btn:hover{background:var(--bg-1);color:var(--tx-1);border-color:var(--border-hi)}
.btn-gold{background:var(--gold);color:#fff;border-color:var(--gold)}.btn-gold:hover{background:#9a8860}
.btn-blue{background:var(--blue-bg);color:var(--blue);border-color:var(--blue-bd)}.btn-blue:hover{background:rgba(74,104,152,.14)}
.btn-purple{background:var(--purple-bg);color:var(--purple);border-color:var(--purple-bd)}.btn-purple:hover{background:rgba(124,94,154,.14)}
.btn-red{background:var(--red-bg);color:var(--red);border-color:var(--red-bd)}.btn-red:hover{background:rgba(176,80,80,.14)}
.btn-green{background:var(--green-bg);color:var(--green);border-color:var(--green-bd)}.btn-green:hover{background:rgba(74,138,90,.14)}
.btn-sm{height:26px;padding:0 9px;font-size:11px}
.btn-icon{width:32px;padding:0;justify-content:center}.btn-icon.btn-sm{width:26px}

/* Page header */
.page-hd{padding:20px 28px 14px;border-bottom:1px solid var(--border);flex-shrink:0;background:var(--bg-white)}
.page-hd h1{font-family:var(--serif);font-size:20px;font-weight:700;letter-spacing:-.3px;color:var(--tx-1)}
.page-hd p{font-size:12px;color:var(--tx-3);margin-top:2px}
.page-hd-actions{display:flex;gap:8px;margin-top:10px;flex-wrap:wrap}

/* Cards */
.card{background:var(--bg-white);border:1px solid var(--border);border-radius:var(--radius-lg);padding:18px;transition:border-color .12s}
.card:hover{border-color:var(--border-hi)}
.card h4{font-size:9.5px;font-weight:600;text-transform:uppercase;letter-spacing:.5px;color:var(--tx-4);margin-bottom:7px}
.card .val{font-size:24px;font-weight:700;font-family:var(--serif);letter-spacing:-.5px}
.card .sub{font-size:10px;color:var(--tx-4);margin-top:2px}
.grid{display:grid;gap:12px}.grid-4{grid-template-columns:repeat(auto-fill,minmax(170px,1fr))}.grid-2{grid-template-columns:1fr 1fr}
.pad{padding:22px 28px}

/* Index Preview */
.idx-toolbar{display:flex;align-items:center;gap:8px;padding:10px 24px;border-bottom:1px solid var(--border);background:var(--bg-white);flex-wrap:wrap;flex-shrink:0}
.idx-nav-mode{display:flex;border:1px solid var(--border);border-radius:var(--radius);overflow:hidden}
.idx-nav-btn{padding:5px 12px;font-size:11px;font-weight:500;color:var(--tx-3);background:var(--bg-white);border:none;border-right:1px solid var(--border);cursor:pointer;transition:all .1s}
.idx-nav-btn:last-child{border-right:none}
.idx-nav-btn:hover{background:var(--bg-1);color:var(--tx-2)}
.idx-nav-btn.active{background:var(--gold-bg);color:var(--gold);font-weight:600}
.idx-layout-toggle{display:flex;border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;margin-left:auto}
.idx-search{display:flex;align-items:center;gap:7px;background:var(--bg-white);border:1px solid var(--border);border-radius:var(--radius);padding:0 10px;height:30px;min-width:180px}
.idx-search:focus-within{border-color:var(--gold)}
.idx-search input{background:none;border:none;outline:none;color:var(--tx-1);font-size:12px;width:100%}
.idx-search input::placeholder{color:var(--tx-4)}

.idx-main{display:flex;flex:1;overflow:hidden}
.idx-tree{width:220px;min-width:220px;border-right:1px solid var(--border);overflow-y:auto;background:var(--bg-white);padding:8px}
.idx-tree.hidden{display:none}
.idx-tree-section{font-size:9px;font-weight:600;text-transform:uppercase;letter-spacing:.7px;color:var(--tx-4);padding:10px 8px 4px}
.idx-tree-item{padding:4px 10px;border-radius:4px;font-size:11.5px;color:var(--tx-3);cursor:pointer;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;transition:background .08s}
.idx-tree-item:hover{background:var(--bg-1);color:var(--tx-2)}
.idx-tree-item.active{background:var(--gold-bg);color:var(--gold);font-weight:600}
.idx-tree-count{font-size:9px;color:var(--tx-4);font-family:var(--mono)}

.idx-body{flex:1;overflow-y:auto;padding:24px 32px}
.idx-body.two-col{columns:2;column-gap:40px;column-rule:1px solid var(--border)}

/* Section headers in index */
.idx-section-hd{font-family:var(--serif);font-size:22px;font-weight:700;color:var(--tx-1);padding:16px 0 10px;border-bottom:2px solid var(--gold);margin-bottom:16px;break-after:avoid;letter-spacing:-.3px}
.idx-section-hd:first-child{padding-top:0}

/* Index entry */
.idx-entry{margin-bottom:14px;break-inside:avoid;position:relative}
.idx-entry.flagged{border-left:3px solid var(--amber);padding-left:10px}
.idx-entry.bookmarked::before{content:'🔖';position:absolute;left:-20px;top:0;font-size:12px}
.idx-entry-name{font-family:var(--serif);font-size:15px;font-weight:700;color:var(--tx-1);margin-bottom:2px;cursor:pointer;display:inline-flex;align-items:center;gap:6px}
.idx-entry-name:hover{color:var(--gold)}
.idx-entry-badge{font-size:9px;font-weight:500;font-family:var(--font);padding:1px 6px;border-radius:8px;vertical-align:middle}
.idx-entry-badge.warn{background:var(--amber-bg);color:var(--amber);border:1px solid rgba(154,122,48,.2)}
.idx-entry-badge.empty{background:var(--red-bg);color:var(--red);border:1px solid var(--red-bd)}
.idx-entry-meta{font-size:10px;color:var(--tx-4);margin-bottom:4px;font-family:var(--mono)}
.idx-seealso{font-size:11px;color:var(--tx-3);font-style:italic;margin-bottom:4px}
.idx-seealso a{color:var(--blue);font-style:normal}
.idx-bestbet{display:inline-block;font-size:10px;background:var(--gold-bg);color:var(--gold);padding:1px 8px;border-radius:8px;margin-bottom:4px;border:1px solid rgba(140,122,80,.2)}

/* Segment group */
.idx-seg{margin-bottom:6px}
.idx-seg-label{font-size:9.5px;font-weight:600;text-transform:uppercase;letter-spacing:.4px;color:var(--tx-4);margin-bottom:2px}

/* Individual result */
.idx-result{display:flex;align-items:baseline;gap:6px;padding:1px 0;font-size:12.5px;line-height:1.5}
.idx-result-desc{color:var(--tx-2);flex:1}
.idx-result-desc.empty-desc{color:var(--red);font-style:italic;background:rgba(176,80,80,.05);padding:0 4px;border-radius:3px}
.idx-result-desc.editable:hover{background:var(--bg-1);cursor:text;border-radius:3px;padding:0 4px}
.idx-result-rel{font-size:10px;color:var(--tx-4);font-style:italic}
.idx-result-ref{font-family:var(--mono);font-size:10.5px;color:var(--blue);white-space:nowrap}
.idx-result-ref a{color:var(--blue)}
.idx-result-actions{display:flex;gap:3px;opacity:0;transition:opacity .1s;flex-shrink:0}
.idx-result:hover .idx-result-actions{opacity:1}
.idx-mini-btn{width:20px;height:20px;border:1px solid var(--border);border-radius:4px;background:var(--bg-white);display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--tx-4);font-size:10px;transition:all .1s}
.idx-mini-btn:hover{background:var(--bg-1);color:var(--tx-2);border-color:var(--border-hi)}
.idx-mini-btn.active{color:var(--gold);border-color:var(--gold)}

/* Transcript popup */
.transcript-popup{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);width:600px;max-height:70vh;background:var(--bg-white);border:1px solid var(--border);border-radius:var(--radius-lg);box-shadow:0 12px 40px rgba(0,0,0,.12);z-index:300;display:flex;flex-direction:column}
.transcript-popup-hd{padding:14px 18px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.transcript-popup-hd h3{font-family:var(--serif);font-size:14px;font-weight:600}
.transcript-popup-body{flex:1;overflow-y:auto;padding:18px;font-family:var(--serif);font-size:14px;line-height:1.7;color:var(--tx-2)}
.popup-overlay{position:fixed;inset:0;background:rgba(0,0,0,.15);z-index:299}

/* Inline edit */
.idx-inline-edit{display:flex;gap:4px;align-items:center}
.idx-inline-input{border:1px solid var(--gold);border-radius:4px;padding:2px 8px;font-size:12px;font-family:var(--font);color:var(--tx-1);outline:none;background:var(--bg-white);flex:1;min-width:150px}

/* Bulk bar */
.bulk-bar{display:flex;align-items:center;gap:8px;padding:8px 24px;background:var(--blue-bg);border-bottom:1px solid var(--blue-bd);font-size:12px;color:var(--blue);font-weight:500;flex-shrink:0}

/* Table (Sheet View) */
.table-toolbar{display:flex;align-items:center;gap:8px;padding:8px 20px;border-bottom:1px solid var(--border);flex-wrap:wrap;background:var(--bg-white)}
table{width:max-content;min-width:100%;border-collapse:separate;border-spacing:0}
thead{position:sticky;top:0;z-index:10}
th{background:var(--bg-1);padding:0 12px;height:34px;font-size:10px;font-weight:600;color:var(--tx-4);text-transform:uppercase;letter-spacing:.5px;text-align:left;border-bottom:1px solid var(--border);border-right:1px solid var(--border);white-space:nowrap;cursor:pointer;user-select:none}
th:hover{color:var(--tx-3);background:var(--bg-2)}
td{padding:0 12px;height:32px;font-size:12px;border-bottom:1px solid var(--border);border-right:1px solid var(--border);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:280px;background:var(--bg-white)}
tr:hover td{background:var(--bg-0)}
tr.sel td{background:var(--blue-bg)}
td.editing{background:var(--bg-1)!important;outline:2px solid var(--gold);outline-offset:-2px}
.cell-input{background:none;border:none;outline:none;color:var(--tx-1);font-size:12px;width:100%;height:100%}
.col-chk{width:36px;min-width:36px;text-align:center}
.col-num{width:42px;min-width:42px;text-align:center;font-family:var(--mono)}
input[type="checkbox"]{appearance:none;width:14px;height:14px;border:1.5px solid var(--border-hi);border-radius:3px;background:var(--bg-white);cursor:pointer;position:relative;transition:all .08s;vertical-align:middle}
input[type="checkbox"]:checked{background:var(--gold);border-color:var(--gold)}
input[type="checkbox"]:checked::after{content:'✓';position:absolute;top:-2px;left:1px;font-size:11px;color:#fff;font-weight:700}
.toolbar-spacer{flex:1}
.toolbar-count{font-size:10px;color:var(--tx-4);font-family:var(--mono)}

/* Review */
.review-item{background:var(--bg-white);border:1px solid var(--border);border-radius:var(--radius-lg);padding:18px;margin-bottom:10px}
.review-item:hover{border-color:var(--border-hi)}
.review-tag{font-family:var(--serif);font-size:15px;font-weight:600;margin-bottom:3px}
.review-section{font-size:10px;color:var(--tx-4);text-transform:uppercase;letter-spacing:.4px;margin-bottom:10px}
.review-row{display:flex;gap:16px;margin-bottom:8px;font-size:12.5px}
.review-label{font-size:9px;font-weight:600;color:var(--tx-4);text-transform:uppercase;letter-spacing:.4px;margin-bottom:2px}
.review-old{color:var(--tx-4);text-decoration:line-through}
.review-new{color:var(--green);font-weight:500}
.review-reason{font-size:11px;color:var(--tx-3);font-style:italic;margin-bottom:10px;padding:8px 12px;background:var(--bg-0);border-radius:6px;border-left:3px solid var(--purple)}
.review-actions{display:flex;gap:6px;align-items:center}
.review-custom-input{flex:1;background:var(--bg-white);border:1px solid var(--border);border-radius:var(--radius);padding:5px 10px;color:var(--tx-1);font-size:12px;outline:none}
.review-custom-input:focus{border-color:var(--gold)}
.review-transcript{font-size:11px;color:var(--tx-3);margin-top:8px;padding:8px 12px;background:var(--bg-0);border-radius:6px;max-height:70px;overflow-y:auto;font-family:var(--serif);line-height:1.5}

/* Auditor */
.audit-stat{text-align:center;padding:14px;background:var(--bg-white);border-radius:var(--radius);border:1px solid var(--border)}
.audit-stat .num{font-size:28px;font-weight:700;font-family:var(--serif)}
.audit-stat .lbl{font-size:9px;color:var(--tx-4);text-transform:uppercase;letter-spacing:.5px;margin-top:2px}
.audit-progress-bar{height:6px;background:var(--bg-2);border-radius:3px;overflow:hidden;margin:8px 0}
.audit-progress-fill{height:100%;background:linear-gradient(90deg,var(--gold),var(--blue));border-radius:3px}
.audit-log{max-height:180px;overflow-y:auto;font-family:var(--mono);font-size:10px;color:var(--tx-3);padding:10px;background:var(--bg-0);border-radius:6px;border:1px solid var(--border)}

/* AI Panel */
.ai-panel{width:360px;min-width:360px;background:var(--bg-white);border-left:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0}
.ai-panel.hidden{display:none}
.ai-head{display:flex;align-items:center;gap:8px;padding:12px 14px;border-bottom:1px solid var(--border)}
.ai-head h3{font-size:13px;font-weight:600;flex:1;font-family:var(--serif)}
.ai-dot{width:7px;height:7px;border-radius:50%;background:var(--purple);box-shadow:0 0 6px var(--purple)}
.ai-msgs{flex:1;overflow-y:auto;padding:14px;display:flex;flex-direction:column;gap:10px}
.ai-msg{padding:10px 12px;border-radius:9px;font-size:12.5px;line-height:1.5;max-width:92%;word-wrap:break-word;animation:msgIn .15s ease-out}
@keyframes msgIn{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:translateY(0)}}
.ai-msg.user{background:var(--blue-bg);border:1px solid var(--blue-bd);color:var(--tx-1);align-self:flex-end;border-bottom-right-radius:3px}
.ai-msg.assistant{background:var(--bg-0);border:1px solid var(--border);color:var(--tx-2);align-self:flex-start;border-bottom-left-radius:3px}
.ai-msg.system{background:var(--purple-bg);border:1px solid var(--purple-bd);color:var(--purple);font-size:11px;align-self:center;text-align:center}
.ai-msg strong{color:var(--tx-1)}.ai-msg code{font-family:var(--mono);font-size:10.5px;background:var(--bg-2);padding:1px 4px;border-radius:3px}
.ai-msg pre{background:var(--bg-1);padding:8px;border-radius:6px;font-family:var(--mono);font-size:10px;overflow-x:auto;margin:5px 0;white-space:pre-wrap;color:var(--tx-1)}
.ai-typing{color:var(--tx-4);font-size:11px;font-style:italic;padding:4px 12px}
.ai-input-area{display:flex;gap:8px;padding:10px 14px;border-top:1px solid var(--border)}
.ai-input{flex:1;background:var(--bg-0);border:1px solid var(--border);border-radius:var(--radius);padding:8px 12px;color:var(--tx-1);font-size:12px;outline:none;resize:none;min-height:36px;max-height:90px}
.ai-input:focus{border-color:var(--purple)}.ai-input::placeholder{color:var(--tx-4)}
.ai-send{width:36px;height:36px;border-radius:var(--radius);background:var(--purple);border:none;color:#fff;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.ai-send:hover{background:#8e70aa}.ai-send:disabled{opacity:.4}

/* Setup */
.setup-screen{display:flex;align-items:center;justify-content:center;height:100vh;background:var(--bg-0);background-image:radial-gradient(ellipse at 30% 20%,rgba(140,122,80,.06) 0%,transparent 55%)}
.setup-card{background:var(--bg-white);border:1px solid var(--border);border-radius:var(--radius-lg);padding:36px;max-width:520px;width:100%;box-shadow:0 8px 32px rgba(0,0,0,.06)}
.setup-card h1{font-family:var(--serif);font-size:22px;font-weight:700;letter-spacing:-.4px;margin-bottom:3px}
.setup-card .sub{font-size:12px;color:var(--tx-3);line-height:1.6;margin-bottom:18px}
.setup-card label{display:block;font-size:10px;font-weight:600;color:var(--tx-4);margin-bottom:5px;text-transform:uppercase;letter-spacing:.5px}
.s-input{width:100%;padding:9px 12px;background:var(--bg-0);border:1px solid var(--border);border-radius:var(--radius);color:var(--tx-1);font-size:12px;font-family:var(--mono);outline:none;margin-bottom:12px}
.s-input:focus{border-color:var(--gold)}.s-input::placeholder{color:var(--tx-4)}
.setup-steps{background:var(--bg-0);border:1px solid var(--border);border-radius:var(--radius);padding:12px 16px;margin-bottom:16px}
.setup-steps h3{font-size:11px;font-weight:600;color:var(--tx-2);margin-bottom:6px}
.setup-steps ol{padding-left:18px;font-size:11px;color:var(--tx-3);line-height:1.9}
.setup-steps code{background:var(--bg-2);padding:1px 5px;border-radius:3px;font-family:var(--mono);font-size:10px;color:var(--gold)}
.setup-ai{background:var(--purple-bg);border:1px solid var(--purple-bd);border-radius:var(--radius);padding:12px 16px;margin-bottom:16px}
.setup-ai h3{font-size:11px;font-weight:600;color:var(--purple);margin-bottom:3px}
.setup-ai p{font-size:10px;color:var(--tx-3);margin-bottom:6px}
.setup-err{color:var(--red);font-size:11px;margin-bottom:8px}

/* Settings */
.rule-item{display:flex;align-items:center;gap:8px;padding:8px 10px;background:var(--bg-0);border:1px solid var(--border);border-radius:6px;margin-bottom:5px;font-size:12px}
.rule-name{font-weight:600;color:var(--tx-1);flex:1}.rule-desc{font-size:11px;color:var(--tx-3);flex:2}
.rule-toggle{width:34px;height:18px;border-radius:9px;background:var(--bg-3);border:none;cursor:pointer;position:relative;transition:background .15s}
.rule-toggle.on{background:var(--gold)}
.rule-toggle::after{content:'';position:absolute;top:2px;left:2px;width:14px;height:14px;border-radius:50%;background:#fff;transition:transform .15s;box-shadow:0 1px 3px rgba(0,0,0,.15)}
.rule-toggle.on::after{transform:translateX(16px)}

/* Loading + Toasts */
.loading-state{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;gap:12px;color:var(--tx-4)}
.spinner{width:22px;height:22px;border:2.5px solid var(--border);border-top-color:var(--gold);border-radius:50%;animation:sp .7s linear infinite}
@keyframes sp{to{transform:rotate(360deg)}}
.toasts{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);z-index:999;display:flex;flex-direction:column;gap:6px;align-items:center}
.toast{padding:8px 18px;background:var(--bg-white);border:1px solid var(--border);border-radius:var(--radius);font-size:11px;color:var(--tx-2);box-shadow:0 4px 16px rgba(0,0,0,.08);animation:toastIn .2s ease-out}
.toast.success{border-color:var(--green);color:var(--green)}.toast.error{border-color:var(--red);color:var(--red)}
@keyframes toastIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}

/* Filter dropdown */
.filter-dd{position:absolute;top:100%;left:0;background:var(--bg-white);border:1px solid var(--border);border-radius:var(--radius);box-shadow:0 8px 24px rgba(0,0,0,.08);padding:6px;z-index:100;min-width:200px;max-height:300px;overflow-y:auto}
.filter-dd-item{padding:5px 10px;border-radius:4px;font-size:12px;color:var(--tx-2);cursor:pointer}
.filter-dd-item:hover{background:var(--bg-1);color:var(--tx-1)}
.filter-dd-item .cnt{font-family:var(--mono);font-size:10px;color:var(--tx-4);float:right}
</style>
</head>
<body>
<div id="app"></div>
<script src="https://accounts.google.com/gsi/client" async defer></script>
<script src="https://apis.google.com/js/api.js"></script>
<script>
// ═══════════════════════════════════════════════════════════════
// JEM INDEX WORKSTATION v2
// ═══════════════════════════════════════════════════════════════
const DISC='https://sheets.googleapis.com/$discovery/rest?version=v4',SCOPES='https://www.googleapis.com/auth/spreadsheets';

const RULES={tagDesc:{minWords:3,maxWords:6,absMax:8,
checks:[{id:'length',name:'Length (3-6 words, max 8)',on:true},{id:'no_repeat',name:'No tag name repetition',on:true},{id:'rebbe',name:'"Rebbe" only when it\'s the point',on:true},{id:'trailing_prep',name:'Preserve trailing prepositions',on:true},{id:'multi_point',name:'Multi-point significance',on:true},{id:'spelling',name:'Spelling & grammar',on:true}],
good:[{tag:'Tefillin',desc:'With pride'},{tag:'Pesach',desc:'Communal Seders in'},{tag:'Terror',desc:'Following Ma\'alot Massacre'},{tag:'Farbrengen',desc:'Broadcast at'}],
bad:[{tag:'Tefillin',desc:'Praying publicly with pride wearing tefillin'},{tag:'Shabbos',desc:'The Rebbe speaks about Shabbos'}]},
segOrder:['Addresses','Timeless Moments','Conversations','My Encounter','Short Films','Films'],
typeMap:{'LT Sicha':'Addresses','LT Timeless Moment':'Timeless Moments','LT Eye to Eye':'Conversations','LT My Encounter':'My Encounter','Short Film':'Short Films','Film':'Films','Film Chapter':'Films','Living Torah':'Addresses'},
sectionFromPath:function(p){if(p.startsWith('People/'))return'People';if(p.includes('History'))return'History';if(p.startsWith('Time/')||p.includes('Calendar'))return'Dates';if(p.startsWith('Place/')||p.includes('Location')||p.includes('Country'))return'Locations';if(p.includes('Nigun'))return'Nigunim';if(p.includes('Organization')||p.includes('Book'))return'Orgs & Books';return'Topics'},
sectionOrder:['People','Topics','Dates','History','Locations','Nigunim','Orgs & Books']};

// ── State ─────────────────────────────────────────────────
const S={connected:false,clientId:localStorage.getItem('jw_cid')||'',sheetId:localStorage.getItem('jw_sid')||'',claudeKey:localStorage.getItem('jw_ckey')||'',user:null,sheetMeta:null,
activeTab:0,headers:[],rows:[],loading:false,
view:'index',aiOpen:false,
// Index
indexData:null, // {sections:{People:[entries...], Topics:[...],...}}
idxSearch:'',idxNavMode:'tabs',idxLayout:'single',idxActiveSection:'all',idxActiveEntry:null,
idxBookmarks:JSON.parse(localStorage.getItem('jw_bm')||'{}'),
idxNotes:JSON.parse(localStorage.getItem('jw_notes')||'{}'),
editingDesc:null, // {entryName, segType, clipIdx, resultKey}
transcriptPopup:null, // {clipName, transcript}
// Sheet
search:'',sortCol:null,sortDir:'asc',selected:new Set(),visibleCols:new Set(),editCell:null,editVal:'',
// Review
reviewQueue:JSON.parse(localStorage.getItem('jw_rq')||'[]'),reviewCustom:{},
// Auditor
auditRunning:false,auditProgress:0,auditTotal:0,auditLog:[],auditBatch:25,
// AI
aiMsgs:[],aiTyping:false,aiInput:'',
toasts:[],tid:0};

// ── Helpers ───────────────────────────────────────────────
const $=s=>document.querySelector(s),$$=s=>document.querySelectorAll(s);
function esc(s){const d=document.createElement('div');d.textContent=s;return d.innerHTML}
function cl(n){let s='',c=n;while(c>=0){s=String.fromCharCode(c%26+65)+s;c=Math.floor(c/26)-1}return s}
function toast(m,t=''){S.toasts.push({id:++S.tid,m,t});render();setTimeout(()=>{S.toasts=S.toasts.filter(x=>x.id!==S.tid);render()},3500)}
function rmd(t){return t.replace(/```action[\s\S]*?```/g,'').replace(/```([\s\S]*?)```/g,'<pre>$1</pre>').replace(/`([^`]+)`/g,'<code>$1</code>').replace(/\*\*([^*]+)\*\*/g,'<strong>$1</strong>').replace(/\n/g,'<br>')}
function saveBM(){localStorage.setItem('jw_bm',JSON.stringify(S.idxBookmarks))}
function saveNotes(){localStorage.setItem('jw_notes',JSON.stringify(S.idxNotes))}
function saveRQ(){localStorage.setItem('jw_rq',JSON.stringify(S.reviewQueue))}

// ── Build Index from Sheet Data ───────────────────────────
function buildIndex(){
  if(!S.headers.length||!S.rows.length){S.indexData=null;return}
  const kwCol=S.headers.findIndex(h=>h.toLowerCase()==='keywords');
  const nameCol=S.headers.findIndex(h=>h.toLowerCase()==='name');
  const typeCol=S.headers.findIndex(h=>h.toLowerCase()==='type');
  const idCol=S.headers.findIndex(h=>h.toLowerCase()==='id');
  const objIdCol=S.headers.findIndex(h=>h.toLowerCase()==='objectid');
  const transcriptCol=S.headers.findIndex(h=>h.toLowerCase()==='transcript');
  const summaryCol=S.headers.findIndex(h=>h.toLowerCase()==='summary');
  const progCol=S.headers.findIndex(h=>h.toLowerCase()==='program_number');
  const pvNameCol=S.headers.findIndex(h=>h.toLowerCase()==='produced_video_name');
  const pvTypeCol=S.headers.findIndex(h=>h.toLowerCase()==='produced_video_type');

  if(kwCol===-1){toast('Cannot find "keywords" column','error');return}

  const entries={}; // key: tagName → {name, path, section, results:[{desc, rel, relevancy, clipName, clipId, segType, transcript, progNum, ...}]}

  S.rows.forEach((row,ri)=>{
    const kwRaw=(row[kwCol]||'').trim();
    if(!kwRaw||kwRaw==='[]')return;
    let tags;
    try{tags=JSON.parse(kwRaw)}catch{return}

    const clipType=(row[typeCol]||'').trim();
    const segType=RULES.typeMap[clipType]||'Addresses';
    const clipName=(row[nameCol]||'').trim();
    const clipId=row[idCol]||'';
    const objId=(row[objIdCol]||'').trim();
    const transcript=(row[transcriptCol]||'').trim();
    const summary=(row[summaryCol]||'').trim();
    const progNum=(row[progCol]||'').trim();
    const pvName=(row[pvNameCol]||'').trim();
    const pvType=(row[pvTypeCol]||'').trim();

    tags.forEach(tag=>{
      const name=(tag.name||'').trim();
      const path=tag.path||'';
      const desc=(tag.description||'').trim();
      const rel=tag.relationship||'';
      const relevancy=tag.relevancy||0;
      if(!name)return;

      if(!entries[name]){
        entries[name]={name,path,section:RULES.sectionFromPath(path),results:[],seealso:[],bestbet:null};
      }
      entries[name].results.push({
        desc,rel,relevancy,clipName,clipId,objId,segType,transcript:transcript||summary||'',
        progNum,pvName,pvType,rowIdx:ri,clipType
      });
    });
  });

  // Group by section and sort
  const sections={};
  RULES.sectionOrder.forEach(sec=>{sections[sec]=[]});
  Object.values(entries).forEach(e=>{
    const sec=e.section;
    if(!sections[sec])sections[sec]=[];
    // Sort results by segment order then alphabetically by description
    e.results.sort((a,b)=>{
      const oa=RULES.segOrder.indexOf(a.segType),ob=RULES.segOrder.indexOf(b.segType);
      if(oa!==ob)return oa-ob;
      return(a.desc||'').localeCompare(b.desc||'');
    });
    sections[sec].push(e);
  });
  // Sort entries within each section alphabetically
  Object.keys(sections).forEach(sec=>{sections[sec].sort((a,b)=>a.name.localeCompare(b.name))});

  S.indexData={sections,totalEntries:Object.keys(entries).length,totalResults:Object.values(entries).reduce((s,e)=>s+e.results.length,0)};
}

// ── Google Sheets API ─────────────────────────────────────
let gapiOk=false;
function initG(){return new Promise((r,j)=>{if(gapiOk)return r();gapi.load('client',async()=>{try{await gapi.client.init({discoveryDocs:[DISC]});gapiOk=true;r()}catch(e){j(e)}})})}
async function doConnect(cid,sid,ck){
  S.clientId=cid;S.sheetId=sid;S.claudeKey=ck||'';
  localStorage.setItem('jw_cid',cid);localStorage.setItem('jw_sid',sid);if(ck)localStorage.setItem('jw_ckey',ck);
  await initG();
  return new Promise((r,j)=>{const tc=google.accounts.oauth2.initTokenClient({client_id:cid,scope:SCOPES,callback:async resp=>{
    if(resp.error){j(new Error(resp.error_description||resp.error));return}
    try{const u=await(await fetch('https://www.googleapis.com/oauth2/v3/userinfo',{headers:{Authorization:'Bearer '+resp.access_token}})).json();S.user={name:u.name||u.email||'User',pic:u.picture||''}}catch{S.user={name:'User',pic:''}}
    try{const m=await gapi.client.sheets.spreadsheets.get({spreadsheetId:sid});S.sheetMeta={title:m.result.properties.title,tabs:m.result.sheets.map(s=>({title:s.properties.title,sid:s.properties.sheetId}))}}catch(e){console.error(e)}
    S.connected=true;r();}});tc.requestAccessToken()});
}
async function loadTab(idx){
  if(!S.sheetMeta?.tabs?.[idx])return;S.loading=true;render();
  try{const r=await gapi.client.sheets.spreadsheets.values.get({spreadsheetId:S.sheetId,range:`'${S.sheetMeta.tabs[idx].title}'`});const v=r.result.values||[];S.headers=v.length?v[0]:[];S.rows=v.length>1?v.slice(1).map(r=>{while(r.length<S.headers.length)r.push('');return r}):[];S.visibleCols=new Set(S.headers.map((_,i)=>i));S.selected=new Set();S.sortCol=null;S.search='';S.editCell=null;S.activeTab=idx;buildIndex()}catch(e){toast('Load failed: '+e.message,'error')}
  S.loading=false;render();
}
async function saveCell(ri,ci,val){const nm=S.sheetMeta.tabs[S.activeTab].title;try{await gapi.client.sheets.spreadsheets.values.update({spreadsheetId:S.sheetId,range:`'${nm}'!${cl(ci)}${ri+2}`,valueInputOption:'USER_ENTERED',resource:{values:[[val]]}});S.rows[ri][ci]=val;toast('Saved','success')}catch(e){toast('Save failed: '+e.message,'error')}}
async function saveCells(changes){const nm=S.sheetMeta.tabs[S.activeTab].title;try{await gapi.client.sheets.spreadsheets.values.batchUpdate({spreadsheetId:S.sheetId,resource:{valueInputOption:'USER_ENTERED',data:changes.map(c=>({range:`'${nm}'!${cl(c.col)}${c.row+2}`,values:[[c.value]]}))}});changes.forEach(c=>{if(S.rows[c.row])S.rows[c.row][c.col]=c.value});toast(`Updated ${changes.length} cells`,'success')}catch(e){toast('Batch save failed','error')}}
async function delRows(idxs){const nm=S.sheetMeta.tabs[S.activeTab].title;const sorted=[...idxs].sort((a,b)=>b-a);try{const sid=S.sheetMeta.tabs[S.activeTab].sid;await gapi.client.sheets.spreadsheets.batchUpdate({spreadsheetId:S.sheetId,resource:{requests:sorted.map(i=>({deleteDimension:{range:{sheetId:sid,dimension:'ROWS',startIndex:i+1,endIndex:i+2}}}))}});S.rows=S.rows.filter((_,i)=>!idxs.has(i));S.selected=new Set();toast(`Deleted ${sorted.length} rows`,'success');buildIndex()}catch(e){toast('Delete failed','error')}render()}
function logout(){try{google.accounts.oauth2.revoke(gapi.client.getToken()?.access_token)}catch{}S.connected=false;S.sheetMeta=null;S.user=null;S.headers=[];S.rows=[];S.indexData=null;S.aiMsgs=[];localStorage.removeItem('jw_cid');localStorage.removeItem('jw_sid');render()}

// ── Bulk delete by type ───────────────────────────────────
async function bulkDeleteByType(type){
  const typeCol=S.headers.findIndex(h=>h.toLowerCase()==='type');
  const pvTypeCol=S.headers.findIndex(h=>h.toLowerCase()==='produced_video_type');
  if(typeCol===-1&&pvTypeCol===-1){toast('Cannot find type column','error');return}
  const matchRows=new Set();
  S.rows.forEach((r,i)=>{
    const t=(r[typeCol]||'').trim().toLowerCase();
    const pv=(r[pvTypeCol]||'').trim().toLowerCase();
    const q=type.toLowerCase();
    if(t.includes(q)||pv.includes(q))matchRows.add(i);
  });
  if(matchRows.size===0){toast('No matching rows found','error');return}
  if(!confirm(`Delete ${matchRows.size} rows matching "${type}"?`))return;
  await delRows(matchRows);
}

// ── Claude AI ─────────────────────────────────────────────
async function aiChat(msg){
  if(!S.claudeKey){toast('No API key','error');return}
  S.aiMsgs.push({role:'user',content:msg});S.aiTyping=true;S.aiInput='';render();scrollAI();
  const tabN=S.sheetMeta?.tabs?.[S.activeTab]?.title||'';
  // Build a lightweight context: schema + index summary, NOT raw rows
  let idxSummary='';
  if(S.indexData){
    idxSummary='\nIndex summary:\n';
    RULES.sectionOrder.forEach(sec=>{
      const entries=S.indexData.sections[sec]||[];
      if(!entries.length)return;
      idxSummary+=`${sec}: ${entries.length} entries (e.g., ${entries.slice(0,5).map(e=>e.name).join(', ')})\n`;
    });
  }
  // If user mentions a specific entry, include that entry's data
  let entryCtx='';
  if(S.indexData){
    const msgLow=msg.toLowerCase();
    for(const sec of Object.values(S.indexData.sections)){
      for(const e of sec){
        if(msgLow.includes(e.name.toLowerCase())){
          entryCtx+=`\nEntry "${e.name}" (${e.section}, ${e.results.length} results):\n`;
          e.results.slice(0,15).forEach(r=>{
            entryCtx+=`  - [${r.segType}] "${r.desc||'[empty]'}" (${r.rel}) clip:${r.clipId} prog:${r.progNum}\n`;
          });
          if(e.results.length>15)entryCtx+=`  ...+${e.results.length-15} more\n`;
          break; // Only include first matching entry to keep context small
        }
      }
      if(entryCtx)break;
    }
  }
  // Slim sample: just 3 rows with truncated columns (skip keywords/transcript)
  const skipCols=new Set(['keywords','transcript','summary','long_description','search.keywords_relevancy_1','search.keywords_relevancy_2','search.keywords_relevancy_3','search.keywords_relevancy_4']);
  const slimHeaders=S.headers.filter(h=>!skipCols.has(h.toLowerCase()));
  const slimIdx=slimHeaders.map(h=>S.headers.indexOf(h));
  const sample=S.rows.slice(0,3).map(r=>slimIdx.map(i=>(r[i]||'').toString().slice(0,60)).join(' | ')).join('\n');
  const ctx=`Tab: "${tabN}"\nColumns: ${S.headers.join(', ')}\nTotal rows: ${S.rows.length}\nSample (3 rows, key cols only):\n${slimHeaders.join(' | ')}\n${sample}${idxSummary}${entryCtx}`;
  const sys=`You are an AI assistant in the JEM Index Workstation managing video index data from JEM.tv about the Lubavitcher Rebbe. The sheet has ${S.rows.length} clips with tags in a "keywords" JSON column. Each tag has name, path, description, relevancy, relationship.\n\n${ctx}\n\nTo make changes use:\n\`\`\`action\n{"type":"update_cells","changes":[{"row":0,"col":2,"value":"new"}]}\n\`\`\`\nor {"type":"delete_rows","indices":[0,1]}. Be concise.`;
  try{const resp=await fetch('https://api.anthropic.com/v1/messages',{method:'POST',headers:{'Content-Type':'application/json','x-api-key':S.claudeKey,'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:2048,system:sys,messages:S.aiMsgs.slice(-12).map(m=>({role:m.role,content:m.content}))})});
    if(!resp.ok){const e=await resp.json().catch(()=>({}));throw new Error(e.error?.message||'API error')}
    const data=await resp.json(),text=data.content.map(c=>c.text||'').join('');S.aiMsgs.push({role:'assistant',content:text});
    const am=text.match(/```action\s*([\s\S]*?)```/);if(am){try{const a=JSON.parse(am[1].trim());if(a.type==='update_cells')await saveCells(a.changes);else if(a.type==='update_cell')await saveCell(a.row,a.col,a.value);else if(a.type==='delete_rows')await delRows(new Set(a.indices));buildIndex()}catch{}}
  }catch(e){S.aiMsgs.push({role:'assistant',content:'Error: '+e.message})}
  S.aiTyping=false;render();scrollAI();
}
function scrollAI(){setTimeout(()=>{const el=$('.ai-msgs');if(el)el.scrollTop=el.scrollHeight},50)}

// ── Generate Index Tab in Google Sheet ────────────────────
async function generateIndexTab(sectionName){
  if(!S.indexData||!S.indexData.sections[sectionName]){toast('No data for '+sectionName,'error');return}
  const tabName='Index - '+sectionName;
  
  // Check if tab already exists
  const existingTabs=(S.sheetMeta?.tabs||[]).map(t=>t.title);
  if(existingTabs.includes(tabName)){toast(`"${tabName}" already exists — skipping. Delete it manually first to regenerate.`,'error');return}
  
  S.loading=true;render();
  toast(`Generating "${tabName}"…`);
  
  try{
    // Create the new tab
    await gapi.client.sheets.spreadsheets.batchUpdate({
      spreadsheetId:S.sheetId,
      resource:{requests:[{addSheet:{properties:{title:tabName}}}]}
    });
    
    const entries=S.indexData.sections[sectionName];
    const headers=['Entry Name','Segment Type','Description','Relationship','Reference','Relevancy','','','Clip Link','Clip Title','Full Transcript','','Review Status','AI Suggestion','Notes','Bookmarked'];
    
    // Build rows in the indented format
    const dataRows=[headers];
    const transcriptQueue=[]; // Track transcripts for phase 2 write
    
    // Determine relationship defaults for this section
    const relDefaults=RULES.relDefaults[sectionName]||RULES.relDefaults.Topics||{};
    
    entries.forEach(entry=>{
      // Entry name row
      const entryRow=new Array(16).fill('');
      entryRow[0]=entry.name;
      dataRows.push(entryRow);
      
      // Group results by segment type
      const bySeg={};
      entry.results.forEach(r=>{
        if(!bySeg[r.segType])bySeg[r.segType]=[];
        bySeg[r.segType].push(r);
      });
      
      // Output in segment order
      RULES.segOrder.forEach(seg=>{
        if(!bySeg[seg])return;
        
        // Segment type header row
        const segRow=new Array(16).fill('');
        segRow[1]=seg;
        dataRows.push(segRow);
        
        // Sort results by description alphabetically
        bySeg[seg].sort((a,b)=>(a.desc||'').localeCompare(b.desc||''));
        
        bySeg[seg].forEach(r=>{
          const row=new Array(16).fill('');
          // Col C: Description
          row[2]=r.desc||'';
          // Col D: Relationship — only if it differs from default
          const defaultRel=relDefaults[seg]||'spoken_about';
          if(r.rel&&r.rel!==defaultRel){
            // Nigunim special: never show except spoken_about
            if(sectionName==='Nigunim'){
              if(r.rel==='spoken_about')row[3]=r.rel;
            }else{
              row[3]=r.rel;
            }
          }
          // Col E: Reference — program number or film name
          if(r.clipType==='Film Chapter'||r.clipType==='Film'){
            row[4]=r.pvName||r.clipName||'';
          }else{
            row[4]=r.progNum?'#'+r.progNum:'';
          }
          // Col F: Relevancy
          row[5]=r.relevancy||'';
          // Col I: Clip Link
          const cid=r.clipId||r.objId?.replace('video_clip-','')||'';
          row[8]=cid?'https://videos.jem.tv/video-player?clip='+cid:'';
          // Col J: Clip Title
          row[9]=r.clipName||'';
          // Col K: Full Transcript
          row[10]=r.transcript||'';
          // Col M-P: Review columns (empty initially)
          row[12]='';row[13]='';row[14]='';row[15]='';
          
          dataRows.push(row);
        });
      });
    });
    
    // Write all data in batches (Sheets API has limits)
    // Truncate transcripts to avoid cell limits (50k chars max)
    dataRows.forEach(row=>{if(row[10]&&row[10].length>45000)row[10]=row[10].slice(0,45000)+'… [truncated]'});
    
    const BATCH=500; // Smaller batches for reliability
    for(let i=0;i<dataRows.length;i+=BATCH){
      const chunk=dataRows.slice(i,i+BATCH);
      try{
        await gapi.client.sheets.spreadsheets.values.append({
          spreadsheetId:S.sheetId,
          range:`'${tabName}'!A1`,
          valueInputOption:'RAW',
          insertDataOption:'INSERT_ROWS',
          resource:{values:chunk}
        });
      }catch(batchErr){
        // If batch fails, try smaller chunks
        console.error('Batch write failed at row '+i+', trying smaller chunks:', batchErr);
        for(let j=0;j<chunk.length;j+=50){
          const mini=chunk.slice(j,j+50);
          try{
            await gapi.client.sheets.spreadsheets.values.append({
              spreadsheetId:S.sheetId,
              range:`'${tabName}'!A1`,
              valueInputOption:'RAW',
              insertDataOption:'INSERT_ROWS',
              resource:{values:mini}
            });
          }catch(miniErr){console.error('Mini batch failed:',miniErr)}
          await new Promise(r=>setTimeout(r,200));
        }
      }
      toast(`Writing… ${Math.min(i+BATCH,dataRows.length)}/${dataRows.length} rows`);
      if(i+BATCH<dataRows.length)await new Promise(r=>setTimeout(r,500));
    }
    
    // Refresh sheet metadata
    const meta=await gapi.client.sheets.spreadsheets.get({spreadsheetId:S.sheetId});
    S.sheetMeta={title:meta.result.properties.title,tabs:meta.result.sheets.map(s=>({title:s.properties.title,sid:s.properties.sheetId}))};
    
    toast(`"${tabName}" created with ${dataRows.length-1} rows!`,'success');
  }catch(e){
    toast('Failed: '+e.message,'error');
    console.error(e);
  }
  S.loading=false;render();
}

// Toggle review columns visibility in sheet
async function toggleReviewCols(tabName,show){
  try{
    const meta=await gapi.client.sheets.spreadsheets.get({spreadsheetId:S.sheetId});
    const sheet=meta.result.sheets.find(s=>s.properties.title===tabName);
    if(!sheet)return;
    const sid=sheet.properties.sheetId;
    // Review cols are M-P (index 12-15)
    await gapi.client.sheets.spreadsheets.batchUpdate({
      spreadsheetId:S.sheetId,
      resource:{requests:[{
        updateDimensionProperties:{
          range:{sheetId:sid,dimension:'COLUMNS',startIndex:12,endIndex:16},
          properties:{hiddenByUser:!show},
          fields:'hiddenByUser'
        }
      }]}
    });
    toast(show?'Review columns shown':'Review columns hidden','success');
  }catch(e){toast('Failed: '+e.message,'error')}
}


async function runAudit(){
  if(!S.claudeKey||!S.indexData){toast('Need API key and data','error');return}
  const allEntries=[];
  Object.values(S.indexData.sections).forEach(sec=>sec.forEach(e=>{
    e.results.forEach(r=>{
      allEntries.push({entryName:e.name,section:e.section,desc:r.desc,rel:r.rel,transcript:r.transcript,rowIdx:r.rowIdx,clipName:r.clipName});
    });
  }));
  S.auditRunning=true;S.auditProgress=0;S.auditTotal=allEntries.length;S.auditLog=[];render();
  const bs=S.auditBatch;const results=[];
  for(let i=0;i<allEntries.length;i+=bs){
    const batch=allEntries.slice(i,i+bs);
    S.auditLog.push(`Batch ${Math.floor(i/bs)+1}/${Math.ceil(allEntries.length/bs)}...`);render();
    try{
      const prompt=`Audit tag descriptions for JEM Video Index.\nRules: ${RULES.tagDesc.checks.filter(c=>c.on).map(c=>c.name).join('; ')}\nContext: Index is about the Rebbe. Default subject=Rebbe.\nFor each: "ok", "fix" (with suggestion+reason), or "generate" (if empty, use transcript to create 3-6 word desc).\nJSON array only.\n\n${batch.map((e,j)=>`[${j}] Entry:"${e.entryName}" Sec:${e.section} Rel:${e.rel}\n  Desc:"${e.desc||'[empty]'}"\n  Transcript:"${(e.transcript||'').slice(0,120)}"`).join('\n\n')}`;
      const resp=await fetch('https://api.anthropic.com/v1/messages',{method:'POST',headers:{'Content-Type':'application/json','x-api-key':S.claudeKey,'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:4096,system:'Expert editor. JSON array only.',messages:[{role:'user',content:prompt}]})});
      if(!resp.ok)throw new Error('API '+resp.status);
      const d=await resp.json(),txt=d.content.map(c=>c.text||'').join('');
      let parsed;try{parsed=JSON.parse(txt.replace(/```json?\s*/g,'').replace(/```/g,'').trim())}catch{const m=txt.match(/\[[\s\S]*\]/);if(m)parsed=JSON.parse(m[0]);else throw new Error('Parse fail')}
      let fx=0;parsed.forEach(p=>{if(p.status==='fix'||p.status==='generate'){const e=batch[p.idx];if(e){results.push({...e,suggestion:p.suggestion||'',reason:p.reason||'',status:p.status});fx++}}});
      S.auditLog.push(`  ${fx} need review, ${batch.length-fx} OK`);
    }catch(e){S.auditLog.push(`  Error: ${e.message}`)}
    S.auditProgress=Math.min(i+bs,allEntries.length);render();
    if(i+bs<allEntries.length)await new Promise(r=>setTimeout(r,1500));
  }
  S.auditRunning=false;S.reviewQueue=[...S.reviewQueue,...results];saveRQ();
  S.auditLog.push(`\nDone! ${results.length} items queued.`);toast(`${results.length} items to review`,'success');render();
}
async function reviewAction(item,action,custom){
  if(action==='accept'||action==='custom'){
    // Find the keyword in the row and update description
    const kwCol=S.headers.findIndex(h=>h.toLowerCase()==='keywords');
    if(kwCol>=0&&S.rows[item.rowIdx]){
      try{
        let kw=JSON.parse(S.rows[item.rowIdx][kwCol]);
        const tag=kw.find(t=>t.name===item.entryName);
        if(tag){tag.description=action==='custom'?custom:item.suggestion;
          await saveCell(item.rowIdx,kwCol,JSON.stringify(kw));}
      }catch{}
    }
  }
  S.reviewQueue=S.reviewQueue.filter(r=>!(r.rowIdx===item.rowIdx&&r.entryName===item.entryName));saveRQ();render();
}

          const descEmpty=!r.desc?.trim();
          const vidUrl=r.clipId?`https://videos.jem.tv/video-player?clip=${r.clipId}`:(r.objId?`https://videos.jem.tv/video-player?clip=${r.objId.replace('video_clip-','')}`:'');
          h+=`<div class="idx-result">`;
          h+=`<span class="idx-result-desc ${descEmpty?'empty-desc':'editable'}" data-editdesc="${esc(e.name)}|${seg}|${ri}" title="Double-click to edit">${descEmpty?'[no description]':esc(r.desc)}</span>`;
          if(r.rel)h+=`<span class="idx-result-rel">[${esc(r.rel)}]</span>`;
          h+=`<span class="idx-result-ref">`;
          if(r.clipType==='Film Chapter'||r.clipType==='Film')h+=`<a href="${vidUrl}" target="_blank" title="${esc(r.clipName)}">${esc(r.pvName||r.clipName)}</a>`;
          else h+=`<a href="${vidUrl}" target="_blank" title="${esc(r.clipName)}">#${esc(r.progNum)}</a>`;
          h+=`</span>`;
          h+=`<span class="idx-result-actions">`;
          if(vidUrl)h+=`<a class="idx-mini-btn" href="${vidUrl}" target="_blank" title="Watch">${IC.video}</a>`;
          if(r.transcript)h+=`<span class="idx-mini-btn" data-showtx="${r.rowIdx}" title="Transcript">${IC.doc}</span>`;
          h+=`<span class="idx-mini-btn" data-auditone="${esc(e.name)}|${r.rowIdx}" title="Audit this">${IC.audit}</span>`;
          h+=`</span></div>`;
        });
        h+='</div>';
      });
      h+='</div>';
    });
  });
  if(entryCount>300)h+=`<div style="padding:20px;text-align:center;color:var(--tx-3);font-size:12px">Showing 300 of ${entryCount} entries. Use search or section tabs to narrow.</div>`;
  h+='</div></div></div>';
  return h;
}

function rSheet(){
  const pr=getProc(),vc=S.headers.map((h,i)=>({h,i})).filter(c=>S.visibleCols.has(c.i)),dr=pr.slice(0,500);
  let h='<div style="display:flex;flex-direction:column;height:100%">';
  h+='<div class="table-toolbar">';
  h+=`<div class="idx-search">${IC.search}<input id="si" placeholder="Search…" value="${esc(S.search)}"></div>`;
  if(S.selected.size>0)h+=`<div class="sel-bar">${S.selected.size} sel <button class="btn btn-sm btn-red" id="btn-del">${IC.trash}</button><button class="btn btn-sm" id="btn-desel">Clear</button></div>`;
  h+=`<div class="toolbar-spacer"></div><span class="toolbar-count">${pr.length.toLocaleString()} rows</span>`;
  h+=`<button class="btn btn-sm" id="btn-ref">${IC.refresh}</button>`;
  h+='</div>';
  h+='<div class="table-wrap"><table><thead><tr>';
  h+=`<th class="col-chk"><input type="checkbox" id="chk-all" ${S.selected.size===pr.length&&pr.length?'checked':''}></th><th class="col-num">#</th>`;
  for(const c of vc)h+=`<th data-col="${c.i}">${esc(c.h)}</th>`;
  h+='</tr></thead><tbody>';
  for(const{d,i:idx}of dr){
    h+=`<tr class="${S.selected.has(idx)?'sel':''}" data-idx="${idx}"><td class="col-chk"><input type="checkbox" data-chk="${idx}" ${S.selected.has(idx)?'checked':''}></td><td class="col-num" style="color:var(--tx-4);font-size:10px">${idx+1}</td>`;
    for(const c of vc){const val=d[c.i]||'',ed=S.editCell&&S.editCell.r===idx&&S.editCell.c===c.i;
      if(ed)h+=`<td class="editing"><input class="cell-input" id="ei" value="${esc(S.editVal)}"></td>`;
      else h+=`<td data-dbl="${idx}-${c.i}" title="${esc(val)}">${esc((val+'').slice(0,100))}</td>`}
    h+='</tr>'}
  h+='</tbody></table>';
  if(pr.length>500)h+=`<div style="padding:12px;text-align:center;color:var(--tx-4);font-size:11px">Showing 500 of ${pr.length.toLocaleString()}</div>`;
  return h+'</div></div>';
}
function getProc(){let r=S.rows.map((d,i)=>({d,i}));if(S.search.trim()){const q=S.search.toLowerCase();r=r.filter(x=>x.d.some(c=>c&&c.toString().toLowerCase().includes(q)))}if(S.sortCol!==null){const c=S.sortCol,dir=S.sortDir;r.sort((a,b)=>{const va=(a.d[c]||'').toString(),vb=(b.d[c]||'').toString(),na=parseFloat(va),nb=parseFloat(vb);if(!isNaN(na)&&!isNaN(nb))return dir==='asc'?na-nb:nb-na;return dir==='asc'?va.localeCompare(vb):vb.localeCompare(va)})}return r}

function rAuditor(){
  let h='<div class="page-hd"><h1>AI Tag Description Auditor</h1><p>Check descriptions against your rules</p></div><div class="pad">';
  if(!S.indexData)return h+'<p>Load data first.</p></div>';
  const ix=S.indexData;
  h+='<div class="grid grid-4" style="margin-bottom:16px">';
  h+=`<div class="audit-stat"><div class="num">${ix.totalEntries}</div><div class="lbl">Entries</div></div>`;
  h+=`<div class="audit-stat"><div class="num">${ix.totalResults}</div><div class="lbl">Tag Instances</div></div>`;
  h+=`<div class="audit-stat"><div class="num" style="color:var(--purple)">${S.reviewQueue.length}</div><div class="lbl">In Queue</div></div>`;
  h+='</div>';
  h+='<div class="card" style="margin-bottom:14px"><h4>Active Rules</h4>';
  RULES.tagDesc.checks.forEach(c=>{h+=`<div style="display:flex;align-items:center;gap:6px;padding:3px 0;font-size:12px"><span style="color:${c.on?'var(--green)':'var(--tx-4)'}">${c.on?'✓':'✗'}</span>${c.name}</div>`});
  h+='</div>';
  if(S.auditRunning){
    h+=`<div style="padding:14px;background:var(--bg-0);border:1px solid var(--border);border-radius:var(--radius)"><div style="font-size:13px;font-weight:600">Auditing… ${S.auditProgress}/${S.auditTotal}</div><div class="audit-progress-bar"><div class="audit-progress-fill" style="width:${S.auditTotal?(S.auditProgress/S.auditTotal*100):0}%"></div></div><div class="audit-log">`;
    S.auditLog.forEach(l=>{h+=`<div>${esc(l)}</div>`});h+='</div></div>';
  }else{
    h+=`<button class="btn btn-gold" id="btn-audit" style="height:40px;padding:0 24px;font-size:13px;font-weight:600">${IC.play} Run Full Audit</button>`;
    h+=`<span style="font-size:11px;color:var(--tx-3);margin-left:10px">${S.auditBatch} per batch, rate-limited</span>`;
    if(S.auditLog.length){h+='<div class="audit-log" style="margin-top:12px">';S.auditLog.forEach(l=>{h+=`<div>${esc(l)}</div>`});h+='</div>'}
  }
  return h+'</div>';
}

function rReview(){
  let h=`<div class="page-hd"><h1>Review Queue</h1><p>${S.reviewQueue.length} items awaiting review</p></div><div class="pad">`;
  if(!S.reviewQueue.length)return h+`<div style="text-align:center;padding:50px;color:var(--tx-3)"><div style="font-size:40px;margin-bottom:10px">✓</div><div style="font-size:15px;font-weight:600;color:var(--tx-2)">All clear</div><button class="btn btn-purple" data-nav="auditor" style="margin-top:14px">Run Audit</button></div></div>`;
  S.reviewQueue.slice(0,50).forEach((item,qi)=>{
    h+=`<div class="review-item"><div class="review-tag">${esc(item.entryName)}</div><div class="review-section">${esc(item.section)} · Row ${item.rowIdx+1}</div>`;
    h+=`<div class="review-row"><div style="flex:1"><div class="review-label">Original</div><div class="${item.desc?'review-old':''}">${item.desc?esc(item.desc):'<i style="color:var(--tx-4)">[empty]</i>'}</div></div><div style="flex:1"><div class="review-label">Suggested</div><div class="review-new">${esc(item.suggestion)}</div></div></div>`;
    if(item.reason)h+=`<div class="review-reason">${esc(item.reason)}</div>`;
    if(item.transcript)h+=`<div class="review-transcript">${esc(item.transcript.slice(0,250))}${item.transcript.length>250?'…':''}</div>`;
    h+=`<div class="review-actions"><button class="btn btn-sm btn-green" data-raccept="${qi}">${IC.check} Accept</button><button class="btn btn-sm btn-red" data-rdeny="${qi}">${IC.x} Deny</button><input class="review-custom-input" data-rcinput="${qi}" placeholder="Custom…"><button class="btn btn-sm btn-purple" data-rcustom="${qi}">Custom</button></div></div>`;
  });
  if(S.reviewQueue.length>50)h+=`<div style="text-align:center;color:var(--tx-3);font-size:12px;padding:12px">Showing 50 of ${S.reviewQueue.length}</div>`;
  return h+'</div>';
}

function rSettings(){
  let h='<div class="page-hd"><h1>Settings</h1><p>Configure rules, connections, and preferences</p></div><div class="pad">';
  h+='<div style="margin-bottom:20px"><h3 style="font-family:var(--serif);font-size:16px;margin-bottom:10px">Tag Description Rules</h3>';
  RULES.tagDesc.checks.forEach((c,i)=>{h+=`<div class="rule-item"><span class="rule-name">${c.name}</span><button class="rule-toggle ${c.on?'on':''}" data-ruletoggle="${i}"></button></div>`});
  h+=`<button class="btn btn-sm" style="margin-top:8px" id="add-rule">${IC.play} Add Rule</button>`;
  h+='</div>';
  h+='<div style="margin-bottom:20px"><h3 style="font-family:var(--serif);font-size:16px;margin-bottom:10px">Style Examples</h3>';
  RULES.tagDesc.good.forEach(e=>{h+=`<div style="font-size:12px;padding:3px 0"><strong>${esc(e.tag)}</strong> → "${esc(e.desc)}"</div>`});
  h+='</div>';
  h+=`<div style="margin-bottom:20px"><h3 style="font-family:var(--serif);font-size:16px;margin-bottom:8px">Bulk Delete by Type</h3><p style="font-size:11px;color:var(--tx-3);margin-bottom:8px">Delete all rows matching a content type (e.g., "Good Night", "Connection Point")</p><div style="display:flex;gap:8px"><input class="s-input" id="bulk-type" placeholder="Type name…" style="margin:0;flex:1"><button class="btn btn-red" id="bulk-del-btn">${IC.trash} Delete Matching</button></div></div>`;
  h+=`<div><h3 style="font-family:var(--serif);font-size:16px;margin-bottom:8px">Connection</h3><div style="font-size:12px;color:var(--tx-2)">Sheet: <code>${esc(S.sheetId.slice(0,30))}…</code></div><div style="font-size:12px;color:var(--tx-2)">Claude: <span style="color:${S.claudeKey?'var(--green)':'var(--red)'}">${S.claudeKey?'Connected':'Not set'}</span></div></div>`;
  return h+'</div>';
}

function rAI(){
  let h='<div class="ai-panel"><div class="ai-head"><div class="ai-dot"></div><h3>Claude AI</h3><button class="btn btn-sm btn-icon" id="ai-close">${IC.x}</button></div><div class="ai-msgs">';
  if(!S.aiMsgs.length)h+=`<div class="ai-msg system">Ask me about your data, or request changes.</div>`;
  S.aiMsgs.forEach(m=>{const d=rmd(m.content);if(d)h+=`<div class="ai-msg ${m.role}">${d}</div>`});
  if(S.aiTyping)h+='<div class="ai-typing">Thinking…</div>';
  h+=`</div><div class="ai-input-area"><textarea class="ai-input" id="ain" placeholder="Ask about your data…" rows="1">${esc(S.aiInput)}</textarea><button class="ai-send" id="ais" ${S.aiTyping?'disabled':''}>${IC.send}</button></div></div>`;
  return h;
}

function rTranscript(){
  const t=S.transcriptPopup;
  return `<div class="popup-overlay" id="tx-close"></div><div class="transcript-popup"><div class="transcript-popup-hd"><h3>${esc(t.clipName)}</h3><button class="btn btn-sm btn-icon" id="tx-x">${IC.x}</button></div><div class="transcript-popup-body">${esc(t.transcript)}</div></div>`;
}

function rSetup(app){
  app.innerHTML=`<div class="setup-screen"><div class="setup-card"><h1>JEM Index Workstation</h1><p class="sub">Connect your Google Sheet and Claude AI to start editing your video index.</p>
  <div class="setup-steps"><h3>Google Setup (one-time)</h3><ol><li>Go to <code>console.cloud.google.com</code></li><li>Enable <code>Google Sheets API</code></li><li>Create <strong>OAuth 2.0 Client ID</strong> (Web app)</li><li>Add JS origin: <strong>your GitHub Pages URL</strong></li><li>Add yourself as <strong>test user</strong></li></ol></div>
  <label>Google OAuth Client ID</label><input class="s-input" id="ic" placeholder="…apps.googleusercontent.com" value="${esc(S.clientId)}">
  <label>Google Sheet ID</label><input class="s-input" id="is" placeholder="From spreadsheet URL" value="${esc(S.sheetId)}">
  <div class="setup-ai"><h3>🤖 Claude AI</h3><p>Powers auditing, chat, and intelligent features.</p><label style="color:var(--purple)">Anthropic API Key</label><input class="s-input" id="ik" type="password" placeholder="sk-ant-…" value="${esc(S.claudeKey)}"></div>
  <div class="setup-err" id="se"></div>
  <button class="btn btn-gold" id="btn-con" style="width:100%;height:42px;font-size:14px;font-weight:600">Sign in & Connect</button></div></div>`;
  $('#btn-con').onclick=async()=>{const c=$('#ic').value.trim(),s=$('#is').value.trim(),k=$('#ik').value.trim();if(!c||!s){$('#se').textContent='Both required';return}$('#btn-con').textContent='Connecting…';$('#btn-con').disabled=true;try{await doConnect(c,s,k);await loadTab(0);render()}catch(e){$('#se').textContent=e.message;$('#btn-con').textContent='Sign in & Connect';$('#btn-con').disabled=false}};
}

// ═══════════════════════════════════════════════════════════════
// EVENT BINDING
// ═══════════════════════════════════════════════════════════════
function bindAll(){
  const on=(sel,ev,fn)=>{const el=$(sel);if(el)el.addEventListener(ev,fn)};
  // Nav
  $$('[data-nav]').forEach(el=>el.onclick=()=>{S.view=el.dataset.nav;render()});
  on('#nav-ai','click',()=>{S.aiOpen=!S.aiOpen;render()});
  on('#blo','click',logout);
  $$('[data-stab]').forEach(el=>el.onclick=()=>loadTab(+el.dataset.stab));

  // Index
  on('#idx-search','input',()=>{S.idxSearch=$('#idx-search').value;render();setTimeout(()=>{const e=$('#idx-search');if(e){e.focus();e.selectionStart=e.selectionEnd=e.value.length}},0)});
  $$('[data-idxnav]').forEach(el=>el.onclick=()=>{S.idxNavMode=el.dataset.idxnav;if(S.idxNavMode!=='tabs')S.idxActiveSection='all';render()});
  $$('[data-idxlayout]').forEach(el=>el.onclick=()=>{S.idxLayout=el.dataset.idxlayout;render()});
  $$('[data-idxsec]').forEach(el=>el.onclick=()=>{S.idxActiveSection=el.dataset.idxsec;render()});
  $$('[data-tree]').forEach(el=>el.onclick=()=>{S.idxActiveEntry=el.dataset.tree;render()});
  on('#idx-ref','click',()=>{buildIndex();render()});

  // Generate index tabs
  $$('[data-gentab]').forEach(el=>el.onclick=()=>generateIndexTab(el.dataset.gentab));
  // Toggle review columns
  $$('[data-togglerev]').forEach(el=>el.onclick=()=>{
    const show=el.dataset.togglerev==='show';
    const indexTabs=(S.sheetMeta?.tabs||[]).filter(t=>t.title.startsWith('Index - '));
    indexTabs.forEach(t=>toggleReviewCols(t.title,show));
  });

  // Bookmarks
  $$('[data-bm]').forEach(el=>el.onclick=(e)=>{e.stopPropagation();const n=el.dataset.bm;S.idxBookmarks[n]=!S.idxBookmarks[n];if(!S.idxBookmarks[n])delete S.idxBookmarks[n];saveBM();render()});

  // Description editing (double-click)
  $$('[data-editdesc]').forEach(el=>el.ondblclick=()=>{
    const[entryName,segType,ri]=el.dataset.editdesc.split('|');
    S.editingDesc={entryName,segType,ri:+ri};
    // Get current text
    const entry=findEntry(entryName);
    if(!entry)return;
    const byseg={};entry.results.forEach(r=>{if(!byseg[r.segType])byseg[r.segType]=[];byseg[r.segType].push(r)});
    const result=byseg[segType]?.[+ri];
    if(!result)return;
    // Replace with input
    el.outerHTML=`<span class="idx-inline-edit"><input class="idx-inline-input" id="desc-edit" value="${esc(result.desc||'')}"><button class="btn btn-sm btn-green" id="desc-save">${IC.check}</button><button class="btn btn-sm" id="desc-cancel">${IC.x}</button></span>`;
    const inp=$('#desc-edit');if(inp)inp.focus();
    on('#desc-save','click',async()=>{
      const newVal=$('#desc-edit')?.value||'';
      // Update in the sheet's keywords JSON
      const kwCol=S.headers.findIndex(h=>h.toLowerCase()==='keywords');
      if(kwCol>=0){
        try{
          let kw=JSON.parse(S.rows[result.rowIdx][kwCol]);
          const tag=kw.find(t=>t.name===entryName);
          if(tag){tag.description=newVal;await saveCell(result.rowIdx,kwCol,JSON.stringify(kw));buildIndex();render()}
        }catch(e){toast('Save error','error')}
      }
    });
    on('#desc-cancel','click',()=>{S.editingDesc=null;render()});
    if(inp)inp.onkeydown=e=>{if(e.key==='Enter')$('#desc-save')?.click();if(e.key==='Escape')$('#desc-cancel')?.click()};
  });

  // Transcript popup
  $$('[data-showtx]').forEach(el=>el.onclick=()=>{
    const ri=+el.dataset.showtx;
    const txCol=S.headers.findIndex(h=>h.toLowerCase()==='transcript');
    const nameCol=S.headers.findIndex(h=>h.toLowerCase()==='name');
    if(txCol>=0&&S.rows[ri]){
      S.transcriptPopup={clipName:(S.rows[ri][nameCol]||'Clip'),transcript:S.rows[ri][txCol]||'No transcript available'};render()
    }
  });
  on('#tx-close','click',()=>{S.transcriptPopup=null;render()});
  on('#tx-x','click',()=>{S.transcriptPopup=null;render()});

  // Sheet view
  on('#si','input',()=>{S.search=$('#si').value;render();setTimeout(()=>{const e=$('#si');if(e){e.focus();e.selectionStart=e.selectionEnd=e.value.length}},0)});
  on('#chk-all','change',()=>{const p=getProc();S.selected=$('#chk-all').checked?new Set(p.map(r=>r.i)):new Set();render()});
  $$('[data-chk]').forEach(el=>el.onchange=()=>{const i=+el.dataset.chk;S.selected.has(i)?S.selected.delete(i):S.selected.add(i);render()});
  $$('th[data-col]').forEach(el=>el.onclick=()=>{const c=+el.dataset.col;if(S.sortCol===c)S.sortDir=S.sortDir==='asc'?'desc':'asc';else{S.sortCol=c;S.sortDir='asc'}render()});
  $$('[data-dbl]').forEach(el=>el.ondblclick=()=>{const[r,c]=el.dataset.dbl.split('-').map(Number);S.editCell={r,c};S.editVal=(S.rows[r]||[])[c]||'';render();setTimeout(()=>{const e=$('#ei');if(e)e.focus()},0)});
  const ei=$('#ei');if(ei){ei.oninput=()=>{S.editVal=ei.value};ei.onblur=()=>{if(S.editCell){saveCell(S.editCell.r,S.editCell.c,S.editVal).then(()=>{S.editCell=null;buildIndex();render()})}};ei.onkeydown=e=>{if(e.key==='Enter')ei.blur();if(e.key==='Escape'){S.editCell=null;render()}}}
  on('#btn-del','click',()=>delRows(S.selected));
  on('#btn-desel','click',()=>{S.selected=new Set();render()});
  on('#btn-ref','click',()=>loadTab(S.activeTab));

  // Auditor
  on('#btn-audit','click',runAudit);

  // Review
  $$('[data-raccept]').forEach(el=>el.onclick=()=>{const qi=+el.dataset.raccept;const item=S.reviewQueue[qi];if(item)reviewAction(item,'accept')});
  $$('[data-rdeny]').forEach(el=>el.onclick=()=>{const qi=+el.dataset.rdeny;const item=S.reviewQueue[qi];if(item){S.reviewQueue=S.reviewQueue.filter(r=>!(r.rowIdx===item.rowIdx&&r.entryName===item.entryName));saveRQ();render()}});
  $$('[data-rcustom]').forEach(el=>el.onclick=()=>{const qi=+el.dataset.rcustom;const item=S.reviewQueue[qi];const inp=$(`[data-rcinput="${qi}"]`);if(item&&inp&&inp.value.trim())reviewAction(item,'custom',inp.value.trim())});

  // Settings
  $$('[data-ruletoggle]').forEach(el=>el.onclick=()=>{const i=+el.dataset.ruletoggle;RULES.tagDesc.checks[i].on=!RULES.tagDesc.checks[i].on;render()});
  on('#add-rule','click',()=>{const name=prompt('Rule name:');if(name)RULES.tagDesc.checks.push({id:'custom_'+Date.now(),name,on:true});render()});
  on('#bulk-del-btn','click',()=>{const t=$('#bulk-type')?.value;if(t)bulkDeleteByType(t)});

  // AI
  const ain=$('#ain');if(ain){ain.oninput=()=>{S.aiInput=ain.value;ain.style.height='auto';ain.style.height=Math.min(ain.scrollHeight,90)+'px'};ain.onkeydown=e=>{if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();doSendAI()}}}
  on('#ais','click',doSendAI);
  on('#ai-close','click',()=>{S.aiOpen=false;render()});
}
function doSendAI(){const v=(S.aiInput||'').trim();if(!v||S.aiTyping)return;aiChat(v)}
function findEntry(name){if(!S.indexData)return null;for(const sec of Object.values(S.indexData.sections)){const e=sec.find(x=>x.name===name);if(e)return e}return null}

// ═══════════════════════════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════════════════════════
render();
</script>
