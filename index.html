// Relationship label defaults per segment type. Hide label if it matches the default; show [label] if it differs.
// Section-agnostic fallback defaults (used when section-specific defaults aren't configured)
const REL_DEFAULTS={
  'Addresses':'spoken about',
  'Timeless Moments':'seen in',
  'Conversations':'in conversation with',
  'My Encounter':'interviewee',
  'Short Films':'interviewee',
  'Films':'interviewee'
};

// Normalizes underscore to space for comparison (data may use "spoken_about" or "spoken about")
function normalizeRel(s){return(s||'').toString().trim().toLowerCase().replace(/_/g,' ')}

// Look up the default relationship for a (section, segType) pair.
// Tries section-specific defaults first (RULES.relDefaults[section][segType]), falls back to global.
function getRelDefault(section,segType){
  // Section-specific override
  const sectionDefaults=RULES?.relDefaults?.[section];
  if(sectionDefaults&&sectionDefaults[segType])return normalizeRel(sectionDefaults[segType]);
  // Global fallback
  return normalizeRel(REL_DEFAULTS[segType]);
}

// Should the relationship label be shown for this result?
// Rules:
//   - Nigunim section: show ONLY if rel is "spoken about"; otherwise hide
//   - All other sections: hide if rel matches the section+segType default; show otherwise
function shouldShowRel(r,section){
  const rel=normalizeRel(r.rel);
  if(!rel)return false;
  if(section==='Nigunim'){
    return rel==='spoken about';
  }
  const def=getRelDefault(section,r.segType);
  return rel!==def;
}

// Should the description be rendered for this entry in Book View?
// In People Index, only "spoken about" relationships get descriptions; others are ref-only.
function shouldShowDesc(r,section){
  if(section!=='People')return true;
  return normalizeRel(r.rel)==='spoken about';
}

function rBook(){
  if(!S.indexData)return'<div class="pad" style="color:var(--tx-3)">Loading index data…</div>';
  const ix=S.indexData;
  const scope=S.bookScope||'all'; // 'all' or a specific section name
  const sections=scope==='all'?RULES.sectionOrder:[scope];
  const title=scope==='all'?'Full Index':scope;

  // Header bar with section pills + export buttons
  let h=`<div class="page-hd" style="padding-bottom:10px">`;
  h+=rBackBtn();
  h+=`<div style="display:flex;justify-content:space-between;align-items:flex-start;gap:12px;flex-wrap:wrap">`;
  h+=`<div style="flex:1;min-width:200px"><h1 style="margin-bottom:2px">📖 Book View</h1><p style="margin:0">Read the index as it will appear in print. Click ✎ on any entry or sub-entry to jump to the editor.</p></div>`;
  h+=`<div style="display:flex;gap:6px;flex-shrink:0">`;
  h+=`<button class="btn btn-sm" id="book-download-pdf" title="Open print dialog — choose 'Save as PDF'">📄 Download as PDF</button>`;
  h+=`<button class="btn btn-sm" id="export-index" title="Export full index as standalone HTML" style="border-color:var(--green);color:var(--green)">📥 Export HTML</button>`;
  h+=`</div>`;
  h+=`</div>`;
  // Section selector pills
  h+=`<div class="book-section-pills" style="display:flex;flex-wrap:wrap;gap:5px;margin-top:12px">`;
  const totalCnt=Object.values(ix.sections).reduce((a,s)=>a+s.length,0);
  h+=`<button class="book-pill ${scope==='all'?'active':''}" data-bookscope="all">Full Index <span class="book-pill-cnt">${totalCnt}</span></button>`;
  RULES.sectionOrder.forEach(sec=>{
    const cnt=(ix.sections[sec]||[]).length;
    if(!cnt)return;
    h+=`<button class="book-pill ${scope===sec?'active':''}" data-bookscope="${esc(sec)}">${esc(sec)} <span class="book-pill-cnt">${cnt}</span></button>`;
  });
  h+=`</div>`;
  h+=`</div>`;
  // Reader area
  h+='<div class="book-view"><div class="book-page">';

  sections.forEach(section=>{
    const entries=ix.sections[section]||[];
    if(!entries.length)return;
    if(scope==='all')h+=`<h2 class="book-section-hd">${esc(section)}</h2>`;
    entries.forEach(e=>{
      h+=`<div class="book-entry">`;
      h+=`<div class="book-entry-head"><span class="book-entry-name">${esc(e.name)}</span><button class="book-entry-edit" data-bookedit="${esc(e.name)}" title="Edit in workstation">✎</button></div>`;
      // Group results by segment type, in canonical order
      const byseg={};
      e.results.forEach(r=>{if(!byseg[r.segType])byseg[r.segType]=[];byseg[r.segType].push(r)});
      RULES.segOrder.forEach(seg=>{
        const rs=byseg[seg];
        if(!rs||!rs.length)return;
        h+=`<div class="book-seg"><div class="book-seg-label">${esc(seg)}</div>`;
        rs.forEach(r=>{
          const relRaw=parseInt(r.relevancy)||0;
          const relScore=(relRaw>=1&&relRaw<=4)?relRaw:4;
          h+=`<div class="book-row" data-rel="${relScore}">`;
          // Description (People-exception: only "spoken about" gets description)
          const showDesc=shouldShowDesc(r,section);
          if(showDesc){
            const d=(r.desc||'').trim();
            if(d){
              h+=`<span class="book-desc">${esc(d)}</span>`;
            }else{
              h+=`<span class="book-desc book-desc-empty">[empty]</span>`;
            }
          }
          // Relationship label (only when it differs from segment default, or Nigunim "spoken about")
          if(shouldShowRel(r,section)){
            h+=`<span class="book-rel">[${esc(r.rel)}]</span>`;
          }
          // Reference code — hyperlinked to the clip
          const vidUrl=clipLinkForResult(r);
          let refText='';
          if(r.clipType==='Film Chapter'||r.clipType==='Film'){
            refText=filmRefForResult(r);
          }else{
            refText=refCodeForResult(r)||'';
          }
          if(refText){
            h+=`<a class="book-ref" href="${vidUrl}" target="_blank" title="${esc(r.clipName||'')}">${esc(refText)}</a>`;
          }
          // Edit description — jump to editor and open inline editor
          h+=`<button class="book-comment book-edit-desc" data-bookdescedit="${esc(e.name)}|${esc(r.segType)}|${r.rowIdx}" title="Edit this description">✎</button>`;
          // Comment bounce — click to jump to editor and open note popup
          h+=`<button class="book-comment" data-bookjump="${esc(e.name)}|${esc(r.segType)}|${r.rowIdx}" title="Jump to editor to add a note">💬</button>`;
          h+=`</div>`;
        });
        h+='</div>';
      });
      h+='</div>';
    });
  });

  h+='</div></div>';
  return h;
}

    h+=`<button class="btn btn-sm ${S.showAllActivity?'btn-gold':''}" id="activity-all" style="font-size:9px">Everyone</button>`;

    h+='<div style="max-height:250px;overflow-y:auto;font-size:10px">';
    displayLog.forEach(entry=>{
      const time=new Date(entry.timestamp);
      const timeStr=time.toLocaleDateString()+' '+time.toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'});
      h+=`<div style="padding:3px 0;border-bottom:1px solid var(--bg-1);display:flex;gap:6px">`;

    });

  }
  h+='</div>';

  return h+'</div>';

// FOCUS MODE — one-card-at-a-time keyboard reading view (F key)
// ═══════════════════════════════════════════════════════════════

// Build the queue of items to review in focus mode.
// Respects the current filters (section, search, user-work, reviewFilter).
// Includes entries with pending AI suggestions AND entries with empty/unreviewed descriptions.
function buildFocusQueue(){
  if(!S.indexData)return[];
  const q=S.idxSearch.toLowerCase();
  const searchMode=S.idxSearchMode||'both';
  const userFilter=S.userWorkFilter||'';
  // Determine which sections to include
  const sectionsToShow=S.idxActiveSection==='all'?RULES.sectionOrder:[S.idxActiveSection];
  const queue=[];
  sectionsToShow.forEach(sec=>{
    let entries=(S.indexData.sections[sec]||[]);
    // Apply search filter
    if(q){
      if(searchMode==='name')entries=entries.filter(e=>e.name.toLowerCase().includes(q));
      else if(searchMode==='desc')entries=entries.filter(e=>e.results.some(r=>(r.desc||'').toLowerCase().includes(q)));
      else entries=entries.filter(e=>e.name.toLowerCase().includes(q)||e.results.some(r=>(r.desc||'').toLowerCase().includes(q)));
    }
    // Apply admin user-work filter
    if(userFilter){
      entries=entries.filter(e=>userTouchedEntry(e,userFilter));
    }
    // Apply review filter (same logic as applyReviewFilter, but without the reviewMode side-effect)
    const f=S.reviewFilter;
    if(f==='reviewed')entries=entries.filter(e=>isEntryReviewed(e));
    else if(f==='unreviewed')entries=entries.filter(e=>!isEntryReviewed(e));
    else if(f==='pending')entries=entries.filter(e=>e.results.some(r=>hasPendingSuggestion(e.name,r.segType,r.rowIdx)));
    else if(f==='bookmarked')entries=entries.filter(e=>S.idxBookmarks[e.name]);
    // Flatten to (entry, result) pairs
    entries.forEach(e=>{
      e.results.forEach(r=>{
        const k=rvKey(e.name,r.segType,r.rowIdx);
        const rv=S.reviewData?.[k]||{};
        const hasPending=rv.suggestion&&rv.status==='pending';
        const isEmpty=!r.desc||!r.desc.trim();
        const isReviewed=rv.status==='accepted'||rv.status==='denied'||rv.status==='custom'||rv.status==='ok'||rv.reviewed;
        // Always include: pending suggestions (priority), empty descriptions, and unreviewed non-empty ones.
        // Skip: already-reviewed items that have no pending (those are done).
        if(hasPending){
          queue.push({entry:e,result:r,section:sec,type:'pending',key:k});
        }else if(isEmpty&&!isReviewed){
          queue.push({entry:e,result:r,section:sec,type:'empty',key:k});
        }else if(!isReviewed){
          queue.push({entry:e,result:r,section:sec,type:'unreviewed',key:k});
        }
      });
    });
  });
  // Sort: pending first, then empties, then unreviewed
  const order={pending:0,empty:1,unreviewed:2};
  queue.sort((a,b)=>(order[a.type]||9)-(order[b.type]||9));
  return queue;
}

function enterFocusMode(){
  const queue=buildFocusQueue();
  if(!queue.length){
    toast('No items to review in the current filter','info');
    return;
  }
  // Soft warning for very large queues
  if(queue.length>500){
    customConfirm(`This queue has ${queue.length} items. That's a lot to go through — consider narrowing your filter first. Continue anyway?`).then(ok=>{
      if(!ok)return;
      S.focusQueue=queue;
      S.focusIndex=0;
      S.focusMode=true;
      render();
    });
    return;
  }
  S.focusQueue=queue;
  S.focusIndex=0;
  S.focusMode=true;
  render();
}

function exitFocusMode(){
  S.focusMode=false;
  S.focusShowHelp=false;
  render();
}

function rFocus(){
  if(!S.focusQueue||!S.focusQueue.length){
    return `<div class="focus-wrap"><div class="focus-card"><div style="text-align:center;padding:40px"><h2>No items in queue</h2><p style="color:var(--tx-3);margin:16px 0">Adjust your filters and try again.</p><button class="btn" id="focus-exit">← Exit focus mode</button></div></div></div>`;
  }
  // Clamp index
  if(S.focusIndex<0)S.focusIndex=0;
  if(S.focusIndex>=S.focusQueue.length)S.focusIndex=S.focusQueue.length-1;
  const item=S.focusQueue[S.focusIndex];
  const{entry:e,result:r,section,type,key}=item;
  const rv=S.reviewData?.[key]||{};
  const hasPending=rv.suggestion&&rv.status==='pending';
  const descEmpty=!r.desc||!r.desc.trim();
  const progress=Math.round(((S.focusIndex+1)/S.focusQueue.length)*100);

  let h=`<div class="focus-wrap">`;
  // Top bar — exit button + progress + section/tag info
  h+=`<div class="focus-topbar">`;
  h+=`<button class="focus-exit-btn" id="focus-exit" title="Exit focus mode">← Exit</button>`;
  h+=`<div class="focus-progress-text">${S.focusIndex+1} / ${S.focusQueue.length} · ${esc(section)}</div>`;
  h+=`<span style="min-width:60px"></span>`;
  h+=`</div>`;

  // Main card — book-page style
  h+=`<div class="focus-card">`;
  h+=`<div class="focus-tag-line">${esc(section)} · ${esc(r.segType||'')}</div>`;
  h+=`<h1 class="focus-tag-name">${esc(e.name)}</h1>`;

  // Type-specific content
  if(hasPending){
    h+=`<div class="focus-original-label">Original</div>`;
    h+=`<div class="focus-original">${descEmpty?'<span style="color:var(--tx-4);font-style:italic">[empty]</span>':esc(r.desc)}</div>`;
    h+=`<div class="focus-arrow">↓</div>`;
    h+=`<div class="focus-suggestion-label">AI Suggestion</div>`;
    h+=`<div class="focus-suggestion">${esc(rv.suggestion)}</div>`;
    if(rv.reason){
      h+=`<div class="focus-reason">${esc(rv.reason)}</div>`;
    }
    if(Array.isArray(rv.ruleViolations)&&rv.ruleViolations.length){
      h+=`<div class="focus-rules">`;
      rv.ruleViolations.forEach(v=>{
        const m=String(v).match(/Rule\s*(\d+)\s*[—-]?\s*(.*)/i);
        const lbl=m?`R${m[1]}${m[2]?' · '+m[2]:''}`:v;
        h+=`<span class="idx-rule-chip" title="${esc(v)}">${esc(lbl.length>40?lbl.slice(0,40)+'…':lbl)}</span>`;
      });
      h+=`</div>`;
    }
  }else if(descEmpty){
    h+=`<div class="focus-original-label">Description</div>`;
    h+=`<div class="focus-empty-badge">[empty — needs description]</div>`;
    h+=`<div class="focus-hint">Press E to write one, or D to mark as reviewed with no description</div>`;
  }else{
    h+=`<div class="focus-original-label">Current Description</div>`;
    h+=`<div class="focus-suggestion">${esc(r.desc)}</div>`;
    h+=`<div class="focus-hint">Press A to mark reviewed (no change), E to edit, D to remove</div>`;
  }

  // Clip context (small, subtle)
  if(r.clipName){
    h+=`<div class="focus-clip-info">Clip: ${esc(r.clipName)}${r.pvName&&r.pvName!==r.clipName?' · '+esc(r.pvName):''}</div>`;
  }

  h+=`</div>`;

  // Action button bar
  h+=`<div class="focus-actionbar">`;
  if(hasPending){
    h+=`<button class="focus-action accept" id="focus-accept">✓ Accept</button>`;
    h+=`<button class="focus-action edit" id="focus-edit">✎ Edit</button>`;
    h+=`<button class="focus-action deny" id="focus-deny">✗ Deny</button>`;
  }else if(descEmpty){
    h+=`<button class="focus-action edit" id="focus-edit">✎ Write description</button>`;
    h+=`<button class="focus-action" id="focus-deny">Skip / mark reviewed</button>`;
  }else{
    h+=`<button class="focus-action accept" id="focus-accept">✓ Mark reviewed</button>`;
    h+=`<button class="focus-action edit" id="focus-edit">✎ Edit</button>`;
    h+=`<button class="focus-action deny" id="focus-deny">Remove description</button>`;
  }
  h+=`</div>`;

  // Navigation buttons
  h+=`<div class="focus-navbar">`;
  h+=`<button class="focus-nav" id="focus-prev" ${S.focusIndex<=0?'disabled':''}>← Previous</button>`;
  h+=`<button class="focus-nav" id="focus-next" ${S.focusIndex>=S.focusQueue.length-1?'disabled':''}>Next →</button>`;
  h+=`</div>`;

  // Progress bar at bottom
  h+=`<div class="focus-progressbar"><div class="focus-progress-fill" style="width:${progress}%"></div></div>`;

  h+=`</div>`; // .focus-wrap
  return h;
}

// Wire up focus mode event handlers (buttons only — no keyboard shortcuts)
function wireFocusModeHandlers(){
  const exitBtn=$('#focus-exit');
  if(exitBtn)exitBtn.onclick=exitFocusMode;
  const item=S.focusQueue[S.focusIndex];
  if(!item)return;
  const{entry:entryObj,result:r,key}=item;
  const rv=S.reviewData?.[key]||{};
  const hasPending=rv.suggestion&&rv.status==='pending';
  const descEmpty=!r.desc||!r.desc.trim();

  // Accept button
  on('#focus-accept','click',()=>{
    if(hasPending){
      acceptSuggestion(entryObj.name,r.segType,r.rowIdx).then(()=>advanceAfterAction());
    }else{
      const rvExisting=getRV(key)||{};
      rvExisting.status='ok';rvExisting.reviewed=true;
      rvExisting.editedBy=S.user?.name||S.user?.email||'Unknown';
      rvExisting.editedAt=Date.now();
      setRV(key,rvExisting);
      toast('Marked reviewed','success');
      advanceAfterAction();
    }
  });

  // Deny button
  on('#focus-deny','click',()=>{
    if(hasPending){
      denySuggestion(entryObj.name,r.segType,r.rowIdx);
      advanceAfterAction();
    }else if(descEmpty){
      const rvExisting=getRV(key)||{};
      rvExisting.status='ok';rvExisting.reviewed=true;
      rvExisting.editedBy=S.user?.name||S.user?.email||'Unknown';
      rvExisting.editedAt=Date.now();
      setRV(key,rvExisting);
      toast('Skipped — marked reviewed','success');
      advanceAfterAction();
    }else{
      customConfirm(`Remove description "${r.desc}" for ${entryObj.name}?`).then(async(ok)=>{
        if(!ok)return;
        await updateTagDesc(r.rowIdx,entryObj.name,'');
        const rvExisting=getRV(key)||{};
        rvExisting.status='ok';rvExisting.reviewed=true;
        rvExisting.editedBy=S.user?.name||S.user?.email||'Unknown';
        rvExisting.editedAt=Date.now();
        setRV(key,rvExisting);
        buildIndex();
        advanceAfterAction();
      });
    }
  });

  // Edit button — exits focus mode, jumps to entry in Workspace, opens inline editor
  on('#focus-edit','click',()=>{
    const entryName=entryObj.name;
    exitFocusMode();
    setTimeout(()=>{
      jumpToEntry(entryName,key);
      setTimeout(()=>{
        const allRows=document.querySelectorAll('.idx-result');
        for(const row of allRows){
          const editBtn=row.querySelector(`[data-clippanel="${CSS.escape(key)}"]`);
          if(editBtn){
            row.scrollIntoView({behavior:'smooth',block:'center'});
            const descEl=row.querySelector('.idx-result-desc.editable, .idx-result-desc.empty-desc');
            if(descEl){
              const evt=new MouseEvent('dblclick',{bubbles:true,cancelable:true});
              descEl.dispatchEvent(evt);
            }
            break;
          }
        }
      },350);
    },50);
  });

  // Navigation buttons
  on('#focus-next','click',()=>{
    if(S.focusIndex<S.focusQueue.length-1){S.focusIndex++;render()}
  });
  on('#focus-prev','click',()=>{
    if(S.focusIndex>0){S.focusIndex--;render()}
  });
}

// After an accept/deny action, rebuild the queue and advance the pointer.
function advanceAfterAction(){
  // Rebuild queue (the item we just acted on should drop out)
  const oldKey=S.focusQueue[S.focusIndex]?.key;
  S.focusQueue=buildFocusQueue();
  // Find where we are now — keep roughly the same position
  if(!S.focusQueue.length){
    toast('All done! No more items in this filter.','success');
    exitFocusMode();
    return;
  }
  // If the old item is gone, the index stays pointing at the next item naturally
  // If it's still there (e.g. deny that didn't remove), skip past it
  if(S.focusQueue[S.focusIndex]?.key===oldKey){
    S.focusIndex++;
  }
  if(S.focusIndex>=S.focusQueue.length)S.focusIndex=S.focusQueue.length-1;
  if(S.focusIndex<0)S.focusIndex=0;
  render();
}

function rIndex(){
  if(!S.indexData)return'<div class="pad" style="color:var(--tx-3)">No index data. Load a sheet first.</div>';
  const ix=S.indexData;
  const q=S.idxSearch.toLowerCase();

  let sectionsToShow=S.idxActiveSection==='all'?RULES.sectionOrder:[S.idxActiveSection];

  let h='<div class="idx-wrap">';
  // Back button (only if history exists)
  const backBtn=rBackBtn();
  if(backBtn)h+='<div style="padding:8px 16px 0">'+backBtn+'</div>';
  // User work filter banner (admin only, when active)
  if(S.userWorkFilter){
    const member=(S.teamMembers||[]).find(m=>m&&m.email===S.userWorkFilter);
    const userName=member?.name||S.userWorkFilter;
    h+=`<div style="padding:8px 16px 0"><div style="background:rgba(212,175,55,0.12);border:1px solid var(--gold);border-radius:6px;padding:7px 12px;display:flex;align-items:center;gap:10px;font-size:12px"><span style="font-weight:600;color:var(--gold)">👤 Showing work by:</span><span style="font-weight:500;color:var(--tx-1)">${esc(userName)}</span><button id="user-filter-clear" style="margin-left:auto;background:none;border:none;cursor:pointer;color:var(--tx-3);font-size:14px;padding:0 6px" title="Clear filter">×</button></div></div>`;
  }
  // Clean toolbar
  h+='<div class="idx-toolbar">';
  // Search (with mode pills)
  h+='<div style="display:flex;flex-direction:column;gap:4px;flex:1;max-width:260px">';
  h+=`<div class="idx-search">${IC.search}<input id="idx-search" placeholder="Search entries…" value="${esc(S.idxSearch)}"></div>`;
  const sm=S.idxSearchMode||'both';
  h+=`<div class="idx-search-modes" style="display:flex;gap:3px;font-size:9px;font-weight:500">`;
  h+=`<button class="idx-sm-pill ${sm==='both'?'active':''}" data-searchmode="both" title="Search entry names AND descriptions">Both</button>`;
  h+=`<button class="idx-sm-pill ${sm==='name'?'active':''}" data-searchmode="name" title="Search only entry names (e.g. 'Tefillin')">Entry name</button>`;
  h+=`<button class="idx-sm-pill ${sm==='desc'?'active':''}" data-searchmode="desc" title="Search only descriptions (e.g. 'donning prior to')">Description</button>`;
  h+=`</div>`;
  h+='</div>';
  // Section dropdown removed — section navigation is now in the sidebar Workspace dropdown
  // Filter dropdown
  const filterLabels={all:'Everything',unreviewed:'Needs Review',pending:'Has Suggestions',reviewed:'Reviewed'};
  h+=`<div class="tb-dd" data-tbdd="filter"><div class="tb-dd-btn">Show: <span class="tb-dd-val">${S.reviewFilter==='bookmarked'?'🔖 Bookmarked':(filterLabels[S.reviewFilter]||'Everything')}</span></div><div class="tb-dd-panel">`;
  [{id:'all',l:'Everything'},{id:'unreviewed',l:'Needs Review'},{id:'pending',l:'Has Suggestions'},{id:'reviewed',l:'Reviewed ✓'}].forEach(f=>{
    h+=`<div class="tb-dd-item ${S.reviewFilter===f.id?'active':''}" data-rvfilter="${f.id}">${f.l}</div>`;
  });
  h+=`</div></div>`;
  // Spacer
  h+=`<div class="toolbar-spacer"></div>`;
  // Layout toggle — single/double column
  h+=`<div class="tb-layout-toggle">`;

    }

    entries.forEach(e=>{
      const isBM=S.idxBookmarks[e.name];
      const note=S.idxNotes[e.name];
      const hasEmpty=e.results.some(r=>!r.desc?.trim());
      const tooMany=e.results.length>=12;
      const entryDone=isEntryReviewed(e);
      const entryHasPending=e.results.some(r=>hasPendingSuggestion(e.name,r.segType,r.rowIdx));
      entryCount++;

      let eh='';
      eh+=`<div class="idx-entry ${tooMany?'flagged':''} ${isBM?'bookmarked':''}">`;
      eh+=`<div class="idx-entry-name" data-entry="${esc(e.name)}">`;
      // Audit checkbox (hidden unless select mode)
      const allSelected=e.results.every(r=>S.auditSelected.has(e.name+'|'+r.segType+'|'+r.rowIdx));
      eh+=`<input type="checkbox" class="idx-audit-chk" data-audit-entry="${esc(e.name)}" ${allSelected?'checked':''} title="Select for AI audit">`;
      // Move checkbox (hidden unless move mode)
      eh+=`<input type="checkbox" class="idx-move-chk" data-move-entry="${esc(e.name)}" ${S.moveSelected.has(e.name)?'checked':''} title="Select to move">`;
      // Inline rename input if renaming this entry, otherwise name + pencil
      if(S.renamingEntry&&S.renamingEntry.name===e.name){
        eh+=`<input type="text" class="idx-rename-input" id="rename-input" value="${esc(S.renamingEntry.inputValue)}" data-rename-for="${esc(e.name)}" style="font-family:var(--serif);font-size:inherit;font-weight:700;padding:2px 6px;border:1px solid var(--gold);border-radius:4px;min-width:240px" autofocus>`;
        eh+=`<button class="btn btn-sm btn-gold" data-rename-save="${esc(e.name)}" style="font-size:11px;padding:2px 8px">Save</button>`;
        eh+=`<button class="btn btn-sm" data-rename-cancel="1" style="font-size:11px;padding:2px 8px">Cancel</button>`;
      }else{
        eh+=`${esc(e.name)}`;
        eh+=`<button class="idx-entry-rename" data-rename-start="${esc(e.name)}" title="Rename this tag" style="background:none;border:none;cursor:pointer;color:var(--tx-4);font-size:12px;padding:0 4px;opacity:0;transition:opacity .15s">✎</button>`;
      }
      if(tooMany)eh+=` <span class="idx-entry-badge warn">${e.results.length} results</span>`;
      if(hasEmpty)eh+=` <span class="idx-entry-badge empty">missing desc</span>`;
      // Status toggle — Pending/Reviewed
      eh+=`<button class="idx-entry-status ${entryDone?'reviewed':''}" data-entry-rv="${esc(e.name)}">${entryDone?'✓ Reviewed':'Pending'}</button>`;
      eh+=`</div>`;
      // Show "was: X ↺" if this entry has been renamed
      const renameRec=S.tagRenames&&S.tagRenames[e.name];
      if(renameRec&&renameRec.originalName&&renameRec.originalName!==e.name){
        eh+=`<div class="idx-entry-rename-note" style="font-size:10px;color:var(--amber);margin-top:-2px;margin-bottom:2px;padding-left:2px">was: <em>${esc(renameRec.originalName)}</em> <button data-rename-revert="${esc(e.name)}" title="Revert to original name" style="background:none;border:none;cursor:pointer;color:var(--amber);padding:0 4px;font-size:11px">↺</button></div>`;
      }
      const entryNoteKey='entry|'+e.name;
      const entryNote=S.descNotes?.[entryNoteKey];
      const entryHasThread=entryNote&&entryNote.thread&&entryNote.thread.length>0;
      eh+=`<div class="idx-entry-meta">${e.results.length} result${e.results.length!==1?'s':''} · <span data-bm="${esc(e.name)}" style="cursor:pointer;color:${isBM?'var(--gold)':'var(--tx-4)'}">${IC.bookmark}</span>`;
      eh+=` · <span data-descnote="${esc(entryNoteKey)}" style="cursor:pointer;color:${entryHasThread?'var(--amber)':'var(--tx-4)'};font-size:11px" title="${entryHasThread?entryNote.thread.length+' comment(s) — click to view':'Add note to entry'}">💬${entryHasThread?entryNote.thread.length:''}</span>`;

          const k=rvKey(e.name,r.segType,r.rowIdx);

          // Description content

          const hasOrigTracked=rv&&rv.originalDesc!==undefined&&rv.originalDesc!==null;
          const hasOriginal=hasOrigTracked&&rv.originalDesc!==r.desc;
          const originalWasEmpty=hasOriginal&&!rv.originalDesc;
          if(isPending){
            if(hasOriginal){
              if(originalWasEmpty){
                eh+=`<span class="idx-orig-inline"><span class="idx-orig-text empty" data-revert="${esc(e.name)}|${seg}|${r.rowIdx}" title="Click to revert to empty">[empty]</span><span class="idx-orig-sep">→</span></span>`;
              }else{
                eh+=`<span class="idx-orig-inline"><span class="idx-orig-text" data-revert="${esc(e.name)}|${seg}|${r.rowIdx}" title="Click to revert">${esc(rv.originalDesc)}</span><span class="idx-orig-sep">→</span></span>`;
              }
            }
            eh+=`<span class="idx-sug-old">${descEmpty?'[empty]':esc(r.desc)}</span>`;
            eh+=`<span class="idx-sug-arrow">→</span>`;
            eh+=`<span class="idx-sug-new">${esc(rv.suggestion)}</span>`;
            if(rv.reason)eh+=`<span class="idx-sug-reason" data-reason="${esc(rv.reason)}">${esc(rv.reason.length>18?rv.reason.slice(0,18)+'…':rv.reason)}</span>`;
            // Rule violation chips — show which rules were violated by the original
            if(Array.isArray(rv.ruleViolations)&&rv.ruleViolations.length){
              rv.ruleViolations.forEach(v=>{
                // Extract rule number + short label (e.g. "Rule 3 — repeats tag name" → "R3 · repeats tag name")
                const m=String(v).match(/Rule\s*(\d+)\s*[—-]?\s*(.*)/i);
                const lbl=m?`R${m[1]}${m[2]?' · '+m[2]:''}`:v;
                const short=lbl.length>30?lbl.slice(0,30)+'…':lbl;
                eh+=`<span class="idx-rule-chip" title="${esc(v)}">${esc(short)}</span>`;
              });
            }
            eh+=`<span class="idx-sug-actions">`;
            eh+=`<span class="idx-sug-btn accept" data-sugaccept="${esc(e.name)}|${seg}|${r.rowIdx}" title="Accept">${IC.check}</span>`;
            eh+=`<span class="idx-sug-btn deny" data-sugdeny="${esc(e.name)}|${seg}|${r.rowIdx}" title="Deny">${IC.x}</span>`;
            eh+=`<span class="idx-sug-btn custom" data-sugcustom="${esc(e.name)}|${seg}|${r.rowIdx}" title="Custom edit">✎</span>`;
            eh+=`<span class="idx-sug-btn" data-sugchat="${esc(e.name)}|${seg}|${r.rowIdx}" title="AI Chat" style="color:var(--blue)">🤖</span>`;
            eh+=`</span>`;
          }else if(hasOriginal){
            const editInfo=rv.editedBy?`Edited by ${rv.editedBy}${rv.editedAt?' at '+new Date(rv.editedAt).toLocaleString():''}. `:'';
            if(originalWasEmpty){
              eh+=`<span class="idx-orig-inline"><span class="idx-orig-text empty" data-revert="${esc(e.name)}|${seg}|${r.rowIdx}" title="Click to revert to empty">[empty]</span><span class="idx-orig-revert" data-revert="${esc(e.name)}|${seg}|${r.rowIdx}" title="Revert to empty">↩</span><span class="idx-orig-sep">→</span></span>`;
            }else{
              eh+=`<span class="idx-orig-inline"><span class="idx-orig-text" data-revert="${esc(e.name)}|${seg}|${r.rowIdx}" title="Click to revert to original">${esc(rv.originalDesc)}</span><span class="idx-orig-revert" data-revert="${esc(e.name)}|${seg}|${r.rowIdx}">↩</span><span class="idx-orig-sep">→</span></span>`;
            }
            eh+=`<span class="idx-result-desc editable" data-editdesc="${esc(e.name)}|${seg}|${ri}" title="${esc(editInfo)}Double-click to edit">${esc(r.desc)}</span>`;
          }else{
            const editInfo2=(rv&&rv.editedBy)?`Edited by ${rv.editedBy}${rv.editedAt?' at '+new Date(rv.editedAt).toLocaleString():''}. `:'';
            eh+=`<span class="idx-result-desc ${descEmpty?'empty-desc':'editable'}" data-editdesc="${esc(e.name)}|${seg}|${ri}" title="${esc(editInfo2)}Double-click to edit">${descEmpty?'[no description]':esc(r.desc)}</span>`;
          }
          // Meta section — wraps as a unit to line 2 when row is tight
          eh+=`<span class="idx-result-meta">`;
          // Relationship label (hide when matching segment default; Nigunim exception)
          if(shouldShowRel(r,e.section))eh+=`<span class="idx-result-rel">[${esc(r.rel)}]</span>`;
          // Reference code — book-style. Formatting on the ref reflects relevancy (bold=4, underline=3, italic=2, regular=1).

          const descNote=S.descNotes?.[descNoteKey];
          const hasThread=descNote&&descNote.thread&&descNote.thread.length>0;
          eh+=`<span class="idx-mini-btn ${hasThread?'has-note':''}" data-descnote="${esc(descNoteKey)}" title="${hasThread?descNote.thread.length+' comment(s) — click to view':'Add comment'}" style="${hasThread?'color:var(--amber);background:var(--amber);color:#fff;border-color:var(--amber);font-size:9px;width:auto;padding:0 5px':''}">💬${hasThread?' '+descNote.thread.length:''}</span>`;
          // Audit shield icon (always visible)
          eh+=`<span class="idx-mini-btn" data-auditone="${esc(e.name)}|${r.rowIdx}|${seg}" title="AI Suggestion">${IC.audit}</span>`;
          // AI chat (always available)
          eh+=`<span class="idx-mini-btn" data-aichat="${esc(e.name)}|${seg}|${r.rowIdx}" title="AI Chat" style="color:var(--blue)">🤖</span>`;
          // Info panel (clip details: video, summary, transcript)
          eh+=`<span class="idx-mini-btn" data-clippanel="${esc(e.name)}|${seg}|${r.rowIdx}" title="View clip details">ⓘ</span>`;
          // Status toggle — Pending/Reviewed
          eh+=`<button class="idx-status ${isReviewed?'reviewed':''}" data-desc-rv="${esc(e.name)}|${seg}|${r.rowIdx}">${isReviewed?'✓ Reviewed':'Pending'}</button>`;
          eh+=`</span>`; // end meta
          eh+=`</div>`;
        });
        eh+='</div>';
      });
      eh+='</div>';
      entryHtmls.push(eh);
    });
  });

  // Render into idx-body — paginate + single or two columns
  const PAGE_SIZE=200;
  const totalEntries=entryHtmls.length;
  const totalPages=Math.ceil(totalEntries/PAGE_SIZE);
  if(S.idxPage>=totalPages)S.idxPage=Math.max(0,totalPages-1);
  const pageStart=S.idxPage*PAGE_SIZE;
  const pageEnd=Math.min(pageStart+PAGE_SIZE,totalEntries);
  const pageHtmls=entryHtmls.slice(pageStart,pageEnd);

  h+=`<div class="idx-body ${isTwoCol?'two-col-mode':''} ${S.auditSelectMode?'select-mode':''} ${S.moveSelectMode?'move-mode':''}">`;
  
  // Top bar: INSIDE idx-body but sticky at top
  h+='<div class="idx-top-bar" style="position:sticky;top:0;z-index:10;background:var(--bg-0);padding-bottom:8px;border-bottom:1px solid var(--border);margin-bottom:8px">';
  if(S.auditSelectMode){
    h+=`<button class="btn btn-sm" id="idx-audit-cancel" style="font-size:11px">☑ Done Selecting</button>`;
  }else if(S.moveSelectMode){
    h+=`<button class="btn btn-sm" id="idx-move-cancel" style="font-size:11px">✦ Done Moving</button>`;
  }else{
    h+=`<button class="btn btn-sm" id="idx-audit-select" style="font-size:11px">☐ Select for Audit</button>`;
    h+=`<button class="btn btn-sm" id="idx-move-select" style="font-size:11px">✦ Move Entries</button>`;
  }
  if(totalPages>1){
    h+=`<div class="idx-pager" style="margin-left:auto">`;
    h+=`<button class="btn btn-sm" id="idx-page-prev" ${S.idxPage<=0?'disabled':''} style="font-size:10px;padding:2px 8px">←</button>`;
    h+=`<span>Page</span><input id="idx-page-input" type="text" value="${S.idxPage+1}" title="Type page number and press Enter"><span>of ${totalPages}</span>`;
    h+=`<button class="btn btn-sm" id="idx-page-next" ${S.idxPage>=totalPages-1?'disabled':''} style="font-size:10px;padding:2px 8px">→</button>`;
    h+=`</div>`;
  }
  h+='</div>';

  // Content — single or two columns
  if(isTwoCol&&pageHtmls.length>1){
    // Find the split point that minimizes the difference in total weight between columns
    const weights=pageHtmls.map(h=>h.length);
    const totalWeight=weights.reduce((a,b)=>a+b,0);
    let bestSplit=Math.ceil(pageHtmls.length/2);
    let bestDiff=Infinity;
    for(let s=1;s<pageHtmls.length;s++){
      const leftW=weights.slice(0,s).reduce((a,b)=>a+b,0);
      const rightW=totalWeight-leftW;
      const diff=Math.abs(leftW-rightW);
      if(diff<bestDiff){bestDiff=diff;bestSplit=s}
    }
    h+='<div class="idx-cols">';
    h+='<div class="idx-col">'+pageHtmls.slice(0,bestSplit).join('')+'</div>';
    h+='<div class="idx-col-divider"></div>';
    h+='<div class="idx-col">'+pageHtmls.slice(bestSplit).join('')+'</div>';
    h+='</div>';
  }else{
    h+=pageHtmls.join('');
  }

  // Bottom pagination
  if(totalPages>1){
    h+=`<div class="idx-pager" style="border-top:1px solid var(--border);margin-top:12px;padding-top:12px">`;
    h+=`<button class="btn btn-sm" id="idx-page-prev2" ${S.idxPage<=0?'disabled':''} style="font-size:10px;padding:2px 8px">←</button>`;
    h+=`<span>Page</span><input id="idx-page-input2" type="text" value="${S.idxPage+1}" title="Type page number and press Enter"><span>of ${totalPages} (${totalEntries} entries)</span>`;
    h+=`<button class="btn btn-sm" id="idx-page-next2" ${S.idxPage>=totalPages-1?'disabled':''} style="font-size:10px;padding:2px 8px">→</button>`;
    h+=`</div>`;
  }

  h+='</div></div></div>';
  return h;
}

// Apply review filter to entries
// Check if a given user (by email) has done any "work" on this entry.
// Work = manual edits, accepts, denies, or custom edits — anything where editedBy was recorded.
function userTouchedEntry(entry,userEmail){
  if(!userEmail||!entry||!entry.results)return false;
  // Look up the user's name from teamMembers (editedBy stores name OR email)
  const member=(S.teamMembers||[]).find(m=>m&&m.email===userEmail);
  const name=member?.name;
  for(const r of entry.results){
    const k=rvKey(entry.name,r.segType,r.rowIdx);
    const rv=S.reviewData?.[k];
    if(!rv)continue;
    if(rv.editedBy===userEmail||(name&&rv.editedBy===name))return true;
  }
  return false;
}

function applyReviewFilter(entries){
  // First, apply admin user-work filter if active
  const userFilter=S.userWorkFilter||'';
  if(userFilter){
    entries=entries.filter(e=>userTouchedEntry(e,userFilter));
  }
  const f=S.reviewFilter;
  if(f==='all'&&!S.reviewMode)return entries;
  return entries.filter(e=>{
    if(f==='reviewed')return isEntryReviewed(e);
    if(f==='unreviewed')return!isEntryReviewed(e);
    if(f==='pending')return e.results.some(r=>hasPendingSuggestion(e.name,r.segType,r.rowIdx));
    if(f==='bookmarked')return S.idxBookmarks[e.name];
    // 'all' with review mode — show only unreviewed or with pending
    if(S.reviewMode)return!isEntryReviewed(e)||e.results.some(r=>hasPendingSuggestion(e.name,r.segType,r.rowIdx));
    return true;
  });
}

function getProc(){let r=S.rows.map((d,i)=>({d,i}));if(S.search.trim()){const q=S.search.toLowerCase();r=r.filter(x=>x.d.some(c=>c&&c.toString().toLowerCase().includes(q)))}if(S.sortCol!==null){const c=S.sortCol,dir=S.sortDir;r.sort((a,b)=>{const va=(a.d[c]||'').toString(),vb=(b.d[c]||'').toString(),na=parseFloat(va),nb=parseFloat(vb);if(!isNaN(na)&&!isNaN(nb))return dir==='asc'?na-nb:nb-na;return dir==='asc'?va.localeCompare(vb):vb.localeCompare(va)})}return r}

function rAuditor(){

function rReview(){
  const pendingItems=Object.entries(S.reviewData).filter(([k,rv])=>rv.status==='pending'&&rv.suggestion).map(([k,rv])=>({key:k,...rv,parts:k.split('|')}));
  const deniedItems=Object.entries(S.reviewData).filter(([k,rv])=>rv.deniedHistory&&rv.deniedHistory.length>0).map(([k,rv])=>({key:k,...rv,parts:k.split('|')}));
  let h=`<div class="page-hd">${rBackBtn()}<h1>Review Queue</h1><p>${pendingItems.length} pending suggestions · Suggestions also appear inline in Index Preview</p><div class="page-hd-actions"><button class="btn btn-purple" data-nav="index" onclick="S.reviewFilter='pending';render()">View in Index Preview →</button></div></div><div class="pad">`;
  if(!pendingItems.length){
    h+=`<div style="text-align:center;padding:50px;color:var(--tx-3)"><div style="font-size:40px;margin-bottom:10px">✓</div><div style="font-size:15px;font-weight:600;color:var(--tx-2)">All clear</div><button class="btn btn-purple" data-nav="auditor" style="margin-top:14px">Run Audit</button></div>`;
  }else{
    pendingItems.slice(0,50).forEach((item,qi)=>{
      const entryName=item.parts[0],seg=item.parts[1],rowIdx=+item.parts[2];
      h+=`<div class="review-item"><div class="review-tag">${esc(entryName)}</div><div class="review-section">${esc(seg)} · Row ${rowIdx+1}</div>`;
      // Find current description
      const entry=findEntry(entryName);
      const curDesc=entry?entry.results.find(r=>r.segType===seg&&r.rowIdx===rowIdx)?.desc:'';
      h+=`<div class="review-row"><div style="flex:1"><div class="review-label">Original</div><div class="${curDesc?'review-old':''}">${curDesc?esc(curDesc):'<i style="color:var(--tx-4)">[empty]</i>'}</div></div><div style="flex:1"><div class="review-label">Suggested</div><div class="review-new">${esc(item.suggestion)}</div></div></div>`;
      if(item.reason)h+=`<div class="review-reason">${esc(item.reason)}</div>`;
      h+=`<div class="review-actions"><button class="btn btn-sm btn-green" data-sugaccept="${esc(entryName)}|${seg}|${rowIdx}">${IC.check} Accept</button><button class="btn btn-sm btn-red" data-sugdeny="${esc(entryName)}|${seg}|${rowIdx}">${IC.x} Deny</button><input class="review-custom-input" data-rcinput2="${qi}" placeholder="Custom…"><button class="btn btn-sm btn-purple" data-sugcustom2="${esc(entryName)}|${seg}|${rowIdx}|${qi}">Custom</button></div></div>`;
    });
    if(pendingItems.length>50)h+=`<div style="text-align:center;color:var(--tx-3);font-size:12px;padding:12px">Showing 50 of ${pendingItems.length}</div>`;
  }

  // Denied history
  if(deniedItems.length){
    h+='<div style="margin-top:24px"><h3 style="font-family:var(--serif);font-size:16px;margin-bottom:8px">Denied Suggestion History</h3>';
    h+='<div class="denied-drawer">';
    deniedItems.forEach(item=>{
      const entryName=item.parts[0];
      (item.deniedHistory||[]).forEach(d=>{
        h+=`<div class="denied-item"><strong>${esc(entryName)}</strong><span style="color:var(--tx-4);margin:0 6px">→</span><span style="text-decoration:line-through">${esc(d.suggestion)}</span><span style="margin-left:auto;font-size:9px;color:var(--tx-4)">${d.time?new Date(d.time).toLocaleDateString():''}</span></div>`;
      });
    });
    h+='</div></div>';
  }
  return h+'</div>';
}

function bindAll(){
  const on=(sel,ev,fn)=>{const el=$(sel);if(el)el.addEventListener(ev,fn)};
  // Nav
  $$('[data-nav]').forEach(el=>el.onclick=()=>{
    const newView=el.dataset.nav;
    if(S.view!==newView){
      S.viewHistory.push({view:S.view,section:S.idxActiveSection,page:S.idxPage,search:S.idxSearch,filter:S.reviewFilter,bookScope:S.bookScope});
      if(S.viewHistory.length>20)S.viewHistory=S.viewHistory.slice(-20);
    }
    S.view=newView;
    S.clipPanel=null;
    // When clicking Workspace in sidebar, open the submenu only if it was closed (don't disturb it if already open)
    if(newView==='index'){
      if(!S.sidebarWorkspaceOpen)S.sidebarWorkspaceOpen=true;
      S.idxActiveSection='all';
      S.idxPage=0;
      if(S.reviewFilter==='bookmarked')S.reviewFilter='all';
    }
    // When clicking Book View in sidebar, default to 'all' if not set
    if(newView==='book'&&!S.bookScope)S.bookScope='all';
    render();
  });

Entry: "${cp.entryName}"

AI reason: "${sc.reason}"

${fullRules}

FULL TRANSCRIPT:
${sc.transcript}

When you suggest a description, format it clearly on its own line starting with →

If the user asks for alternatives, give 5 numbered options.

    const result=byseg[segType]?.[ri];

// Keyboard shortcuts for review — minimal set
function handleKeyShortcut(e){
  if(e.target.tagName==='INPUT'||e.target.tagName==='TEXTAREA')return;
  // Ctrl+Z / Cmd+Z undo
  if(e.key==='z'&&(e.ctrlKey||e.metaKey)){e.preventDefault();doUndo();return}
  // Ctrl+[ / Cmd+[ or Alt+← go back
  if((e.key==='['&&(e.ctrlKey||e.metaKey))||(e.key==='ArrowLeft'&&e.altKey)){
    if(S.viewHistory&&S.viewHistory.length){e.preventDefault();doBack();return}
  }
}

// Go back one step in view history. Restores view, section, page, search, filter, bookScope, and scroll/highlight.
function doBack(){
  if(!S.viewHistory||!S.viewHistory.length)return;
  const prev=S.viewHistory.pop();
  S.view=prev.view;
  S.idxActiveSection=prev.section||'all';
  S.idxPage=prev.page||0;
  S.idxSearch=prev.search||'';
  S.reviewFilter=prev.filter||'all';
  S.bookScope=prev.bookScope||S.bookScope;
  S.clipPanel=null;
  S.notifOpen=false;
  render();
  if(prev.scrollTop!=null){
    setTimeout(()=>{
      const mc=$('.main-content');
      if(mc)mc.scrollTop=prev.scrollTop;
      if(prev.scrollToEntry){
        const el=document.querySelector(`[data-entry="${CSS.escape(prev.scrollToEntry)}"]`);
        if(el){el.scrollIntoView({behavior:'smooth',block:'center'});el.classList.add('jump-highlight');setTimeout(()=>el.classList.remove('jump-highlight'),1500)}
      }
    },80);
  }
}

function doSendAI(){const v=(S.aiInput||'').trim();if(!v||S.aiTyping)return;aiChat(v)}
function findEntry(name){if(!S.indexData)return null;for(const sec of Object.values(S.indexData.sections)){const e=sec.find(x=>x.name===name);if(e)return e}return null}

// Navigate directly to a specific entry — sets section, page, scrolls, highlights only that entry
// If noteKey is provided, highlights just the description line (for description notes) or entry (for entry notes)
function jumpToEntry(entryName,noteKey){
  const entry=findEntry(entryName);
  if(!entry){toast('Entry "'+entryName+'" not found','error');return}
  // Save current view to history (include bookScope so we return to the right Book View page)
  S.viewHistory.push({view:S.view,bookScope:S.bookScope,section:S.idxActiveSection,page:S.idxPage,search:S.idxSearch,filter:S.reviewFilter});
  if(S.viewHistory.length>20)S.viewHistory=S.viewHistory.slice(-20);
  S.view='index';
  S.idxSearch='';
  S.idxActiveSection=entry.section||'all';
  S.reviewFilter='all';
  // Calculate correct page
  const sectionEntries=(S.indexData?.sections[entry.section]||[]).sort((a,b)=>a.name.localeCompare(b.name));
  const idx=sectionEntries.findIndex(e=>e.name===entryName);
  S.idxPage=idx>=0?Math.floor(idx/200):0;
  render();
  setTimeout(()=>{
    // Find the entry in DOM using data-entry attribute
    const entries=document.querySelectorAll('.idx-entry');
    for(const el of entries){
      const hd=el.querySelector('[data-entry]');
      if(hd&&hd.dataset.entry===entryName){
        if(noteKey&&!noteKey.startsWith('entry|')){
          // Description-level note — highlight just that description line
          const descLines=el.querySelectorAll('.idx-result');
          let found=false;
          for(const dl of descLines){
            const noteBtn=dl.querySelector('[data-descnote]');
            if(noteBtn&&noteBtn.dataset.descnote===noteKey){
              dl.scrollIntoView({behavior:'smooth',block:'center'});
              dl.classList.add('jump-highlight');
              found=true;
              break;
            }
          }
          if(!found){
            el.scrollIntoView({behavior:'smooth',block:'center'});
            el.classList.add('jump-highlight');
          }
        }else{
          // Entry-level note or no noteKey — highlight whole entry
          el.scrollIntoView({behavior:'smooth',block:'center'});
          el.classList.add('jump-highlight');
        }
        break;
      }
    }
  },150);
}

// Audit selected items from index preview
async function auditSelectedItems(){
  if(!S.claudeKey){toast('No API key','error');return}
  const items=[];
  S.auditSelected.forEach(key=>{
    const parts=key.split('|');
    // Handle entry names with | by splitting from right
    const rowIdx=+parts[parts.length-1];
    const segType=parts[parts.length-2];
    const entryName=parts.slice(0,-2).join('|');
    const entry=findEntry(entryName);
    if(!entry)return;
    const r=entry.results.find(x=>x.segType===segType&&x.rowIdx===rowIdx);
    if(!r)return;
    items.push({entryName,section:entry.section,desc:r.desc,rel:r.rel,transcript:r.transcript,rowIdx,clipName:r.clipName,segType});

  const ruleChecklist=RULES.tagDesc.checks.filter(c=>c.on).map((c,i)=>`${i+1}. ${c.name}`).join('\n');
  const antiPatterns=`
COMMON MISTAKES YOU MUST NOT MAKE:
- Do NOT just lowercase the first letter. Restructure if needed.
- Your suggestion must ALSO follow all rules.`;

  for(let i=0;i<items.length;i+=bs){
    const batch=items.slice(i,i+bs);
    const batchNum=Math.floor(i/bs)+1;
    const totalBatches=Math.ceil(items.length/bs);
    S.auditLog.push(`Batch ${batchNum}/${totalBatches} — analyzing ${batch.length} descriptions…`);
    S.auditProgress=i;
    render();
    await new Promise(r=>setTimeout(r,50));
    try{
      const prompt=`Audit these tag descriptions for a printed book index.

${fullRules}
${antiPatterns}

For EACH description, walk through every rule. Your suggestion must be a SHORT NOUN PHRASE (2-5 words).

JSON array. Each: {idx, status:"ok"|"fix"|"generate", suggestion:"...", reason:"which rule(s) violated"}

${batch.map((e,j)=>`[${j}] Entry:"${e.entryName}" Sec:${e.section} Rel:${e.rel}\n  Desc:"${e.desc||'[empty]'}"\n  Transcript:"${(e.transcript||'').slice(0,800)}"`).join('\n\n')}`;

      const resp=await fetch('https://api.anthropic.com/v1/messages',{method:'POST',headers:{'Content-Type':'application/json','x-api-key':S.claudeKey,'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:4096,system:`Ruthless professional index editor. Walk through EVERY rule per description.\n\nChecklist:\n${ruleChecklist}\n\nJSON array only.`,messages:[{role:'user',content:prompt}]})});
      if(!resp.ok)throw new Error('API '+resp.status);
      const d=await resp.json(),txt=d.content.map(c=>c.text||'').join('');
      let parsed;try{parsed=JSON.parse(txt.replace(/```json?\s*/g,'').replace(/```/g,'').trim())}catch{const m2=txt.match(/\[[\s\S]*\]/);if(m2)parsed=JSON.parse(m2[0]);else throw new Error('Parse fail')}
      let fx=0;
      parsed.forEach(p=>{
        const e=batch[p.idx!=null?p.idx:p.index];
        if(!e)return;
        const k=rvKey(e.entryName,e.segType,e.rowIdx);
        if(p.status==='fix'||p.status==='generate'){
          const existing=getRV(k);
          setRV(k,{suggestion:p.suggestion||'',reason:p.reason||'',status:'pending',reviewed:false,deniedHistory:(existing?.deniedHistory||[])});
          const entry=findEntry(e.entryName);
          const r=entry?.results.find(x=>x.segType===e.segType&&x.rowIdx===e.rowIdx);
          if(r)syncToIndexTab(e.entryName,r,'pending',p.suggestion||'').catch(()=>{});
          fx++;
        }else{
          setRV(k,{...(getRV(k)||{}),status:'ok'});
        }
      });
      totalFixed+=fx;
      S.auditLog.push(`  ✓ ${fx} need review, ${batch.length-fx} passed`);
    }catch(e){S.auditLog.push(`  ✗ Error: ${e.message}`)}
    S.auditProgress=Math.min(i+bs,items.length);
    render();
    await new Promise(r=>setTimeout(r,50));
    if(i+bs<items.length)await new Promise(r=>setTimeout(r,500));
  }
  S.auditRunning=false;
  // Keep S.auditSelectMode=true so checkboxes stay visible for more selections
  S.auditSelected=new Set();
  S.auditLog.push(`Done! ${totalFixed} need changes, ${items.length-totalFixed} look good.`);
  toast(`Audit complete: ${totalFixed} need changes, ${items.length-totalFixed} look good`,'success');
  buildIndex();render();

// Escape a string for use in a regex
function escapeRegex(s){return String(s).replace(/[.*+?^${}()|[\]\\]/g,'\\$&')}

// Apply highlights to transcript text — wraps matched phrases in <mark>
function applyTranscriptHighlights(transcript,phrases){
  if(!transcript||!phrases||!phrases.length)return esc(transcript);
  let out=esc(transcript);
  // Apply longest phrases first to avoid overlap issues
  const sorted=[...phrases].sort((a,b)=>b.length-a.length);
  sorted.forEach(phrase=>{
    if(!phrase||phrase.length<3)return;
    const escaped=escapeRegex(esc(phrase));
    try{
      const re=new RegExp('('+escaped+')','gi');
      out=out.replace(re,'<mark class="transcript-highlight">$1</mark>');
    }catch(e){/* skip on bad regex */}
  });
  return out;
}

// Call AI to find transcript passages that connect to the tag

"""
${(transcript||'').slice(0,8000)}

  "phrases": [],
  "noMatch": true,
  "note": "brief reason why"
}

JSON only, no preamble.`;

  const resp=await fetch('https://api.anthropic.com/v1/messages',{
    method:'POST',
    headers:{'Content-Type':'application/json','x-api-key':S.claudeKey,'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},
    body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:800,messages:[{role:'user',content:prompt}]})
  });
  if(!resp.ok)throw new Error('API '+resp.status);
  const data=await resp.json();
  const text=data.content?.[0]?.text||'';
  const m=text.match(/\{[\s\S]*\}/);
  if(!m)throw new Error('No JSON in response');
  return JSON.parse(m[0]);
}

// Cache key builder
function transcriptHighlightKey(tag,clipId){return tag+'|'+(clipId||'')}

// Request highlights for a (tag, clipId) pair. Uses cache unless force=true.
async function requestTranscriptHighlights(tag,transcript,desc,clipId,force){
  const key=transcriptHighlightKey(tag,clipId);
  if(!S.transcriptHighlights)S.transcriptHighlights={};
  if(!force&&S.transcriptHighlights[key]&&!S.transcriptHighlights[key].loading&&!S.transcriptHighlights[key].error){
    return S.transcriptHighlights[key];
  }
  S.transcriptHighlights[key]={loading:true,phrases:[],noMatch:false};
  render();
  try{
    const result=await fetchTranscriptHighlights(tag,transcript,desc);
    S.transcriptHighlights[key]={
      loading:false,
      phrases:Array.isArray(result.phrases)?result.phrases:[],
      noMatch:!!result.noMatch,
      note:result.note||''
    };
  }catch(e){
    console.error('Transcript highlight error:',e);
    S.transcriptHighlights[key]={loading:false,phrases:[],noMatch:false,error:e.message||'Failed to analyze'};
  }
  render();
  return S.transcriptHighlights[key];
}

// Bulk audit an entire section
async function bulkAuditSection(sectionName){
  if(!S.claudeKey){toast('No API key','error');return}
  if(!S.indexData){toast('No index data','error');return}
  const entries=S.indexData.sections[sectionName]||[];
  if(!entries.length){toast('No entries in '+sectionName,'error');return}
  // Collect all items
  const items=[];
  entries.forEach(e=>{
    e.results.forEach(r=>{
      items.push({entryName:e.name,section:sectionName,desc:r.desc,rel:r.rel,transcript:r.transcript,rowIdx:r.rowIdx,clipName:r.clipName,segType:r.segType});
    });
  });
  if(!await customConfirm(`Audit entire "${sectionName}" section? (${items.length} descriptions)`))return;
  
  S.auditRunning=true;S.auditProgress=0;S.auditTotal=items.length;S.auditLog=[];
  S.auditSelected=new Set();
  document.querySelectorAll('body > .audit-float').forEach(el=>el.remove());
  render();
  await new Promise(r=>setTimeout(r,50));
  
  const bs=S.auditBatch;let totalFixed=0;
  for(let i=0;i<items.length;i+=bs){
    const batch=items.slice(i,i+bs);
    try{
      const fullRules=buildAuditRulesText();
      const prompt=`Audit these tag descriptions for the JEM Video Index book.

${fullRules}

IMPORTANT: For EACH description, walk through every rule individually. Only mark "ok" if it passes ALL rules.

JSON array only. Each: {idx, status:"ok"|"fix"|"generate", suggestion:"...", reason:"which rule(s) violated and why"}

${batch.map((e,j)=>`[${j}] Entry:"${e.entryName}" Sec:${e.section} Rel:${e.rel}\n  Desc:"${e.desc||'[empty]'}"\n  Transcript:"${(e.transcript||'').slice(0,800)}"`).join('\n\n')}`;
      const sysPrompt='You are a strict professional index editor. For EACH description, walk through EVERY rule. Respond with JSON array only.';
      const resp=await fetch('https://api.anthropic.com/v1/messages',{method:'POST',headers:{'Content-Type':'application/json','x-api-key':S.claudeKey,'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:4096,system:sysPrompt,messages:[{role:'user',content:prompt}]})});
      if(!resp.ok)throw new Error('API '+resp.status);
      const d=await resp.json(),txt=d.content.map(c=>c.text||'').join('');
      let parsed;try{parsed=JSON.parse(txt.replace(/```json?\s*/g,'').replace(/```/g,'').trim())}catch{const m2=txt.match(/\[[\s\S]*\]/);if(m2)parsed=JSON.parse(m2[0]);else throw new Error('Parse fail')}
      let fx=0;
      parsed.forEach(p=>{
        const e=batch[p.idx!=null?p.idx:p.index];
        if(!e)return;
        const k=rvKey(e.entryName,e.segType,e.rowIdx);
        if(p.status==='fix'||p.status==='generate'){
          const existing=getRV(k);
          setRV(k,{suggestion:p.suggestion||'',reason:p.reason||'',status:'pending',reviewed:false,deniedHistory:(existing?.deniedHistory||[]),originalDesc:existing?.originalDesc||''});
          fx++;
        }else{
          setRV(k,{...(getRV(k)||{}),status:'ok'});
        }
      });
      totalFixed+=fx;
    }catch(e){toast('Audit error: '+e.message,'error')}
    S.auditProgress=Math.min(i+bs,items.length);
    if(i+bs<items.length){
      toast(`Auditing ${sectionName}… ${S.auditProgress}/${S.auditTotal}`);
      await new Promise(r=>setTimeout(r,1500));
    }
  }
  S.auditRunning=false;
  const keptCount=items.length-totalFixed;
  logActivity(`Audited ${sectionName}: ${totalFixed} need changes, ${keptCount} look good`);
  toast(`${sectionName}: ${totalFixed} need changes, ${keptCount} look good`,'success');
  render();
}

<style>
body{font-family:'Source Serif 4',Georgia,serif;max-width:800px;margin:0 auto;padding:40px;color:#1a1a1a;font-size:12px;line-height:1.5}

</style></head><body>
<h1>JEM Video Index</h1>`;

  RULES.sectionOrder.forEach(sec=>{
    const entries=ix.sections[sec]||[];

    html+=`<h2>${sec}</h2>`;
    entries.forEach(e=>{

      const byseg={};
      e.results.forEach(r=>{if(!byseg[r.segType])byseg[r.segType]=[];byseg[r.segType].push(r)});
      RULES.segOrder.forEach(seg=>{
        if(!byseg[seg])return;
        html+=`<div class="seg-label">${seg}</div>`;
        byseg[seg].forEach(r=>{
          html+=`<div class="result">`;
          if(r.desc)html+=`<span class="desc">${esc(r.desc)}</span>`;

  const blob=new Blob([html],{type:'text/html'});
  const a=document.createElement('a');
  a.href=URL.createObjectURL(blob);

async function runConsistencyCheck(){
  if(!S.claudeKey){toast('No API key','error');return}
  if(!S.indexData){toast('No index data','error');return}
  
  S.consistencyRunning=true;S.consistencyProgress=0;S.consistencyResults=[];
  toast('Running consistency check…');render();
  
  // Collect all reviewed/finalized descriptions grouped by section
  const allDescs=[];
  const ix=S.indexData;
  RULES.sectionOrder.forEach(sec=>{
    (ix.sections[sec]||[]).forEach(entry=>{
      entry.results.forEach(r=>{
        if(r.desc&&r.desc.trim()){
          allDescs.push({entry:entry.name,section:sec,desc:r.desc,segType:r.segType,rowIdx:r.rowIdx});
        }
      });
    });
  });
  
  S.consistencyTotal=allDescs.length;
  
  // Build transliteration rules text
  const transRules=(RULES.consistency?.transliteration||[]).map(t=>`"${t.correct}" (never: ${t.wrong.join(', ')})`).join('\n  ');
  const checkRules=(RULES.consistency?.checks||[]).filter(c=>c.on).map(c=>c.name).join('\n');
  
  // Process in batches of 100 descriptions
  const bs=100;
  const allIssues=[];
  for(let i=0;i<allDescs.length;i+=bs){
    const batch=allDescs.slice(i,i+bs);
    S.consistencyProgress=Math.min(i+bs,allDescs.length);
    toast(`Checking consistency… ${S.consistencyProgress}/${S.consistencyTotal}`);
    
    try{
      const prompt=`You are reviewing ${batch.length} tag descriptions from the JEM Video Index for CONSISTENCY issues.

CONSISTENCY RULES:
${checkRules}

STANDARD TRANSLITERATIONS (always use the first spelling):
  ${transRules}

Look at ALL descriptions below as a group. Find:
1. Same concept described with different words across entries (e.g. "Establishment of" vs "Inception of")
2. Same multi-word phrases in different word orders (e.g. "tefillin and mezuzos" vs "mezuzos and tefillin")
3. Hebrew/Yiddish words spelled differently across entries
4. Inconsistent capitalization of the same term
5. Style/voice inconsistencies — all should read like one person wrote them

For each issue found, return the pair of entries that conflict and suggest which version to standardize on.

JSON array only. Each issue: {type:"phrase"|"word_order"|"transliteration"|"capitalization"|"style", entry1:{name:"...",desc:"..."}, entry2:{name:"...",desc:"..."}, issue:"what's inconsistent", suggestion:"standardize to this"}

If no issues found, return empty array [].

DESCRIPTIONS:
${batch.map((d,j)=>`[${j}] ${d.section} > "${d.entry}": "${d.desc}"`).join('\n')}`;

      const resp=await fetch('https://api.anthropic.com/v1/messages',{method:'POST',headers:{'Content-Type':'application/json','x-api-key':S.claudeKey,'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:4096,system:'You are a meticulous consistency checker for a book index. Find inconsistencies across descriptions. JSON array only.',messages:[{role:'user',content:prompt}]})});
      if(!resp.ok)throw new Error('API '+resp.status);
      const d=await resp.json(),txt=d.content.map(c=>c.text||'').join('');
      let parsed;
      try{parsed=JSON.parse(txt.replace(/```json?\s*/g,'').replace(/```/g,'').trim())}
      catch{const m2=txt.match(/\[[\s\S]*\]/);if(m2)parsed=JSON.parse(m2[0]);else parsed=[]}
      if(Array.isArray(parsed))allIssues.push(...parsed);
    }catch(e){console.warn('Consistency batch error:',e)}
    
    if(i+bs<allDescs.length)await new Promise(r=>setTimeout(r,1500));
  }
  
  S.consistencyRunning=false;
  S.consistencyResults=allIssues;
  toast(`Done! ${allIssues.length} consistency issues found`,'success');
  S.view='consistency';render();
}

function rNotes(){
  let h='<div class="page-hd">'+rBackBtn()+'<h1>💬 All Notes</h1><p>Comments across the index</p>';
  h+='</div><div class="pad">';
  
  const noteKeys=Object.keys(S.descNotes||{}).filter(k=>{const n=S.descNotes[k];return n&&n.thread&&n.thread.length>0&&!n.resolved});
  const resolvedKeys=Object.keys(S.descNotes||{}).filter(k=>{const n=S.descNotes[k];return n&&n.thread&&n.thread.length>0&&n.resolved});
  
  if(!noteKeys.length&&!resolvedKeys.length){
    h+='<div style="text-align:center;padding:40px;color:var(--tx-3)">No notes yet. Click 💬 on any entry or description to start a conversation.</div>';
    return h+'</div>';
  }
  
  // Sort by most recent comment
  noteKeys.sort((a,b)=>{
    const at=S.descNotes[a].thread.slice(-1)[0]?.timestamp||0;
    const bt=S.descNotes[b].thread.slice(-1)[0]?.timestamp||0;
    return bt-at;
  });
  
  if(!noteKeys.length){
    h+='<div style="text-align:center;padding:20px;color:var(--tx-3)">No open notes. All resolved!</div>';
  }
  
  noteKeys.forEach(key=>{
    const note=S.descNotes[key];
    let displayName,subtitle='';
    if(key.startsWith('entry|')){
      displayName=key.slice(6);
      subtitle='Entry note';
    }else{
      const lp=key.lastIndexOf('|');
      const slp=key.lastIndexOf('|',lp-1);
      displayName=slp>=0?key.slice(0,slp):key.split('|')[0];
      subtitle='Description note';
    }
    
    h+=`<div class="card" style="margin-bottom:12px">`;
    h+=`<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">`;
    h+=`<div><strong style="font-size:14px;font-family:var(--serif)">${esc(displayName)}</strong> <span style="font-size:10px;color:var(--tx-4)">${subtitle}</span></div>`;
    h+=`<div style="display:flex;gap:6px">`;
    h+=`<button class="btn btn-sm" data-notejump-view="${esc(key)}" style="font-size:10px">Jump to entry</button>`;
    h+=`<button class="btn btn-sm" data-noteopen="${esc(key)}" data-notetitle="${esc(displayName)}" style="font-size:10px;color:var(--amber);border-color:var(--amber)">Reply</button>`;
    h+=`<button class="btn btn-sm" data-note-resolve="${esc(key)}" style="font-size:10px;color:var(--green);border-color:var(--green)">✓ Resolve</button>`;
    h+=`<button class="btn btn-sm" data-note-delete="${esc(key)}" style="font-size:10px;color:var(--red);border-color:var(--red);cursor:pointer">Delete</button>`;
    h+=`</div></div>`;
    
    note.thread.forEach((c,ci)=>{
      h+=`<div style="margin-bottom:6px;display:flex;gap:8px;align-items:flex-start">`;
      h+=`<div style="flex:1">`;
      h+=`<span style="font-size:10px;font-weight:600;color:var(--blue)">${esc(c.user)}</span>`;
      h+=`<span style="font-size:9px;color:var(--tx-4);margin-left:6px">${new Date(c.timestamp).toLocaleDateString()} ${new Date(c.timestamp).toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'})}</span>`;
      h+=`<div style="font-size:12px;color:var(--tx-1);margin-top:2px">${esc(c.text)}</div>`;
      h+=`</div>`;
      h+=`<span style="font-size:9px;color:var(--tx-4);cursor:pointer;flex-shrink:0;opacity:0.4" data-noteview-del="${esc(key)}|${ci}" title="Delete this comment" onmouseover="this.style.opacity='1';this.style.color='var(--red)'" onmouseout="this.style.opacity='0.4';this.style.color='var(--tx-4)'">✕</span>`;
      h+=`</div>`;
    });
    h+=`</div>`;
  });
  
  // Resolved section
  if(resolvedKeys.length){
    h+=`<div style="margin-top:24px;padding-top:16px;border-top:2px solid var(--border)">`;
    h+=`<h3 style="font-family:var(--serif);font-size:16px;color:var(--tx-3);margin-bottom:12px">✓ Resolved (${resolvedKeys.length})</h3>`;
    resolvedKeys.sort((a,b)=>{
      const at=S.descNotes[a].resolvedAt||0;
      const bt=S.descNotes[b].resolvedAt||0;
      return bt-at;
    });
    resolvedKeys.forEach(key=>{
      const note=S.descNotes[key];
      let displayName;
      if(key.startsWith('entry|'))displayName=key.slice(6);
      else{const lp=key.lastIndexOf('|');const slp=key.lastIndexOf('|',lp-1);displayName=slp>=0?key.slice(0,slp):key.split('|')[0]}
      
      h+=`<div class="card" style="margin-bottom:8px;opacity:0.6">`;
      h+=`<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px">`;

      h+=`</div></div>`;

      });
      h+=`</div>`;
    });
    h+=`</div>`;
  }
  
  return h+'</div>';
}

function rConsistency(){
  let h='<div class="page-hd">'+rBackBtn()+'<h1>Consistency Check Results</h1>';
  h+=`<p>${(S.consistencyResults||[]).length} issues found across the index</p>`;
  h+='<div class="page-hd-actions">';
  h+=`<button class="btn btn-purple" id="rerun-consistency">⟳ Run Again</button>`;
  h+='</div></div><div class="pad">';
  
  if(!S.consistencyResults||!S.consistencyResults.length){
    h+='<div style="text-align:center;padding:40px;color:var(--tx-3)">No consistency issues found. Everything looks uniform!</div>';
    return h+'</div>';
  }
  
  // Group by type
  const byType={};
  S.consistencyResults.forEach((issue,i)=>{
    const t=issue.type||'other';
    if(!byType[t])byType[t]=[];
    byType[t].push({...issue,idx:i});
  });
  
  const typeLabels={phrase:'Phrasing Differences',word_order:'Word Order',transliteration:'Spelling/Transliteration',capitalization:'Capitalization',style:'Style/Voice',other:'Other'};
  const typeColors={phrase:'var(--purple)',word_order:'var(--blue)',transliteration:'var(--amber)',capitalization:'var(--green)',style:'var(--red)',other:'var(--tx-3)'};
  
  // Summary badges
  h+='<div style="display:flex;gap:8px;margin-bottom:20px;flex-wrap:wrap">';
  Object.keys(byType).forEach(t=>{
    h+=`<span style="font-size:12px;padding:4px 12px;border-radius:12px;background:var(--bg-1);border:1px solid var(--border);color:${typeColors[t]||'var(--tx-2)'};font-weight:500">${typeLabels[t]||t}: ${byType[t].length}</span>`;
  });
  h+='</div>';
  
  // List issues
  Object.keys(byType).forEach(t=>{
    h+=`<div style="margin-bottom:24px">`;
    h+=`<h3 style="font-family:var(--serif);font-size:16px;color:${typeColors[t]||'var(--tx-1)'};margin-bottom:10px">${typeLabels[t]||t}</h3>`;
    byType[t].forEach(issue=>{
      const dismissed=S.consistencyDismissed&&S.consistencyDismissed[issue.idx];
      h+=`<div class="card" style="margin-bottom:8px;${dismissed?'opacity:0.4':''}">`;
      h+=`<div style="display:flex;gap:12px;align-items:flex-start">`;
      h+=`<div style="flex:1;font-size:12px">`;
      if(issue.entry1)h+=`<div style="margin-bottom:4px"><strong>${esc(issue.entry1.name||'')}</strong>: <span style="color:var(--red)">${esc(issue.entry1.desc||'')}</span></div>`;
      if(issue.entry2)h+=`<div style="margin-bottom:4px"><strong>${esc(issue.entry2.name||'')}</strong>: <span style="color:var(--red)">${esc(issue.entry2.desc||'')}</span></div>`;
      if(issue.issue)h+=`<div style="color:var(--tx-3);font-size:11px;margin-bottom:4px">${esc(issue.issue)}</div>`;
      if(issue.suggestion)h+=`<div style="color:var(--green);font-weight:500">→ ${esc(issue.suggestion)}</div>`;
      h+=`</div>`;
      h+=`<button class="btn btn-sm" data-dismiss-issue="${issue.idx}" style="flex-shrink:0">${dismissed?'Restore':'Dismiss'}</button>`;
      h+=`</div></div>`;
    });
    h+=`</div>`;
  });
  
  return h+'</div>';
}
